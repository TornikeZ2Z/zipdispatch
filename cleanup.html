      } else {
        const eta=cursor+min*60000;
        const next=items[items.indexOf(it)+1];
        const sched=next&&next.leg?Date.parse(next.leg.start):null;
        let note='',_lateFlag=false;
        if(sched!=null){
          const dl=Date.parse(next.leg.winEnd||next.leg.start);
          const slack=Math.round((dl-eta)/60000);
          const lbl=next.leg.winEnd?('window until '+String(next.leg.winEnd).slice(11,16)):('scheduled '+fmtMs(sched));
          _lateFlag=slack<0;
          note=slack>=0?(' \u00b7 ETA '+fmtMs(eta)+', '+lbl+' ('+slack+' min slack)'):(' \u00b7 ETA '+fmtEtaWindow(eta));
        }
        rows.push({t:fmtMs(cursor),txt:it.label+' \u00b7 '+min+' min'+note,travel:true,warn:_lateFlag});
        cursor=sched!=null?Math.max(eta,sched):eta;
      }
    } else {
      const l=it.leg; if(!l)continue;
      const act=l.actH||schedH(l);
      const sched=Date.parse(l.start);
      const arrive=cursor===null?sched:cursor;
      const workStart=Math.max(arrive,sched);
      totMi+=mi;totMin+=min;
      const samePD=it.samePD||sameSpot(l);
      if(samePD){ const doneS=workStart+act*3600000; rows.push({t:fmtMs(workStart),txt:'Job #'+it.jobN+' \u00b7 '+l.code+' \u00b7 '+l.cityFrom+' \u2014 work '+fmtH(act)+' \u00b7 same address \u00b7 done ~'+fmtMs(doneS),travel:false}); cursor=doneS; continue; }
      const loadMs=act*ACT_LOAD_SHARE*3600000;
      const unloadMs=act*(1-ACT_LOAD_SHARE)*3600000;
      const departP=workStart+loadMs;
      const etaD=departP+min*60000;
      const done=etaD+unloadMs;
      rows.push({t:fmtMs(workStart),txt:'Job #'+it.jobN+' \u00b7 '+l.code+' \u00b7 pickup '+l.cityFrom+' \u2014 '+(it.carrier?'load':'work')+' '+fmtH(act)+' (ACT)',travel:false});
      if(it.carrier){
        rows.push({t:'',txt:'Hand off to carrier \u2014 goods continue to '+l.cityTo+(l.stateTo?', '+l.stateTo:'')+' by carrier. Crew & truck head back to base.',travel:true});
        cursor=done;
      } else if(it.inreg){
        rows.push({t:fmtMs(departP),txt:'Drive to delivery \u00b7 '+min+' min \u00b7 '+mi.toFixed(0)+' miles',travel:true});
        rows.push({t:fmtMs(etaD),txt:'Deliver '+l.cityTo+' \u00b7 ETA '+fmtMs(etaD)+' \u00b7 done ~'+fmtMs(done),travel:false});
        cursor=done;
      } else {
        const farMi=Math.round(MI(it));
        const farDrv=it.min!=null?(Math.floor(it.min/60)+'h'+String(Math.round(it.min%60)).padStart(2,'0')+' truck drive'):('~'+Math.round(farMi/52)+'h drive est');
        rows.push({t:fmtMs(departP),txt:'Departs long distance \u2192 '+l.cityTo+(l.stateTo?', '+l.stateTo:'')+' \u00b7 '+(it.mi!=null?'':'~')+farMi.toLocaleString()+' miles ('+farDrv+')',travel:true});
        rows.push({t:'',txt:'No same-day return \u2014 long-distance departure. Truck & crew continue; back at '+r.base+' base over the next day(s).',travel:true});
        cursor=null;
      }
    }
  }
  box.innerHTML=rows.map(s=>'<div class="step'+(s.travel?' tv':'')+(s.warn?' late':'')+'"><span class="dot"></span><span class="st">'+(s.t||'')+'</span><span>'+esc(s.txt)+'</span></div>').join('');
  tot.innerHTML='Day driving ~<b>'+Math.floor(totMin/60)+'h'+String(Math.round(totMin%60)).padStart(2,'0')+' \u00b7 '+totMi.toFixed(0)+' miles</b> \u00b7 empty '+Math.round(empMin)+' min / '+empMi.toFixed(0)+' miles <span class="rsrc">'+(resolved?'HERE truck routes':'straight-line estimate'+(HERE_KEY?' \u2014 refining\u2026':''))+'</span><br><span class="rsrc">ACT split 60% loading / 40% unloading; work starts no earlier than the booked time.</span>';
}

function tlChunk(td, changes, incoming){
  changes=changes||{};
  let RR=td.routes.slice();

  if(COMPANYFILTER.size) RR=RR.filter(r=>COMPANYFILTER.has(coOf((r.legs&&r.legs[0])||r.first||r)));

  let minH=8,maxH=18;
  const legBlocks=r=>{const sl=[...r.legs].sort((a,b)=>Date.parse(a.start)-Date.parse(b.start));return sl.map((l,i)=>{const st=Date.parse(l.start);const multi=l._far&&l.straight;let en=multi?null:(l._endMs||Date.parse(l.end||l.start));const nd=en&&new Date(en).getDate()!==new Date(st).getDate();return {r,l,i,n:sl.length,st,en,nd,multi};});};
  RR.forEach(r=>legBlocks(r).forEach(b=>{minH=Math.min(minH,new Date(b.st).getHours());if(b.en&&!b.nd)maxH=Math.max(maxH,new Date(b.en).getHours()+1);}));
  const A=Math.max(0,minH-1),B=Math.min(24,Math.max(maxH+1,19)),SPAN=(B-A)*60;
  const pos=ms=>{const d=new Date(ms);return ((d.getHours()*60+d.getMinutes())-A*60)/SPAN*100;};
  const kindCol=l=>{const jt=String(l.jobType||''),mt=String(l.movingType||'');if(/labor/i.test(jt))return '#5B6770';const ld=/long/i.test(mt)||l._far;if(ld&&(l.straight||/straight/i.test(jt)))return '#6C4FD8';if(ld)return '#C98A1B';return '#6E9220';};
  const shortIds=new Set(td.shortIds||[]);
  const mkB=b=>{const left=Math.max(0,pos(b.st));const right=(b.multi||b.nd)?100:Math.min(100,pos(b.en));const w=Math.max(2.5,right-left);const cf=(b.l.cf||0).toLocaleString();
    const chg=changes[b.l.code]; const chgTag=chg?(chg.kind==='move'?' \u00b7 \u2192 moving '+fmtDay(chg.to).mon+' '+fmtDay(chg.to).dn:' \u00b7 \u2192 re-chained'):'';
    const lbl=(b.n>1?(b.i+1)+'/'+b.n+' \u00b7 ':'')+(b.l.cityFrom||'')+' \u2192 '+(b.l.cityTo||'labor')+' \u00b7 '+cf+' CF'+chgTag+(b.multi?' \u00b7 \u2192 multi':(b.nd?' \u00b7 \u2192 next day':''));
    const tip=b.r.id+' \u00b7 '+(b.l.code||'')+' \u00b7 '+(b.l.cityFrom||'')+' \u2192 '+(b.l.cityTo||'\u2014')+' \u00b7 '+hmPretty(b.st)+(b.en?'\u2013'+new Date(b.en).toTimeString().slice(0,5):'')+' \u00b7 '+cf+' CF'+(chg?' \u00b7 PENDING CHANGE \u2014 Update will write this':'');
    return '<div class="tlblock'+(b.multi?' ld':'')+(b.nd?' nd':'')+(chg?' tlchg '+(chg.kind==='move'?'chgmove':'chgcall'):'')+'" style="left:'+left+'%;width:'+w+'%;'+(chg?'':'background:'+kindCol(b.l))+'" title="'+esc(tip)+'">'+esc(lbl)+'</div>';};
  const trackOf=r=>legBlocks(r).map(mkB).join('');
  let rows=''; const byB={};
  [...RR].sort((x,y)=>(x.base||'').localeCompare(y.base||'')||((x.t0||0)-(y.t0||0))).forEach(r=>{(byB[r.base]=byB[r.base]||[]).push(r);});
  const _ghosts=(td.ghosts||[]).filter(g=>(!BASEFILTER.size||BASEFILTER.has(g.base))&&(!COMPANYFILTER.size||COMPANYFILTER.has(coOf(g))));
  const _gByB={}; _ghosts.forEach(g=>{(_gByB[g.base]=_gByB[g.base]||[]).push(g);});
  const _ghostRow=(g)=>{const gl=Math.max(0,pos(g.origStartMs));const gr=Math.min(100,pos(g.origEndMs||g.origStartMs));const gw=Math.max(3,gr-gl);const dest=g.kind==='call'?('now '+hmPretty(g.newStartMs||g.arriveMs)+', after '+(jobCust(td,g.after)||g.after)):('moved to '+fmtDay(g.to).mon+' '+fmtDay(g.to).dn);return '<div class="tlrow ghostrow" data-base="'+esc(g.base)+'"'+(COLLAPSED.has(g.base)?' style="display:none"':'')+' title="'+esc(g.customer+' \u2014 '+dest)+'"><div class="tllabel"><b>'+esc(g.customer)+'</b><span>was '+hmPretty(g.origStartMs)+' \u2192 '+esc(dest)+'</span></div><div class="tltrack"><div class="tlblock ghostblk '+(g.kind==='call'?'gcall':'gmove')+'" style="left:'+gl+'%;width:'+gw+'%">was here</div></div></div>';};
  const _bases=[...new Set([...Object.keys(byB),...Object.keys(_gByB)])].sort();

    const rs=byB[bb]||[];
    rows+='<div class="tlsep" data-b="'+esc(bb)+'"><span class="tlcaret">'+(COLLAPSED.has(bb)?'\u25b8':'\u25be')+'</span><h4>'+esc(bb)+' BASE</h4><span class="tlmeta">'+rs.length+' route'+(rs.length!==1?'s':'')+((_gByB[bb]||[]).length?' \u00b7 '+(_gByB[bb]).length+' moved':'')+'</span></div>';

    (_gByB[bb]||[]).forEach(g=>{rows+=_ghostRow(g);});
  }
  let scale='<div class="tlrow scale"><div class="tllabel"></div><div class="tltrack">';
  for(let h=A;h<=B;h++){const p=(h-A)*60/SPAN*100;scale+='<div class="tlgrid" style="left:'+p+'%"></div>'+(h<B?'<div class="tlhr" style="left:'+p+'%">'+(h%24)+':00</div>':'');}
  scale+='</div></div>';
  let _inc='';
  if(incoming&&incoming.length){ _inc='<div class="tlsep incsep"><span class="tlcaret"></span><h4>\u2193 INCOMING (from your moves)</h4><span class="tlmeta">'+incoming.length+' job'+(incoming.length>1?'s':'')+'</span></div>'; incoming.forEach(m=>{const il=Math.max(0,pos(m.startMs||Date.parse(m.to)));_inc+='<div class="tlrow incomingrow" title="'+esc(m.customer+' moving in from '+m.from)+'"><div class="tllabel"><b>'+esc(m.customer)+'</b><span>\u2190 from '+fmtDay(m.from).mon+' '+fmtDay(m.from).dn+'</span></div><div class="tltrack"><div class="tlblock ghostblk gin" style="left:'+il+'%;width:6%">incoming</div></div></div>';}); }
  return '<div id="cltl" class="tlwrap">'+scale+_inc+rows+'</div>';
}

function removeJobByEventId(id){

    const i=(DATA.days[d]||[]).findIndex(j=>j.eventId&&String(j.eventId).split('@')[0]===bare);
    if(i>=0){const old=DATA.days[d][i];DATA.days[d].splice(i,1);return {day:d,old};}
  }

}
async function calSyncCore(){

  var tm=function(s){return s?String(s).slice(11,16):'';};

    const j=await gapiFetch('calendars/'+encodeURIComponent(GCAL_ID)+'/events?updatedMin='+encodeURIComponent(since)+'&maxResults=250&showDeleted=true&singleEvents=false'+(pageToken?'&pageToken='+pageToken:''));
    items=items.concat(j.items||[]);pageToken=j.nextPageToken;
  }while(pageToken&&items.length<2000);

      if(was){del++;lines.push('🗑 '+((was.old&&was.old.customer)||ev.summary||ev.id)+' — removed ('+was.day+')');}
      continue;
    }
    const job=parseCalEvent(ev);
    if(!job){skip++;continue;}
    const was=removeJobByEventId(ev.id);
    const day=job.start.slice(0,10);
    job.idx=(DATA.days[day]=DATA.days[day]||[]).length;
    DATA.days[day].push(job);
    if(was){upd++;const _o=was.old||{};const _ch=[];
      if(was.day!==day)_ch.push('moved '+was.day+' → '+day);
      if(_o.start&&job.start&&_o.start!==job.start)_ch.push('time '+tm(_o.start)+' → '+tm(job.start));
      if((_o.crew||0)!==(job.crew||0))_ch.push('crew '+(_o.crew||'?')+' → '+(job.crew||'?'));
      if((_o.cf||0)!==(job.cf||0))_ch.push('CF '+(_o.cf||0).toLocaleString()+' → '+(job.cf||0).toLocaleString());
      if((_o.trucksQ||0)!==(job.trucksQ||0))_ch.push('trucks '+(_o.trucksQ||'?')+' → '+(job.trucksQ||'?'));
      if((_o.mf||'')!==(job.mf||''))_ch.push('foreman/pickup changed');
      if((_o.deliveryAddr||_o.mt||'')!==(job.deliveryAddr||job.mt||''))_ch.push('dropoff changed');
      lines.push('🔁 '+(job.customer||job.code)+' — '+(_ch.length?_ch.join(', '):'details updated')+' ('+day+')');
    } else {add++;lines.push('🆕 '+(job.customer||job.code)+' — new ('+day+')');}
  }

  if(add+upd+del>0){ rcInvalidate(); renderHorizon(); if(SELECTED&&WINDOW.find(function(d){return d.iso===SELECTED;}))renderDay(SELECTED); else if(WINDOW.length){SELECTED=WINDOW[0].iso;renderDay(SELECTED);} updateCalBtns(); populateDayPicker(); }
  return LAST_SYNC;
}

/* ===== Update Calendar (robust): gather every confirmed change across all days from durable state ===== */
/* ===== Update Calendar v3 (bulletproof): never drop a confirmed item; always show the summary ===== */
function gatherConfirmed(){
  var byIso={};
  Object.keys(STATUS).forEach(function(k){
    if(STATUS[k]!=='confirmed')return;
    var p=k.split('|'); if(p.length<4)return;
    var iso=p[0], slot=String(p[1]).replace(/^slot/,''), kind=p[2], code=p.slice(3).join('|');
    if(!iso||!kind||!code)return;
    (byIso[iso]=byIso[iso]||[]).push({iso:iso,slot:slot,kind:kind,code:code,key:k});
  });
  var out=[];
  Object.keys(byIso).forEach(function(iso){
    var hasCall=byIso[iso].some(function(x){return x.kind==='call';});
    var plan=null;
    if(hasCall){ try{ plan=cleanupPlan(iso, scanHorizon(windowStart(),7)); }catch(e){} }
    byIso[iso].forEach(function(x){
      var j=jobByCode(x.code);
      x.customer=(typeof SLOTCUST!=='undefined'&&SLOTCUST[x.key])||(j&&j.customer)||x.code;
      x.eventId=(j&&j.eventId)||null; x.writable=false; x.why='';
      if(x.kind==='move'){
        var cm=CONFIRMED_MOVES[x.code]; x.to=(cm&&cm.to)||null;
        if(x.eventId&&x.to)x.writable=true; else x.why=(!x.eventId?'job not loaded yet':'no target date');
      } else {
        x.after=LEADS[iso+'|slot'+x.slot+'|'+x.code]||null;
        if(plan){ var rec=(plan.callPool||[]).find(function(r){return r.tail===x.code;})||(plan.standardChains||[]).find(function(r){return r.tail===x.code;}); if(rec){ if(x.arriveMs==null)x.arriveMs=(rec.askArriveMs!=null?rec.askArriveMs:rec.arriveMs); if(!x.after)x.after=rec.after; } }
        if(x.eventId&&x.after)x.writable=true; else x.why=(!x.eventId?'job not loaded yet':'lead not found');
      }
      out.push(x);                       /* ALWAYS include — the summary shows everything that is confirmed */
    });
  });
  out.sort(function(a,b){return a.iso<b.iso?-1:a.iso>b.iso?1:0;});
  return out;
}

async function executeCalWrites(){
  var acts=gatherConfirmed().filter(function(a){return a.writable;});
  if(!acts.length){gModal('Nothing to write','<div class="gsub">No confirmed changes are ready to write yet. Press ↻ Refresh so the calendar finishes loading, then try again.</div>');return;}
  var ok=0,fail=0;var errs=[];var done=[];
  var pad=function(n){return String(n).padStart(2,'0');};
  var fmtLocal=function(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';};
  for(const a of acts){
    try{
      const ev=await gapiFetch(evPath(a.eventId));
      const tz=(ev.start&&ev.start.timeZone)||'America/New_York';
      const durMs=(Date.parse(ev.end&&ev.end.dateTime)-Date.parse(ev.start&&ev.start.dateTime))||3*3600000;
      if(a.kind==='call'){
        let leadNick='',leadTruck='';
        const lj=jobByCode(a.after); const leadEventId=(lj&&lj.eventId)||null;
        if(leadEventId){try{const lev=await gapiFetch(evPath(leadEventId));const tg=parseTitleTag(lev.summary);leadNick=tg.nick;leadTruck=tg.truck;}catch(e){}}
        let desc=ev.description||'';
        desc=upsertField(desc,'After Job Code',a.after);
        desc=upsertField(desc,'After Customer Name',(lj&&lj.customer)||'');
        if(leadTruck)desc=upsertField(desc,'Truck #',leadTruck);
        desc=upsertField(desc,'Support Chained','Yes');
        const leadCust=(lj&&lj.customer)||a.after||'';
        let baseTitle=String(ev.summary||'').replace(/^AFTER\b[^·]*·\s*/i,'');
        if(leadNick)baseTitle=newTitle(baseTitle,leadNick,leadTruck);
        const body={description:desc, summary:(leadCust?('AFTER '+leadCust+' · '):'')+baseTitle};
        body.attendees=setForemanGuest(ev.attendees,emailForNick(leadNick),foremanEmailSet());
        if(a.arriveMs!=null){
          const day=String(ev.start.dateTime||'').slice(0,10)||a.iso;
          const win=(typeof cleanWindow==='function')?cleanWindow(a.arriveMs,day):null;
          const sd=day+'T'+(win?win.start:fmtMs(a.arriveMs))+':00';
          body.start={dateTime:sd,timeZone:tz};
          body.end={dateTime:(win&&win.end?day+'T'+win.end+':00':fmtLocal(new Date(Date.parse(sd)+durMs))),timeZone:tz};
        }
        await gapiFetch(evPath(a.eventId)+'?sendUpdates=all',{method:'PATCH',body:JSON.stringify(body)});
      } else {
        const clock=(ev.start.dateTime||'').slice(11,16)||'09:00';
        const sdt=a.to+'T'+clock+':00';
        await gapiFetch(evPath(a.eventId)+'?sendUpdates=all',{method:'PATCH',body:JSON.stringify({start:{dateTime:sdt,timeZone:tz},end:{dateTime:fmtLocal(new Date(Date.parse(sdt)+durMs)),timeZone:tz}})});
      }
      ok++; done.push(a);
    }catch(e){fail++;errs.push((a.customer||a.code)+': '+e.message);}
  }
  done.forEach(function(a){ try{delete STATUS[a.key];}catch(e){} try{delete LEADS[a.iso+'|slot'+a.slot+'|'+a.code];}catch(e){} try{delete CONFIRMED_MOVES[a.code];}catch(e){} try{if(typeof logDecision==='function')logDecision(a.iso,a.code,a.customer||'','','pushed','');}catch(e){} });
  try{saveStatus(STATUS);}catch(e){} try{saveMoves();}catch(e){} try{saveLeads();}catch(e){}

  $('gmodalhost').innerHTML='';
  gModal('Calendar updated','<div class="gsub">✅ '+ok+' change'+(ok!==1?'s':'')+' written'+(fail?' · ⚠ '+fail+' failed':'')+'.</div>'+(fail?'<div class="gqt">'+esc(errs.slice(0,5).join(' · '))+(/40[13]/.test(errs.join(' '))?'<br>Sign-in may have expired or lacks calendar access — click <b>Connect Calendar</b>, then Update again.':'')+'</div>':'')+'<div class="gqt">Refreshing the board to reflect the changes…</div>');
  try{ if(typeof SELECTED!=='undefined'&&SELECTED)renderDay(SELECTED); if(typeof renderHorizon==='function')renderHorizon(); if(typeof updateCalBtns==='function')updateCalBtns(); if(typeof updateResetCU==='function')updateResetCU(); }catch(e){}
  try{ if(window._calFullDone && typeof calSyncCore==='function'){ Promise.resolve(calSyncCore()).then(function(){ try{if(SELECTED)renderDay(SELECTED);if(typeof renderHorizon==='function')renderHorizon();}catch(_){} }).catch(function(){}); } else if(typeof pullAll==='function'){ pullAll(); } }catch(e){}
}
