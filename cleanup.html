  if(!RR.length) return '<div id="cltl" class="tlwrap"><div class="tlempty">No routes for the selected base'+(BASEFILTER.size>1?'s':'')+' on this day.</div></div>';
  let minH=8,maxH=18;
  const legBlocks=r=>{const sl=[...r.legs].sort((a,b)=>Date.parse(a.start)-Date.parse(b.start));return sl.map((l,i)=>{const st=Date.parse(l.start);const multi=l._far&&l.straight;let en=multi?null:(l._endMs||Date.parse(l.end||l.start));const nd=en&&new Date(en).getDate()!==new Date(st).getDate();return {r,l,i,n:sl.length,st,en,nd,multi};});};
  RR.forEach(r=>legBlocks(r).forEach(b=>{minH=Math.min(minH,new Date(b.st).getHours());if(b.en&&!b.nd)maxH=Math.max(maxH,new Date(b.en).getHours()+1);}));

  const pos=ms=>{const d=new Date(ms);return ((d.getHours()*60+d.getMinutes())-A*60)/SPAN*100;};
  const kindCol=l=>{const jt=String(l.jobType||''),mt=String(l.movingType||'');if(/labor/i.test(jt))return '#5B6770';const ld=/long/i.test(mt)||l._far;if(ld&&(l.straight||/straight/i.test(jt)))return '#6C4FD8';if(ld)return '#C98A1B';return '#6E9220';};
  const shortIds=new Set(td.shortIds||[]);
  const mkB=b=>{const left=Math.max(0,pos(b.st));const right=(b.multi||b.nd)?100:Math.min(100,pos(b.en));const w=Math.max(2.5,right-left);const cf=(b.l.cf||0).toLocaleString();
    const chg=changes[b.l.code]; const chgTag=chg?(chg.kind==='move'?' \u00b7 \u2192 moving '+fmtDay(chg.to).mon+' '+fmtDay(chg.to).dn:' \u00b7 \u2192 re-chained'):'';
    const lbl=(b.n>1?(b.i+1)+'/'+b.n+' \u00b7 ':'')+(b.l.cityFrom||'')+' \u2192 '+(b.l.cityTo||'labor')+' \u00b7 '+cf+' CF'+chgTag+(b.multi?' \u00b7 \u2192 multi':(b.nd?' \u00b7 \u2192 next day':''));

    return '<div class="tlblock'+(b.multi?' ld':'')+(b.nd?' nd':'')+(chg?' tlchg '+(chg.kind==='move'?'chgmove':'chgcall'):'')+'" style="left:'+left+'%;width:'+w+'%;'+(chg?'':'background:'+kindCol(b.l))+'" title="'+esc(tip)+'">'+esc(lbl)+'</div>';};
  const trackOf=r=>legBlocks(r).map(mkB).join('');

  const _ghostRow=(g)=>{const gl=Math.max(0,pos(g.origStartMs));const gr=Math.min(100,pos(g.origEndMs||g.origStartMs));const gw=Math.max(3,gr-gl);const dest=g.kind==='call'?('now '+hmPretty(g.newStartMs||g.arriveMs)+', after '+(jobCust(td,g.after)||g.after)):('moved to '+fmtDay(g.to).mon+' '+fmtDay(g.to).dn);return '<div class="tlrow ghostrow" data-base="'+esc(g.base)+'"'+(COLLAPSED.has(g.base)?' style="display:none"':'')+' title="'+esc(g.customer+' \u2014 '+dest)+'"><div class="tllabel"><b>'+esc(g.customer)+'</b><span>was '+hmPretty(g.origStartMs)+' \u2192 '+esc(dest)+'</span></div><div class="tltrack"><div class="tlblock ghostblk '+(g.kind==='call'?'gcall':'gmove')+'" style="left:'+gl+'%;width:'+gw+'%">was here</div></div></div>';};

    const rs=byB[bb]||[];
    rows+='<div class="tlsep" data-b="'+esc(bb)+'"><span class="tlcaret">'+(COLLAPSED.has(bb)?'\u25b8':'\u25be')+'</span><h4>'+esc(bb)+' BASE</h4><span class="tlmeta">'+rs.length+' route'+(rs.length!==1?'s':'')+((_gByB[bb]||[]).length?' \u00b7 '+(_gByB[bb]).length+' moved':'')+'</span></div>';

  scale+='</div></div>';
  let _inc='';
  if(incoming&&incoming.length){ _inc='<div class="tlsep incsep"><span class="tlcaret"></span><h4>\u2193 INCOMING (from your moves)</h4><span class="tlmeta">'+incoming.length+' job'+(incoming.length>1?'s':'')+'</span></div>'; incoming.forEach(m=>{const il=Math.max(0,pos(m.startMs||Date.parse(m.to)));_inc+='<div class="tlrow incomingrow" title="'+esc(m.customer+' moving in from '+m.from)+'"><div class="tllabel"><b>'+esc(m.customer)+'</b><span>\u2190 from '+fmtDay(m.from).mon+' '+fmtDay(m.from).dn+'</span></div><div class="tltrack"><div class="tlblock ghostblk gin" style="left:'+il+'%;width:6%">incoming</div></div></div>';}); }
  return '<div id="cltl" class="tlwrap">'+scale+_inc+rows+'</div>';
}

    if(plan.status==='short'){ var _fut=[]; for(var _k=1;_k<=3;_k++){ var _fd=new Date(Date.parse(iso+'T12:00')+_k*86400000); var _fi=_fd.getFullYear()+'-'+String(_fd.getMonth()+1).padStart(2,'0')+'-'+String(_fd.getDate()).padStart(2,'0'); var _fe=horizon.find(function(x){return x.iso===_fi;}); if(_fe&&_fe.spare<1)_fut.push(_fe); } var _hasMove=slots.slots.some(function(s){return s.current&&s.current.kind==='move';}); if(!_hasMove&&_fut.length){ h+='<div class="distalert">\u26a0 <b>No date-move is possible from this day yet</b> \u2014 the next '+_fut.length+' day'+(_fut.length>1?'s':'')+' ('+_fut.map(function(e){var _ff=fmtDay(e.iso);return _ff.mon+' '+_ff.dn+' \u00b7 '+(e.status==='short'?'over '+Math.abs(e.spare):'full');}).join(', ')+') '+(_fut.length>1?'are':'is')+' also full, so there\u2019s nowhere to move a job into. Clear the shortage on '+(_fut.length>1?'those days':'that day')+' first \u2014 each crew you free there opens a slot to pull one of this day\u2019s jobs forward.</div>'; } }

  h+='<div class="tlbar"><div class="tltitle">Routes on '+f.dow+' '+f.dn+' \u2014 click any to see the whole run</div><div class="tlleg"><i style="background:#6E9220"></i>local <i style="background:#C98A1B"></i>long <i style="background:#6C4FD8"></i>straight <i style="background:#5B6770"></i>labor <span class="lgchg"></span>pending change</div></div>';

  }));

    const r=RECS[row.dataset.rt]; if(!r||!r.route)return;

    if(ACTIVE_ROUTE===row.dataset.rt){exitMap();ACTIVE_ROUTE=null;return;}
    row.classList.add('rtsel'); ACTIVE_ROUTE=row.dataset.rt;
    const rt=r.route; const title=rt.id+' \u00b7 '+(rt.legs.length>1?rt.legs.length+' jobs':((rt.legs[0].cityFrom||'')+' \u2192 '+(rt.legs[0].cityTo||'')));
    const sub='Base '+esc(rt.base||'')+' \u00b7 '+(rt.totalCF||0).toLocaleString()+' CF \u00b7 the whole run for this day.';
    showRouteJourney(rt, title, sub);

  root.querySelectorAll('#cltl .tlsep[data-b]').forEach(sep=>sep.addEventListener('click',()=>{ const b=sep.dataset.b; if(COLLAPSED.has(b))COLLAPSED.delete(b); else COLLAPSED.add(b); root.querySelectorAll('#cltl .tlrow[data-base="'+b+'"]').forEach(r=>{r.style.display=COLLAPSED.has(b)?'none':'';}); const c=sep.querySelector('.tlcaret'); if(c)c.textContent=COLLAPSED.has(b)?'\u25b8':'\u25be'; }));

/* ===== calendar write-back (cleanup): re-chain + date move, final-face ===== */
function upsertField(desc,label,value){desc=desc==null?'':String(desc);value=value==null?'':String(value);const lines=desc.split('\n');const rx=new RegExp('^\\s*'+label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*:','i');let found=false;for(let i=0;i<lines.length;i++){if(rx.test(lines[i])){lines[i]=label+': '+value;found=true;break;}}if(!found)lines.push(label+': '+value);return lines.join('\n');}
function setForemanGuest(attendees,newEmail,foremanEmails){const set=new Set((foremanEmails||[]).map(e=>String(e).toLowerCase()));let att=(attendees||[]).slice().filter(a=>{const e=(a.email||'').toLowerCase();if(!e)return true;if(set.has(e))return false;return true;});if(newEmail){const ne=newEmail.toLowerCase();if(!att.some(a=>(a.email||'').toLowerCase()===ne))att.push({email:newEmail});}return att;}
function foremanEmailSet(){return (DATA.foremen||[]).map(f=>(f.email||'')).filter(Boolean);}
function emailForNick(nick){const f=(DATA.foremen||[]).find(x=>(x.nick||'').toLowerCase()===String(nick||'').toLowerCase());return (f&&f.email)||'';}
function parseTitleTag(title){const p=String(title||'').split('#');return p.length>=3?{nick:p[1],truck:p[2]}:{nick:'',truck:''};}
function newTitle(oldTitle,nick,truckTok){const p=String(oldTitle||'').split('#');if(p.length>=3){p[1]=nick;p[2]=truckTok;return p.join('#');}return String(oldTitle||'')+' #'+nick+'#'+truckTok+'#';}
function calActions(){
  const out=[]; if(!CURPLAN)return out;
  const chg=CURCHANGES||{};
  Object.keys(chg).forEach(function(code){
    const c=chg[code]; const j=jobByCode(code); if(!j||!j.eventId)return;
    if(c.kind==='call'){
      const lead=c.after; const lj=lead?jobByCode(lead):null;
      const rec=((CURPLAN.callPool||[]).find(function(x){return x.tail===code;}))||{};
      const arrive=rec.askArriveMs!=null?rec.askArriveMs:rec.arriveMs;
      out.push({kind:'rechain',code:code,eventId:j.eventId,customer:j.customer||c.customer,
        leadCode:lead,leadCustomer:(lj&&lj.customer)||'',leadEventId:(lj&&lj.eventId)||null,newStartMs:arrive});
    } else if(c.kind==='move'){
      out.push({kind:'date',code:code,eventId:j.eventId,customer:j.customer,toDay:c.to});
    }
  });
  return out;
}
async function executeCalWrites(){
  const acts=calActions();
  if(!acts.length){gModal('Nothing to write','<div class="gsub">No confirmed changes on this day yet.</div>');return;}
  let ok=0,fail=0;const errs=[];
  const pad=n=>String(n).padStart(2,'0');
  const fmtLocal=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
  for(const a of acts){
    try{
      const ev=await gapiFetch(evPath(a.eventId));
      const tz=(ev.start&&ev.start.timeZone)||'America/New_York';
      const durMs=(Date.parse(ev.end&&ev.end.dateTime)-Date.parse(ev.start&&ev.start.dateTime))||3*3600000;
      if(a.kind==='rechain'){
        let leadNick='',leadTruck='';
        if(a.leadEventId){try{const lev=await gapiFetch(evPath(a.leadEventId));const tg=parseTitleTag(lev.summary);leadNick=tg.nick;leadTruck=tg.truck;}catch(e){}}
        let desc=ev.description||'';
        if(a.leadCode)desc=upsertField(desc,'After Job Code',a.leadCode);
        desc=upsertField(desc,'After Customer Name',a.leadCustomer||'');
        if(leadTruck)desc=upsertField(desc,'Truck #',leadTruck);
        desc=upsertField(desc,'Support Chained','Yes');
        const body={description:desc};
        if(leadNick)body.summary=newTitle(ev.summary,leadNick,leadTruck);
        body.attendees=setForemanGuest(ev.attendees,emailForNick(leadNick),foremanEmailSet());
        if(a.newStartMs!=null){const day=String(ev.start.dateTime||'').slice(0,10)||(SELECTED||CURPLAN.iso);const sd=day+'T'+fmtMs(a.newStartMs)+':00';body.start={dateTime:sd,timeZone:tz};body.end={dateTime:fmtLocal(new Date(Date.parse(sd)+durMs)),timeZone:tz};}
        await gapiFetch(evPath(a.eventId)+'?sendUpdates=all',{method:'PATCH',body:JSON.stringify(body)});
      } else {
        const clock=(ev.start.dateTime||'').slice(11,16)||'09:00';
        const sdt=a.toDay+'T'+clock+':00';
        await gapiFetch(evPath(a.eventId)+'?sendUpdates=all',{method:'PATCH',body:JSON.stringify({start:{dateTime:sdt,timeZone:tz},end:{dateTime:fmtLocal(new Date(Date.parse(sdt)+durMs)),timeZone:tz}})});
      }
      ok++;
    }catch(e){fail++;errs.push(a.code+': '+e.message);}
  }
  $('gmodalhost').innerHTML='';
  gModal('Calendar updated','<div class="gsub">\u2705 '+ok+' change'+(ok!==1?'s':'')+' written'+(fail?' \u00b7 \u26a0 '+fail+' failed':'')+'.</div>'+(fail?'<div class="gqt">'+esc(errs.slice(0,4).join(' \u00b7 '))+(/40[13]/.test(errs.join(' '))?'<br>Sign-in may have expired or lacks calendar access \u2014 click <b>Connect Calendar</b>, then Update again.':'')+'</div>':'')+'<div class="gqt">Press Update Calendar to re-pull and see them reflected here.</div>');
}

  html+='<div class="sumnet">Net effect: frees <b>'+ents.length+'</b> crew-day'+(ents.length>1?'s':'')+' on this date.</div>';

  box.querySelector('#sumcancel').onclick=function(){$('gmodalhost').innerHTML='';};

}

function plan_buffer(){return (typeof CLEAN!=='undefined'&&CLEAN.buffer)||2;}

/* ===== Update Calendar: write agreed actions ===== */
function agreedActions(){
  const out=[];
  if(!CURPLAN)return out;
  const iso=CURPLAN.iso;
  CURPLAN.extraChains.forEach(e=>{const id=iso+'|call|'+e.tail;if(STATUS[id]==='done'){const j=jobByCode(e.tail);if(j&&j.eventId)out.push({kind:'time',code:e.tail,eventId:j.eventId,customer:e.customer,newStartMs:e.askArriveMs,day:iso});}});
  CURPLAN.moves.forEach(m=>{const id=iso+'|move|'+m.code;if(STATUS[id]==='done'){const j=jobByCode(m.code);if(j&&j.eventId)out.push({kind:'date',code:m.code,eventId:j.eventId,customer:m.customer,toDay:m.to,keepStart:String(j.start).slice(11)});}});
  return out;
}
function updateCalendarFlow(){
  ensureGToken(async()=>{
    const acts=agreedActions();
    if(!acts.length){gModal('Nothing to write yet','Mark the calls you\u2019ve <b>agreed</b> and the dates you\u2019ve <b>moved</b> (green buttons) on this day, then press Update calendar. Declined and to-do items are skipped.');return;}
    const list=acts.map(a=>a.kind==='time'
      ?'<li><b>'+esc(a.customer||a.code)+'</b>: change start time to <b>'+fmtMs(a.newStartMs)+'</b> (same day)</li>'
      :'<li><b>'+esc(a.customer||a.code)+'</b>: move to <b>'+a.toDay+'</b> (keep '+a.keepStart.slice(0,5)+')</li>').join('');
    const box=gModal('Write '+acts.length+' change'+(acts.length>1?'s':'')+' to the calendar?','<div class="gsub">These edit real calendar events. Only items you marked agreed/moved are included.</div><ul style="margin:10px 0 0 18px;line-height:1.7">'+list+'</ul>',
      '<button class="cb" id="cancelw">Cancel</button> <button class="cb on-done" id="dow">Write '+acts.length+' change'+(acts.length>1?'s':'')+'</button>');
    box.querySelector('#cancelw').onclick=()=>$('gmodalhost').innerHTML='';
    box.querySelector('#dow').onclick=async()=>{
      box.querySelector('#dow').textContent='Writing…';box.querySelector('#dow').disabled=true;
      let ok=0,fail=0;
      for(const a of acts){
        try{
          const ev=await gapiFetch(evPath(a.eventId));
          const tz=(ev.start&&ev.start.timeZone)||'America/New_York';
          let sd,ed;
          if(a.kind==='time'){
            const day=String((ev.start.dateTime||'')).slice(0,10)||a.day;
            sd=day+'T'+fmtMs(a.newStartMs)+':00';
            const durMs=(Date.parse(ev.end.dateTime)-Date.parse(ev.start.dateTime))||3*3600000;
            ed=new Date(Date.parse(sd)+durMs);
            const pad=n=>String(n).padStart(2,'0');const f=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
            await gapiFetch(evPath(a.eventId),{method:'PATCH',body:JSON.stringify({start:{dateTime:sd,timeZone:tz},end:{dateTime:f(ed),timeZone:tz}})});
          } else {

  {const _dk=Object.keys(DATA.days).sort(),_bc=DATA.foremen.filter(f=>f.status!=='Active'&&f.status!=='Cancelled').length;$('rfstamp').textContent=_dk.length?('jobs through '+_dk[_dk.length-1]+' \u00b7 '+_bc+' backup crews held'):(GTOKEN?'Loading jobs\u2026':'Connect Calendar above to load jobs');}
  updateCalBtns();
  renderHorizon();
  populateDayPicker();
  const fs=WINDOW.find(d=>d.status==='short')||WINDOW.find(d=>d.status==='tight')||WINDOW[0];
  if(fs){SELECTED=fs.iso;renderHorizon();renderDay(SELECTED);}
  else $('daydetail').innerHTML='<div class="pickprompt">'+(!GTOKEN?'Connect Google Calendar (button above) to load your upcoming jobs.':(Object.keys(DATA.days).length?'No calendar days in this range. Pick another start date above.':'Loading jobs from Google Calendar…'))+'</div>';
  if(GTOKEN&&!boot._pulled){boot._pulled=1;pullAll();}else if(GTOKEN){syncFromSheet();}
}
boot();
/* keep the Google token alive in the background so it stops asking to reconnect (mirrors the dispatcher) */
if(!window._gsiFail&&localStorage.getItem('zd_gconn')===GSCOPE_VER&&(!GTOKEN||Date.now()>GTOKEXP-300000)){
  setTimeout(function(){try{
    if(!(window.google&&google.accounts&&google.accounts.oauth2))return;
    window._silentTok=1;
    _tokenClient=_tokenClient||google.accounts.oauth2.initTokenClient({client_id:GCAL_CLIENT_ID,scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/spreadsheets',callback:function(){}});
    _tokenClient.callback=function(resp){ if(resp&&resp.access_token){ GTOKEN=resp.access_token;GTOKEXP=Date.now()+((resp.expires_in||3600)*1000); try{localStorage.setItem('zd_gtok',JSON.stringify({t:GTOKEN,exp:GTOKEXP,scope:GSCOPE_VER}));}catch(e){} try{updateCalBtns();}catch(e){} if(!boot._pulled){boot._pulled=1;try{pullAll();}catch(e){}} } window._silentTok=0; };
    _tokenClient.requestAccessToken({prompt:''});
  }catch(e){}},900);
}
setInterval(function(){
  if(!GTOKEN||window._gsiFail||localStorage.getItem('zd_gconn')!==GSCOPE_VER)return;
  if(Date.now()<GTOKEXP-420000)return;
  try{window._silentTok=1;_tokenClient.requestAccessToken({prompt:''});}catch(e){}
},300000);
</script>
