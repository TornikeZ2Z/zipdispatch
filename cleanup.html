<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Calendar Cleanup · Zip To Zip</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onerror="window._gsiFail=1"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{
  --paper:#F7F6F2; --card:#FFFFFF; --ink:#1F2329; --dim:#646B73; --faint:#969CA3;
  --line:#E6E4DC; --line2:#D3D0C6;
  --fleet:#6E9220; --fleet-bg:#F3F8E4; --fleet-bd:#D3E3A6;
  --rental:#B26B0B; --rental-bg:#FBF0DC; --rental-bd:#EDD6A8;
  --hazard:#B3362A; --hazard-bg:#FBE9E6; --hazard-bd:#F0C7C0;
  --travel:#6C5CE0; --travel-bg:#EFECFB; --travel-bd:#D6D0F5;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px;border:2px solid var(--paper)}
::-webkit-scrollbar-track{background:transparent}

header{display:flex;align-items:center;gap:18px;padding:14px 28px;background:var(--card);border-bottom:1px solid var(--line);flex-wrap:nowrap;position:sticky;top:0;z-index:1100}
.brand{flex-shrink:0;width:360px;min-width:360px}
#brandlogo{height:44px;width:auto;display:block;align-self:flex-start}
#dlabel{display:flex;flex-direction:column;align-items:center;line-height:1.2}
#dlabel .dl1{font-weight:800}
#dlabel .dl2{font-size:14px;color:var(--dim);font-weight:600}
#hdate{display:none}
header .date{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:440px;display:block}
@media (max-width:1480px){header .date{max-width:300px}}
#daynav{flex-shrink:0}
.stats{flex:0 1 auto;min-width:0;margin-left:auto;overflow-x:auto;justify-content:flex-start;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
#rfwrap{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin-left:4px}
.rfrowbtns{display:flex;align-items:center;gap:8px}
#rfstamp{font-size:13px;color:var(--faint);white-space:nowrap}
#locknote{position:fixed;top:84px;right:24px;z-index:2000;background:var(--ink);color:#fff;font-size:15px;line-height:1.5;padding:12px 16px;border-radius:10px;max-width:340px;box-shadow:0 6px 20px rgba(0,0,0,.18);opacity:0;transform:translateY(-6px);transition:opacity .2s,transform .2s;pointer-events:none}
#locknote.show{opacity:1;transform:none}
#locknote u{text-underline-offset:2px}
.synclist{max-height:340px;overflow:auto;margin-top:10px;border:1px solid var(--line);border-radius:10px}
.syncrow{padding:9px 13px;border-bottom:1px solid var(--line);font-size:14.5px}
.syncrow:last-child{border-bottom:none}
@media (max-width:760px){#locknote{top:auto;bottom:16px;left:12px;right:12px;max-width:none}}
@media (max-width:1100px){header{flex-wrap:wrap}header .date{max-width:none}}
.brand{display:flex;flex-direction:column;gap:1px}
header h1{font-family:'Barlow Condensed';font-weight:600;font-size:30px;letter-spacing:.05em;text-transform:uppercase;line-height:1}
header .date{color:var(--dim);font-size:16px}
.stats{display:flex;align-items:stretch;gap:0}
.stat{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:0 26px;border-left:1px solid var(--line);text-align:left}
.stat:first-child{border-left:none}
.stat .v{font-family:'Barlow Condensed';font-weight:600;font-size:34px;line-height:1}
.stat .l{white-space:nowrap;color:var(--faint);font-size:14px;text-transform:uppercase;letter-spacing:.09em;font-weight:600}
.stat .v.amber{color:var(--rental)} .stat .v.teal{color:var(--fleet)}

#warnstrip{display:flex;flex-direction:column;gap:6px;padding:12px 28px;background:var(--rental-bg);border-bottom:1px solid var(--rental-bd)}
#warnstrip div{color:#7A4E10;font-size:16px;display:flex;align-items:baseline;gap:9px}
#warnstrip div::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--rental);flex-shrink:0;position:relative;top:0px}
#warnstrip b{font-weight:600}

.layout{display:flex;align-items:flex-start}
#mapwrap{position:relative;position:sticky;top:71px;height:calc(100vh - 71px);z-index:1}
#map{width:100%;height:100%;display:block;background:#E9F0F1}
.leaflet-container{font-family:'Inter',sans-serif;font-size:15px}
.leaflet-control-zoom a{color:var(--ink)!important;border-color:var(--line2)!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:19px!important}
.leaflet-control-attribution{font-size:11.5px!important;background:rgba(255,255,255,.75)!important}
.leaflet-tooltip.lpop, .lpop .leaflet-popup-content{font-size:15px}

.bmark{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#fff;border:3px solid var(--fleet);font-family:'Barlow Condensed';font-weight:600;font-size:14.5px;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.18)}
.bmark.amber{border-color:var(--rental)}
.bmark.idle{border-color:#ABB1AB;opacity:.7}
.pmark{width:15px;height:15px;border-radius:50%;background:#1F2329;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dmark{width:15px;height:15px;border-radius:50%;background:#fff;border:3.5px solid #1F2329;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dmark.f{border-color:var(--fleet)} .dmark.r{border-color:var(--rental)}
.lpop .leaflet-popup-content{margin:12px 15px;line-height:1.55}
.lpop .tt{font-weight:600;font-size:16px}
.lpop .ts{color:var(--dim);font-size:15px}

.maplegend{position:absolute;left:14px;bottom:14px;display:flex;gap:18px;font-size:15px;color:var(--dim);background:rgba(255,255,255,.94);padding:10px 16px;border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);z-index:800}
.maplegend span{display:flex;align-items:center;gap:8px;font-weight:500}
.sw{display:inline-block;width:22px;height:0;border-top:3px solid;border-radius:2px}
.sw.dash{border-top-style:dashed}

.mapcard{position:absolute;left:14px;top:14px;z-index:1200;background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:12px;padding:15px 19px;width:clamp(320px,52vw,940px);max-width:calc(100% - 28px);box-sizing:border-box;box-shadow:0 4px 16px rgba(0,0,0,.09);max-height:calc(100% - 28px);display:flex;flex-direction:column}
.mchead{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mchead .mt{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcbtns{display:flex;gap:6px;flex-shrink:0}
.mcmin,.mcx{background:var(--paper);border:1.5px solid var(--line2);border-radius:8px;font-family:'Inter';font-weight:700;cursor:pointer;color:var(--ink);font-size:14.5px;padding:4px 10px;line-height:1.2;white-space:nowrap}
.mcx{color:var(--hazard)}
.mcmin:hover,.mcx:hover{border-color:var(--ink)}
.mcbody{overflow-y:auto;min-height:0;display:flex;flex-direction:column}
.mapcard.min{width:auto;min-width:0;padding:9px 12px}
.mapcard.min .mcbody{display:none}
.mapcard.min .mchead{gap:14px}
.mapcard .mt{font-family:'Barlow Condensed';font-weight:600;font-size:22px;letter-spacing:.02em}
.mapcard .ms{font-size:15px;color:var(--dim);margin-top:3px;line-height:1.5}
.mapcard .steps{margin-top:10px;display:flex;flex-direction:column;gap:7px;padding-right:4px}
.bchip.co-chip{font-weight:700}
.bchip.co-chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.mapcard .step{font-size:15px;color:var(--ink);display:flex;gap:8px;position:relative;padding-left:17px;line-height:1.45}
.mapcard .step .dot{position:absolute;left:0;top:5px;width:9px;height:9px;border-radius:50%;background:var(--ink)}
.mapcard .step.tv .dot{background:var(--travel)}
.mapcard .step:not(:last-child)::after{content:'';position:absolute;left:4px;top:16px;bottom:-9px;width:1.5px;background:var(--line2)}
.mapcard .step.tv{color:var(--travel)}
.mapcard .step.late{color:var(--hazard);font-weight:600}
.mapcard .step.late .dot{background:var(--hazard)}
.rsrc{color:var(--faint);font-size:13.5px}
.mapcard .step .st{font-family:'IBM Plex Mono';font-size:14px;color:var(--dim);width:40px;flex-shrink:0;position:relative;top:1px}
.mapcard .stmi{color:var(--dim);font-weight:500}
.mapcard button{margin-top:11px;background:var(--ink);border:none;color:#fff;font-family:'Inter';font-weight:500;font-size:15px;padding:8px 15px;border-radius:8px;cursor:pointer}
.mapcard button:hover{background:#33383F}

.rail{padding:20px 24px 100px;min-height:calc(100vh - 71px)}
.rail{flex:1 1 auto;min-width:0;max-width:none;margin:0 auto;width:100%;transition:max-width .45s cubic-bezier(.22,.8,.3,1)}
.layout.mapon .rail{max-width:none}
.layout.tableon .rail{max-width:none}
#mapwrap{flex:0 0 auto;width:0;overflow:hidden;border-right:none;border-left:0 solid var(--line);transition:width .45s cubic-bezier(.22,.8,.3,1)}
.layout.mapon #mapwrap{width:46vw;border-left-width:1px}
.jpath{display:flex;align-items:center;flex-wrap:wrap;gap:5px;min-width:0;flex:1}
.jp{font-family:'Barlow Condensed';font-weight:600;font-size:20px;letter-spacing:.02em;line-height:1.2}
.jp.jb{background:var(--ink);color:#fff;font-size:15px;font-family:'Inter';font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:.04em}
.jp.jld{color:var(--rental)}
.ja{color:var(--faint);font-size:15.5px}
.metaline{margin:8px 0 3px;font-size:15.5px;color:var(--dim)}
.metaline .mono{font-size:14.5px;color:var(--faint)}
.fsub{font-weight:400;color:var(--dim);font-size:15px}
.vrow{display:flex;align-items:center;gap:10px;font-size:16px;color:var(--ink)}
.vbadge{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:600;font-size:15.5px;flex-shrink:0;border:1.5px solid var(--line2);background:var(--paper);color:var(--ink)}
.vbadge.teal{color:var(--fleet);border-color:var(--fleet-bd);background:var(--fleet-bg)}
.vbadge.amber{color:var(--rental);border-color:var(--rental-bd);background:var(--rental-bg)}
.vbadge.gray{opacity:.65}
.xrow{display:flex;gap:22px;flex-wrap:wrap;margin-top:8px}
.panelbox{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:0;margin-bottom:14px;overflow:hidden}
.panelbox summary{cursor:pointer;list-style:none;font-family:'Barlow Condensed';font-size:19px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);padding:13px 18px;display:flex;align-items:center;gap:8px}
.panelbox summary::before{content:'▸';font-size:13.5px;transition:transform .12s}
.panelbox[open] summary::before{transform:rotate(90deg)}
.panelbox summary:hover{color:var(--ink)}
.rcols{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:4px 18px 12px}
@media (max-width:920px){.rcols{grid-template-columns:1fr}}
.rcols h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:6px 0 8px;font-weight:600}
.rrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:15.5px}
.rrow:last-child{border-bottom:none}
.rtog{display:flex;align-items:center;gap:4px;font-size:12.5px;color:var(--faint);cursor:pointer}
.rtog input{accent-color:var(--hazard);cursor:pointer}
.rnick{font-weight:600;min-width:168px}
.rbase{color:var(--faint);font-size:14.5px;min-width:28px}
.rst{color:var(--dim);font-size:15px;flex:1;min-width:0;white-space:normal;line-height:1.4}
.rst.ron{color:var(--fleet);font-weight:500}
.rst.roff{color:var(--hazard);font-weight:600}
.panelbox .helpnote{padding:0 18px 14px}
#optipanel{display:none;background:var(--travel-bg);border:1px solid var(--travel-bd);border-radius:13px;padding:14px 18px;margin-bottom:14px}
.optihead{font-family:'Barlow Condensed';font-size:19px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--travel);margin-bottom:8px}
.optirow{display:flex;align-items:center;gap:14px;padding:9px 0;border-top:1px solid var(--travel-bd)}
.optitxt{flex:1;min-width:0;font-size:16px}
.optitxt b{font-weight:600}
.optisub{display:block;font-size:15px;color:var(--dim);margin-top:1px}
.optibtn{background:var(--travel);border:none;color:#fff;font-family:'Inter';font-weight:600;font-size:15.5px;padding:8px 16px;border-radius:8px;cursor:pointer}
.optibtn:hover{background:#5a4ad0}
.optiapplied{margin-top:10px;font-size:14px;color:var(--dim)}
.chgrouphead{font-size:14.5px;font-weight:700;color:var(--travel);margin:10px 0 6px}
.chgrouphead span{font-weight:400;color:var(--dim);font-size:14px;margin-left:6px}
.chainrow{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--travel-bd);border-radius:10px;padding:11px 14px;margin-bottom:8px}
.chmain{flex:1;min-width:0}
.chpair{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:15px}
.chjob i{font-style:normal;color:var(--faint);font-size:14px}
.chplus{color:var(--travel);font-weight:700}
.chkind{font-size:12.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:var(--travel-bg);color:var(--travel);border:1px solid var(--travel-bd);border-radius:6px;padding:2px 7px}
.chkind.manual{background:var(--paper);color:var(--dim);border-color:var(--line2)}
.chsub{font-size:14px;color:var(--dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chx{background:#fff;border:1px solid var(--line2);color:var(--hazard);font-family:'Inter';font-weight:600;font-size:14px;padding:7px 13px;border-radius:8px;cursor:pointer;flex-shrink:0}
.chx:hover{border-color:var(--hazard)}
#cmpsummary{display:none;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--travel);border-radius:12px;padding:12px 18px;margin-bottom:14px;font-size:15.5px;color:var(--dim)}
.ffsname{font-family:'Barlow Condensed';font-weight:600;font-size:23px;letter-spacing:.02em}
.ffsmeta{font-size:16px;color:var(--dim)}
.vizbtn{background:var(--fleet-bg);border:1px solid var(--fleet-bd);color:var(--fleet);font-family:'Inter';font-weight:600;font-size:15.5px;padding:7px 13px;border-radius:8px;cursor:pointer;margin-right:auto;transition:all .12s}
.vizbtn:hover{background:var(--fleet);color:#fff}
.vizbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}
#applybtn.locked{background:#C9CDD2;cursor:not-allowed}
#applybtn.locked:hover{background:#C9CDD2}
#locknote{position:fixed;top:84px;right:24px;z-index:2000;background:var(--ink);color:#fff;font-size:15px;line-height:1.5;padding:12px 16px;border-radius:10px;max-width:320px;box-shadow:0 6px 20px rgba(0,0,0,.18);opacity:0;transform:translateY(-6px);transition:opacity .2s,transform .2s;pointer-events:none}
#locknote.show{opacity:1;transform:none}
#alertbar{display:none;border-radius:13px;padding:13px 18px;margin-bottom:10px;border:1px solid}
#alertbar.crit{background:#FDECEC;border-color:#F0C0C0;border-left:5px solid var(--hazard)}
#alertbar.tight{background:#FFF7E8;border-color:#EAD9B0;border-left:5px solid #B26B0B}
.altitle{font-family:'Barlow Condensed';font-size:17px;font-weight:600;letter-spacing:.06em;margin-bottom:7px}
#alertbar.crit .altitle{color:var(--hazard)}
#alertbar.tight .altitle{color:#8A5A12}
.alrows{display:flex;flex-wrap:wrap;gap:8px}
.alday{background:#fff;border:1px solid var(--line2);border-radius:8px;padding:5px 11px;font-size:14.5px;cursor:pointer}
.alday.c{border-color:#E8AFAF}
.alday:hover{border-color:var(--ink)}
.almore{font-size:14px;color:var(--dim);align-self:center}
.alfix{margin-top:10px;padding-top:10px;border-top:1px dashed #E5C9C9;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.alfixlab{font-size:14.5px;font-weight:600;color:var(--ink)}
.almv{background:#fff;border:1px solid var(--line2);border-radius:9px;padding:6px 8px 6px 12px;font-size:14.5px;display:inline-flex;align-items:center;gap:9px}
.almvbtn{background:var(--ink);color:#fff;border:none;border-radius:7px;font-family:'Inter';font-weight:600;font-size:14px;padding:5px 11px;cursor:pointer}
.almvbtn:hover{background:#000}
#viewbar,#filterbar{display:flex;align-items:center;gap:11px;row-gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:10px 16px;margin-bottom:10px}
#filterbar{margin-bottom:14px}
.ddwrap{position:relative}
.ddbtn{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:8px 14px;cursor:pointer;color:var(--ink)}
.ddbtn:hover{border-color:var(--ink)}
.ddbtn.act{background:var(--ink);color:#fff;border-color:var(--ink)}
.ddpanel{display:none;position:absolute;top:calc(100% + 8px);left:0;z-index:1500;background:var(--card);border:1px solid var(--line2);border-radius:13px;box-shadow:0 14px 38px rgba(0,0,0,.16);min-width:230px;max-height:380px;overflow-y:auto;padding:6px}
.ddpanel.open{display:block}
.ddrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:15px}
.ddrow:hover{background:var(--paper)}
.ddrow.cur{background:var(--ink);color:#fff}
.ddrow.cur .ffct{color:#cfd3d8}
#resetov:disabled{opacity:.45;cursor:default;border-color:var(--line2)!important}
#gconn,#gdelta{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:8px 13px;cursor:pointer;color:var(--ink)}
#gconn:hover,#gdelta:hover{border-color:var(--ink)}
#gconn.gok{background:var(--fleet-bg);color:var(--fleet);border-color:var(--fleet)}
.gcalbtn{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:10px 14px;cursor:pointer;color:var(--ink)}
.gcalbtn:hover{border-color:var(--ink)}
.chip.tmove{background:#EDF3F1;border:1px solid #CFE0DB;color:#2E5F52;font-weight:600;letter-spacing:.02em}
.chip.tjob{background:#F0EFF7;border:1px solid #D8D5EA;color:#4E4690;font-weight:600;letter-spacing:.02em}
.rfrowbtns{display:flex;gap:8px}
#calpush{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:9px 14px;cursor:pointer;color:var(--ink)}
#calpush:hover:not(:disabled){border-color:var(--fleet);color:var(--fleet)}
#calpush:disabled{opacity:.45;cursor:default}
#gmodal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(31,34,38,.45);align-items:center;justify-content:center}
#gmodal.show{display:flex}
#gmodal .gbox{background:var(--card,#fff);border-radius:14px;max-width:560px;width:100%;max-height:85vh;overflow:auto;padding:22px 24px;box-shadow:0 24px 64px rgba(0,0,0,.32);position:relative;box-sizing:border-box}
#gmodal .gh{font-family:'Barlow Condensed';font-size:24px;font-weight:600;line-height:1.15;margin-bottom:10px;padding-right:28px;color:var(--ink)}
#gmodal .gfoot{margin-top:16px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
#gmodal .gx{position:absolute;top:11px;right:13px;background:none;border:none;font-size:19px;cursor:pointer;color:var(--dim);line-height:1;padding:4px}
#gmodal .sumsec{margin-top:12px} #gmodal .sumsec h4{font-family:'Barlow Condensed';font-size:16px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin:0 0 4px} #gmodal .sumsec ul{margin:0;padding-left:18px} #gmodal .sumnet{margin-top:12px;font-weight:600;color:var(--ink)}
#gmodal .gbody{font-size:15px;line-height:1.6;max-height:60vh;overflow:auto}

/* ═══════════ MOBILE (≤820px) — full dispatching, Timeline-first ═══════════ */
#mobmenu,#mobbar,#mobbk{display:none}
@media (max-width:820px){
  html{ -webkit-text-size-adjust:100% }
  body{padding-bottom:88px}
  header{position:sticky;top:0;z-index:1200;background:var(--bg);flex-wrap:wrap;gap:8px;padding:8px 10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .brand img{height:22px}
  .brand{min-width:0;flex-shrink:1}
  #dbtn{max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #daynav button{min-height:40px}
  #hdate,#rfstamp,#brandtxt{display:none!important}
  #daynav{order:2;flex:1;justify-content:center}
  #rfwrap{order:3;margin-left:auto}
  #mobmenu{display:inline-flex;align-items:center;justify-content:center;order:1;width:42px;height:42px;font-size:21px;border:1.5px solid var(--line2);border-radius:10px;background:var(--card);cursor:pointer}
  #stats{order:4;width:100%;display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  #stats>*{flex:0 0 auto;padding:5px 10px}
  #stats>*:not(.smob){display:none}
  .layout{display:block}
  /* leftbar → drawer */
  #leftbar{position:fixed;left:0;top:0;bottom:0;width:min(86vw,340px);z-index:1500;transform:translateX(-105%);transition:transform .25s ease;overflow-y:auto;background:var(--bg);box-shadow:8px 0 30px rgba(0,0,0,.25);padding:14px 14px calc(20px + env(safe-area-inset-bottom));margin:0;max-height:none}
  #leftbar.mopen{transform:none}
  #mobbk{position:fixed;inset:0;background:rgba(20,22,16,.45);z-index:1450}
  #mobbk.show{display:block}
  /* toolbars scroll horizontally */
  #viewbar,#filterbar{display:flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:8px;padding-bottom:4px}
  #viewbar>*,#filterbar>*{flex:0 0 auto}
  /* dropdown panels become bottom sheets */
  .ddpanel.open,#dpanel.open{position:fixed!important;left:10px;right:10px;bottom:calc(90px + env(safe-area-inset-bottom));top:auto!important;max-height:52vh;overflow:auto;z-index:1720;box-shadow:0 -12px 40px rgba(0,0,0,.34);border-radius:16px;padding:6px}
  /* cards: stacked controls, big touch targets */
  .ctrlrow{flex-direction:column;align-items:stretch;gap:10px}
  .ctrlgrp{width:100%}
  .ctrls select,.cellsel{width:100%;min-height:44px}
  input,select,textarea{font-size:16px!important}
  .cfbtn{width:100%;min-height:46px}
  .card{padding:14px 12px}
  /* timeline: horizontal scroll + sticky labels */
  #timelineview{overflow-x:auto;-webkit-overflow-scrolling:touch}
  #timelineview>div{min-width:1150px}
  .tllabel{position:sticky;left:0;background:var(--card);z-index:3;box-shadow:2px 0 8px rgba(0,0,0,.07);padding-right:8px}
  /* table momentum scroll */
  #tableview{-webkit-overflow-scrolling:touch}
  /* map journey panel → bottom sheet */
  #mapcard{position:fixed!important;left:0;right:0;bottom:0;top:auto!important;width:auto!important;max-width:none!important;max-height:54vh;overflow:auto;z-index:1480;border-radius:16px 16px 0 0;margin:0;padding-bottom:calc(82px + env(safe-area-inset-bottom))}
  /* modals → full-screen sheets */
  #gmodal>div,#gmodal .gbox{width:100vw!important;max-width:100vw!important;height:100dvh;max-height:100dvh!important;border-radius:0!important;overflow:auto;box-sizing:border-box;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
  .gform2{grid-template-columns:1fr!important}
  .atfrow{grid-template-columns:1fr!important}
  /* bottom action bar */
  #mobbar{position:fixed;left:0;right:0;bottom:0;display:flex;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(252,251,248,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line2);z-index:1400}
  #mobbar button{flex:1;min-height:46px;font-size:14.5px!important;white-space:nowrap}
  #locknote{top:auto!important;bottom:calc(96px + env(safe-area-inset-bottom));left:12px;right:12px;max-width:none;z-index:1600}
  #undonote{bottom:calc(150px + env(safe-area-inset-bottom));z-index:1600}
  .maplbl{font-size:11px;padding:4px 8px}
  .offstrip,.alrows{gap:6px}
}
@media (min-width:821px){ #mobbar,#mobmenu,#mobbk{display:none!important} }
/* ═══════════ iPad (821–1080px) — desktop + touch polish ═══════════ */
@media (min-width:821px) and (max-width:1080px){
  .layout{flex-direction:row}
  #leftbar{width:238px}
  #mapwrap{position:sticky}
  .ddbtn,.vbtn{padding:10px 14px}
  .ctrls select,.cellsel{min-height:42px}
  .ctgl,.mexcl{transform:scale(1.12)}
  .lbrow{padding:10px 8px}
  button{min-height:38px}
}
@media (hover:none){
  .ddbtn,.vbtn,button{cursor:default}
}

.bchip.clr{color:var(--faint);font-weight:600;padding:4px 8px}
.bchip.b-NJ.on{background:#0F8A66;border-color:#0F8A66;color:#fff}
.bchip.b-PA.on{background:#7C5CE0;border-color:#7C5CE0;color:#fff}
.bchip.b-NY.on{background:#1F6FD6;border-color:#1F6FD6;color:#fff}
.bchip.b-DE.on{background:#B26B0B;border-color:#B26B0B;color:#fff}
.bchip.b-CT.on{background:#C2417A;border-color:#C2417A;color:#fff}
.bchip.b-MA.on{background:#3E8E9C;border-color:#3E8E9C;color:#fff}
/* inline tier pills — the 3 re-do tiers, colour-coded */
.tlbl{display:inline-block;font-family:'Inter';font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:1px 7px;border-radius:6px;vertical-align:middle}
.tlbl.free{background:#E7F0D8;color:#4E6B16}
.tlbl.call{background:#F7EBD7;color:#8A5210}
.tlbl.move{background:#F8E3EE;color:#9B2D5F}
/* slot accent by tier */
.slot.tcall{border-left:4px solid #B26B0B}
.slot.tmove{border-left:4px solid #C2417A}
.slot.tcall.confirmed,.slot.tmove.confirmed{border-left-color:var(--fleet)}
/* pending change on the routes timeline — what UPDATE will write */
.tlblock.chgcall{background-color:#B26B0B!important}
.tlblock.chgmove{background-color:#C2417A!important}
.tlrow.rowchg:not(.rtsel) .tllabel b{color:#B26B0B}
.tlrow.rowchg:not(.rtsel) .tllabel{box-shadow:inset 3px 0 0 #B26B0B}
.tlrow.tlshortrow:not(.rtsel):not(.rowchg) .tllabel{box-shadow:inset 3px 0 0 var(--hazard)}
.tlrow.tlshortrow .tllabel span{color:var(--hazard);font-weight:600}
.tlleg .lgchg{display:inline-block;width:13px;height:13px;border-radius:3px;background:#B26B0B;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.45) 0 4px,transparent 4px 8px);outline:1.5px dashed #1F2329;outline-offset:-1px;margin:0 4px 0 8px;vertical-align:middle}
/* ===== batch-3 fixes: timeline size, chip padding, step badge, collapsible bases, summary, phone ===== */
/* #2 timeline rows back to full height + #7 chip padding */
#cltl .tlrow{min-height:46px}
#cltl .tltrack{padding-right:8px}
#cltl .tlblock{top:6px;bottom:6px;padding:0 10px}
/* #6 numbered step badge (replaces confusing "crew N") */
.slot .stag.step{background:var(--ink);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0;font-size:13.5px;font-weight:700;flex:0 0 auto}
.fixnote{font-size:14.5px;color:var(--dim);margin:0 0 8px}
/* #4 collapsible base sections */
#cltl .tlsep{cursor:pointer;user-select:none}
#cltl .tlsep:hover{filter:brightness(.975)}
#cltl .tlsep .tlcaret{font-size:13px;opacity:.65;width:12px;display:inline-block}
/* #1 moved-off-this-day note */
.movedout{font-size:14.5px;color:var(--rental);background:var(--rental-bg);border:1px solid var(--rental-bd);border-radius:8px;padding:7px 11px;margin:8px 0 2px;font-weight:500}
/* #8 update summary modal */
.sumsec{margin:13px 0 0}
.sumsec h4{margin:0 0 5px;font-family:'Barlow Condensed';font-weight:600;font-size:16px;letter-spacing:.03em}
.sumsec ul{margin:0 0 0 18px;line-height:1.75}
.sumnet{margin:13px 0 2px;font-weight:600}
/* #5 phone chip */
.telchip{display:inline-block;font-family:'Inter';font-weight:700;font-size:13px;color:#1F6FD6;text-decoration:none;border:1px solid #BBD0EC;border-radius:6px;padding:1px 7px;margin-left:5px;vertical-align:middle}
.telchip:hover{background:#EAF1FB}
/* #6 positive feedback banners */
.cres.win{background:linear-gradient(0deg,var(--fleet-bg),var(--fleet-bg)),#fff;border:1px solid var(--fleet-bd);color:#3D5512;border-radius:9px;padding:10px 13px;margin-bottom:8px;font-weight:600}
.cres.okwin{background:var(--fleet-bg);border:1px solid var(--fleet-bd);color:#3D5512;border-radius:9px;padding:9px 12px;margin-bottom:8px;font-weight:500}
/* ===== batch-5: move-story ghosts, incoming, distribution alerts ===== */
.tlrow.ghostrow{opacity:.92}
.tlrow.ghostrow .tllabel b{color:var(--dim);font-weight:600}
.tlrow.ghostrow .tllabel span{color:var(--faint)}
.tlblock.ghostblk{background:transparent!important;border:1.6px dashed var(--line2);color:var(--faint);font-weight:700;font-size:13px;box-shadow:none}
.tlblock.ghostblk.gcall{border-color:#B26B0B;color:#B26B0B}
.tlblock.ghostblk.gmove{border-color:#C2417A;color:#C2417A}
.tlblock.ghostblk.gin{border-color:#1F6FD6;color:#1F6FD6;border-style:dotted}
.tlrow.incomingrow .tllabel b{color:#1F6FD6;font-weight:700}
.tlrow.incomingrow .tllabel span{color:var(--faint)}
#cltl .tlsep.incsep{background:#E9F1FB;border-left-color:#1F6FD6;color:#1F6FD6}
/* distribution checks */
.distalert{font-size:15px;color:#B3362A;background:var(--hazard-bg);border:1px solid var(--hazard-bd);border-radius:8px;padding:8px 11px;margin:0 0 8px;font-weight:500}
.distinfo{font-size:14.5px;color:var(--dim);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin:0 0 8px}

/* declined-customers log (permanent decline visibility) */
.declog{font-size:14px;color:var(--faint);background:var(--paper);border:1px dashed var(--line2);border-radius:8px;padding:7px 11px;margin:8px 0 0}
.declog b{color:var(--dim);font-weight:700}
/* ===== declined-customer chips with undo ===== */
.declog .decllbl{color:var(--faint)}
.declchip{display:inline-flex;align-items:center;gap:3px;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:1px 4px 1px 10px;margin:3px 5px 0 0;font-weight:600;color:var(--ink);font-size:13px}
.declundo{border:none;background:var(--paper);color:var(--dim);border-radius:50%;width:19px;height:19px;line-height:1;cursor:pointer;font-size:13px;padding:0;display:inline-flex;align-items:center;justify-content:center}
.declundo:hover{background:var(--hazard-bg);color:var(--hazard)}
/* ===== horizon pagination (problem-days strip) ===== */
.hzpager{display:flex;align-items:center;gap:12px;justify-content:center;margin:9px 0 2px}
.hzpg{border:1.5px solid var(--line2);background:var(--card);color:var(--dim);border-radius:8px;padding:5px 12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter'}
.hzpg:hover:not(:disabled){border-color:var(--ink);color:var(--ink)}
.hzpg:disabled{opacity:.38;cursor:default}
.hzpglbl{font-size:13.5px;color:var(--faint);font-weight:600;white-space:nowrap}

#brandlogo{height:44px;width:auto;display:block}
.calbtns{display:inline-flex;gap:6px;margin-left:8px;vertical-align:middle}
.cb.cal{text-decoration:none;font-size:12px;padding:3px 9px;background:#eef3fe;border:1px solid #c4d4f5;color:#1558d6;border-radius:7px;font-weight:600;line-height:1.4}
.cb.cal:hover{background:#e0eafe}
.calbtn.ghost{background:#fff;border:1px solid #D3D0C6;color:#B3362A;font-weight:600}
.calbtn.ghost:hover{border-color:#B3362A}
</style>

/* hav */
function hav(a,b){
  const R=3959, dLa=(b.lat-a.lat)*Math.PI/180, dLo=(b.lon-a.lon)*Math.PI/180;

  const h=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

/* scoreRoute */
function scoreRoute(r,w){
  const cf=Math.min(r.totalCF/2500,1)*w.cf;
  const pk=Math.min(r.packing/1500,1)*w.pack;
  const ld=(r.isLD?1:0)*w.ld;
  const mt=Math.min(Math.max(r.trucksNeeded-1,0)+(r.vansNeeded&&r.trucksNeeded?0.5:0),1.5)/1.5*w.multi;
  const pi=(r.piano?1:0)*w.piano;
  const max=w.cf+w.pack+w.ld+w.multi+w.piano||1;
  return Math.round((cf+pk+ld+mt+pi)/max*100);
}

/* evalForeman */
function evalForeman(f,r,ctx){
  let s=50; const pros=[],cons=[];
  if(f.status!=='Active'){s-=25;cons.push('backup pool (potential)');}
  if(!f.states.includes(r.pickupState)){s-=12;cons.push('not listed for '+r.pickupState);}
  if(f.base===r.base){s+=40;pros.push(r.base+' home base');}
  else{
    const scarce=ctx.pendingAt(f.base)>=ctx.homeAvail(f.base);
    if(scarce){s-=28;cons.push(f.base+' is short-staffed today');}
    else{s-=8;cons.push('travels from '+f.base);}
    const fb=DATA.bases[f.base],rb=DATA.bases[r.base];
    if(fb&&rb)s-=Math.min(hav(fb,rb)/12,12);
  }
  s+=f.bigJob*(Math.min(r.totalCF,2500)/2500)*8; if(f.bigJob>=4&&r.totalCF>900)pros.push('big jobs ★'+f.bigJob);
  s+=f.packSell*(Math.min(r.packing,1500)/1500)*6; if(f.packSell>=4&&r.packing>300)pros.push('sells packing ★'+f.packSell);
  if(r.isLD||r.hasCarrier){s+=f.ldPickup*5; if(f.ldPickup>=4)pros.push('LD pickup ★'+f.ldPickup);}
  if(r.ldDeparture&&!f.canLD){s-=40;cons.push('no long distance');}
  if(r.trucksNeeded>=2){if(f.multiTruck>=3){s+=f.multiTruck*4;pros.push('runs 2-truck jobs ★'+f.multiTruck);}else{s-=60;cons.push('no 2-truck experience');}}
  if(r.piano){if(f.piano){s+=12;pros.push('piano');}else{s-=60;cons.push('no piano');}}
  if(f.driver)s+=6; else{s-=10;cons.push('not a truck driver');}
  s+=f.stacking*1.5; if(f.stacking===5)pros.push('stacking ★5');
  s-=f.hourly*0.15;

  // Forman-of-the-Month: bounded ±12 bonus centered at 60
  const fsc=formanScore(f);
  if(fsc!==null){
    const bonus=Math.max(-12,Math.min(12,(fsc-60)*0.5));
    s+=bonus;
    if(bonus>=4)pros.push('Foreman score '+fsc);
    else if(bonus<=-4)cons.push('Foreman score '+fsc);
  }
  // premium jobs (big packing / hard routes) prefer top tier — soft gate, not a hard block
  const premium=r.packing>=800||r.score>=60;
  if(premium&&fsc!==null&&fsc<65){s-=15;cons.push('premium job — below top tier ('+fsc+')');}
  if(premium&&fsc!==null&&fsc>=65)pros.push('top-tier for premium job');
  // rest rotation: long consecutive streak = let them breathe
  const streak=ctx.streak?ctx.streak(f.name):0;
  if(streak>=6){s-=10;cons.push('worked '+streak+' days straight — rest due');}

  return {f,score:Math.round(s),pros,cons};
}

  });
  const book=(map,key,r)=>{(map[key]=map[key]||[]).push({t0:r.t0,t1:r.t1,rid:r.id,startLoc:r._startLoc,endLoc:r._endLoc});};
  // business rule: one foreman = one route per day. Multi-job days only via chains (one merged route).
  const freeF=(key,r)=>!(busyF[key]||[]).some(iv=>iv.rid!==r.id);
  const fbest={};
  for(const r of order){
    r._pinBusy=false;r._pinOff=false;
    if(r.pinForeman&&isOff(r.pinForeman)){r.pinForeman=null;r._pinOff=true;}
    if(r.pinForeman){
      const f=DATA.foremen.find(x=>x.name===r.pinForeman);
      if(f&&freeF(f.name,r))book(busyF,f.name,r);
      else r._pinBusy=true;
    }
    r._pinIssues=r.chainWarn?[r.chainWarn]:[];
    r.pinTrucks=r.pinTrucks||[];
    for(const pn of r.pinTrucks){
      if(!pn||pn==='R26'||pn==='R20')continue;
      const pt=DATA.trucks.find(k=>k.n===pn&&k.status==='Active');
      if(pt&&free(busyT,pt.n,r)){
        book(busyT,pt.n,r);
        if(pt.state&&pt.state!==r.base)r._pinIssues.push(pt.n+' is '+pt.state+' fleet — this route departs '+r.base+' base, truck must be repositioned first');
      }
      else r._pinIssues.push(pn+' unavailable in this window — auto-assigned instead');
    }
  }
  for(const r of order){ if(r.assignedForeman) book(busyF,r.assignedForeman.name,r); }
  computeStreaks();
  const ctx={pendingAt:b=>order.filter(x=>!x.foreman&&x.base===b).length,
             homeAvail:b=>DATA.foremen.filter(f=>f.base===b&&f.status==='Active').length,
             streak:n=>STREAKS[n]||0};
  for(const r of order){
    if(r.assignedForeman){ r.foreman=r.assignedForeman; r.foremanEval={f:r.assignedForeman,score:100,byEmail:true,pros:['assigned on the calendar'],cons:[]}; r.foremanTravel=!!(r.assignedForeman.base&&r.assignedForeman.base!==r.base); r.candidates=[r.foremanEval]; }
    else {
    const evals=[];
    for(const f of DATA.foremen){
      if(f.status==='Cancelled')continue;
      if(isOff(f.name))continue;
      const busy=!freeF(f.name,r);
      const e=evalForeman(f,r,ctx); e.busy=busy;
      evals.push(e);
    }
    evals.sort((a,b)=>(a.busy-b.busy)||(b.score-a.score));
    r.candidates=evals.filter(e=>!e.busy).slice(0,4);
    let best=r.candidates[0]||null;
    if(r.pinForeman&&!r._pinBusy){
      const pe=evals.find(e=>e.f.name===r.pinForeman);
      if(pe){best=pe;}
    } else if(best){book(busyF,best.f.name,r);}
    evals.forEach(e=>{
      if(e.busy||!best||e.f.name===best.f.name)return;
      const cur=fbest[e.f.name];
      if(!cur||e.score>cur.score)fbest[e.f.name]={score:e.score,route:r.id,winner:best.f.name,winScore:best.score};
    });
    r.foreman=best?best.f:null;
    r.foremanEval=best;
    r.foremanTravel=best&&best.f.base!==r.base;
    }
    const need=[];r.rentals=0;r._crewGap=false;
    const atBase=ty=>DATA.trucks.filter(t=>t.status==='Active'&&t.state===r.base&&t.type===ty&&truckActiveOn(t,currentDay)&&!TRIPAWAY_T[_tn(t.n)]&&free(busyT,t.n,r));
    const take=t=>{book(busyT,t.n,r);need.push({kind:'fleet',t});};
    const _tnEff=(r.trucksOverride!=null?r.trucksOverride:r.trucksNeeded);
    const truckSlots=Math.max(_tnEff,(!_tnEff&&!r.vansNeeded)?1:0);
    const slotsSpec=[];
    for(let i=0;i<truckSlots;i++)slotsSpec.push('Truck');
    for(let i=0;i<r.vansNeeded;i++)slotsSpec.push('Van');
    r._slotsSpec=slotsSpec;
    slotsSpec.forEach((ty,s)=>{
      const primary=s===0&&ty==='Truck';
      const pin=r.pinTrucks[s]||null;
      if(primary){
        r._truckTrace=DATA.trucks.filter(k=>k.status==='Active'&&k.type===ty).map(k=>{
          let why,ok=false;
          const _H=DATA.holders||{};
          if(_H[k.n]&&(!r.foreman||_H[k.n]!==r.foreman.name)){const hf=DATA.foremen.find(x=>x.name===_H[k.n]);why='with '+(hf?hf.nick:_H[k.n])+' — locked pairing';}
          else if(!truckActiveOn(k,currentDay))why='rental active '+(k.rentStart||'?')+' → '+(k.rentEnd||'open-ended')+' — outside this day';
          else if(TRIPAWAY_T[_tn(k.n)])why='on a straight LD trip ('+TRIPAWAY_T[_tn(k.n)].code+') — back '+TRIPAWAY_T[_tn(k.n)].back;
          else if(k.state!==r.base)why=k.state+' fleet — wrong base';
          else if(!free(busyT,k.n,r))why='busy in this time window';
          else if(k.cf<r.maxCF)why=k.cf.toLocaleString()+' CF — smaller than the '+r.maxCF.toLocaleString()+' CF load';
          else if(k.maxCrew<r.crew)why='cab seats '+k.maxCrew+' — crew is '+r.crew;
          else{ok=true;why=k.cf.toLocaleString()+' CF · cab '+k.maxCrew+(isRentalTruck(k)?' · monthly rental':' · owned');}
          return {n:k.n,ok,why,cf:k.cf,rentedm:isRentalTruck(k)};
        }).sort((a,b)=>(b.ok-a.ok)||(a.cf-b.cf)).slice(0,8);
      }
      if(pin){
        const pt=DATA.trucks.find(k=>k.n===pin&&k.status==='Active');
        if(pt&&busyT[pt.n]&&busyT[pt.n].some(iv=>iv.rid===r.id)){
          take(pt);
          if(primary)r._truckChosen=pt.n;
          if(primary&&pt.cf<r.maxCF)r._pinIssues.push(pt.n+' is smaller than the biggest leg ('+r.maxCF.toLocaleString()+' CF)');
          if(primary&&pt.maxCrew<r.crew)r._pinIssues.push(pt.n+' cab fits '+pt.maxCrew+' — crew is '+r.crew);
          return;
        }
      }
      const H=DATA.holders||{};
      if(primary&&r.foreman){
        const hn=Object.keys(H).find(tn=>H[tn]===r.foreman.name);
        if(hn){
          const ht=DATA.trucks.find(k=>k.n===hn&&k.status==='Active'&&k.type===ty);
          if(ht&&free(busyT,ht.n,r)){
            take(ht);r._truckChosen=ht.n;
            if(ht.state&&ht.state!==r.base)r._pinIssues.push(ht.n+' is '+ht.state+' fleet — locked pairing with '+r.foreman.name+' kept, truck must reposition');
            if(ht.cf<r.maxCF)r._pinIssues.push(ht.n+' (paired with '+r.foreman.name+') is smaller than the '+r.maxCF.toLocaleString()+' CF load');
            return;
          }
        }
      }
      const cand=atBase(ty)
        .filter(t=>!need.some(x=>x.kind==='fleet'&&x.t.n===t.n))
        .filter(t=>!(H[t.n]&&(!r.foreman||H[t.n]!==r.foreman.name)))
        .filter(t=>primary?(t.cf>=r.maxCF&&t.maxCrew>=r.crew):true)
        .sort((a,b)=>(a.cf-b.cf));
      const pick=cand[0];
      if(pick){take(pick);if(primary)r._truckChosen=pick.n;}
      else{
        const sz=ty==='Van'?'20 ft van':(r.maxCF>RENTAL20_CF?'26 ft':'20 ft');
        if(currentDay<TODAY_ISO){
          // history: the day ran, so a rental truck WAS there — record it, don't alarm
          need.push({kind:'rental',sz});
          if(primary)r._truckChosen='Rental '+sz;
        } else {
          need.push({kind:'short',ty,sz});
          if(primary)r._truckChosen='— no truck free';
        }
      }
    });
    r.vehicles=need;
    r.short=need.filter(v=>v.kind==='short').length;
    r.rentals=need.filter(v=>v.kind==='rental'||(v.kind==='fleet'&&isRentalTruck(v.t))).length;
    r.status=r.short>0?'short':(r.rentals>0?'rental':'fleet');
    // crew transport: how many cab seats do the assigned vehicles actually have?
    // fleet trucks carry their real cab; rentals/short slots assume a 3-seat cab (standard box-truck)
    {const _cab=need.reduce((s,v)=>s+(v.kind==='fleet'?(v.t.maxCrew||3):3),0);
     r._cabSeats=_cab;
     r._carNeed=(need.length>0&&r.crew>_cab)?(r.crew-_cab):0;
     r._crewGap=r._carNeed>0;}
  }  const assignedF=new Set(routes.map(r=>r.foreman&&r.foreman.name).filter(Boolean));
  const pickStates=new Set(routes.map(r=>r.pickupState).filter(Boolean));
  BENCH.foremen=DATA.foremen.filter(f=>f.status==='Active'&&!assignedF.has(f.name)&&!isOff(f.name)).map(f=>{
    let reason;
    if(![...pickStates].some(s=>f.states.includes(s)))reason='listed states ('+f.states.join(', ')+') do not match today\'s pickups';
    else if(fbest[f.name]){const b=fbest[f.name];reason='closest: '+b.route+' — scored '+b.score+', '+b.winner+' won with '+b.winScore;}
    else if(!f.driver)reason='not a truck driver — penalized on every route';
    else reason='outscored on every route today';
    return {f,reason};
  });
  const usedT=new Set(routes.flatMap(r=>r.vehicles.filter(v=>v.kind==='fleet').map(v=>v.t.n)));
  const routesAt={};routes.forEach(r=>routesAt[r.base]=(routesAt[r.base]||0)+1);
  const rentalAt={};routes.forEach(r=>{if(r.rentals)rentalAt[r.base]=true;});
  BENCH.trucks=DATA.trucks.filter(k=>k.status==='Active'&&!usedT.has(k.n)).map(k=>{
    let reason;
    if(!routesAt[k.state])reason='no routes from '+k.state+' base today';
    else reason='spare';
    return {t:k,reason};
  });
}

/* getW */
function getW(){return WEIGHTS;}

/* tripAwayMap */
function tripAwayMap(dayIso){
  const out={};const outT={};
  const d0=Date.parse(dayIso+'T12:00');
  for(let k=1;k<=10;k++){
    const dd=new Date(d0-k*86400000);
    const dIso=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
    for(const j of (DATA.days[dIso]||[])){
      if(!j.straight||!j.tripDays||j.tripDays<=1||(!j.mf&&!j.mt))continue;
      if(k<j.tripDays){
        const back=new Date(Date.parse(dIso+'T12:00')+j.tripDays*86400000);
        const backLbl=back.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        const f=j.mf?matchForeman(j.mf):null;
        if(f&&f.status==='Active')out[f.name]={code:j.code,back:backLbl};
        if(j.mt)String(j.mt).split(/[+,]/).forEach(tn=>{const kk=_tn(tn);if(kk&&DATA.trucks.some(x=>_tn(x.n)===kk))outT[kk]={code:j.code,back:backLbl};});
      }
    }
  }
  return {f:out,t:outT};
}

/* detectAutoChains */
function detectAutoChains(rts){
  // Universal fit-based chaining (owner spec):
  //  - any job can chain, morning included
  //  - every job in a chain <= 700 CF
  //  - drive between jobs <= 45 min
  //  - arrive at the next customer no later than booked start + 30 min (early = wait, work starts at booked time)
  //  - smallest link distance wins
  //  - up to 3 jobs per chain (3rd added on the next pass)
  //  - the whole chain finishes the same day
  const out=[];
  const tailsTaken=new Set();
  const singles=rts.filter(r=>r.legs.length===1&&!r.legs[0].after
      &&(r.legs[0].cf||0)<=CHAIN_RULES.maxCF
      &&!AUTOOFFLIST.has(r.legs[0].code))
    .sort((a,b)=>Date.parse(a.legs[0].start)-Date.parse(b.legs[0].start));
  for(const B of singles){
    if(B.ldDeparture)continue;          // straight LD departures are not chainable; carrier pickups are
    const lb=B.legs[0];
    if(!lb.pickup||!lb.delivery||!INREGION(lb.delivery))continue;
    const bt0=Date.parse(lb.start);
    let best=null;
    for(const A of rts){
      if(A===B||A.ldDeparture)continue;
      if(A.legs.length>=CHAIN_RULES.maxJobs)continue;            // chain is full
      if(A.legs.some(x=>(x.cf||0)>CHAIN_RULES.maxCF))continue;   // every job in the chain must be small
      if(tailsTaken.has(A.id))continue;                          // one new tail per head per pass
      const la=[...A.legs].sort((x,y)=>Date.parse(x.start||0)-Date.parse(y.start||0)).slice(-1)[0];
      if(!la.delivery||!INREGION(la.delivery))continue;
      if(coOf(la)!==coOf(lb))continue;   // chain only within the same company
      const at1=Math.max(...A.legs.map(l=>l._endMs||Date.parse(l.end||l.start||0)));
      const rm=cachedRoadMi(la.delivery,lb.pickup);
      const linkMi=(rm!=null?rm:hav(la.delivery,lb.pickup)*1.15);
      const driveMs=linkMi/35*3600000;
      if(driveMs>CHAIN_RULES.maxDriveMin*60000)continue;         // link drive cap
      const eta=at1+driveMs;
      if(eta>bt0+CHAIN_RULES.lateMin*60000)continue;             // on time, +30 min grace
      // same-day rule: the chained crew must be DONE before midnight
      {const _ws=Math.max(eta,bt0);
       const _p2d=(lb.pickup&&lb.delivery)?hav(lb.pickup,lb.delivery)/35*3600000*1.15:0;
       const _done=_ws+((lb.actH||schedH(lb))*3600000)+_p2d;
       if(_done>Date.parse(String(lb.start).slice(0,10)+'T23:59'))continue;}
      if(Math.max(A.crew,B.crew)>6)continue;                     // one cab carries the crew
      if(!best||linkMi<best.linkMi)best={A,linkMi,la};
    }
    if(best){
      tailsTaken.add(best.A.id);
      out.push({tail:lb.code,after:best.la.code,auto:true,linkMi:Math.round(best.linkMi)});
    }
  }
  return out;
}

/* matchForeman */
function matchForeman(nk){
  const q=String(nk).trim().toLowerCase();
  return DATA.foremen.find(x=>x.nick.toLowerCase()===q)
    ||DATA.foremen.find(x=>x.name.toLowerCase()===q)
    ||DATA.foremen.find(x=>{const p=x.name.toLowerCase().split(/\s+/);return p[0]===q||(q.split(/\s+/).length===2&&p[0]===q.split(/\s+/)[0]&&p[1]&&p[1][0]===q.split(/\s+/)[1][0]);});
}

/* computeAutoOff */
function computeAutoOff(){
  AUTO_OFF=new Set();AUTO_NOTE={};
  const src=(DATA.dayoffs&&DATA.dayoffs.length)?DATA.dayoffs:OFFSHEET.map(o=>[o[0],o[1],o[2],o[3]]);
  for(const [nk,a,b,note] of src){
    if(currentDay>=a&&currentDay<=b){
      const f=matchForeman(nk);
      if(f){AUTO_OFF.add(f.name);AUTO_NOTE[f.name]=note||'day off';}
    }
  }
}

/* isOff */
function isOff(n){return DAYOFF.has(n)||AUTO_OFF.has(n)||!!TRIPAWAY[n];}

/* rentalQuote */
function rentalQuote(sz,base){
  const list=DATA.rentalRates||[];
  if(!list.length)return null;
  const want=/van/i.test(sz)?'van':(/26/.test(sz)?'26':'20');
  const fits=o=>{const s=String(o.size||'').toLowerCase();return want==='van'?/van/.test(s):s.includes(want)&&!/van/.test(s);};
  const local=list.filter(o=>fits(o)&&o.base===base).sort((a,b)=>a.rate-b.rate);
  const any=list.filter(o=>fits(o)&&!o.base).sort((a,b)=>a.rate-b.rate);
  return local[0]||any[0]||null;
}

/* formanScore */
function formanScore(f){
  if(DATA.scores&&Object.keys(DATA.scores).length){
    if(DATA.scores[f.nick]!==undefined)return DATA.scores[f.nick];
    const hit=Object.keys(DATA.scores).find(k=>matchForeman(k)&&matchForeman(k).name===f.name);
    return hit!==undefined&&hit!==null?DATA.scores[hit]:null;
  }
  const last=f.name.trim().split(/\s+/).slice(-1)[0];
  return FORMAN_SCORES[last]!==undefined?FORMAN_SCORES[last]:null;
}

/* computeStreaks */
function computeStreaks(){
  STREAKS={};
  const dates=Object.keys(DATA.days||{}).sort();
  const prior=dates.filter(d=>d<currentDay).slice(-8);
  for(const f of DATA.foremen){
    if(f.status==='Cancelled')continue;
    let s=0;
    for(let i=prior.length-1;i>=0;i--){
      const worked=(DATA.days[prior[i]]||[]).some(j=>j.mf&&(j.mf.toLowerCase()===f.nick.toLowerCase()||f.name.toLowerCase().startsWith(j.mf.toLowerCase())));
      if(worked)s++;else break;
    }
    STREAKS[f.name]=s;
  }
}

/* foremenAvailOn */
function foremenAvailOn(dayIso){
  const act=DATA.foremen.filter(f=>f.status==='Active');
  const off=new Set();
  const src=(DATA.dayoffs&&DATA.dayoffs.length)?DATA.dayoffs:[];
  for(const [nk,a,b] of src){
    if(dayIso>=a&&dayIso<=b){const f=matchForeman(nk);if(f&&f.status==='Active')off.add(f.name);}
  }
  if(dayIso===currentDay)DAYOFF.forEach(n=>off.add(n));
  const ta=tripAwayMap(dayIso).f;Object.keys(ta).forEach(n=>{const f=DATA.foremen.find(x=>x.name===n);if(f&&f.status==='Active')off.add(n);});
  return {avail:act.length-off.size,off:off.size,total:act.length};
}

/* rcInvalidate */
function rcInvalidate(day){if(day)delete _RC[day];else for(const k of Object.keys(_RC))delete _RC[k];}

/* dayPlanOn */
function dayPlanOn(dayIso){
  if(_RC[dayIso])return _RC[dayIso];
  // run the real engine for that day — chains, exclusions, assignment with double-run reuse
  const keepJobs=DATA.jobs,keepAC=AUTOCHAINS,keepDay=currentDay;
  try{
    DATA.jobs=DATA.days[dayIso]||[];
    currentDay=dayIso;
    AUTOCHAINS=[];
    let rts=buildRoutes();
    for(let _g=0;_g<2;_g++){
      const det=detectAutoChains(rts);
      if(!det.length)break;
      AUTOCHAINS=AUTOCHAINS.concat(det);
      rts=buildRoutes();
    }
    assignAll(rts,getW(),'nearest');
    const byF={};rts.forEach(r=>{if(r.foreman)(byF[r.foreman.name]=byF[r.foreman.name]||[]).push(r.id);});
    const dd=Object.entries(byF).filter(([,ids])=>ids.length>1);
    _RC[dayIso]={routes:rts.length,unassigned:rts.filter(r=>!r.foreman).length,
      doubles:dd.length,
      dblTxt:dd.map(([n,ids])=>{const f=DATA.foremen.find(x=>x.name===n);return (f?f.name:n)+': '+ids.join('+');}).join(' · ')};
  }catch(e){ const n=(DATA.days[dayIso]||[]).filter(j=>!j.after&&!EXCL.has(jobKey(j))).length;_RC[dayIso]={routes:n,unassigned:0,doubles:0}; }
  finally{ DATA.jobs=keepJobs;AUTOCHAINS=keepAC;currentDay=keepDay; }
  return _RC[dayIso];
}

/* estRoutesOn */
function estRoutesOn(dayIso){
  return dayPlanOn(dayIso).routes;
}

/* exports for node */
</script>
<script>
// ============ CALENDAR CLEANUP ENGINE v3 (layer on engine_core) ============
// Objective: keep a 2-route buffer when load allows. Tiered ladder:
//   1) standard chaining  (PM jobs, free, route optimization — always)
//   2) extra chaining     (AM jobs, customer call, $50 same-day = no discount)
//   3) day switch         (move date, chain-first, last resort for shortage)
const CLEAN = { maxArrivalHr: 16, maxHomeHr: 22, pmCutoffHr: 12, windowDays: 7, buffer: 2,
                tightLinkMin: 15, tightLinkMi: 15, discountTight: 50, discountLoose: 50 };

function jobByCode(code){ for(const iso in DATA.days){const arr=DATA.days[iso]||[];for(const j of arr){if(j.code===code)return j;}} return null; }
function shortName(c){ return c? String(c).trim().split(/\s+/)[0] : ''; }
function ptOf(p){ return (p && p.lat!=null && p.lon!=null)? {lat:p.lat, lon:p.lon} : null; }

function cleanWindow(arriveMs, dayIso){
  const ceil = Date.parse(dayIso+'T'+String(CLEAN.maxArrivalHr).padStart(2,'0')+':00');
  let s = new Date(arriveMs); s.setMinutes(0,0,0);
  let sMs = s.getTime(); let eMs = Math.min(ceil, sMs + 2*3600000);
  if (eMs - sMs < 3600000) sMs = eMs - 2*3600000;
  const f = ms => { const d=new Date(ms); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  return { start:f(sMs), end:f(eMs), text:f(sMs)+'\u2013'+f(eMs) };
}

function coreAvailOn(iso){
  const a = DATA.foremen.filter(f=>f.status==='Active');
  const off = new Set();
  const src = (DATA.dayoffs&&DATA.dayoffs.length)?DATA.dayoffs:[];
  for(const [nk,s,e] of src){ if(iso>=s&&iso<=e){const f=matchForeman(nk);if(f&&f.status==='Active')off.add(f.name);} }
  const ta = tripAwayMap(iso).f; Object.keys(ta).forEach(n=>{const f=DATA.foremen.find(x=>x.name===n);if(f&&f.status==='Active')off.add(n);});
  return { avail: a.length-off.size, off:[...off], total:a.length };
}

function companyOf(title, dateMs){
  var t=String(title||'').toLowerCase();
  var dv=(typeof dateMs==='number'&&isFinite(dateMs))?dateMs:Date.parse(dateMs);
  if(!isFinite(dv))dv=Infinity;                 // unknown date -> treat as "now/future" (Liga/Boston/VA cutoffs only gate the past)
  var isBoston=/(\(Boston\)|MA\s*-|RI\s*-|NH\s*-)/.test(String(title||''));
  if(t.indexOf('liga')>=0 && dv<new Date(2025,0,1).getTime()) return 'Liga';
  if(t.indexOf('tuji')>=0) return 'Tuji';
  if(isBoston && dv<new Date(2026,3,20).getTime()) return 'Boston';
  if(t.indexOf('(virginia)')>=0 && dv<new Date(2026,2,26).getTime()) return 'Virginia';
  return 'Zip to Zip';
}
function coOf(j){ if(!j)return 'Zip to Zip'; if(j.company)return j.company; return companyOf(j.title||j.summary||'', Date.parse(j.start||0)); }
function _linkFeasible(A, jt){
  if(A.ldDeparture) return {ok:false};
  if(A.legs.length>=CHAIN_RULES.maxJobs) return {ok:false};
  if(A.legs.some(x=>(x.cf||0)>CHAIN_RULES.maxCF)) return {ok:false};
  if((jt.cf||0)>CHAIN_RULES.maxCF) return {ok:false};
  if(!jt.pickup||!jt.delivery||!INREGION(jt.delivery)) return {ok:false};
  const la=[...A.legs].sort((x,y)=>Date.parse(x.start||0)-Date.parse(y.start||0)).slice(-1)[0];
  if(!la.delivery||!INREGION(la.delivery)) return {ok:false};
  if(coOf(la)!==coOf(jt)) return {ok:false};   // chain only within the same company
  const at1=Math.max(...A.legs.map(l=>l._endMs||Date.parse(l.end||l.start||0)));
  const rm=cachedRoadMi(la.delivery, jt.pickup);
  const linkMi=(rm!=null?rm:hav(la.delivery, jt.pickup)*1.15);
  const driveMs=linkMi/35*3600000;
  if(driveMs>CHAIN_RULES.maxDriveMin*60000) return {ok:false};
  const bt0=Date.parse(jt.start); const eta=at1+driveMs;
  const dayIso=String(jt.start).slice(0,10);
  const ceil=Date.parse(dayIso+'T'+String(CLEAN.maxArrivalHr).padStart(2,'0')+':00');
  const normal = eta <= bt0 + CHAIN_RULES.lateMin*60000;
  const arriveMs = normal ? Math.max(eta, bt0) : eta;
  if(eta>ceil) return {ok:false};
  const ws=arriveMs; const p2d=hav(jt.pickup, jt.delivery)/35*3600000*1.15;
  const done=ws+((jt.actH||schedH(jt))*3600000)+p2d;
  if(done>Date.parse(dayIso+'T23:59')) return {ok:false};
  if(Math.max(A.crew, jt.crew||2)>6) return {ok:false};
  // TOTAL-ROUTE awareness: the chained job becomes the route's LAST leg, so the crew drives home from ITS delivery to the anchor route's base.
  const baseObj=(typeof DATA!=='undefined'&&DATA.bases)?DATA.bases[A.base]:null;
  let returnMi=0, returnMin=0, homeMs=done;
  if(baseObj&&jt.delivery){ const rrm=cachedRoadMi(jt.delivery, baseObj); returnMi=(rrm!=null?rrm:hav(jt.delivery, baseObj)*1.15); returnMin=Math.round(returnMi/35*60); homeMs=done+returnMi/35*3600000; }
  const maxHome=Date.parse(dayIso+'T'+String(CLEAN.maxHomeHr||22).padStart(2,'0')+':00');
  if(homeMs>maxHome) return {ok:false}; // never strand the crew: reject chains whose delivery sends them home too late / too far from base
  // cost the engine MINIMIZES = empty drive INTO the job (reposition) + empty drive home FROM the job (return). Picks the anchor best for the whole route, not just the next pickup.
  return {ok:true, arriveMs, linkMi:Math.round(linkMi), linkMin:Math.round(driveMs/60000), returnMi:Math.round(returnMi), returnMin, homeMs, cost:Math.round(driveMs/60000)+returnMin, anchorEndMs:at1, normal, anchorLeg:la};
}
function bestAnchorFor(jobObj, routes){ let best=null; for(const A of routes){const f=_linkFeasible(A, jobObj);if(f.ok&&(!best||f.cost<best.cost))best={A,...f};} return best; }

function recGeo(anchorLeg, jobObj){
  const stops=[];
  if(anchorLeg){const d=ptOf(anchorLeg.delivery)||ptOf(anchorLeg.pickup);if(d)stops.push({lat:d.lat,lon:d.lon,kind:'A',label:'crew finishes \u00b7 '+(anchorLeg.cityTo||anchorLeg.cityFrom||''),customer:anchorLeg.customer||''});}
  const p=ptOf(jobObj.pickup); if(p)stops.push({lat:p.lat,lon:p.lon,kind:'P',label:'pickup \u00b7 '+(jobObj.cityFrom||''),customer:jobObj.customer||''});
  const d=ptOf(jobObj.delivery); if(d)stops.push({lat:d.lat,lon:d.lon,kind:'D',label:'delivery \u00b7 '+(jobObj.cityTo||''),customer:jobObj.customer||''});
  return stops;
}

// classify all single-route chains into standard (PM, free) and calls (AM, paid)
function detectChains(rts, iso){
  const standard=[], calls=[]; const seen=new Set();
  const singles = rts.filter(r=>r.legs.length===1 && !r.legs[0].after && !r.ldDeparture
        && !/long/i.test(String(r.legs[0].movingType||'')) && !r.legs[0]._far
        && (r.legs[0].cf||0)<=CHAIN_RULES.maxCF && !AUTOOFFLIST.has(r.legs[0].code));
  for(const B of singles){
    const lb=B.legs[0]; let best=null;
    for(const A of rts){ if(A===B)continue; const f=_linkFeasible(A, lb); if(!f.ok)continue; if(!best||f.cost<best.cost)best={A,...f}; }
    if(!best)continue;
    const base={ tail:lb.code, after:best.anchorLeg.code, anchorRouteId:best.A.id,
      linkMi:best.linkMi, linkMin:best.linkMin, returnMi:best.returnMi, returnMin:best.returnMin, homeMs:best.homeMs, cost:best.cost, anchorEndMs:best.anchorEndMs, arriveMs:best.arriveMs, normal:best.normal,
      customer:lb.customer||'', city:lb.cityFrom||'', deliveryCity:lb.cityTo||'', cf:lb.cf||0, actH:(lb.actH||schedH(lb)),
      origStartMs:Date.parse(lb.start), anchorCustomer:best.anchorLeg.customer||'',
      anchorCity:best.anchorLeg.cityTo||best.anchorLeg.cityFrom||'', geo:recGeo(best.anchorLeg, lb) };
    const isPM = new Date(lb.start).getHours() >= CLEAN.pmCutoffHr;
    if(isPM){ standard.push(base); }
    else { base.discount=(best.linkMin<=CLEAN.tightLinkMin||best.linkMi<=CLEAN.tightLinkMi)?CLEAN.discountTight:CLEAN.discountLoose;
           base.window=cleanWindow(best.arriveMs, iso); calls.push(base); }
  }
  standard.sort((a,b)=>(a.cost!=null?a.cost:a.linkMin)-(b.cost!=null?b.cost:b.linkMin));
  calls.sort((a,b)=>(a.cost!=null?a.cost:a.linkMin)-(b.cost!=null?b.cost:b.linkMin));
  return {standard, calls};
}

// Apply engine auto-chains + all free PM standard chains greedily. Returns final routes + the standard list.
function optimizeStandard(iso){
  const kJ=DATA.jobs,kAC=AUTOCHAINS,kD=currentDay,kOff=new Set(AUTOOFFLIST);
  try{
    DATA.jobs=DATA.days[iso]||[]; currentDay=iso; AUTOCHAINS=[];
    try{computeAutoOff();}catch(e){}
    let rts=buildRoutes();
    for(let g=0;g<2;g++){const det=detectAutoChains(rts);if(!det.length)break;AUTOCHAINS=AUTOCHAINS.concat(det);rts=buildRoutes();}
    const baseCount=rts.length;
    const standardChains=[];
    for(let k=0;k<14;k++){
      const {standard}=detectChains(rts, iso);
      if(!standard.length)break;
      const pick=standard[0];
      AUTOCHAINS.push({tail:pick.tail, after:pick.after});
      const nr=buildRoutes();
      if(nr.length>=rts.length){ AUTOCHAINS.pop(); break; } // safety: must reduce
      rts=nr; standardChains.push(pick);
    }
    const finalCount=rts.length;
    // snapshot routes (plain) for downstream pools, and detect remaining calls
    const {calls}=detectChains(rts, iso);
    const snap=rts.map(r=>({id:r.id,base:r.base,crew:r.crew,legs:r.legs.length,codes:r.legs.map(l=>l.code),
      single:r.legs.length===1&&!r.ldDeparture, code:r.legs[0].code,
      first:r.legs[0], pickup:r.legs[0].pickup, delivery:r.legs[0].delivery}));
    return {routesSnap:snap, standardChains, calls, baseCount, finalCount};
  } finally { DATA.jobs=kJ; AUTOCHAINS=kAC; currentDay=kD; AUTOOFFLIST.clear(); kOff.forEach(x=>AUTOOFFLIST.add(x)); }
}

function dayLoad(iso){
  const opt=optimizeStandard(iso); const core=coreAvailOn(iso);
  const target=core.avail-CLEAN.buffer; const routes=opt.finalCount;
  const status = routes<=target?'ok':(routes<=core.avail?'tight':'short');
  return {iso, routes, base:opt.baseCount, availableCore:core.avail, coreOff:core.off, target,
          spare:core.avail-routes, status, nearFull:status==='ok'&&(core.avail-routes)<=CLEAN.buffer, standardCount:opt.standardChains.length, _opt:opt};
}

function slotOnTarget(jobObj, targetIso){
  const kJ=DATA.jobs,kAC=AUTOCHAINS,kD=currentDay,kOff=new Set(AUTOOFFLIST);
  try{
    DATA.jobs=DATA.days[targetIso]||[]; currentDay=targetIso; AUTOCHAINS=[];
    try{computeAutoOff();}catch(e){}
    let rts=buildRoutes();
    for(let g=0;g<2;g++){const det=detectAutoChains(rts);if(!det.length)break;AUTOCHAINS=AUTOCHAINS.concat(det);rts=buildRoutes();}
    const probe=Object.assign({}, jobObj, {start: targetIso+' '+String(jobObj.start).slice(11)});
    const anchor=bestAnchorFor(probe, rts);
    if(anchor){
      return { fresh:false, anchorCode:anchor.anchorLeg.code, anchorCustomer:anchor.anchorLeg.customer||'',
               anchorCity:anchor.anchorLeg.cityTo||anchor.anchorLeg.cityFrom||'', arriveMs:anchor.arriveMs,
               anchorEndMs:anchor.anchorEndMs, linkMin:anchor.linkMin, linkMi:anchor.linkMi,
               city:probe.cityFrom||'', deliveryCity:probe.cityTo||'', actH:(probe.actH||schedH(probe)),
               customer:probe.customer||'', window:cleanWindow(anchor.arriveMs, targetIso), geo:recGeo(anchor.anchorLeg, probe) };
    }
    const ms=Date.parse(probe.start);
    return { fresh:true, origStartMs:ms, customer:probe.customer||'', city:probe.cityFrom||'', deliveryCity:probe.cityTo||'', geo:recGeo(null, probe) };
  } finally { DATA.jobs=kJ; AUTOCHAINS=kAC; currentDay=kD; AUTOOFFLIST.clear(); kOff.forEach(x=>AUTOOFFLIST.add(x)); }
}

// ranked move candidates for singles that remain after standard (AM or unchainable PM)
function buildMovePool(iso, opt, horizon, callTails){
  const day=DATA.days[iso]||[];
  const singleCodes=new Set(opt.routesSnap.filter(r=>r.single).map(r=>r.code));
  const movable=day.filter(j=>{
    if(!singleCodes.has(j.code))return false;
    if(/long/i.test(j.movingType||'')||j._far)return false; // local-only: never move long-distance/straight
    if(j._confirmed)return false;
    if(j.delivery && !INREGION(j.delivery))return false;
    return true;
  }).sort((a,b)=>(a.cf||0)-(b.cf||0));
  const base=Date.parse(iso+'T12:00');
  const targets=horizon.filter(t=>t.iso>iso && t.spare>=1)/*item1: only days AFTER the job's original date*/
    .sort((x,y)=>(y.spare-x.spare)||(Math.abs(Date.parse(x.iso+'T12:00')-base)-Math.abs(Date.parse(y.iso+'T12:00')-base)));
  const out=[];
  for(const j of movable){
    if(!targets.length)break;
    const t=targets[0];
    const slot=slotOnTarget(j, t.iso);
    out.push({ code:j.code, customer:j.customer||'', city:j.cityFrom||'', cf:j.cf||0, from:iso, to:t.iso,
               targetSpare:t.spare, slot, isAM:new Date(j.start).getHours()<CLEAN.pmCutoffHr });
  }
  return out;
}


// days within +/- n of iso (never before today) that actually have jobs — for date moves (max +/-2)
function nearbyDays(iso, n){
  const out=[]; const base=Date.parse(iso+'T12:00');
  for(let d=-n; d<=n; d++){ if(d===0)continue;
    const dt=new Date(base+d*86400000);
    const i=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    if(i<=iso || !DATA.days[i])continue;/*item1: never earlier than the original date*/
    const l=dayLoad(i);
    out.push({iso:i, routes:l.routes, availableCore:l.availableCore, target:l.target, spare:l.spare, status:l.status});
  }
  return out;
}
// every future day (today onward) that is amber/red — for the "problems only" filter (not limited to a window)
function allProblemDays(){
  const out=[];
  for(const iso of Object.keys(DATA.days).sort()){
    if(iso<TODAY_ISO)continue;
    const l=dayLoad(iso);
    if(l.status!=='ok' || l.nearFull) out.push({iso, routes:l.routes, base:l.base, availableCore:l.availableCore, target:l.target, spare:l.spare, status:l.status, nearFull:l.nearFull, standardCount:l.standardCount});
  }
  return out;
}

function cleanupPlan(iso, horizon){
  const load=dayLoad(iso); const opt=load._opt;
  const callPool=opt.calls.map(c=>Object.assign({}, c, {window:c.window||cleanWindow(c.arriveMs, iso),
      discount:c.discount||((c.linkMin<=CLEAN.tightLinkMin||c.linkMi<=CLEAN.tightLinkMi)?CLEAN.discountTight:CLEAN.discountLoose)}));
  const movePool=buildMovePool(iso, opt, nearbyDays(iso, 3), new Set(callPool.map(c=>c.tail))); // max +3 days (never earlier than original, never past)
  const gapToBuffer=Math.max(0, load.routes-load.target);
  const gapToCover =Math.max(0, load.routes-load.availableCore);
  return { iso, availableCore:load.availableCore, coreOff:load.coreOff, target:load.target,
           baseRoutes:load.base, routes:load.routes, routesSnap:load._opt.routesSnap, status:load.status, nearFull:load.nearFull, spare:load.spare,
           standardChains:opt.standardChains, callPool, movePool, gapToBuffer, gapToCover };
}

function scanHorizon(fromIso, nDays){
  const days=[]; const start=Date.parse(fromIso+'T12:00');
  for(let i=0;i<nDays;i++){
    const d=new Date(start+i*86400000);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(!DATA.days[iso])continue;
    const l=dayLoad(iso);
    days.push({iso, routes:l.routes, base:l.base, availableCore:l.availableCore, target:l.target, spare:l.spare, status:l.status, nearFull:l.nearFull, standardCount:l.standardCount});
  }
  return days;
}


// Given a plan + a set of declined ids, return the recommended non-conflicting active set.
// Strategy: free crews with calls first (cheaper than moving a customer's date), up to the
// buffer gap; if calls can't even clear the shortage, add date-moves until the shortage clears.
function solvePlan(plan, declined, hardCust){
  declined = declined || new Set();
  const declCust=new Set(hardCust?[...hardCust]:[]);      // a refused CUSTOMER is off for good (any action, any code) -- you only talk to them once
  plan.callPool.forEach(c=>{ if(declined.has(c.tail)&&c.customer)declCust.add(c.customer); });
  plan.movePool.forEach(m=>{ if(declined.has(m.code)&&m.customer)declCust.add(m.customer); });
  const used = new Set();        // job codes consumed as tail or anchor
  const activeCalls=[], activeMoves=[];
  const needCover=plan.gapToCover, needBuffer=plan.gapToBuffer;
  let freed=0;
  for(const c of plan.callPool){
    if(freed>=needBuffer)break;
    if(declined.has(c.tail)||declCust.has(c.customer))continue;
    if(used.has(c.tail)||used.has(c.after))continue;
    const purpose = freed<needCover ? 'cover' : 'buffer';
    activeCalls.push(Object.assign({purpose}, c)); used.add(c.tail); used.add(c.after); freed++;
  }
  if(freed<needCover){
    const spareLeft={};
    for(const m of plan.movePool){
      if(freed>=needCover)break;
      if(declined.has(m.code)||declCust.has(m.customer))continue;
      if(used.has(m.code))continue;
      const k=m.to; const cap=(spareLeft[k]!=null?spareLeft[k]:m.targetSpare);
      if(cap<1)continue;
      activeMoves.push(Object.assign({purpose:'cover'}, m)); used.add(m.code); spareLeft[k]=cap-1; freed++;
    }
  }
  const projectedRoutes=plan.routes-freed;
  return { activeCalls, activeMoves, freed,
           clearedShortage: freed>=needCover,
           reachedBuffer: projectedRoutes<=plan.target,
           projectedRoutes,
           // remaining bench alternatives (for the cascade UI to know more exist)
           moreCalls: plan.callPool.filter(c=>!activeCalls.find(a=>a.tail===c.tail) && !declined.has(c.tail) && !declCust.has(c.customer)).length,
           moreMoves: plan.movePool.filter(m=>!activeMoves.find(a=>a.code===m.code) && !declined.has(m.code) && !declCust.has(m.customer)).length };
}


// Full route objects for the day's timeline (build + chains + assignAll so rows show foreman/truck like the dispatcher).
function timelineData(iso, changes){
  changes=changes||{};
  const kJ=DATA.jobs,kAC=AUTOCHAINS,kD=currentDay,kOff=new Set(AUTOOFFLIST),kDay=DATA.days[iso];
  try{
    // apply confirmed MOVES: drop the moved-away jobs from this day so the board re-routes
    const movedOut=[]; const ghosts=[];
    const _chk=Object.keys(changes);
    if(_chk.length){ // learn each changed job's ORIGINAL base+time by building the unchanged routes first (for the ghost)
      DATA.jobs=(DATA.days[iso]||[]).slice(); currentDay=iso; AUTOCHAINS=[];
      try{computeAutoOff();}catch(e){}
      let _o=buildRoutes();
      for(let g=0;g<2;g++){const det=detectAutoChains(_o);if(!det.length)break;AUTOCHAINS=AUTOCHAINS.concat(det);_o=buildRoutes();}
      const _oi={};
      _o.forEach(r=>{const b=r.baseOverride||r.nearestBase||'NJ';r.legs.forEach(l=>{_oi[l.code]={base:b,start:l.start,end:l.end||l.start,cf:l.cf||0,cityFrom:l.cityFrom||'',cityTo:l.cityTo||'',customer:l.customer||l.code};});});
      _chk.forEach(code=>{const c=changes[code];const gi=_oi[code];if(!gi)return;ghosts.push({code,customer:gi.customer,base:gi.base,origStartMs:Date.parse(gi.start),origEndMs:Date.parse(gi.end),cf:gi.cf,cityFrom:gi.cityFrom,cityTo:gi.cityTo,kind:c.kind,to:c.to,after:c.after,arriveMs:c.arriveMs});});
      AUTOCHAINS=[];
    }
    let dayJobs=(DATA.days[iso]||[]).slice();
    dayJobs=dayJobs.filter(j=>{const c=changes[j.code]; if(c&&c.kind==='move'){movedOut.push({code:j.code,customer:j.customer||j.code,to:c.to});return false;} return true;});
    // re-chained calls flip to the afternoon: clone the job with its new chained start so the chip moves
    dayJobs=dayJobs.map(j=>{const c=changes[j.code]; if(c&&c.kind==='call'&&c.arriveMs){const cur=Date.parse(j.start);const dur=(Date.parse(j.end||j.start)-cur)||((j.actH||schedH(j)||3)*3600000);const pad=n=>String(n).padStart(2,'0');const f=ms=>{const d=new Date(ms);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());};return Object.assign({},j,{start:f(c.arriveMs),end:f(c.arriveMs+dur),_rechained:true});} return j;});
    DATA.days[iso]=dayJobs; DATA.jobs=dayJobs; currentDay=iso; AUTOCHAINS=[];
    try{computeAutoOff();}catch(e){}
    let rts=buildRoutes();
    for(let g=0;g<2;g++){const det=detectAutoChains(rts);if(!det.length)break;AUTOCHAINS=AUTOCHAINS.concat(det);rts=buildRoutes();}
    // apply confirmed RE-CHAINS (user-picked lead) so the morning job moves to the afternoon after its lead
    Object.keys(changes).forEach(code=>{const c=changes[code];if(c&&c.kind==='call'&&c.after){AUTOCHAINS.push({tail:code,after:c.after});}});
    rts=buildRoutes();
    for(let k=0;k<14;k++){const r=detectChains(rts,iso).standard;if(!r.length)break;const p=r[0];AUTOCHAINS.push({tail:p.tail,after:p.after});const nr=buildRoutes();if(nr.length>=rts.length){AUTOCHAINS.pop();break;}rts=nr;}
    rts.forEach(r=>{ r.base=r.baseOverride||r.nearestBase||'NJ'; r.t0=Math.min(...r.legs.map(l=>Date.parse(l.start||0))); }); // no foreman here — assignment happens in the dispatcher the day before
    const core=coreAvailOn(iso);
    const over=Math.max(0, rts.length-core.avail);
    const shortIds=new Set([...rts].sort((a,b)=>(b.t0||0)-(a.t0||0)).slice(0,over).map(r=>r.id));
    ghosts.forEach(g=>{ if(g.kind==='call'){ const rr=rts.find(r=>r.legs.some(l=>l.code===g.code)); if(rr){g.newRouteId=rr.id; const nl=rr.legs.find(l=>l.code===g.code); if(nl)g.newStartMs=Date.parse(nl.start);} } });
    return {routes:rts, availableCore:core.avail, off:core.off, shortIds:[...shortIds], movedOut, ghosts};
  } finally { DATA.days[iso]=kDay; DATA.jobs=kJ; AUTOCHAINS=kAC; currentDay=kD; AUTOOFFLIST.clear(); kOff.forEach(x=>AUTOOFFLIST.add(x)); }
}

// Per-crew-slot ordered options for the resolve flow + decline cascade.
// declined = Set of keys 'slot<i>|call|<tail>' / 'slot<i>|move|<code>'. Recompute on every action.
function resolveSlots(plan, declined, hardCust){
  declined = declined || new Set();
  const declCust=new Set(hardCust?[...hardCust]:[]);   // captured-at-decline names (bulletproof) + refused customer -> never suggest again (call OR move, any code)
  plan.callPool.forEach(c=>{ if(declined.has(c.tail)&&c.customer)declCust.add(c.customer); });
  plan.movePool.forEach(m=>{ if(declined.has(m.code)&&m.customer)declCust.add(m.customer); });
  const cover=plan.gapToCover, gap=Math.max(plan.gapToBuffer, plan.gapToCover);
  const used=new Set(); const slots=[];
  for(let i=0;i<gap;i++){
    const cand=[];
    for(const c of plan.callPool){
      if(used.has(c.tail)||used.has(c.after))continue;
      if(declined.has(c.tail)||declCust.has(c.customer))continue;
      cand.push({kind:'call', key:'call|'+c.tail, rec:c});
    }
    for(const m of plan.movePool){
      if(used.has(m.code))continue;
      if(declined.has(m.code)||declCust.has(m.customer))continue;
      cand.push({kind:'move', key:'move|'+m.code, rec:m});
    }
    const cur=cand[0]||null;
    if(cur){ if(cur.kind==='call'){used.add(cur.rec.tail);used.add(cur.rec.after);} else used.add(cur.rec.code); }
    slots.push({index:i, must:i<cover, current:cur, altCount:Math.max(0,cand.length-1), exhausted:!cur});
  }
  return {slots, cover, gap, declinedCusts:[...declCust]};
}

<script>
/* ===== shared helpers ===== */
const $=id=>document.getElementById(id);
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDay(iso){const d=new Date(Date.parse(iso+'T12:00'));return {dow:DOW[d.getDay()],dn:d.getDate(),mon:MON[d.getMonth()]};}
function fmtMs(ms){const d=new Date(ms);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function hmPretty(ms){let h=new Date(ms).getHours(),m=new Date(ms).getMinutes();const ap=h<12?'am':'pm';let h12=h%12;if(h12===0)h12=12;return h12+(m?':'+String(m).padStart(2,'0'):'')+ap;}
function havArr(a,b){return hav({lat:a[0],lon:a[1]},{lat:b[0],lon:b[1]});}

/* ===== HERE truck routing (reuses engine_core's hereCache so drawn routes warm cachedRoadMi) ===== */
const HERE_KEY='0IGXB_hGz84InzFmhfCygxp27_54NI-LkjL6N5RSYT8';
function decodeFlexPoly(encoded){
  const DEC='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
  const idx={};[...DEC].forEach((c,i)=>idx[c]=i);let i=0;
  function varint(){let r=0,s=0,b;do{b=idx[encoded[i++]];r|=(b&31)<<s;s+=5;}while(b>=32);return r;}
  function svarint(){const r=varint();return (r&1)?~(r>>>1):(r>>>1);}
  varint();const meta=varint();const precision=meta&15,thirdDim=(meta>>4)&7;const factor=Math.pow(10,precision);
  let lat=0,lng=0;const pts=[];while(i<encoded.length){lat+=svarint();lng+=svarint();if(thirdDim)svarint();pts.push([lat/factor,lng/factor]);}return pts;
}
async function truckRoute(a,b){
  const ck=a.join()+'|'+b.join();if(hereCache[ck]!==undefined)return hereCache[ck];
  const p=(async()=>{try{
    const u='https://router.hereapi.com/v8/routes?transportMode=truck&routingMode=fast&origin='+a[0]+','+a[1]+'&destination='+b[0]+','+b[1]+'&return=polyline,summary&apikey='+encodeURIComponent(HERE_KEY);
    const res=await fetch(u);if(!res.ok)throw 0;const j=await res.json();const sec=(j.routes&&j.routes[0]&&j.routes[0].sections)||[];if(!sec.length)throw 0;
    let pts=[],len=0,dur=0;for(const s of sec){pts=pts.concat(decodeFlexPoly(s.polyline));len+=s.summary.length;dur+=s.summary.duration;}
    const out={pts,mi:len/1609.34,min:dur/60};hereCache[ck]=out;return out;
  }catch(e){hereCache[ck]=null;return null;}})();
  hereCache[ck]=p;return p;
}

function step(t,txt,tv,late){return '<div class="step'+(tv?' tv':'')+(late?' late':'')+'"><span class="dot"></span><span class="st">'+(t||'')+'</span><span>'+txt+'</span></div>';}
function journeySteps(rec,kind){
  // rec carries: anchorCustomer, anchorCity, anchorEndMs, linkMin, linkMi, askArriveMs|arriveMs, window, customer, city, deliveryCity, actH
  const arrive=rec.askArriveMs!=null?rec.askArriveMs:rec.arriveMs;
  const rows=[];
  if(rec.anchorEndMs!=null){
    rows.push(step(fmtMs(rec.anchorEndMs),'Crew finishes <b>'+esc(rec.anchorCustomer||'previous job')+'</b> · '+esc(rec.anchorCity||''),false));
    rows.push(step(fmtMs(rec.anchorEndMs),'Drive to '+esc(rec.city||'pickup')+' · '+(rec.linkMin!=null?rec.linkMin+' min · ':'')+(rec.linkMi!=null?rec.linkMi+' mi':''),true));
  }
  if(arrive!=null){
    const win=rec.window?rec.window.text:fmtMs(arrive);
    rows.push(step(fmtMs(arrive),'Arrive <b>'+esc(rec.customer||'')+'</b> · pickup '+esc(rec.city||'')+' · ask window '+win,false));
    const act=rec.actH||3;
    const load=act*0.6*3600000;
    const departP=arrive+load;
    rows.push(step(fmtMs(departP),'Load ~'+(Math.round(act*0.6*10)/10)+'h, then drive to delivery',true));
    const done=departP + 30*60000 + act*0.4*3600000;
    rows.push(step(fmtMs(done),'Deliver '+esc(rec.deliveryCity||'')+' · done ~'+fmtMs(done),false));
  }
  return rows.join('');
}
