<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zip To Zip — Packing Materials Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F7F6F2;--card:#FFF;--ink:#1F2329;--dim:#646B73;--faint:#969CA3;--line:#E6E4DC;--line2:#D3D0C6;
--good:#4F7A1F;--good-bg:#EEF4DE;--warn:#B26B0B;--warn-bg:#FBF1DC;--bad:#C0392B;--bad-bg:#FBE7E4;--accent:#2563EB;--accent-bg:#EAF0FE;}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:20px 22px 80px}
.top{display:flex;align-items:center;gap:14px;padding:6px 0 18px;border-bottom:1px solid var(--line);margin-bottom:20px}
.top img{height:34px;cursor:pointer}
.brand{font-family:'Barlow Condensed';font-weight:700;font-size:22px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;color:var(--ink);text-decoration:none}
.htxt h1{font-family:'Barlow Condensed';font-weight:600;font-size:24px;letter-spacing:.04em;text-transform:uppercase;margin:0;line-height:1}
.htxt .sub{color:var(--dim);font-size:12.5px;margin-top:3px}
.spacer{flex:1}
h2{font-family:'Barlow Condensed';font-weight:600;font-size:18px;letter-spacing:.04em;text-transform:uppercase;margin:26px 0 11px;color:var(--ink)}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.kpi .v{font-family:'Barlow Condensed';font-weight:700;font-size:25px;line-height:1}
.kpi .l{color:var(--dim);font-size:11.5px;margin-top:4px;letter-spacing:.02em}
.note{background:var(--accent-bg);border:1px solid #C9DBFB;border-radius:10px;padding:9px 13px;font-size:12.5px;color:#274690;margin:14px 0}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:13px}
th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
th{background:#FAF9F5;font-weight:600;color:var(--dim);font-size:11.5px;letter-spacing:.02em;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0}
th:hover{color:var(--ink)}
tbody tr{cursor:pointer}tbody tr:hover{background:#FAF9F5}
tr:last-child td{border-bottom:0}
.pill{display:inline-block;padding:1px 8px;border-radius:999px;font-size:11px;font-weight:600}
.p-bad{background:var(--bad-bg);color:var(--bad)}.p-warn{background:var(--warn-bg);color:var(--warn)}.p-good{background:var(--good-bg);color:var(--good)}
.cell-bad{background:var(--bad-bg)}.cell-warn{background:var(--warn-bg)}
.wl{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.wlcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:12px;padding:13px 15px;cursor:pointer;transition:box-shadow .15s}
.wlcard:hover{box-shadow:0 6px 18px rgba(0,0,0,.09)}
.wlcard .nm{font-weight:700;font-size:15px}.wlcard .mt{color:var(--dim);font-size:12px;margin:2px 0 8px}
.sig{font-size:12px;color:var(--bad);margin:3px 0;display:flex;gap:6px;align-items:flex-start}
.sig.amb{color:var(--warn)}
#drill{display:none;background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:20px 22px;margin-top:14px;box-shadow:0 10px 30px rgba(0,0,0,.10)}
.dh{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
.dh .nm{font-family:'Barlow Condensed';font-weight:700;font-size:26px;letter-spacing:.03em}
.dh .meta{color:var(--dim);font-size:13px}
.dclose{margin-left:auto;border:1px solid var(--line2);background:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;font-weight:600}
.dgrid{display:grid;grid-template-columns:1.1fr 1fr;gap:22px}
@media(max-width:840px){.dgrid{grid-template-columns:1fr}}
.panel h3{font-size:13px;font-weight:700;color:var(--ink);margin:0 0 9px;letter-spacing:.01em}
.cmp{display:flex;flex-direction:column;gap:9px}
.cmprow{font-size:12.5px}
.cmprow .lab{display:flex;justify-content:space-between;margin-bottom:2px}
.cmprow .lab b{font-weight:700}
.track{position:relative;height:9px;background:#EEF0F2;border-radius:6px}
.fillb{position:absolute;left:0;top:0;height:100%;border-radius:6px}
.medm{position:absolute;top:-2px;width:2px;height:13px;background:#111;opacity:.55}
.chart{margin-top:6px}
.lgnd{font-size:11px;color:var(--dim);display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
.lgnd span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.jobtbl{margin-top:6px;max-height:330px;overflow:auto;border:1px solid var(--line);border-radius:10px}
.jobtbl table{border:0;border-radius:0}
.jobtbl th{font-size:11px}
.itemrow td{background:#FBFAF6;font-size:12px;color:var(--dim)}
.miscol{color:var(--dim)}
.hint{color:var(--faint);font-size:12px;margin-top:8px}
.tabs{display:flex;gap:6px;margin:0 0 12px}
.tab{border:1px solid var(--line2);background:#fff;border-radius:8px;padding:6px 13px;cursor:pointer;font-size:13px;font-weight:600;color:var(--dim)}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.srch{border:1px solid var(--line2);border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;width:200px}
.ckbtn{border:1px solid var(--bad);color:var(--bad);background:#fff;border-radius:7px;padding:3px 9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.ckbtn:hover{background:var(--bad);color:#fff}.ckbtn:disabled{opacity:.5;cursor:default}
.connbtn{border:1px solid var(--accent);color:var(--accent);background:var(--accent-bg);border-radius:8px;padding:5px 12px;font-size:12.5px;font-weight:600;cursor:pointer}
.conn{color:var(--good);font-size:12.5px;font-weight:600}
#connstatus{font-family:'Inter';font-weight:400;text-transform:none;letter-spacing:0;margin-left:10px}
#pktoast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);background:#1F2329;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:.25s;z-index:99;pointer-events:none;max-width:90vw}
#pktoast.show{opacity:1;transform:translateX(-50%) translateY(0)}

</style>

  try{
    const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&headers=1&sheet='+encodeURIComponent('Packing Checked')+'&_t='+Date.now();
    const r=await fetch(url);if(!r.ok)return;const t=await r.text();
    const rows=pcsv(t);if(rows.length<2)return;const H=rows[0].map(function(x){return String(x).trim().toLowerCase();});let ji=H.indexOf('job code');if(ji<0)ji=0;
    let added=0;rows.slice(1).forEach(function(rw){const jc=(rw[ji]||'').trim();if(jc){if(!CHECKED.has(jc))added++;CHECKED.add(jc);}});
    if(added){recompute();renderAll();}
  }catch(e){}
}
function flaggedJobs(){
  const out=[];
  for(let i=0;i<JOBS.length;i++){
    if(!isLive(i))continue;
    const j=JOBS[i],realCF=j[5],act=j[3],est=j[2],pp=j[7],tipP=j[10],tip=j[8],reasons=[];
    if(act===0&&realCF>=300)reasons.push('Real move ('+Math.round(realCF)+' CF) sold $0 packing');
    if(tipP>=15&&pp<20)reasons.push('High tip ('+pct(tipP)+') but very low packing ('+Math.round(pp)+'/100 CF)');
    if(est>=1000&&act<0.3*est&&realCF>=300)reasons.push('Estimated '+money(est)+' packing, sold only '+money(act));
    if(realCF>=700&&pp<12)reasons.push('Large move ('+Math.round(realCF)+' CF) with almost no packing');
    if(reasons.length)out.push({i:i,jc:j[11],fn:FOREMEN[j[0]],date:j[1],realCF:realCF,act:act,tip:tip,reasons:reasons,sev:reasons.length*100000+tip});
  }
  out.sort(function(a,b){return b.sev-a.sev;});return out;
}
function renderChecklist(){
  const fj=flaggedJobs();
  $('#checkhint').innerHTML=fj.length+' job'+(fj.length===1?'':'s')+' worth a manual check — zero packing on a real move, a big tip with almost no packing, a large under-delivery vs the estimate, or a big move with almost no packing. Confirm one (e.g. difficult customer) to mark it reviewed and drop it from the stats.';
  if(!fj.length){$('#checklist').innerHTML='<div class="hint">Nothing flagged.</div>';return;}
  const rows=fj.slice(0,250).map(function(f){return '<tr><td>'+esc(f.jc)+'</td><td style="text-align:left">'+esc(f.fn)+'</td><td>'+f.date+'</td><td>'+Math.round(f.realCF)+'</td><td>'+money(f.act)+'</td><td>'+money(f.tip)+'</td><td style="text-align:left;font-size:12px;color:var(--bad)">'+f.reasons.map(esc).join('; ')+'</td><td><button class="ckbtn" onclick="markChecked('+f.i+',this)">✓ checked</button></td></tr>';}).join('');
  $('#checklist').innerHTML='<div class="jobtbl" style="max-height:440px"><table><thead><tr><th>Job</th><th style="text-align:left">Foreman</th><th>Date</th><th>Real CF</th><th>Packing</th><th>Tip</th><th style="text-align:left">Why flagged</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+(fj.length>250?'<div class="hint">Showing first 250 of '+fj.length+'.</div>':'');
}
function markChecked(i,btn){
  const j=JOBS[i];const note=prompt('Confirm '+j[11]+' is OK (e.g. difficult customer). Optional note:');if(note===null)return;
  if(btn){btn.disabled=true;btn.textContent='saving…';}
  ensureToken(async function(){
    try{
      await shAppendRow('Packing Checked',{'Job Code':j[11],'Foreman':FOREMEN[j[0]],'Date':j[1],'Real CF':Math.round(j[5]),'Packing $':Math.round(j[3]),'Tip $':Math.round(j[8]),'Note':note||'confirmed','Checked On':new Date().toISOString().slice(0,10)});
      CHECKED.add(j[11]);recompute();renderAll();toast('✓ '+j[11]+' marked checked — removed from stats and saved to the sheet.');
    }catch(e){if(btn){btn.disabled=false;btn.textContent='✓ checked';}toast('⚠ Could not save: '+e.message);}
  });
}
function updateConnUI(){
  const el=$('#connstatus');if(!el)return;
  if(GTOKEN&&Date.now()<GTOKEXP-60000)el.innerHTML='<span class="conn">● Google connected</span>';
  else el.innerHTML='<button class="connbtn" onclick="connectGoogle()">Connect Google to save checks</button>';
}
function toast(m){let t=$('#pktoast');if(!t){t=document.createElement('div');t.id='pktoast';document.body.appendChild(t);}t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},4500);}

function renderKPIs(){
  const live=JOBS.filter((j,i)=>isLive(i));
  const totJobs=live.length, totPack=sum(live.map(j=>j[3])), totCharge=sum(live.map(j=>j[9]));
  const zero=live.filter(j=>j[3]===0).length;
  const k=[['Jobs',totJobs.toLocaleString()],['Packing sold',money(totPack)],['Avg packing / 100 CF',Math.round(TM.pp100)],
    ['Packing % of charge',pct(100*totPack/totCharge)],['Zero-packing jobs',pct(100*zero/totJobs)],['Foremen (15+ jobs)',EL.length+' / '+FOREMEN.length]];
  $('#kpis').innerHTML=k.map(x=>`<div class="kpi"><div class="v">${x[1]}</div><div class="l">${x[0]}</div></div>`).join('');
  $('#note').innerHTML='<b>How to read this:</b> the itemized breakdown reconciles with the summary to the dollar, so genuine off-book sales don’t show here. The watchlist flags <b>behavioral</b> outliers vs. the team median — who to look at, not proof. Click any foreman for the full drill-down.';
}
function concernPill(s){const c=s.concern>=3?'p-bad':s.concern>=1.3?'p-warn':'p-good';const t=s.concern>=3?'High':s.concern>=1.3?'Watch':'OK';return `<span class="pill ${c}">${t}</span>`;}
function renderWatchlist(){
  const w=EL.filter(s=>s.signals.length).sort((a,b)=>b.concern-a.concern);
  $('#wlhint').textContent=w.length+' of '+EL.length+' foremen (15+ jobs) show at least one statistical red flag. Ranked by concern.';
  $('#watchlist').innerHTML=w.map(s=>`<div class="wlcard" onclick="drill(${s.fi})" style="border-left-color:${s.concern>=3?'var(--bad)':'var(--warn)'}">
    <div class="nm">${esc(s.name)} ${concernPill(s)}</div>
    <div class="mt">${s.n} jobs · ${money(s.pack)} packing · ${Math.round(s.pp100)} per 100 CF</div>
    ${s.signals.map(g=>`<div class="sig ${g[1]?'':'amb'}">▸ ${esc(g[0])}</div>`).join('')}
  </div>`).join('') || '<div class="hint">No flags — everyone is within normal range.</div>';
}
const COLS=[['name','Foreman',0],['n','Jobs',1],['pp100','Pack/100CF',1],['actVsEst','Actual vs Est',1],['tipPct','Tip %',1],['packPctCharge','Pack % chg',1],['zeroPct','Zero-pack %',1],['fillerPct','Filler %',1],['pack','Packing $',1],['concern','Concern',1]];
function fmtCell(s,k){
  if(k==='name')return esc(s.name);
  if(k==='n')return s.n;
  if(k==='pack')return money(s.pack);
  if(k==='concern')return s.n>=15?concernPill(s):'<span class="miscol">—</span>';
  const v=s[k]; if(s.n<15&&k!=='n')return '<span class="miscol">'+(['pp100','tipPct'].includes(k)?Math.round(v):pct(v))+'</span>';
  if(['actVsEst','tipPct','packPctCharge','zeroPct','fillerPct'].includes(k))return pct(v);
  return Math.round(v);
}
function cellClass(s,k){
  if(s.n<15)return '';
  const bad={pp100:s.z_pp100,packPctCharge:s.z_packPctCharge,actVsEst:s.z_actVsEst,zeroPct:s.z_zeroPct,fillerPct:s.z_fillerPct}[k];
  if(bad==null)return ''; return bad>=1.5?'cell-bad':bad>=0.9?'cell-warn':'';
}
function renderRoster(){
  const q=($('#srch').value||'').toLowerCase();
  let list=ST.slice();
  if(rosterFilter==='elig')list=list.filter(s=>s.n>=15);
  if(rosterFilter==='flag')list=list.filter(s=>s.signals&&s.signals.length);
  if(q)list=list.filter(s=>s.name.toLowerCase().includes(q));
  list.sort((a,b)=>{const av=a[sortKey]??-1,bv=b[sortKey]??-1;return (av>bv?1:av<bv?-1:0)*sortDir;});
  const th=COLS.map(c=>`<th onclick="setSort('${c[0]}')">${c[1]}${sortKey===c[0]?(sortDir<0?' ▾':' ▴'):''}</th>`).join('');
  const rows=list.map(s=>`<tr onclick="drill(${s.fi})">${COLS.map(c=>`<td class="${cellClass(s,c[0])}">${fmtCell(s,c[0])}</td>`).join('')}</tr>`).join('');
  $('#roster').innerHTML=`<table><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
}
function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=k==='name'?1:-1;}renderRoster();}
document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;rosterFilter=t.dataset.f;[...document.querySelectorAll('.tab')].forEach(x=>x.classList.toggle('on',x===t));renderRoster();});

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// ---- charts (inline SVG) ----
function svg(w,h,inner){return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px" font-family="Inter">${inner}</svg>`;}
function compareBars(s){
  const rows=[['Packing / 100 CF','pp100',Math.round,1],['Actual vs estimate','actVsEst',pct,1],['Packing % of charge','packPctCharge',pct,1],['Tip %','tipPct',pct,0],['Zero-packing %','zeroPct',pct,0],['Filler %','fillerPct',pct,0]];
  return '<div class="cmp">'+rows.map(([lab,k,f,lowBad])=>{
    const v=s[k],m=TM[k],maxv=Math.max(v,m)*1.25||1;
    const z=s['z_'+k]; const bad=z!=null&&z>=1.5, warn=z!=null&&z>=0.9;
    const col=bad?'var(--bad)':warn?'var(--warn)':'var(--good)';
    return `<div class="cmprow"><div class="lab"><span>${lab}</span><b style="color:${col}">${f(v)}</b></div>
      <div class="track"><div class="fillb" style="width:${Math.min(100,100*v/maxv)}%;background:${col}"></div>
      <div class="medm" style="left:${Math.min(100,100*m/maxv)}%" title="team median ${f(m)}"></div></div></div>`;
  }).join('')+'</div><div class="lgnd"><span><span class="dot" style="background:var(--good)"></span>better/normal</span><span><span class="dot" style="background:var(--bad)"></span>worse than peers</span><span>▏ = team median</span></div>';
}
function trendChart(s){
  const m={}; s.jobs.forEach(i=>{const j=JOBS[i];const mo=(j[1]||'').slice(0,7);if(!mo)return;(m[mo]=m[mo]||[]).push(j[7]);});
  const months=Object.keys(m).sort(); if(months.length<2)return '<div class="hint">Not enough months.</div>';
  const pts=months.map(k=>med(m[k])); const W=380,H=130,pad=26;
  const mx=Math.max(...pts,TM.pp100)*1.15||1;
  const X=i=>pad+i*(W-pad-8)/(months.length-1), Y=v=>H-20-(v/mx)*(H-34);
  const line=pts.map((v,i)=>(i?'L':'M')+X(i)+' '+Y(v)).join(' ');
  const medY=Y(TM.pp100);
  return svg(W,H,`<line x1="${pad}" y1="${medY}" x2="${W-8}" y2="${medY}" stroke="#111" stroke-dasharray="4 4" opacity=".4"/>
    <text x="${W-10}" y="${medY-4}" font-size="9" fill="#888" text-anchor="end">team median</text>
    <path d="${line}" fill="none" stroke="${REAL_COLOR}" stroke-width="2.2"/>
    ${pts.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="3" fill="${REAL_COLOR}"/><text x="${X(i)}" y="${H-6}" font-size="9" fill="#888" text-anchor="middle">${months[i].slice(5)}</text>`).join('')}
    <text x="2" y="12" font-size="9" fill="#888">pack/100CF</text>`);
}
function scatterChart(s){
  const W=380,H=150,pad=30;
  const all=EL.flatMap(f=>f.jobs.map(i=>JOBS[i]));
  const mxp=Math.max(...all.map(j=>j[7]))*1.05||1, mxt=Math.max(20,...all.map(j=>Math.min(j[10],40)));
  const X=t=>pad+Math.min(t,40)/mxt*(W-pad-10), Y=p=>H-22-p/mxp*(H-34);
  const others=all.map(j=>`<circle cx="${X(j[10])}" cy="${Y(j[7])}" r="1.6" fill="#ccc"/>`).join('');
  const mine=s.jobs.map(i=>JOBS[i]).map(j=>`<circle cx="${X(j[10])}" cy="${Y(j[7])}" r="3" fill="${REAL_COLOR}" opacity=".85"/>`).join('');
  return svg(W,H,`${others}${mine}
    <line x1="${pad}" y1="${H-22}" x2="${W-6}" y2="${H-22}" stroke="#ddd"/><line x1="${pad}" y1="6" x2="${pad}" y2="${H-22}" stroke="#ddd"/>
    <text x="${(W)/2}" y="${H-4}" font-size="9" fill="#888" text-anchor="middle">tip %  →</text>
    <text x="8" y="14" font-size="9" fill="#888">pack/100CF</text>`)+'<div class="lgnd"><span><span class="dot" style="background:#ccc"></span>all jobs</span><span><span class="dot" style="background:'+REAL_COLOR+'"></span>this foreman</span></div>';
}
function itemMix(s){
  const ents=Object.entries(s.byItem).map(([i,v])=>[+i,v]).sort((a,b)=>b[1]-a[1]);
  if(!ents.length)return '<div class="hint">No itemized packing.</div>';
  const max=ents[0][1];
  return '<div style="display:flex;flex-direction:column;gap:5px">'+ents.map(([i,v])=>`<div style="font-size:12px"><div style="display:flex;justify-content:space-between"><span>${esc(ITEM_NAMES[i])}</span><b>${money(v)}</b></div>
    <div class="track" style="height:7px"><div class="fillb" style="width:${100*v/max}%;height:100%;background:${ICAT[i]?FILLER_COLOR:REAL_COLOR}"></div></div></div>`).join('')
    +`</div><div class="lgnd"><span><span class="dot" style="background:${REAL_COLOR}"></span>real packing ${money(s.real)}</span><span><span class="dot" style="background:${FILLER_COLOR}"></span>filler/tape/wrap ${money(s.fill)}</span></div>`;
}
let jobSort={k:1,dir:-1};
function jobTable(s){
  const cols=[['Date',j=>j[1]],['Job',j=>j[11]],['Real CF',j=>Math.round(j[5])],['Packing $',j=>Math.round(j[3])],['per 100CF',j=>Math.round(j[7])],['Tip $',j=>Math.round(j[8])],['Tip %',j=>pct(j[10])],['vs Est',j=>pct(j[4])]];
  const js=s.jobs.map(i=>JOBS[i]).slice().sort((a,b)=>{const ai=jobSort.k;let av=a===b?0:(jobSort.k===0?a[1]:a[[null,5,3,7,8,10,4][jobSort.k]||5]);return 0;});
  const rows=s.jobs.map(i=>JOBS[i]).sort((a,b)=>(a[1]<b[1]?1:-1)).map((j,ix)=>{
    const gi=JOBS.indexOf(j);
    const zero=j[3]===0;
    return `<tr onclick="toggleItems(this,${gi})" style="${zero?'background:var(--bad-bg)':''}">${cols.map(c=>`<td>${c[1](j)}</td>`).join('')}</tr>`;
  }).join('');
  return `<div class="jobtbl"><table><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="hint">Rows in red sold <b>zero packing</b>. Click a job to see its item breakdown.</div>`;
}
function toggleItems(tr,gi){
  if(tr.nextSibling&&tr.nextSibling.classList&&tr.nextSibling.classList.contains('itemrow')){tr.nextSibling.remove();return;}
  const its=JI[gi];
  const html=its.length?its.map(it=>`${esc(ITEM_NAMES[it[1]])} ×${it[2]} = ${money(it[3])}`).join(' &nbsp;·&nbsp; '):'no items recorded';
  const row=document.createElement('tr');row.className='itemrow';row.innerHTML=`<td colspan="8">${html}</td>`;
  tr.after(row);
}
function drill(fi){
  const s=byFi[fi];
  const d=$('#drill'); d.style.display='block';
  const lvl=s.n<15?'<span class="pill p-warn">low sample</span>':concernPill(s);
  d.innerHTML=`<div class="dh"><div class="nm">${esc(s.name)}</div>${lvl}
    <div class="meta">${s.n} jobs · ${money(s.pack)} packing sold · ${money(s.charge)} total charge · ${money(s.tip)} tips</div>
    <button class="dclose" onclick="$('#drill').style.display='none'">✕ close</button></div>
    ${s.signals&&s.signals.length?`<div style="margin-bottom:14px">${s.signals.map(g=>`<div class="sig ${g[1]?'':'amb'}">▸ ${esc(g[0])}</div>`).join('')}</div>`:'<div class="hint" style="margin-bottom:12px">No statistical red flags — within normal range.</div>'}
    <div class="dgrid">
      <div class="panel"><h3>vs. the team (median)</h3>${compareBars(s)}
        <h3 style="margin-top:18px">Packing per 100 CF by month</h3><div class="chart">${trendChart(s)}</div>
        <h3 style="margin-top:16px">Tips vs. packing — every job</h3><div class="chart">${scatterChart(s)}</div>
        <div class="hint">If their jobs cluster low-packing but high-tip (upper-left), that’s the pattern to question.</div>
      </div>
      <div class="panel"><h3>What they sell (item mix)</h3>${itemMix(s)}
        <h3 style="margin-top:18px">Every job (${s.n})</h3>${jobTable(s)}
      </div>
    </div>`;
  d.scrollIntoView({behavior:'smooth',block:'start'});
}
function renderAll(){renderKPIs();renderWatchlist();renderChecklist();renderRoster();updateConnUI();}
renderAll();
loadChecked();
</script>
</body>
