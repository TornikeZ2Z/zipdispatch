<title>Packing Materials Control — Zip To Zip</title>

<style>
:root{
  --paper:#F7F6F2; --card:#FFFFFF; --ink:#1F2329; --dim:#646B73; --faint:#969CA3;
  --line:#E6E4DC; --line2:#D3D0C6; --soft:#F1F0EA;
  --acc:#B26B0B; --acc-bg:#FBF1DC; --acc-bd:#E9D08A; --acc-ink:#8A530A;
  --bad:#C0392B; --bad-bg:#FBEAE7; --bad-bd:#F0C5BD;
  --warn:#B7791F; --warn-bg:#FBF1DC; --warn-bd:#EAD79C;
  --good:#2E7D46; --good-bg:#E9F4ED; --good-bd:#BFE3CB;
  --blue:#2563EB; --blue-bg:#EAF1FE;
  --shadow:0 1px 2px rgba(31,35,41,.04),0 8px 24px rgba(31,35,41,.06);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;}
a{color:inherit}
.bar{position:sticky;top:0;z-index:50;background:rgba(244,242,236,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.bar-in{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:11px 22px;}
.home{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--dim);font-weight:600;font-size:13px;padding:6px 10px;border-radius:9px;border:1px solid transparent}
.home:hover{background:var(--card);border-color:var(--line)}
.home svg{width:16px;height:16px}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.brand .dot{width:30px;height:30px;border-radius:9px;background:var(--acc-bg);border:1px solid var(--acc-bd);color:var(--acc);display:flex;align-items:center;justify-content:center}
.brand .dot svg{width:18px;height:18px}
.brand h1{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:20px;letter-spacing:.04em;text-transform:uppercase;margin:0;line-height:1}
.brand .gen{font-size:11px;color:var(--faint);letter-spacing:.02em}
.connbtn{font:inherit;font-size:12.5px;font-weight:600;border-radius:9px;padding:7px 12px;cursor:pointer}
.connbtn{background:var(--acc);color:#fff;border:none}
.connbtn:hover{filter:brightness(.95)}
.conn{color:var(--good);font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:6px}
.wrap{max-width:1240px;margin:0 auto;padding:20px 22px 80px}
.tabs{display:flex;gap:4px;background:var(--soft);border:1px solid var(--line);padding:4px;border-radius:13px;margin-bottom:20px;overflow-x:auto}
.tab{flex:1;min-width:max-content;text-align:center;font-weight:600;font-size:13.5px;color:var(--dim);padding:9px 14px;border-radius:9px;cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:.12s}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--card);color:var(--acc-ink);box-shadow:var(--shadow);border-color:var(--line)}
.tab .tn{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;margin-left:6px;border-radius:9px;background:var(--bad);color:#fff;font-size:11px;font-weight:700;vertical-align:middle}
.view{display:none;animation:fade .2s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h2.sec{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:24px;letter-spacing:.02em;margin:0 0 3px}
.sub{color:var(--dim);font-size:13.5px;margin:0 0 18px;max-width:880px}
.card{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.card-h{display:flex;align-items:center;gap:10px;margin:-2px 0 14px}
.card-h h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;letter-spacing:.02em;margin:0;line-height:1.1}
.card-h .hint{font-size:12px;color:var(--faint);margin:0}
.exp{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--dim);background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:5px 9px;cursor:pointer}
.exp:hover{color:var(--acc-ink);border-color:var(--acc-bd)}
.exp svg{width:13px;height:13px}
.grid{display:grid;gap:18px}
.g2{grid-template-columns:1fr 1fr}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;box-shadow:var(--shadow)}
.kpi .v{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:26px;line-height:1;letter-spacing:.01em}
.kpi .l{font-size:11.5px;color:var(--dim);margin-top:5px;letter-spacing:.01em}
.kpi .d{font-size:11px;font-weight:600;margin-top:3px}
.chartbox{position:relative;height:300px}
.chartbox.tall{height:360px}
table{border-collapse:collapse;width:100%;font-size:13px}
.tbl{overflow:auto;border:1px solid var(--line);border-radius:12px}
.tbl table{min-width:560px}
thead th{position:sticky;top:0;background:var(--soft);color:var(--dim);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;text-align:right;padding:10px 12px;border-bottom:1px solid var(--line2);white-space:nowrap;cursor:default}
thead th.l{text-align:left}thead th.s{cursor:pointer}thead th.s:hover{color:var(--ink)}
tbody td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td.l{text-align:left}
tbody tr:last-child td{border-bottom:none}
tbody tr.click{cursor:pointer}
tbody tr.click:hover{background:var(--soft)}
.num{font-variant-numeric:tabular-nums}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.01em}
.p-bad{background:var(--bad-bg);color:var(--bad);border:1px solid var(--bad-bd)}
.p-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
.p-good{background:var(--good-bg);color:var(--good);border:1px solid var(--good-bd)}
.p-mut{background:var(--soft);color:var(--faint);border:1px solid var(--line)}
.delta{font-size:11px;font-weight:600}
.dn{color:var(--bad)}.up{color:var(--good)}.eq{color:var(--faint)}
.scorebar{display:inline-flex;align-items:center;gap:8px}
.scorebar .track{width:62px;height:7px;border-radius:4px;background:var(--line);overflow:hidden}
.scorebar .fill{height:100%;border-radius:4px}
.scoreN{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;min-width:24px;text-align:right}
.bignum{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.01em}
.note{background:var(--acc-bg);border:1px solid var(--acc-bd);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--acc-ink);margin-bottom:18px}
.note b{color:var(--acc-ink)}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
@media(max-width:780px){.statgrid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--soft);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.stat .v{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:22px;line-height:1}
.stat .l{font-size:11px;color:var(--dim);margin-top:4px}
.stat .c{font-size:11px;font-weight:600;margin-top:3px}
.fsel{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.fsel select{font:inherit;font-size:14px;font-weight:600;padding:9px 12px;border:1px solid var(--line2);border-radius:10px;background:var(--card);color:var(--ink);min-width:230px}
.fhead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.fhead .nm{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:28px;letter-spacing:.01em;line-height:1}
.reason{font-size:12px;color:var(--bad)}
.ckbtn{font:inherit;font-size:12px;font-weight:600;background:var(--good);color:#fff;border:none;border-radius:8px;padding:6px 11px;cursor:pointer}
.ckbtn:hover{filter:brightness(.96)}.ckbtn:disabled{opacity:.6;cursor:default}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-top:10px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
.bench-hero{display:flex;gap:18px;align-items:center;flex-wrap:wrap;background:linear-gradient(110deg,var(--good-bg),var(--card));border:1px solid var(--good-bd);border-radius:14px;padding:16px 18px;margin-bottom:18px}
.bench-hero .av{width:54px;height:54px;border-radius:14px;background:var(--good);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px}
.modal{position:fixed;inset:0;background:rgba(20,22,26,.55);display:none;align-items:center;justify-content:center;z-index:9999;padding:24px}
.modal.on{display:flex}
.modal-box{background:var(--card);border-radius:16px;width:min(1080px,96vw);max-height:92vh;overflow:auto;padding:20px;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.modal-h{display:flex;align-items:center;margin-bottom:14px}
.modal-h b{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:20px;letter-spacing:.02em}
.modal-x{margin-left:auto;background:var(--soft);border:1px solid var(--line);border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:16px;color:var(--dim)}
.modal .chartbox{height:min(68vh,620px)}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1E2228;color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;z-index:10000;max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.muted-s{color:var(--faint);font-size:12px}
.evid{display:flex;flex-direction:column;gap:2px;align-items:flex-end}
.evid .v{font-weight:600;font-variant-numeric:tabular-nums}
.pcard{padding:16px 18px}
.pc-h{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.pc-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:22px;letter-spacing:.01em}
.pc-sec{margin-top:10px}
.pc-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:5px}
.pc-lbl.bad{color:var(--bad)}
.pc-ul,.pc-ol{margin:0;padding-left:18px}
.pc-ul li,.pc-ol li{font-size:13px;line-height:1.5;margin:3px 0}
.pc-ul.bad li{color:var(--ink)}
.pc-ul.q li{color:var(--dim)}
.pc-2col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px;padding-top:10px;border-top:1px solid var(--line)}
@media(max-width:780px){.pc-2col{grid-template-columns:1fr}}
.matrow{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--dim);background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:8px 12px;margin-bottom:10px}
.matrow i{font-style:normal;color:var(--faint)}
.fmrow{display:flex;align-items:center;gap:10px;margin:7px 0}
.fmlbl{width:120px;font-size:12.5px;color:var(--dim)}
.fmtrack{flex:1;height:9px;background:var(--line);border-radius:5px;overflow:hidden}
.fmfill{display:block;height:100%;border-radius:5px}
.fmrow b{width:42px;text-align:right;font-variant-numeric:tabular-nums}</style>
</head>

function $(s){return document.querySelector(s);}
function esc(x){return String(x==null?'':x).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){if(n==null||isNaN(n))return '—';return '$'+Math.round(n).toLocaleString();}
function k$(n){if(n==null||isNaN(n))return '—';return n>=1000?'$'+(n/1000).toFixed(n>=10000?0:1)+'k':'$'+Math.round(n);}
function pct(n,d){if(n==null||isNaN(n))return '—';return (d==null?Math.round(n):n.toFixed(d))+'%';}
function num(n,d){if(n==null||isNaN(n))return '—';return Number(n).toFixed(d==null?0:d);}
function sum(a){return a.reduce(function(x,y){return x+(y||0);},0);}
function median(a){a=a.filter(function(x){return x!=null&&!isNaN(x);}).slice().sort(function(x,y){return x-y;});if(!a.length)return null;var m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2;}
function clip(x,lo,hi){lo=lo==null?0:lo;hi=hi==null?100:hi;return Math.max(lo,Math.min(hi,x));}
function initials(nm){var p=String(nm).trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'');}
function bandOf(r){return r>=30?'bad':r>=15?'warn':'good';}
function bandLabel(r){return r>=30?'Needs review':r>=15?'Watch':'Normal';}
function confOf(n){return n>=60?'High':n>=30?'Medium':n>=15?'Low':'Insufficient';}

  return r.status===204?null:r.json();

async function shAppendRow(tab,obj){
  let vals=[];try{vals=(await shFetch('/values/'+encodeURIComponent("'"+tab+"'")+'?valueRenderOption=FORMATTED_VALUE')).values||[];}catch(e){vals=[];}
  let header=vals[0]||[];

function pcsv(t){const rows=[];let r=[],c='',q=false;for(let i=0;i<t.length;i++){const ch=t[i];if(q){if(ch==='"'){if(t[i+1]==='"'){c+='"';i++;}else q=false;}else c+=ch;}else{if(ch==='"')q=true;else if(ch===','){r.push(c);c='';}else if(ch==='\n'){r.push(c);rows.push(r);r=[];c='';}else if(ch!=='\r')c+=ch;}}if(c!==''||r.length){r.push(c);rows.push(r);}return rows;}

var _matIdx=null;
function matIdx(){if(_matIdx)return _matIdx;var qk=-1,tf=-1,wr=[];ITEM_NAMES.forEach(function(n,i){var L=n.toLowerCase();if(L.indexOf('mattress cover')>=0){if(/queen|king/.test(L))qk=i;else tf=i;}if(ICAT[i]==='wrap')wr.push(i);});_matIdx={qk:qk,tf:tf,wr:wr};return _matIdx;}

function recWrap(r){var M=matIdx(),s=0;M.wr.forEach(function(i){s+=jobItemQty[r.ji][i]||0;});return s;}
function reqCovers(r){return (r.mqk>0?r.mqk:0)+(r.mtf>0?r.mtf:0);}
function reqTape(r){return (r.ivBoxes!=null&&r.ivBoxes>0)?Math.ceil(r.ivBoxes/8):0;}
function hasInv(r){return r.mqk!=null;}
function _erf(x){var s=x<0?-1:1;x=Math.abs(x);var t=1/(1+0.3275911*x);var y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);return s*y;}
function normCdf(z){return 0.5*(1+_erf(z/Math.SQRT2));}
function mwuLowerP(a,b){var na=a.length,nb=b.length;if(na<8||nb<8)return null;var all=a.map(function(v){return [v,0];}).concat(b.map(function(v){return [v,1];}));all.sort(function(x,y){return x[0]-y[0];});var rank=new Array(all.length),i=0;while(i<all.length){var j=i;while(j+1<all.length&&all[j+1][0]===all[i][0])j++;var r=(i+j)/2+1;for(var k=i;k<=j;k++)rank[k]=r;i=j+1;}var Ra=0;for(var t=0;t<all.length;t++)if(all[t][1]===0)Ra+=rank[t];var Ua=Ra-na*(na+1)/2,mu=na*nb/2,sd=Math.sqrt(na*nb*(na+nb+1)/12);if(!sd)return null;return normCdf((Ua-mu)/sd);}

function metricVals(m){
  var V={}; m.forEach(function(r){ if(r.ivNoPack)return; var fi=r.fi;
    function add(o,v){(o[fi]=o[fi]||[]).push(v);}
    if(r.cf>=200) add(V.pkCF=V.pkCF||{},r.pk100);
    if(hasInv(r)&&(r.ivBoxes+r.ivWrap)>=3) add(V.ppu=V.ppu||{},r.act/((r.ivBoxes+r.ivWrap)||1));
    if(hasInv(r)&&r.ivBoxes>0) add(V.tpb=V.tpb||{},(jobItemQty[r.ji][tapeIdx]||0)/r.ivBoxes);
    var rc=reqCovers(r); if(rc>0) add(V.cover=V.cover||{},Math.min(recCovers(r),rc)/rc);
    if(hasInv(r)&&r.ivWrap>0) add(V.wrap=V.wrap||{},Math.min(recWrap(r),r.ivWrap)/r.ivWrap);

function confidence(fi,V){

  keys.forEach(function(m){ var o=V[m]; if(!o)return; var a=o[fi]||[]; if(a.length<8)return; testable++;
    var b=[]; Object.keys(o).forEach(function(f){ if(+f!==fi) b=b.concat(o[f]); });

function computeProblems(){
  var m=S.recs.filter(function(r){return r.cb;});
  var V=metricVals(m);
  var big=m.filter(function(r){return r.cf>=200 && !r.ivNoPack;});
  var fpk=median(big.map(function(r){return r.pk100;}));
  var ivj=m.filter(function(r){return hasInv(r) && (r.ivBoxes+r.ivWrap)>=3;});
  var fppu=median(ivj.map(function(r){return r.act/((r.ivBoxes+r.ivWrap)||1);}));
  var FR=[0,0,0],FG=[0,0,0];
  m.forEach(function(r){ if(r.ivNoPack)return;
    var rc=reqCovers(r); if(hasInv(r)&&rc>0){FR[0]+=rc;FG[0]+=Math.min(recCovers(r),rc);}
    if(hasInv(r)&&r.ivWrap>0){FR[1]+=r.ivWrap;FG[1]+=Math.min(recWrap(r),r.ivWrap);}
    var rt=reqTape(r); if(rt>0){FR[2]+=rt;FG[2]+=Math.min(jobItemQty[r.ji][tapeIdx]||0,rt);}
  });
  var fcov=(FR[0]+FR[1]+FR[2])?(FG[0]+FG[1]+FG[2])/(FR[0]+FR[1]+FR[2]):1;
  var by={};m.forEach(function(r){(by[r.fi]=by[r.fi]||[]).push(r);});
  var out=[];

    var a=by[fi]; if(a.length<10) return; fi=+fi;
    var bg=a.filter(function(r){return r.cf>=200 && !r.ivNoPack;});
    var pk=median(bg.map(function(r){return r.pk100;}));
    var zr=bg.length?bg.filter(function(r){return r.act<20;}).length/bg.length:null;
    var ai=a.filter(function(r){return hasInv(r) && (r.ivBoxes+r.ivWrap)>=3;});
    var ppu=ai.length?median(ai.map(function(r){return r.act/((r.ivBoxes+r.ivWrap)||1);})):null;
    var ac=a.filter(function(r){return r.ivCF>0;});
    var cfr=ac.length?median(ac.map(function(r){return r.cf/r.ivCF;})):null;
    var R=[0,0,0],G=[0,0,0];
    a.forEach(function(r){ if(r.ivNoPack)return;
      var rc=reqCovers(r); if(hasInv(r)&&rc>0){R[0]+=rc;G[0]+=Math.min(recCovers(r),rc);}
      if(hasInv(r)&&r.ivWrap>0){R[1]+=r.ivWrap;G[1]+=Math.min(recWrap(r),r.ivWrap);}
      var rt=reqTape(r); if(rt>0){R[2]+=rt;G[2]+=Math.min(jobItemQty[r.ji][tapeIdx]||0,rt);}
    });
    var cov=(R[0]+R[1]+R[2])?(G[0]+G[1]+G[2])/(R[0]+R[1]+R[2]):null;

    if(cov!=null) s+=20*Math.max(0,1-cov/fcov);
    if(cfr!=null && cfr<0.9) s+=15*Math.min(1,(0.9-cfr)/0.3);
    if(zr) s+=15*Math.min(1,zr/0.3);
    var cf=confidence(fi,V);
    out.push({fi:fi,name:FOREMEN[fi],jobs:a.length,score:Math.round(s),pk:pk,ppu:ppu,cfr:cfr,zero:zr,cov:cov,
      R:R,G:G,covPct:R[0]?G[0]/R[0]:null,wrapPct:R[1]?G[1]/R[1]:null,tapePct:R[2]?G[2]/R[2]:null,conf:cf});
  });
  out.sort(function(x,y){return y.score-x.score;});
  return {fleet:{pk:fpk,ppu:fppu,cov:fcov,covPct:FR[0]?FG[0]/FR[0]:null,wrapPct:FR[1]?FG[1]/FR[1]:null,tapePct:FR[2]?FG[2]/FR[2]:null},per:out};
}

  var P=computeProblems(); var fleet=P.fleet; var flagged=P.per.filter(function(p){return p.score>=12;});
  var strong=P.per.filter(function(p){return p.conf.lvl==='STRONG';}).length;
  var html='<h2 class="sec">Problem board</h2><p class="sub">Foremen ranked by how much of the packing their jobs’ inventory calls for goes unbooked (covers, shrink wrap, tape, $ per CF, $ per item). Customers often pack their own goods — legitimate and random — so each card carries a <b>confidence badge</b>: a rank-sum test of whether the shortfall is consistent enough to be a real pattern, not chance. With ~65 comparisons, expect ~3 false "weak" hits, so weight the strong ones.</p>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin:-6px 0 14px"><button class="connbtn" style="background:var(--ink)" onclick="pullCalendar(this)">⟳ Sync calendar</button><button class="connbtn" style="background:var(--ink)" onclick="downloadCalJSON()">⬇ Export data</button></div>';
  html+='<div class="kpis">'+[
    ['Strong-signal foremen',strong,'beyond chance',strong?'bad':''],
    ['Flagged (any)',flagged.length,'score ≥ 12','warn'],
    ['Covers sold/needed',Math.round(100*(fleet.covPct||0))+'%','fleet',''],
    ['Wrap sold/needed',Math.round(100*(fleet.wrapPct||0))+'%','fleet','']
  ].map(function(x){return '<div class="kpi"><div class="v bignum">'+x[1]+'</div><div class="l">'+x[0]+'</div><div class="d '+(x[3]==='bad'?'dn':'')+'">'+x[2]+'</div></div>';}).join('')+'</div>';
  html+=fleetMatCard(fleet);
  html+='<div class="card">'+cardH('Concern score by foreman','Bar = score; the badge on each card below tells you how statistically solid it is.','ch-prob')+'<div class="chartbox tall"><canvas id="ch-prob"></canvas></div></div>';
  if(!flagged.length) html+='<div class="card">No foreman crosses the concern threshold.</div>';
  flagged.forEach(function(p){ html+=problemCard(p,fleet); });
  html+=jobProblems();
  host.innerHTML=html;
}
function cfgProb(){
  var P=computeProblems(); var d=P.per.filter(function(p){return p.score>=8;});
  var colmap={STRONG:COL.bad,WEAK:COL.warn,THIN:COL.dim,NORMAL:COL.dim};
  return {type:'bar',data:{labels:d.map(function(p){return p.name;}),datasets:[{data:d.map(function(p){return p.score;}),backgroundColor:d.map(function(p){return colmap[p.conf.lvl]||COL.dim;}),borderRadius:5,maxBarThickness:22}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return 'concern '+c.raw+' · '+d[c.dataIndex].conf.lvl;}}}},scales:{x:{beginAtZero:true,suggestedMax:40,grid:{color:COL.line},ticks:{color:COL.dim}},y:{grid:{display:false},ticks:{color:COL.ink,font:{weight:'600'}}}}}};
}
function cfgCfGap(){
  var rows=S.recs.filter(function(r){return r.calCF!=null&&r.calCF>0&&r.cf>0;});
  var byf={};rows.forEach(function(r){(byf[r.fi]=byf[r.fi]||[]).push(r);});
  var d=[];Object.keys(byf).forEach(function(fi){var a=byf[fi];var recM=median(a.map(function(r){return r.cf;}));var calM=median(a.map(function(r){return r.calCF;}));d.push({name:FOREMEN[fi],ratio:calM?recM/calM:1});});
  d.sort(function(a,b){return a.ratio-b.ratio;});
  return {type:'bar',data:{labels:d.map(function(x){return x.name;}),datasets:[{data:d.map(function(x){return +num(x.ratio,2);}),backgroundColor:d.map(function(x){return x.ratio<0.85?COL.bad:(x.ratio>1.15?COL.good:COL.warn);}),borderRadius:5,maxBarThickness:22}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},refline:{axis:'x',value:1,label:'1.0 match'},tooltip:{callbacks:{label:function(c){return 'recorded/calendar CF = '+c.raw;}}}},scales:{x:{beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}},y:{grid:{display:false},ticks:{color:COL.ink,font:{size:10,weight:'600'}}}}}};
}
/* ============================ CHARTS ============================ */
var COL={bad:'#C0392B',warn:'#B7791F',good:'#2E7D46',acc:'#B26B0B',blue:'#2563EB',dim:'#9298A0',line:'#E7E4DB',ink:'#1E2228'};
var PAINT={};
var CHART_TITLES={'ch-prob':'Concern score by foreman','ch-cfgap':'CF cross-check vs calendar','ch-fulfil':'Quoted vs recorded packing — fulfilment','ch-invunit':'Packing $ per unit of goods moved','ch-risk':'Risk score by foreman','ch-lead':'Packing $ per 100 CF — leaderboard','ch-scatter':'Volume vs efficiency','ch-mix':'Item mix by revenue','ch-radar':'Signal profile vs fleet','ch-attach':'Item attach vs fleet','ch-jobs':'Every job: size vs packing','ch-trend':'Monthly packing $ / 100 CF','ch-gap':'Gap to benchmark — $/100 CF'};
var reflinePlugin={id:'refline',afterDatasetsDraw:function(c,a,o){if(!o||o.value==null)return;var ax=o.axis==='y'?c.scales.y:c.scales.x;if(!ax)return;var ctx=c.ctx;ctx.save();ctx.strokeStyle=o.color||COL.dim;ctx.setLineDash([5,4]);ctx.lineWidth=1.4;if(o.axis==='y'){var yy=ax.getPixelForValue(o.value);ctx.beginPath();ctx.moveTo(c.chartArea.left,yy);ctx.lineTo(c.chartArea.right,yy);ctx.stroke();if(o.label){ctx.fillStyle=o.color||COL.dim;ctx.font='600 11px Inter';ctx.fillText(o.label,c.chartArea.left+6,yy-4);}}else{var xx=ax.getPixelForValue(o.value);ctx.beginPath();ctx.moveTo(xx,c.chartArea.top);ctx.lineTo(xx,c.chartArea.bottom);ctx.stroke();if(o.label){ctx.fillStyle=o.color||COL.dim;ctx.font='600 11px Inter';ctx.fillText(o.label,xx+4,c.chartArea.top+12);}}ctx.restore();}};
function destroyChart(id){if(CHARTS[id]&&CHARTS[id].inst){try{CHARTS[id].inst.destroy();}catch(e){}}CHARTS[id]=null;}
function paint(id,cfgFn){PAINT[id]=cfgFn;if(!window.Chart)return;var cv=document.getElementById(id);if(!cv)return;destroyChart(id);try{CHARTS[id]={inst:new Chart(cv,cfgFn())};}catch(e){}}
function refreshCharts(view){
  if(window.Chart&&!window._cfgDone){Chart.register(reflinePlugin);Chart.defaults.font.family='Inter, system-ui, sans-serif';Chart.defaults.color=COL.dim;window._cfgDone=true;}
  if(view==='problems')paint('ch-prob',cfgProb);
  else if(view==='risk')paint('ch-risk',cfgRisk);
  else if(view==='overview'){paint('ch-lead',cfgLead);paint('ch-scatter',cfgScatter);paint('ch-mix',cfgMix);}
  else if(view==='foreman'){paint('ch-radar',cfgRadar);paint('ch-attach',cfgAttach);paint('ch-jobs',cfgJobs);paint('ch-trend',cfgTrend);}
  else if(view==='bench')paint('ch-gap',cfgGap);
  else if(view==='calendar'){if(CAL_PULLED){paint('ch-cfgap',cfgCfGap);paint('ch-fulfil',cfgFulfil);}}
  else if(view==='inventory')paint('ch-invunit',cfgInvUnit);
}
function expandChart(id){if(!PAINT[id])return;$('#cmodal-t').textContent=CHART_TITLES[id]||'Chart';$('#cmodal').classList.add('on');$('#cmodal-c').innerHTML='<canvas id="cmodal-cv"></canvas>';if(!window.Chart)return;if(CHARTS._modal&&CHARTS._modal.inst){try{CHARTS._modal.inst.destroy();}catch(e){}}try{CHARTS._modal={inst:new Chart($('#cmodal-cv'),PAINT[id]())};}catch(e){}}
function closeModal(){$('#cmodal').classList.remove('on');if(CHARTS._modal&&CHARTS._modal.inst){try{CHARTS._modal.inst.destroy();}catch(e){}CHARTS._modal=null;}}

function cfgRisk(){var d=S.ranked;return {type:'bar',data:{labels:d.map(function(p){return p.name;}),datasets:[{data:d.map(function(p){return p.risk;}),backgroundColor:d.map(function(p){return COL[bandOf(p.risk)];}),borderRadius:5,maxBarThickness:22}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){var p=d[c.dataIndex];return ['Risk '+p.risk+' · '+bandLabel(p.risk),'$/100CF '+num(p.pk100,1)+'  ·  tape '+num(p.tape100,2),'zero-pack '+pct(100*p.zero)+'  ·  '+p.n_big+' jobs'];}}}},scales:{x:{beginAtZero:true,suggestedMax:50,grid:{color:COL.line},ticks:{color:COL.dim}},y:{grid:{display:false},ticks:{color:COL.ink,font:{weight:'600'}}}}}};}
function cfgLead(){var d=S.per.filter(function(p){return p.pk100!=null;}).slice().sort(function(a,b){return b.pk100-a.pk100;});return {type:'bar',data:{labels:d.map(function(p){return p.name;}),datasets:[{data:d.map(function(p){return +num(p.pk100,1);}),backgroundColor:d.map(function(p){return p.pk100>=S.fleet.pk?COL.good:(p.pk100>=S.fleet.pk*0.7?COL.warn:COL.bad);}),borderRadius:5,maxBarThickness:22}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},refline:{axis:'x',value:S.fleet.pk,label:'fleet '+num(S.fleet.pk,0)},tooltip:{callbacks:{label:function(c){return '$'+num(d[c.dataIndex].pk100,1)+' / 100 CF';}}}},scales:{x:{beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}},y:{grid:{display:false},ticks:{color:COL.ink,font:{weight:'600'}}}}}};}
function cfgScatter(){var d=S.per.filter(function(p){return p.pk100!=null&&p.n_big>0;});var maxP=Math.max.apply(null,d.map(function(p){return p.totalPack||1;}).concat([1]));return {type:'bubble',data:{datasets:d.map(function(p){return {label:p.name,data:[{x:p.n_big,y:+num(p.pk100,1),r:6+18*Math.sqrt((p.totalPack||1)/maxP)}],backgroundColor:COL[bandOf(p.risk)]+'bb',borderColor:COL[bandOf(p.risk)]};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},refline:{axis:'y',value:S.fleet.pk,label:'fleet'},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.raw.x+' jobs · $'+c.raw.y+'/100CF';}}}},scales:{x:{title:{display:true,text:'Jobs (≥200 CF)',color:COL.dim},beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}},y:{title:{display:true,text:'$ / 100 CF',color:COL.dim},beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}}}}};}
function cfgMix(){var cats={};for(var ji=0;ji<JOBS.length;ji++){for(var ii=0;ii<nItems;ii++){var t=jobItemTot[ji][ii];if(t)cats[ICAT[ii]]=(cats[ICAT[ii]]||0)+t;}}var keys=Object.keys(cats);return {type:'doughnut',data:{labels:keys.map(function(c){return CAT_LABEL[c];}),datasets:[{data:keys.map(function(c){return Math.round(cats[c]);}),backgroundColor:keys.map(function(c){return CAT_COLOR[c];}),borderColor:'#fff',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+': '+money(c.raw);}}}}}};}
function cfgRadar(){var p=S.per[curForeman],f=S.fleet;function rr(v,b){return (v!=null&&b)?clip(100*v/b,0,200):0;}var vals=[rr(p.pk100,f.pk),rr(p.tape100,f.tape),rr(p.wrap100,f.wrap),(f.zero<1?clip(100*(1-p.zero)/(1-f.zero),0,200):0),(f.ave&&p.ave!=null?clip(100*p.ave/f.ave,0,200):0)];return {type:'radar',data:{labels:['$ / CF','Tape / CF','Wrap / CF','Non-zero rate','Est. match'],datasets:[{label:'Fleet',data:[100,100,100,100,100],borderColor:COL.dim,backgroundColor:COL.dim+'22',pointRadius:0,borderDash:[4,4]},{label:p.name,data:vals.map(function(v){return Math.round(v);}),borderColor:COL[bandOf(p.risk)],backgroundColor:COL[bandOf(p.risk)]+'33',pointBackgroundColor:COL[bandOf(p.risk)]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:COL.dim}}},scales:{r:{suggestedMin:0,suggestedMax:140,grid:{color:COL.line},angleLines:{color:COL.line},pointLabels:{color:COL.ink,font:{size:11,weight:'600'}},ticks:{display:false}}}}};}
function cfgAttach(){var p=S.per[curForeman];var idx=[];for(var i=0;i<nItems;i++)if((S.fleetItem[i]||0)>0)idx.push(i);idx.sort(function(a,b){return (S.fleetItem[b]||0)-(S.fleetItem[a]||0);});return {type:'bar',data:{labels:idx.map(function(i){return ITEM_NAMES[i].replace(/\s*\(.*\)/,'');}),datasets:[{label:p.name,data:idx.map(function(i){return +num((p.attach[i]&&p.attach[i].f)||0,2);}),backgroundColor:COL.acc,borderRadius:4,maxBarThickness:15},{label:'Fleet',data:idx.map(function(i){return +num(S.fleetItem[i]||0,2);}),backgroundColor:COL.dim+'99',borderRadius:4,maxBarThickness:15}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:COL.dim}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+num(c.raw,2)+' /100CF';}}}},scales:{x:{beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}},y:{grid:{display:false},ticks:{color:COL.ink,font:{size:10}}}}}};}
function cfgJobs(){var pts=S.recs.filter(function(r){return r.fi===curForeman;});var maxCF=Math.max.apply(null,pts.map(function(r){return r.cf;}).concat([100]));return {type:'scatter',data:{datasets:[{label:'Jobs',data:pts.map(function(r){return {x:r.cf,y:Math.round(r.act)};}),backgroundColor:pts.map(function(r){return r.act<20?COL.bad+'cc':COL.acc+'aa';}),pointRadius:4},{type:'line',label:'Fleet rate',data:[{x:0,y:0},{x:maxCF,y:S.fleet.pk/100*maxCF}],borderColor:COL.dim,borderDash:[5,4],pointRadius:0,borderWidth:1.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return Math.round(c.raw.x)+' CF · $'+Math.round(c.raw.y);}}}},scales:{x:{title:{display:true,text:'Real CF',color:COL.dim},beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}},y:{title:{display:true,text:'Packing $',color:COL.dim},beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}}}}};}
function cfgTrend(){var p=S.per[curForeman];return {type:'line',data:{labels:p.months.map(function(m){return m.m;}),datasets:[{label:'$/100 CF',data:p.months.map(function(m){return +num(m.pk,1);}),borderColor:COL.acc,backgroundColor:COL.acc+'22',fill:true,tension:.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},refline:{axis:'y',value:S.fleet.pk,label:'fleet'}},scales:{x:{grid:{display:false},ticks:{color:COL.dim}},y:{beginAtZero:true,grid:{color:COL.line},ticks:{color:COL.dim}}}}};}
function cfgGap(){var b=S.bench;var d=S.per.filter(function(p){return p.pk100!=null;}).slice().sort(function(x,y){return (x.pk100-b.pk100)-(y.pk100-b.pk100);});return {type:'bar',data:{labels:d.map(function(p){return p.name;}),datasets:[{data:d.map(function(p){return +num(p.pk100-b.pk100,1);}),backgroundColor:d.map(function(p){return (p.pk100-b.pk100)>=0?COL.good:COL.bad;}),borderRadius:5,maxBarThickness:22}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return (c.raw>=0?'+':'')+c.raw+' vs benchmark';}}}},scales:{x:{grid:{color:COL.line},ticks:{color:COL.dim}},y:{grid:{display:false},ticks:{color:COL.ink,font:{size:10,weight:'600'}}}}}};}
/* ============================ INIT / ROUTING ============================ */
var activeView='problems';
function showView(name){activeView=name;
  ['problems','risk','overview','foreman','bench','check','calendar','inventory'].forEach(function(v){var el=$('#v-'+v);if(el)el.classList.toggle('on',v===name);});
  var ts=document.querySelectorAll('.tab');for(var i=0;i<ts.length;i++)ts[i].classList.toggle('on',ts[i].getAttribute('data-v')===name);
  refreshCharts(name);
}
function buildTabs(){
  var nf=0;try{nf=computeProblems().per.filter(function(p){return p.score>=12;}).length;}catch(e){}
  var tabs=[['problems','Problems'],['foreman','Foreman'],['overview','Overview']];
  $('#tabs').innerHTML=tabs.map(function(t){return '<div class="tab'+(t[0]===activeView?' on':'')+'" data-v="'+t[0]+'" onclick="showView(\''+t[0]+'\')">'+t[1]+(t[0]==='problems'&&nf?'<span class="tn">'+nf+'</span>':'')+'</div>';}).join('');
}
function init(){
  $('#gen').textContent='Snapshot '+(PK.GEN||'')+' · '+JOBS.length.toLocaleString()+' jobs · '+FOREMEN.length+' foremen';
  recompute();
  var _P0=computeProblems(); if(_P0.per.length)curForeman=_P0.per[0].fi; else if(S.ranked.length)curForeman=S.ranked[0].fi;
  renderAll();showView('problems');
  loadChecked();
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
(function(){var m=document.getElementById('cmodal');if(m)m.addEventListener('click',function(e){if(e.target===m)closeModal();});})();
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
