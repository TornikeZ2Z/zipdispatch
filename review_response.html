<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Why no review · Zip To Zip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F7F6F2;--card:#FFF;--ink:#1F2329;--dim:#646B73;--faint:#969CA3;--line:#E6E4DC;--line2:#D3D0C6;--soft:#F1F0EA;--acc:#B26B0B;--acc-bg:#FBF1DC;--acc-bd:#E9D08A;--good:#2E7D46;}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;padding:20px 16px 60px}
.wrap{max-width:520px;margin:0 auto}
.bar{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.dot{width:34px;height:34px;border-radius:10px;background:var(--acc-bg);border:1px solid var(--acc-bd);color:var(--acc);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.dot svg{width:19px;height:19px}
h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;letter-spacing:.04em;text-transform:uppercase;margin:0;line-height:1.05}
.sub{font-size:12.5px;color:var(--dim);margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(31,35,41,.04),0 8px 24px rgba(31,35,41,.06);padding:18px 20px}
.jc{font-variant-numeric:tabular-nums;font-weight:700;font-size:17px}
.jmeta{color:var(--dim);font-size:13px;margin-top:3px;margin-bottom:6px}
.q{font-weight:600;margin:14px 0 4px}
.reasons{display:flex;flex-direction:column;gap:9px;margin-top:10px}
.r{width:100%;text-align:left;font:inherit;font-size:15px;font-weight:600;border:1px solid var(--line2);border-radius:11px;padding:13px 15px;background:var(--card);color:var(--ink);cursor:pointer;transition:.12s}
.r:hover{border-color:var(--acc);background:var(--acc-bg)}
.r:active{transform:scale(.99)}
.r.sel{border-color:var(--acc);background:var(--acc-bg);box-shadow:inset 3px 0 0 var(--acc)}
label.fld{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin:16px 0 5px}
textarea{width:100%;font:inherit;font-size:15px;border:1px solid var(--line2);border-radius:10px;padding:11px 13px;min-height:70px;resize:vertical}
textarea:focus{outline:none;border-color:var(--acc)}
.go{width:100%;margin-top:10px;font:inherit;font-size:15px;font-weight:700;border:0;border-radius:11px;padding:14px;background:var(--acc);color:#fff;cursor:pointer;transition:.12s}
.go:disabled{background:var(--soft);color:var(--faint);cursor:default}
.r:disabled{opacity:.5;cursor:default}
.fail{margin-top:12px;background:#fdeceb;border:1px solid #f2b8b5;color:#8a2620;border-radius:11px;padding:12px 14px;font-size:13.5px;line-height:1.5}
.done{text-align:center;padding:30px 10px}
.done .tick{width:54px;height:54px;border-radius:50%;background:#e9f4ec;border:1px solid #bfe0c8;color:var(--good);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.done .tick svg{width:28px;height:28px}
.done h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;margin:0 0 6px}
.muted{color:var(--dim);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <span class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17.3l-6.2 3.7 1.6-7L2 9.2l7.1-.6L12 2l2.9 6.6 7.1.6-5.4 4.8 1.6 7z"/></svg></span>
    <div><h1>No review this time?</h1><div class="sub">Tap the reason — it helps the office</div></div>
  </div>
  <div id="app"></div>
</div>
<script>
// Same /exec relay as the photoshoot confirmation (one Apps Script project).
var RELAY_URL='https://script.google.com/macros/s/AKfycbzX3q9VqyZKd3FUbGCPKN9JcQgcp15rz0QXxzNnxTYeXSRCY16Ei8n_9D07c9EQvOxM/exec';
// Fallback list — the LIVE list is fetched from the relay (portal-editable "Settings" tab); 'Other'
// is always kept so a free-text note is captured even when nothing fits.
var REASONS=['Customer refused','The customer was dissatisfied','Open claim','Support intervention was required','Billing issue','The customer promised to write later','Elderly customer (not comfortable with technology)','No internet / poor internet connection','Customer was unfriendly / not willing to engage','Other'];
var OTHER_LABEL='Other';   // matched case-insensitively below; the relay always keeps an "Other"
// TRUE for any option that stands for "none of these fit" — "Other", "Other (Comment)", "other…".
// Must NOT be an exact-string test: the office renames/extends this label in Settings, and when it
// did ("Other (Comment)") the note box stopped opening, so foremen could no longer explain anything.
function isOther(r){ return /^other\b/i.test(String(r==null?'':r).trim()); }
// Pull the current reason list from the relay (JSONP) so what foremen see matches the office's Settings.
function loadReasons(){
  try{
    var cb='__rrz_'+Date.now();
    window[cb]=function(d){
      try{
        if(d&&d.config&&d.config.reasons&&d.config.reasons.length){
          REASONS=d.config.reasons;
          // Match any label that STARTS with "other" — not the literal word only. The office added
          // "Other (Comment)" in Settings and the old exact test missed it (Tornike 2026-07-20:
          // "the Other option is not available in a form").
          var o=REASONS.filter(isOther)[0];
          if(o)OTHER_LABEL=o;   // the office may rename it — keep the special flow attached
          // Do NOT re-render once the foreman has started answering: the relay is a cold-start
          // Apps Script (20-50s), so this callback often lands AFTER they've typed. A blind
          // render() here wiped their note. Only refresh while the form is still untouched.
          var typed=($('#note')&&$('#note').value||'').trim();
          var otherOpen=!!($('#otherBox')&&$('#otherBox').style.display==='block');
          if(!SENT&&!typed&&!otherOpen)render();
        }
      }catch(e){}
      try{delete window[cb];}catch(e2){window[cb]=undefined;}   // don't leak a global per load
    };
    var s=document.createElement('script');
    s.src=RELAY_URL+'?req=reviewData&callback='+cb;
    s.onerror=function(){}; document.head.appendChild(s);
  }catch(e){}
}
function $(s){return document.querySelector(s);}
function esc(x){return String(x==null?'':x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function qp(k){try{return new URLSearchParams(location.search).get(k)||'';}catch(e){return '';}}
var JOB={jc:qp('jc'),fn:qp('fn'),date:qp('d'),cust:qp('cust')};
var SENT=false;   // one submit per page — a double-tap on a truck must not log the reason twice
// The relay is an Apps Script /exec: no CORS headers, so the POST must be mode:'no-cors' and the
// response is OPAQUE — we can never read a status. But an opaque fetch still REJECTS when the
// network itself fails, which is the realistic failure on a truck (dead zone, captive wifi). So:
// await it, add keepalive so it survives the page being closed, and only say "Thank you" once the
// request actually left the device. Before this, "Thank you" rendered on the next line regardless
// and the explanation vanished with no trace for anyone.
function submit(reason){
  if(SENT)return; SENT=true;
  var note=($('#note')&&$('#note').value||'').trim();
  var btns=document.querySelectorAll('.r,#otherGo');
  Array.prototype.forEach.call(btns,function(b){b.disabled=true;});
  var go=$('#otherGo'); if(go)go.textContent='Sending…';
  fetch(RELAY_URL,{method:'POST',mode:'no-cors',keepalive:true,headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({kind:'reviewReason',jobCode:JOB.jc,foreman:JOB.fn,date:JOB.date,reason:reason,note:note})})
    .then(function(){ renderDone(reason,note); })
    .catch(function(){ SENT=false; renderFail(reason,note); });
}
function renderFail(reason,note){
  Array.prototype.forEach.call(document.querySelectorAll('.r,#otherGo'),function(b){b.disabled=false;});
  var go=$('#otherGo'); if(go)go.textContent='Send';
  var w=$('#failMsg');
  if(!w){ w=document.createElement('div'); w.id='failMsg'; w.className='fail'; $('#app').appendChild(w); }
  w.innerHTML='<b>Couldn’t send — no connection.</b> Nothing was saved yet. '
    +'Move somewhere with signal and tap your reason again — your note is still here.';
  try{w.scrollIntoView({behavior:'smooth',block:'nearest'});}catch(e){}
}
// "Other" means "none of these fit" — the explanation IS the note, so it must be typed BEFORE the
// row is logged. Tapping it used to submit instantly with an empty note and wipe the form, so the
// office got a row that said "Other" and nothing else (Tornike 2026-07-16: "foreman is not able to
// explain the reason"). Now Other opens a note box and only sends once something is written.
function pickOther(label){
  var box=$('#otherBox'); if(!box)return;
  if(label)OTHER_LABEL=label;   // log the exact wording the foreman tapped, not a hardcoded "Other"
  box.style.display='block';
  Array.prototype.forEach.call(document.querySelectorAll('.r'),function(b){b.classList.toggle('sel',b.getAttribute('data-r')===OTHER_LABEL);});
  var t=$('#note'); if(t){t.placeholder='What happened? (required)'; t.focus();}
  syncOtherBtn();
  try{box.scrollIntoView({behavior:'smooth',block:'nearest'});}catch(e){}
}
function syncOtherBtn(){
  var t=$('#note'), b=$('#otherGo'); if(!t||!b)return;
  var ok=!!t.value.trim(); b.disabled=!ok;
  b.textContent = ok ? 'Send' : 'Type what happened first';
}
function render(){
  if(!JOB.jc){$('#app').innerHTML='<div class="card"><b>Missing job.</b><p class="muted">Please use the link from the Slack message.</p></div>';return;}
  var typed=($('#note')&&$('#note').value)||'';   // never lose what the foreman already typed
  var otherOpen=!!($('#otherBox')&&$('#otherBox').style.display==='block');
  $('#app').innerHTML='<div class="card">'
    +'<div class="jc">'+esc(JOB.cust||JOB.jc)+'</div>'
    +'<div class="jmeta">'+(JOB.jc?esc(JOB.jc):'')+(JOB.fn?' · '+esc(JOB.fn):'')+(JOB.date?' · '+esc(JOB.date):'')+'</div>'
    +'<div class="q">Why wasn’t a review left?</div>'
    +'<div class="reasons">'+REASONS.map(function(r){return '<button class="r" data-r="'+esc(r)+'">'+esc(r)+'</button>';}).join('')+'</div>'
    +'<div id="otherBox" style="display:'+(otherOpen?'block':'none')+'">'
      +'<label class="fld">Tell us what happened</label>'
      +'<textarea id="note" placeholder="What happened? (required)">'+esc(typed)+'</textarea>'
      +'<button class="go" id="otherGo" disabled>Type what happened first</button>'
    +'</div>'
    +'</div>';
  Array.prototype.forEach.call(document.querySelectorAll('.r'),function(b){
    b.onclick=function(){
      var r=b.getAttribute('data-r');
      if(isOther(r)){pickOther(r);return;}   // any "Other…" -> ask first, send after
      submit(r);
    };
  });
  var t=$('#note'); if(t){t.oninput=syncOtherBtn;}
  var g=$('#otherGo'); if(g){g.onclick=function(){ if(($('#note').value||'').trim()) submit(OTHER_LABEL); };}
  if(otherOpen)syncOtherBtn();
}
function renderDone(reason,note){
  $('#app').innerHTML='<div class="card done"><div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>'
    +'<h2>Thank you</h2><p class="muted">Logged for <b>'+esc(JOB.cust||JOB.jc)+'</b>: “'+esc(reason)+'”'
    +(note?'<br><span style="color:var(--faint)">“'+esc(note)+'”</span>':'')
    +'. The office can see this now.</p></div>';
}
render();
loadReasons();   // refresh the reason buttons from the live Settings list
</script>
</body>
</html>
