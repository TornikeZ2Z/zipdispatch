<style>
:root{--bg:#F7F6F2;--paper:#F7F6F2;--card:#FFFFFF;--ink:#1F2329;--dim:#646B73;--faint:#969CA3;
  --line:#E6E4DC;--line2:#D3D0C6;
  --fleet:#6E9220;--fleet-bg:#F3F8E4;--fleet-bd:#D3E3A6;
  --rental:#B26B0B;--rental-bg:#FBF0DC;--rental-bd:#EDD6A8;
  --hazard:#B3362A;--hazard-bg:#FBE9E6;--hazard-bd:#F0C7C0;

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px;border:2px solid var(--paper)}::-webkit-scrollbar-track{background:transparent}
header{display:flex;align-items:center;gap:16px;padding:13px 26px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1100;flex-wrap:wrap}
.back{flex:0 0 auto;width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line2);background:var(--card);color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;font-family:'Barlow Condensed'}
.back:hover{border-color:var(--ink);color:var(--ink)}
#brandlogo{height:40px;width:auto;display:block}

.hsub{color:var(--dim);font-size:14px}
.views{display:flex;gap:9px;margin-left:6px}
.vbtn{background:var(--card);border:1.5px solid var(--line2);border-radius:9px;font-family:'Inter';font-weight:600;font-size:15px;padding:8px 14px;cursor:pointer;color:var(--ink)}
.vbtn:hover{border-color:var(--ink)}
.vbtn.on{background:#8CAF2C;border-color:#8CAF2C;color:#15200A;font-weight:800}
.stats{display:flex;align-items:stretch;margin-left:auto}
.stat{display:flex;flex-direction:column;justify-content:center;gap:2px;padding:0 22px;border-left:1px solid var(--line)}
.stat:first-child{border-left:none}
.stat .v{font-family:'Barlow Condensed';font-weight:600;font-size:32px;line-height:1}
.stat .v.amber{color:var(--rental)}.stat .v.red{color:var(--hazard)}.stat .v.teal{color:var(--fleet)}
.stat .l{white-space:nowrap;color:var(--faint);font-size:13px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
#refreshbtn{background:var(--card);border:1.5px solid var(--line2);color:var(--ink);font-family:'Inter';font-weight:500;font-size:15px;padding:9px 14px;border-radius:10px;cursor:pointer;margin-left:14px}
#refreshbtn:hover{border-color:var(--ink)}
#rfstamp{font-size:13px;color:var(--faint);margin-left:10px;white-space:nowrap}
.wrap{padding:20px 26px 90px;max-width:1680px;margin:0 auto}
.toprow{display:grid;grid-template-columns:minmax(300px,1fr) minmax(380px,1.5fr);gap:16px;margin-bottom:18px}
@media(max-width:1080px){.toprow{grid-template-columns:1fr}}
.panelbox{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.pbhead{font-family:'Barlow Condensed';font-size:19px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);padding:13px 18px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line)}
.pbhead .ct{margin-left:auto;font-family:'Inter';font-size:13.5px;font-weight:500;color:var(--faint);letter-spacing:0;text-transform:none}
.pbbody{padding:13px 16px;display:flex;flex-direction:column;gap:11px;max-height:330px;overflow:auto}
.none{color:var(--dim);font-size:15px;text-align:center;padding:20px 8px;line-height:1.55}
.layout{display:grid;grid-template-columns:1fr 440px;gap:18px;align-items:start}
@media(max-width:1180px){.layout{grid-template-columns:1fr}.mapside{position:static!important}}
.layout.mapfull{grid-template-columns:1fr}
.mapside{position:sticky;top:78px}
#map{height:600px;border-radius:13px;border:1px solid var(--line);overflow:hidden;background:#E9F0F1}
.layout.mapfull #map{height:78vh}
.leaflet-container{font-family:'Inter'}
.leaflet-control-zoom a{color:var(--ink)!important;border-color:var(--line2)!important}
.leaflet-tile-pane{filter:saturate(.88)}
#mapinfo{margin-top:10px;font-size:15px;color:var(--dim);min-height:20px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 15px}
.omark{width:14px;height:14px;border-radius:50%;background:#1F2329;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dmark{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#fff;border:3px solid var(--rental);font-family:'Barlow Condensed';font-weight:600;font-size:13px;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.2)}
.dmark.f{border-color:var(--travel)}
.maplegend{display:flex;gap:18px;font-size:13.5px;color:var(--dim);margin-top:8px}
.maplegend span{display:flex;align-items:center;gap:7px}.maplegend i{width:20px;border-top:3px solid;border-radius:2px}
.basesec{margin:24px 0 14px;display:flex;align-items:baseline;gap:12px;border-bottom:2.5px solid var(--ink);padding-bottom:7px}
.basesec:first-child{margin-top:4px}
.basesec h3{font-family:'Barlow Condensed';font-size:25px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.basesec .meta{margin-left:auto;font-size:15px;color:var(--dim);font-weight:500}
.card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--faint);border-radius:13px;padding:16px 19px;margin-bottom:13px;transition:box-shadow .15s,border-color .15s;cursor:pointer}
.card:hover{box-shadow:0 3px 14px rgba(31,35,41,.08)}
.card.st-fleet{border-left-color:var(--fleet)}.card.st-rental{border-left-color:var(--rental)}.card.st-hazard{border-left-color:var(--hazard)}.card.st-travel{border-left-color:var(--travel)}
.card.hl{outline:2.5px solid var(--ink);outline-offset:-1px;box-shadow:0 4px 18px rgba(31,35,41,.1)}
.cardtop{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.rpill{font-family:'IBM Plex Mono';font-size:14px;font-weight:500;color:var(--dim);border:1px solid var(--line2);border-radius:6px;padding:2px 8px}
.rname{font-family:'Barlow Condensed';font-weight:600;font-size:22px;letter-spacing:.02em;line-height:1.2}
.ldtag{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 9px;border-radius:6px}

.spill{margin-left:auto;display:inline-flex;flex-direction:column;align-items:flex-end;gap:1px;text-align:right}
.spill .b{font-size:14px;font-weight:700;letter-spacing:.02em;padding:3px 11px;border-radius:7px;white-space:nowrap}

.spill.rental .b{background:var(--rental-bg);color:var(--rental);border:1px solid var(--rental-bd)}
.spill.fleet .b{background:var(--fleet-bg);color:var(--fleet);border:1px solid var(--fleet-bd)}
.spill.travel .b{background:var(--travel-bg);color:var(--travel);border:1px solid var(--travel-bd)}
.spill .s{font-size:12.5px;color:var(--faint)}
.legrow{margin:11px 0 4px;font-size:16px;color:var(--ink)}
.legrow .jp{font-family:'Barlow Condensed';font-weight:600;font-size:20px;letter-spacing:.02em}
.legrow .jp.dest{color:var(--rental)}
.legrow .arrow{color:var(--faint);margin:0 6px}
.legrow .mono{font-size:14px;color:var(--dim);margin-left:2px}
.metaline{font-size:15px;color:var(--dim);margin-top:2px}.metaline b{color:var(--ink);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0 0}
.chip{font-size:14.5px;font-weight:500;color:var(--dim);background:var(--paper);border:1px solid var(--line);padding:4px 11px;border-radius:7px;display:inline-flex;align-items:center;gap:6px}
.chip.act{cursor:pointer}.chip.act:hover{border-color:var(--ink);color:var(--ink)}
.chip.stor{background:var(--rental-bg);border-color:var(--rental-bd);color:#8A530A}
.chip.bh{background:var(--travel-bg);border-color:var(--travel-bd);color:var(--travel)}
.chip.good{background:var(--fleet-bg);border-color:var(--fleet-bd);color:var(--fleet)}
.assign{border-top:1px solid var(--line);margin-top:13px;padding-top:13px;display:flex;gap:13px;align-items:center}
.aico{width:44px;height:44px;border-radius:50%;background:var(--paper);border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:600;font-size:16px;flex-shrink:0;color:var(--dim)}
.aico.teal{color:var(--fleet);border-color:var(--fleet-bd);background:var(--fleet-bg)}
.aico.amber{color:var(--hazard);border-color:var(--hazard-bd);background:var(--hazard-bg)}
.atext{flex:1;min-width:0}.atext .t{font-size:16px;font-weight:600;line-height:1.3}.atext .s{font-size:14px;color:var(--dim)}
.abtn{background:var(--card);border:1.5px solid var(--line2);border-radius:9px;font-family:'Inter';font-weight:600;font-size:14.5px;padding:8px 14px;cursor:pointer;color:var(--ink);flex-shrink:0}
.abtn:hover{border-color:var(--ink)}
.abtn.amber{border-color:var(--hazard-bd);color:var(--hazard);background:var(--hazard-bg)}
.abtn.amber:hover{background:var(--hazard);color:#fff;border-color:var(--hazard)}
.cons{border:1px solid var(--line);border-left:5px solid var(--travel);border-radius:12px;padding:13px 15px;background:var(--card)}
.cons.accepted{border-left-color:var(--fleet);background:var(--fleet-bg)}
.cons .ch{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.cons .dest{font-family:'Barlow Condensed';font-weight:600;font-size:21px;color:var(--travel);text-transform:uppercase;letter-spacing:.02em}
.cons.accepted .dest{color:var(--fleet)}
.cons .when{font-size:14px;color:var(--dim)}
.cons .truck{margin-left:auto;font-family:'IBM Plex Mono';font-size:13.5px;color:var(--ink)}
.cons .bar2{height:8px;border-radius:5px;background:var(--line);overflow:hidden;margin:9px 0}
.cons .bar2 i{display:block;height:100%;background:var(--fleet)}.cons .bar2 i.over{background:var(--hazard)}
.cons .leg{font-size:15px;padding:2px 0;display:flex;gap:9px}.cons .leg.anchor{font-weight:600}.cons .leg .star{color:var(--travel)}.cons .leg .mi{color:var(--faint);min-width:50px;font-size:13.5px}
.cons .acts{margin-top:11px;display:flex;gap:9px;align-items:center}
.vizbtn{background:var(--travel-bg);border:1px solid var(--travel-bd);color:var(--travel);font-family:'Inter';font-weight:600;font-size:15px;padding:8px 15px;border-radius:8px;cursor:pointer}
.vizbtn:hover{background:var(--travel);color:#fff}
.minib{background:var(--card);border:1.5px solid var(--line2);color:var(--ink);font-family:'Inter';font-weight:600;font-size:14.5px;padding:7px 13px;border-radius:8px;cursor:pointer}
.minib:hover{border-color:var(--ink)}
.accbadge{margin-left:auto;font-size:15px;font-weight:700;color:var(--fleet)}
.storrow{display:flex;align-items:center;gap:12px;font-size:15px;border:1px solid var(--line);border-left:4px solid var(--rental);border-radius:11px;padding:10px 13px;background:var(--card);cursor:pointer}
.storrow:hover{box-shadow:0 2px 10px rgba(31,35,41,.06)}
.storrow .box{flex:0 0 auto;width:38px;height:38px;border-radius:9px;background:var(--rental-bg);border:1px solid var(--rental-bd);color:var(--rental);display:flex;align-items:center;justify-content:center;font-size:18px}
.storrow b{font-weight:600}.storrow .sub{font-size:13.5px;color:var(--dim)}
.storrow .loc{margin-left:auto;font-family:'IBM Plex Mono';font-size:13px;color:var(--dim);text-align:right}
#calview .cweek{background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:15px;overflow:hidden}
#calview .cwh{font-family:'Barlow Condensed';font-weight:600;font-size:18px;letter-spacing:.04em;text-transform:uppercase;padding:11px 16px;border-bottom:1px solid var(--line);color:var(--dim);display:flex}
#calview .cwh .n{margin-left:auto;font-family:'Inter';font-size:13px;color:var(--faint);text-transform:none;letter-spacing:0}
#calview .cgrid{display:grid;grid-template-columns:repeat(7,1fr)}
#calview .cday{border-right:1px solid var(--line);border-top:1px solid var(--line);min-height:104px;padding:7px 8px}
#calview .cday:nth-child(7n){border-right:0}
#calview .cday .dn{font-size:12px;font-weight:700;color:var(--faint);text-transform:uppercase}
#calview .cday.today .dn{color:var(--rental)}
#calview .cev{font-size:12.5px;font-weight:600;border-radius:6px;padding:3px 6px;margin-top:4px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#calview .cev.straight{background:var(--rental-bg);color:#8A530A}
#calview .cev.regular{background:var(--paper);color:var(--dim);border:1px solid var(--line)}
#calview .cev.red{box-shadow:inset 0 0 0 1.6px var(--hazard)}
.mbg{position:fixed;inset:0;background:rgba(31,34,38,.45);display:flex;align-items:center;justify-content:center;z-index:3000;padding:18px}
.mbox{background:var(--card);border-radius:16px;max-width:500px;width:100%;padding:22px 26px;box-shadow:0 24px 60px rgba(0,0,0,.3);position:relative;max-height:88vh;overflow:auto}
.mbox h3{font-family:'Barlow Condensed';font-weight:600;font-size:23px;letter-spacing:.03em;margin-bottom:14px}
.mx{position:absolute;top:14px;right:16px;border:0;background:none;font-size:20px;cursor:pointer;color:var(--dim)}
.mrow{font-size:15.5px;margin:6px 0;color:var(--ink)}.mrow .k{color:var(--faint);font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase}
.mfield{margin:13px 0;display:flex;flex-direction:column;gap:6px}
.mfield label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.mfield input,.mfield select{font:inherit;font-size:15.5px;padding:10px 12px;border:1.5px solid var(--line2);border-radius:9px;background:var(--card);color:var(--ink);width:100%}
.mwa{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14.5px;white-space:pre-wrap;line-height:1.55;font-family:'IBM Plex Mono'}
.mfoot{margin-top:16px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.mbtn{background:var(--card);border:1.5px solid var(--line2);border-radius:9px;font-family:'Inter';font-weight:600;font-size:15px;padding:10px 16px;cursor:pointer;color:var(--ink)}
.mbtn.dark{background:var(--ink);border-color:var(--ink);color:#fff}
.mbtn.green{background:var(--fleet);border-color:var(--fleet);color:#fff}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:15px;opacity:0;pointer-events:none;transition:.25s;z-index:4000;box-shadow:0 10px 30px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
</style>
</head>

const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function midnight(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function today0(){ return midnight(new Date()); }
function parseDate(s){
  s=String(s||"").trim(); if(!s) return null;
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(m){ let y=+m[3]; if(y<100)y+=2000; return new Date(y,+m[1]-1,+m[2]); }
  return null;
}
function fmtMDY(d){ if(!d) return ""; return ("0"+(d.getMonth()+1)).slice(-2)+"/"+("0"+d.getDate()).slice(-2)+"/"+String(d.getFullYear()).slice(-2); }
function daysFromToday(d){ if(!d) return null; return Math.round((midnight(d)-today0())/86400000); }
function weekStart(d){ const x=midnight(d); x.setDate(x.getDate()-x.getDay()); return x; }
function geo(zip){ zip=String(zip||"").replace(/\D/g,"").slice(0,5).padStart(5,"0"); const z=ZIPDB[zip]; return z?{lat:z[0],lon:z[1],city:z[2],state:z[3]}:null; }
function stateZip(s){ s=String(s||"").trim(); const st=(s.match(/[A-Za-z]{2}/)||[""])[0].toUpperCase(); const z=(s.match(/\d{5}/)||[""])[0]; return {state:st,zip:z}; }
function hav(a,b){
  if(!a||!b||a.lat==null||b.lat==null) return 9999;
  const R=3959, dLa=(b.lat-a.lat)*Math.PI/180, dLo=(b.lon-a.lon)*Math.PI/180, la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  const h=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function gviz(tab){ return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&headers=1&sheet="+encodeURIComponent(tab)+"&_t="+Date.now(); }
function colmap(H){ const m={}; H.forEach((h,i)=>m[String(h).trim().toLowerCase()]=i); return m; }

function ensureToken(cb){
  if(GTOKEN && Date.now()<GTOKEXP-60000) return cb();
  if(window._gsiFail || !(window.google && google.accounts && google.accounts.oauth2))
    return modal("Sign-in needed", '<div class="mrow">Open this on the hosted GitHub Pages URL to sign in. Reading works without it; saving needs a quick Google sign-in.</div>');
  _tc = _tc || google.accounts.oauth2.initTokenClient({ client_id:GCLIENT, scope:"https://www.googleapis.com/auth/spreadsheets", callback:()=>{} });
  _tc.callback = resp => {
    if(resp && resp.access_token){
      GTOKEN=resp.access_token; GTOKEXP=Date.now()+((resp.expires_in||3600)*1000);
      try{ localStorage.setItem("zd_ldtok", JSON.stringify({t:GTOKEN,exp:GTOKEXP})); }catch(e){}
      cb();
    } else toast("Sign-in failed.");
  };
  _tc.requestAccessToken({ prompt: GTOKEN?"":"consent" });
}
function shFetch(path, opt){
  return fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+path,
    Object.assign({ headers:{ Authorization:"Bearer "+GTOKEN, "Content-Type":"application/json" } }, opt||{}))
    .then(r => { if(!r.ok) return r.text().then(b=>{ throw new Error("Sheets "+r.status+" "+String(b).slice(0,120)); }); return r.status===204?null:r.json(); });
}
function shAppend(tab, obj){
  const enc=encodeURIComponent("'"+tab+"'");
  return shFetch("/values/"+enc+"?valueRenderOption=FORMATTED_VALUE").catch(()=>({})).then(v=>{
    let header=(v && v.values && v.values[0]) || [];
    let pre=Promise.resolve();
    if(!header.length){
      pre = shFetch(":batchUpdate",{ method:"POST", body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]}) }).catch(()=>{}).then(()=>{
        header=Object.keys(obj);
        return shFetch("/values/"+encodeURIComponent("'"+tab+"'!A1")+"?valueInputOption=USER_ENTERED",{ method:"PUT", body:JSON.stringify({values:[header]}) });
      });
    }
    return pre.then(()=>{
      const row=header.map(h=>obj[h]!=null?String(obj[h]):"");
      Object.keys(obj).forEach(k=>{ if(header.indexOf(k)<0) row.push(String(obj[k])); });
      return shFetch("/values/"+enc+":append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS",{ method:"POST", body:JSON.stringify({values:[row]}) });
    });
  });
}

function loadJobs(){
  return fetch(gviz(JOBS_TAB)).then(r=>r.text()).then(t=>{
    const rows=pcsv(t); if(rows.length<2){ JOBS=[]; return; }
    const c=colmap(rows[0]); const g=(r,k)=>{ const i=c[k]; return i==null?"":String(r[i]||"").trim(); };
    const out=[];
    rows.slice(1).forEach(r=>{
      const isDel = g(r,"is delivered").toLowerCase()==="delivered" || g(r,"current location").toLowerCase()==="delivered";
      if(isDel) return;
      const code=g(r,"job code"); if(!code) return;
      const pz=stateZip(g(r,"pickup zip code")), dz=stateZip(g(r,"delivery zip code"));
      const pg=geo(pz.zip), dg=geo(dz.zip);
      const jt=g(r,"job type");
      const fad=parseDate(g(r,"final fad")||g(r,"fad by paper")||g(r,"fad (first available date)"));
      const dRaw=g(r,"days before fda").replace(/[^0-9-]/g,"");
      let trip=parseFloat(g(r,"estimated trip days")); trip=(isFinite(trip)&&trip>0)?trip:null;
      out.push({
        code, customer:g(r,"customer name"), phone:g(r,"customer mobile"),
        type:/straight/i.test(jt)?"straight":"regular",
        pickupAddr:g(r,"location"), deliveryAddr:g(r,"moving to"),
        pickupState:pg?pg.state:pz.state, destState:dg?dg.state:dz.state,
        pickup:pg?{lat:pg.lat,lon:pg.lon}:null, delivery:dg?{lat:dg.lat,lon:dg.lon}:null,
        pickupZip:pz.zip, deliveryZip:dz.zip,
        cf:num(g(r,"final cf"))||num(g(r,"estimated cf")),
        fad, timeframe:g(r,"delivery time frame"), tripDays:trip,
        daysBefore:dRaw?parseInt(dRaw,10):null,
        foreman:g(r,"forman"), carrier:g(r,"carrier"), carrierPhone:g(r,"carrier phone"),
        sticker:g(r,"sticker"), blanket:g(r,"blanket"), salesRep:g(r,"sales rep 1"),
        currentLocation:g(r,"current location"), eventId:g(r,"event id"),
        pickupDate:parseDate(g(r,"event date"))
      });
    });
    JOBS=out.filter(j=>!j.fad||midnight(j.fad)>=today0());
  }).catch(e=>{ JOBS=[]; });
}
function loadSheetKV(tab, build){
  return fetch(gviz(tab)).then(r=>r.ok?r.text():"").then(t=>{
    const store={};
    try{
      const rows=pcsv(t); if(rows.length<2) return store;
      const c=colmap(rows[0]); const g=(r,k)=>{ const i=c[k]; return i==null?"":String(r[i]||"").trim(); };
      rows.slice(1).forEach(r=>build(store,g,r));
    }catch(e){}
    return store;
  }).catch(()=>({}));
}
function loadStorage(){ return loadSheetKV(STORAGE_TAB,(s,g,r)=>{ const code=g(r,"job code"); if(!code) return; if(g(r,"inventory status").toLowerCase()!=="active") return; s[code]={ type:g(r,"location type"), label:g(r,"location label")||g(r,"location"), unit:g(r,"unit"), cf:g(r,"chargeable cf")||g(r,"real cf"), since:g(r,"storage entry date") }; }).then(s=>{ STORAGE=s; }); }
function loadRoutes(){
  return fetch(gviz(ROUTES_TAB)).then(r=>r.ok?r.text():"").then(t=>{
    ROUTES=[]; ROUTED=new Set();
    try{
      const rows=pcsv(t); if(rows.length<2) return;
      const c=colmap(rows[0]); const g=(r,k)=>{ const i=c[k]; return i==null?"":String(r[i]||"").trim(); };
      rows.slice(1).forEach(r=>{
        const codes=g(r,"job codes"); if(!codes && !g(r,"route id")) return;
        const list=codes.split(/[,;]+/).map(x=>x.trim()).filter(Boolean);
        list.forEach(x=>ROUTED.add(x));
        ROUTES.push({ id:g(r,"route id"), date:g(r,"date"), dest:g(r,"destination"), truck:g(r,"truck"), codes:list });
      });
    }catch(e){}
  }).catch(()=>{ ROUTES=[]; ROUTED=new Set(); });
}
function loadBackhaul(){ return loadSheetKV(BACKHAUL_TAB,(s,g,r)=>{ const code=g(r,"job code"); if(code) s[code]={cargo:g(r,"cargo")}; }).then(s=>{ BACKHAUL=s; }); }
function loadAssign(){ return loadSheetKV(ASSIGN_TAB,(s,g,r)=>{ const code=g(r,"job code"); if(code) s[code]={foreman:g(r,"foreman"),carrier:g(r,"carrier")}; }).then(s=>{ ASSIGN=s; }); }

/* ===== derived ===== */
function foremanOf(j){ return (ASSIGN[j.code]&&ASSIGN[j.code].foreman)||j.foreman||""; }
function carrierOf(j){ return (ASSIGN[j.code]&&ASSIGN[j.code].carrier)||j.carrier||""; }
function isFar(j){ return j.destState && OUR_STATES.indexOf(j.destState)<0; }
function leaveBy(j){ if(!j.fad) return null; return new Date(midnight(j.fad).getTime()-(j.tripDays||1)*86400000); }
function status(j){
  if(ROUTED.has(j.code)) return {lvl:"travel",txt:"Routed",why:"in an accepted route"};
  const dPick=daysFromToday(j.pickupDate);
  if(!j.fad) return {lvl:"rental",txt:"No delivery date",why:"FAD is blank \u2014 needs a date"};
  if(j.type==="straight"){
    if(!foremanOf(j) && dPick!=null && dPick<=ASSIGN_DAYS) return {lvl:"hazard",txt:"Needs foreman",why:"no foreman \u00B7 pickup "+(dPick<0?"overdue":"in "+dPick+"d")};
    const lb=leaveBy(j), dl=daysFromToday(lb), dFad=daysFromToday(j.fad);
    if(isFar(j) && dFad!=null && dFad<=BACKHAUL_DAYS && !BACKHAUL[j.code]) return {lvl:"hazard",txt:"Find backhaul",why:"empty return from "+j.destState+" \u00B7 no cargo found"};
    if(dl!=null && dl<=0) return {lvl:"hazard",txt:"Send now",why:(j.tripDays||1)+"-day trip \u00B7 deliver by "+fmtMDY(j.fad)};
    if(dl!=null && dl<=LEAVE_SOON) return {lvl:"rental",txt:"Send soon",why:"leave by "+fmtMDY(lb)};
    return {lvl:"fleet",txt:"On track",why:"leave by "+fmtMDY(lb)};
  }
  if(!carrierOf(j) && dPick!=null && dPick<=ASSIGN_DAYS) return {lvl:"hazard",txt:"Needs carrier",why:"no carrier \u00B7 pickup "+(dPick<0?"overdue":"in "+dPick+"d")};
  if(!carrierOf(j)) return {lvl:"rental",txt:"No carrier yet",why:"assign before pickup"};
  return {lvl:"fleet",txt:"Carrier set",why:carrierOf(j)};
}
function sortKey(j){ return [ STORAGE[j.code]?0:1, j.fad?midnight(j.fad).getTime():9e15, j.pickupDate?midnight(j.pickupDate).getTime():9e15 ]; }
function sortedJobs(){ return JOBS.slice().sort((a,b)=>{ const ka=sortKey(a),kb=sortKey(b); for(let i=0;i<ka.length;i++){ if(ka[i]!==kb[i]) return ka[i]-kb[i]; } return 0; }); }
function tfDays(j){
  const s=String(j.timeframe||"");
  let m=s.match(/(\d+)\s*(business\s*)?day/i); if(m) return Math.round(+m[1]*(m[2]?1.4:1));
  if(/-\s*(\d{1,2}\/\d{1,2}\/\d{2,4}|\d{4}-\d{2}-\d{2})/.test(s)) return 60;
  const n=s.match(/^\s*(\d{1,3})\s*$/); if(n) return +n[1];
  return 14;
}
function bigTruck(){ return DATA.trucks.reduce((m,t)=>Math.max(m,t.cf),1848); }
function assignTruck(cf){ const ts=DATA.trucks.slice().sort((a,b)=>a.cf-b.cf); for(const t of ts) if(t.cf>=cf) return t; return null; }
function consolidations(){
  const out=[], big=bigTruck();
  const straights=JOBS.filter(j=>j.type==="straight"&&j.delivery&&j.fad);
  const regs=JOBS.filter(j=>j.type==="regular"&&j.delivery);
  straights.forEach(S=>{
    const Ds=midnight(S.fad), cands=[];
    regs.forEach(R=>{
      let fit=null;
      if(R.destState && S.destState && R.destState===S.destState) fit={mi:Math.round(hav(R.delivery,S.delivery)),why:"same state"};
      else { const d=hav(R.delivery,S.delivery); if(d<=220) fit={mi:Math.round(d),why:Math.round(d)+" mi"}; }
      if(!fit) return;
      const rp=R.pickupDate?midnight(R.pickupDate):today0();
      const winEnd=new Date(rp.getTime()+tfDays(R)*86400000);
      if(Ds<rp || Ds>winEnd) return;
      cands.push({R,fit});
    });
    if(!cands.length) return;
    cands.sort((a,b)=>a.fit.mi-b.fit.mi);
    const grp=[]; let cf=S.cf||0;
    cands.forEach(c=>{ if(cf+(c.R.cf||0)<=big){ grp.push(c); cf+=(c.R.cf||0); } });
    if(!grp.length) return;
    out.push({ S, grp, cf, truck:assignTruck(cf) });
  });
  out.sort((a,b)=>midnight(a.S.fad)-midnight(b.S.fad));
  return out;
}

function renderCal(){
  const host=$("#calview"), jobs=sortedJobs(), byDay={};
  jobs.forEach(j=>{ const d=j.fad||j.pickupDate; if(!d) return; const key=midnight(d).getTime(); (byDay[key]=byDay[key]||[]).push(j); });
  const start=weekStart(new Date());
  let html="";
  for(let w=0;w<WEEKS_AHEAD;w++){
    const ws=new Date(start.getTime()+w*7*86400000);
    let any=false, cells="";
    for(let d=0;d<7;d++){
      const day=new Date(ws.getTime()+d*86400000), key=midnight(day).getTime(), evs=byDay[key]||[];
      if(evs.length) any=true;
      const isToday=key===today0().getTime();
      cells+='<div class="cday'+(isToday?" today":"")+'"><div class="dn">'+DOW[day.getDay()]+" "+day.getDate()+'</div>'+
        evs.map(j=>{ const s=status(j); return '<div class="cev '+j.type+(s.lvl==="hazard"?" red":"")+'" data-code="'+esc(j.code)+'" title="'+esc(j.customer)+' \u2014 '+esc(s.txt)+'">'+esc((j.customer||j.code).split(" ")[0])+' '+esc(j.destState||"")+'</div>'; }).join("")+'</div>';
    }
    if(!any&&w>0) continue;
    const we=new Date(ws.getTime()+6*86400000);
    html+='<div class="cweek"><div class="cwh">'+MON[ws.getMonth()]+" "+ws.getDate()+" \u2013 "+MON[we.getMonth()]+" "+we.getDate()+'<span class="n">week of '+fmtMDY(ws)+'</span></div><div class="cgrid">'+cells+'</div></div>';
  }
  host.innerHTML=html||'<div class="card" style="cursor:default;text-align:center;padding:40px"><div class="rname">Nothing scheduled</div></div>';
  host.querySelectorAll("[data-code]").forEach(el=>el.onclick=()=>{ setView("map"); focusJob(el.dataset.code); });
}

/* ===== map ===== */
function initMap(){
  if(LMAP || typeof L==="undefined") return;
  const el=$("#map"); if(!el) return;
  try{
    LMAP=L.map("map",{zoomControl:true});
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"\u00A9 OpenStreetMap \u00A9 CARTO"}).addTo(LMAP);
    LMAP.setView([39.5,-83],5);
    LLAYER=L.layerGroup().addTo(LMAP);
  }catch(e){ LMAP=null; }
}
function destIcon(j){ return L.divIcon({className:"",html:'<div class="dmark'+(j.type==="straight"?"":" f")+'">'+esc(j.destState||"")+'</div>',iconSize:[30,30],iconAnchor:[15,15]}); }
function pickIcon(){ return L.divIcon({className:"",html:'<div class="omark"></div>',iconSize:[14,14],iconAnchor:[7,7]}); }
function drawAll(){
  initMap(); if(!LMAP||!LLAYER) return;
  try{ LLAYER.clearLayers(); }catch(e){}
  const pts=[];
  JOBS.forEach(j=>{
    if(!j.pickup||!j.delivery) return;
    const col=j.type==="straight"?"#B26B0B":"#3B72B0";
    try{
      L.polyline([[j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]],{color:col,weight:2,opacity:.38,dashArray:"5 6"}).addTo(LLAYER);
      L.marker([j.delivery.lat,j.delivery.lon],{icon:destIcon(j)}).addTo(LLAYER).on("click",()=>focusJob(j.code));
    }catch(e){}
    pts.push([j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]);
  });
  if(pts.length){ try{ LMAP.fitBounds(pts,{padding:[28,28]}); }catch(e){} }
  setTimeout(()=>{ try{ LMAP&&LMAP.invalidateSize(); }catch(e){} },200);
}
function focusJob(code){
  const j=JOBS.find(x=>x.code===code); if(!j) return;
  if(VIEW==="cal") setView("map");
  initMap();
  document.querySelectorAll(".card.hl").forEach(c=>c.classList.remove("hl"));
  const card=document.querySelector('.card[data-code="'+code+'"]');
  if(card && VIEW==="list"){ card.classList.add("hl"); card.scrollIntoView({block:"center",behavior:"smooth"}); }
  if(!LMAP||!LLAYER||!j.pickup||!j.delivery){ $("#mapinfo").textContent=j?("No map coordinates for "+code):""; return; }
  try{
    LLAYER.clearLayers();
    L.polyline([[j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]],{color:"#fff",weight:7,opacity:.9}).addTo(LLAYER);
    L.polyline([[j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]],{color:j.type==="straight"?"#B26B0B":"#3B72B0",weight:4,opacity:.95,dashArray:"9 7"}).addTo(LLAYER);
    L.marker([j.pickup.lat,j.pickup.lon],{icon:pickIcon()}).addTo(LLAYER).bindPopup("Pickup \u00B7 "+esc(j.pickupState));
    L.marker([j.delivery.lat,j.delivery.lon],{icon:destIcon(j)}).addTo(LLAYER).bindPopup("<b>"+esc(j.customer)+"</b><br>"+esc(j.pickupState)+" \u2192 "+esc(j.destState)+"<br>"+(j.cf||0)+" CF \u00B7 by "+fmtMDY(j.fad)).openPopup();
    LMAP.fitBounds([[j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]],{padding:[60,60]});
  }catch(e){}
  $("#mapinfo").innerHTML="<b>"+esc(j.customer||j.code)+"</b> \u2014 "+esc(j.pickupState)+" \u2192 "+esc(j.destState)+" \u00B7 "+(j.cf||0)+" CF \u00B7 deliver by "+fmtMDY(j.fad);
  setTimeout(()=>{ try{ LMAP.invalidateSize(); }catch(e){} },150);
}
function showConsolMap(ci){
  const c=CONS[ci]; if(!c) return;
  setView("map"); initMap(); if(!LMAP||!LLAYER) return;
  try{
    LLAYER.clearLayers();
    const jobs=[c.S].concat(c.grp.map(g=>g.R)), dest=c.S.delivery, pts=[];
    jobs.forEach(j=>{
      if(j.pickup&&dest){
        L.polyline([[j.pickup.lat,j.pickup.lon],[dest.lat,dest.lon]],{color:"#6C5CE0",weight:4,opacity:.92}).addTo(LLAYER);
        L.marker([j.pickup.lat,j.pickup.lon],{icon:pickIcon()}).addTo(LLAYER);
        pts.push([j.pickup.lat,j.pickup.lon]);
      }
    });
    if(dest){ L.marker([dest.lat,dest.lon],{icon:destIcon({type:"straight",destState:c.S.destState})}).addTo(LLAYER); pts.push([dest.lat,dest.lon]); }
    if(pts.length) LMAP.fitBounds(pts,{padding:[50,50]});
  }catch(e){}
  $("#mapinfo").innerHTML="Consolidated <b>"+esc(c.S.destState)+"</b> run \u00B7 "+(c.grp.length+1)+" jobs \u00B7 "+Math.round(c.cf)+" CF";
}

/* ===== actions (writes) ===== */
function acceptRoute(ci){
  const c=CONS[ci]; if(!c) return;
  const codes=[c.S].concat(c.grp.map(g=>g.R)).map(j=>j.code).filter(Boolean);
  const fad=c.S.fad;
  const ymd=fad?(""+fad.getFullYear()+("0"+(fad.getMonth()+1)).slice(-2)+("0"+fad.getDate()).slice(-2)):Date.now().toString(36);
  const id="RT-"+(c.S.destState||"XX")+"-"+ymd+"-"+Math.random().toString(36).slice(2,5).toUpperCase();
  const obj={ "Route ID":id, "Date":fad?fmtMDY(fad):"", "Destination":c.S.destState||"", "Truck":c.truck?c.truck.n:"", "Job Codes":codes.join(", "), "CF":Math.round(c.cf), "Created At":new Date().toISOString() };
  ensureToken(()=>shAppend(ROUTES_TAB,obj).then(()=>{
    codes.forEach(x=>ROUTED.add(x)); ROUTES.push({id,codes});
    toast("Route "+id+" saved."); renderConsol(); renderList(); renderStats();
  }).catch(e=>modal("Couldn't save route",'<div class="mrow">'+esc(e.message)+'</div>')));
}
function openAssign(code){
  const j=JOBS.find(x=>x.code===code); if(!j) return;
  const isS=j.type==="straight";
  const head='<div class="mrow"><span class="k">'+esc(j.customer||"")+'</span><br>'+esc(j.pickupState)+' \u2192 '+esc(j.destState)+' \u00B7 deliver by '+fmtMDY(j.fad)+'</div>';
  const field=isS
    ? '<div class="mfield"><label>Foreman \u2014 we deliver this</label><select class="asel"><option value="">\u2014 pick foreman \u2014</option>'+DATA.foremen.map(f=>'<option>'+esc(f)+'</option>').join("")+'</select></div>'
    : '<div class="mfield"><label>Carrier \u2014 3rd-party delivery</label><input class="asel" placeholder="Carrier name"></div>';
  modal((isS?"Assign foreman":"Assign carrier"), head+field, '<button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn dark" id="asave">Save</button>');
  $("#asave").onclick=()=>{
    const v=($(".asel").value||"").trim();
    if(!v){ toast("Pick or enter one first."); return; }
    const obj={ "Job Code":code, "Foreman":isS?v:"", "Carrier":isS?"":v, "Assigned At":new Date().toISOString() };
    ensureToken(()=>shAppend(ASSIGN_TAB,obj).then(()=>{
      ASSIGN[code]=isS?{foreman:v,carrier:""}:{foreman:"",carrier:v};
      closeModal(); toast("Assigned."); renderList(); renderStats();
    }).catch(e=>modal("Couldn't save",'<div class="mrow">'+esc(e.message)+'</div>')));
  };
}
function openStorage(code){
  const s=STORAGE[code], j=JOBS.find(x=>x.code===code); if(!s) return;
  const body=
    '<div class="mrow"><span class="k">Where</span><br><b>'+esc(s.type||"\u2014")+'</b></div>'+
    '<div class="mrow"><span class="k">Location / unit</span><br>'+esc(s.label||s.unit||"\u2014")+'</div>'+
    '<div class="mrow"><span class="k">CF in storage</span><br>'+esc(s.cf||"\u2014")+'</div>'+
    '<div class="mrow"><span class="k">In storage since</span><br>'+esc(s.since||"\u2014")+'</div>'+
    (j?'<div class="mrow"><span class="k">Deliver by</span><br>'+(j.fad?fmtMDY(j.fad):"\u2014")+' \u2014 pull it from storage in time.</div>':"");
  modal("Storage \u2014 "+esc((j&&j.customer)||code), body, '<button class="mbtn dark" onclick="closeModal()">Got it</button>');
}
function waMsg(j,kind){
  const home=DATA.bases[j.pickupState]?j.pickupState:"NJ";
  if(kind==="out") return "\uD83D\uDE9A Going "+(j.pickupState||"NJ")+" \u2192 "+(j.destState||"?")+" around "+(j.fad?fmtMDY(j.fad):"TBD")+".\nHave ~"+(j.cf||0)+" CF and room for more \u2014 anyone need a load on the way? Reply pickup + drop + CF.";
  const back=j.fad?fmtMDY(new Date(midnight(j.fad).getTime()+(j.tripDays||2)*86400000)):"TBD";
  return "\uD83D\uDD04 Truck returning from "+(j.destState||"?")+" \u2192 "+home+" around "+back+", coming back EMPTY.\nLooking for cargo back to "+home+". What've you got?";
}
function openBackhaul(code){
  const j=JOBS.find(x=>x.code===code); if(!j) return;
  const body=
    '<div class="mrow"><span class="k">'+esc(j.customer||"")+'</span> \u00B7 '+esc(j.pickupState)+' \u2192 '+esc(j.destState)+' \u00B7 '+(j.cf||0)+' CF</div>'+
    '<div class="mfield"><label>Outbound \u2014 spare space</label><div class="mwa">'+esc(waMsg(j,"out"))+'</div></div>'+
    '<div class="mfield"><label>Return \u2014 empty back</label><div class="mwa">'+esc(waMsg(j,"ret"))+'</div></div>'+
    '<div class="mfield"><label>If someone gives you return cargo, record it</label><input id="bhcargo" placeholder="e.g. 300 CF furniture, Orlando to Newark"></div>';
  modal("Backhaul \u2014 blast WhatsApp & record", body, '<button class="mbtn" id="cpout">Copy outbound</button><button class="mbtn" id="cpret">Copy return</button><button class="mbtn green" id="bhsave">Save found cargo</button>');
  const cp=t=>{ try{ navigator.clipboard.writeText(t); toast("Copied."); }catch(e){ toast("Select and copy from the box."); } };
  $("#cpout").onclick=()=>cp(waMsg(j,"out"));
  $("#cpret").onclick=()=>cp(waMsg(j,"ret"));
  $("#bhsave").onclick=()=>{
    const cargo=($("#bhcargo").value||"").trim();
    if(!cargo){ toast("Type what cargo you found."); return; }
    const obj={ "Job Code":code, "Cargo":cargo, "From":j.destState||"", "To":j.pickupState||"NJ", "Recorded At":new Date().toISOString() };
    ensureToken(()=>shAppend(BACKHAUL_TAB,obj).then(()=>{
      BACKHAUL[code]={cargo}; closeModal(); toast("Backhaul recorded."); renderList();
    }).catch(e=>modal("Couldn't save",'<div class="mrow">'+esc(e.message)+'</div>')));
  };
}

/* ===== views + boot ===== */
function setView(v){
  VIEW=v;
  document.querySelectorAll(".vbtn").forEach(b=>b.classList.toggle("on",b.dataset.view===v));
  const lc=$("#leftcol"), lay=$(".layout");
  if(v==="map"){
    lc.classList.add("hidden"); lay.classList.add("mapfull");
    initMap(); drawAll();
    setTimeout(()=>{ try{ LMAP&&LMAP.invalidateSize(); }catch(e){} },160);
  } else {
    lc.classList.remove("hidden"); lay.classList.remove("mapfull");
    $("#listview").classList.toggle("hidden",v!=="list");
    $("#calview").classList.toggle("hidden",v!=="cal");
    if(v==="cal") renderCal();
  }
}
function renderAll(){ renderStats(); renderStorage(); renderConsol(); renderList(); if(VIEW==="cal") renderCal(); drawAll(); }
function pull(){
  $("#rfstamp").textContent="Loading\u2026";
  return Promise.all([loadJobs(),loadStorage(),loadRoutes(),loadBackhaul(),loadAssign()]).then(()=>{
    renderAll();
    $("#rfstamp").textContent=JOBS.length+" jobs \u00B7 "+new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  }).catch(e=>{ $("#rfstamp").textContent="load error"; });
}
document.querySelectorAll(".vbtn").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));
$("#refreshbtn").addEventListener("click",pull);
window.closeModal=closeModal;
initMap(); pull();
</script>
</body>
</html>
