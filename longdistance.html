<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Long Distance Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="zipdb.js?v=1"></script>
<script src="ld-localdata.js" onerror="window._ldNoLocal=1"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onerror="window._gsiFail=1"></script>
<style>
:root{
  --paper:#F7F6F2;--card:#FFF;--ink:#1F2329;--dim:#646B73;--faint:#969CA3;--line:#E6E4DC;--line2:#D3D0C6;
  --fleet:#5E8A1E;--fleet-bg:#EFF6E0;--fleet-bd:#D3E3A6;
  --rental:#B26B0B;--rental-bg:#FBF0DC;--rental-bd:#EDD6A8;
  --hazard:#C0392B;--hazard-bg:#FBE9E6;--hazard-bd:#F0C7C0;
  --travel:#6C5CE0;--travel-bg:#EFECFB;--travel-bd:#D6D0F5;
  --teal:#1E8E7E;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;font-size:16px;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:inherit}
header{display:flex;align-items:center;gap:16px;padding:14px 26px;background:var(--card);border-bottom:1px solid var(--line);flex-wrap:wrap;position:sticky;top:0;z-index:20}
.back{font-size:24px;color:var(--faint);text-decoration:none;line-height:1}
#brandlogo{height:34px}
header h1{font-family:'Barlow Condensed';font-weight:600;font-size:26px;letter-spacing:.02em;margin:0;text-transform:uppercase}
.hsub{font-size:12.5px;color:var(--dim);margin-top:1px}
.tabs{display:inline-flex;border:1px solid var(--line2);border-radius:11px;overflow:hidden;background:var(--card)}
.tab{border:0;border-right:1px solid var(--line2);background:none;color:var(--ink);font:600 14.5px Inter;padding:9px 16px;cursor:pointer}
.tab:last-child{border-right:0}
.tab.on{background:var(--ink);color:#fff}
.tab:hover:not(.on){background:var(--paper)}
.tab .b{display:inline-block;min-width:18px;margin-left:6px;padding:0 5px;border-radius:9px;background:rgba(31,34,38,.1);font-size:12px}
.tab.on .b{background:rgba(255,255,255,.25)}
.stats{display:flex;gap:18px;margin-left:auto}
.stat{text-align:center}
.stat .v{font-family:'Barlow Condensed';font-weight:700;font-size:26px;line-height:1}
.stat .v.red{color:var(--hazard)}.stat .v.amber{color:var(--rental)}.stat .v.teal{color:var(--teal)}
.stat .l{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
#refreshbtn{border:1.5px solid var(--line2);background:var(--card);color:var(--ink);font:600 14px Inter;padding:8px 13px;border-radius:10px;cursor:pointer}
#refreshbtn:hover{border-color:var(--ink)}
#rfstamp{font-size:12.5px;color:var(--faint)}
main{padding:20px 30px 90px;max-width:1860px;margin:0 auto}
/* board groups */
.grp{margin-bottom:26px}
.grphead{display:flex;align-items:baseline;gap:11px;margin:0 0 12px;padding-bottom:7px;border-bottom:2px solid var(--line)}
.grphead h2{font-family:'Barlow Condensed';font-weight:600;font-size:21px;letter-spacing:.02em;margin:0}
.grphead .ct{font-size:13px;color:var(--faint);font-weight:600}
.grp.g-critical .grphead h2{color:var(--hazard)} .grp.g-critical .grphead{border-color:var(--hazard-bd)}
.grp.g-data .grphead h2{color:var(--rental)}
.grp.g-pickup .grphead h2{color:var(--travel)}
.grp.g-accepted .grphead h2{color:var(--fleet)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px}
/* job card */
.jc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:0 1px 2px rgba(31,34,38,.04);position:relative;cursor:pointer;transition:border-color .12s}
.jc:hover{border-color:var(--line2)}
.jc.u-red{box-shadow:inset 4px 0 0 var(--hazard)}
.jc.u-amber{box-shadow:inset 4px 0 0 var(--rental)}
.jc.u-gap{box-shadow:inset 4px 0 0 var(--faint)}
.jc.u-green{box-shadow:inset 4px 0 0 var(--fleet)}
.jctop{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.code{font-family:'IBM Plex Mono';font-weight:600;font-size:14.5px;letter-spacing:-.02em}
.ty{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:6px}
.ty.straight{background:var(--rental-bg);color:var(--rental)}
.ty.regular{background:var(--travel-bg);color:var(--travel)}
.cf{font-size:12px;color:var(--dim);font-weight:600;margin-left:auto}
.cust{font-size:15px;font-weight:600;margin:7px 0 2px}
.route-line{font-size:12.5px;color:var(--dim);font-family:'IBM Plex Mono'}
.deliv{font-size:13.5px;font-weight:600;margin:9px 0 3px}
.deliv .sub{font-size:12px;color:var(--dim);font-weight:500}
.dims{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 0}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;border:1px solid transparent}
.chip i{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.8}
.chip.state{background:var(--paper);color:var(--dim);border-color:var(--line)}
.chip.u-red{background:var(--hazard-bg);color:var(--hazard)}
.chip.u-amber{background:var(--rental-bg);color:var(--rental)}
.chip.u-gap{background:#F1F0EC;color:var(--dim)}
.chip.u-green{background:var(--fleet-bg);color:var(--fleet)}
.chip.route{background:var(--travel-bg);color:var(--travel);border-color:var(--travel-bd)}
.chip.stor{background:var(--travel-bg);color:#5A4FB8}
.action{margin-top:11px;padding:9px 11px;background:var(--paper);border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;display:flex;gap:8px;align-items:flex-start}
.action .k{color:var(--faint);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.05em;flex:0 0 auto;margin-top:2px}
.jc.u-red .action{background:var(--hazard-bg);border-color:var(--hazard-bd)}
.jc.u-amber .action{background:var(--rental-bg);border-color:var(--rental-bd)}
/* carrier watch table */
.cwwrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:auto}
table.cw{width:100%;border-collapse:collapse;font-size:13.5px}
table.cw th{background:var(--paper);text-align:left;padding:11px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:700;border-bottom:1px solid var(--line2);position:sticky;top:0}
table.cw td{padding:10px 12px;border-bottom:1px solid var(--line)}
table.cw tr:last-child td{border-bottom:none}
table.cw tr:hover td{background:var(--paper)}
table.cw .c-code{font-family:'IBM Plex Mono';font-weight:600}
.cwnote{font-size:13px;color:var(--dim);margin:0 0 13px}
.empty{text-align:center;color:var(--dim);padding:50px 20px;background:var(--card);border:1px dashed var(--line2);border-radius:14px}
.empty b{display:block;font-family:'Barlow Condensed';font-size:21px;color:var(--ink);margin-bottom:6px}
.sug{background:var(--card);border:1px solid var(--travel-bd);border-radius:14px;padding:14px 16px;margin-bottom:13px;box-shadow:0 1px 2px rgba(31,34,38,.04)}
.sugtop{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.sugid{font-family:'Barlow Condensed';font-weight:600;font-size:18px;color:var(--travel);background:var(--travel-bg);border:1px solid var(--travel-bd);padding:2px 12px;border-radius:20px}
.sugmeta{font-size:13.5px;color:var(--dim)}.sugmeta b{color:var(--ink)}
.rbtn{font:600 13.5px Inter;border:1.5px solid var(--line2);background:var(--card);color:var(--ink);border-radius:9px;padding:7px 12px;cursor:pointer}
.rbtn:hover{border-color:var(--ink)} .rbtn.acc{background:var(--ink);color:#fff;border-color:var(--ink);margin-left:auto}
.sugexp{font-size:13.5px;color:var(--dim);margin:10px 0 0;line-height:1.5}
.rstops{display:flex;flex-direction:column;gap:5px;margin-top:11px}
.rstop{font-size:13px;display:flex;align-items:center;gap:8px}
.rstop .rn{width:20px;height:20px;border-radius:50%;background:var(--rental);color:#fff;font:700 11px Inter;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.rstop b{font-family:'IBM Plex Mono'}
.tlbar{display:flex;align-items:center;gap:18px;margin:2px 0 18px;flex-wrap:wrap}
.tlnav{display:inline-flex;background:var(--card);border:1px solid var(--line2);border-radius:11px;overflow:hidden}
.tlnav button{border:0;border-right:1px solid var(--line);background:none;font:600 15px Inter;color:var(--ink);padding:9px 15px;cursor:pointer;transition:background .12s}
.tlnav button:last-child{border-right:0}
.tlnav button:hover{background:var(--paper)}
.tlrange{font-family:'Barlow Condensed';font-weight:600;font-size:26px;letter-spacing:.01em;line-height:1.02}
.tlrange small{display:block;font:600 11px Inter;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin-top:2px}
.tllg{display:flex;gap:17px;margin-left:auto;font-size:12.5px;color:var(--dim);flex-wrap:wrap;align-items:center}
.tllg span{display:flex;align-items:center;gap:7px}
.lg-pk{width:12px;height:12px;border-radius:50%;border:2px solid var(--faint);background:var(--card);flex:0 0 auto}
.lg-s{position:relative;width:24px;height:4px;background:var(--line2);border-radius:2px;flex:0 0 auto}
.lg-s::after{content:"";position:absolute;right:-2px;top:50%;width:11px;height:11px;border-radius:2px;background:var(--ink);transform:translateY(-50%) rotate(45deg)}
.lg-r{width:26px;height:15px;border-radius:4px;background:var(--travel-bg);border:1px solid var(--travel-bd);border-left:3px solid var(--travel);flex:0 0 auto}
.tlgrid{position:relative;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--card);box-shadow:0 1px 2px rgba(31,34,38,.04),0 22px 46px -30px rgba(31,34,38,.26)}
.tlhead{display:flex;height:56px;background:linear-gradient(180deg,var(--card),var(--paper));border-bottom:1px solid var(--line2)}
.tlhlab{width:252px;flex:0 0 252px;border-right:1px solid var(--line2);display:flex;align-items:flex-end;padding:0 18px 9px;font:700 11px Inter;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
.tlhcal{position:relative;flex:1;min-width:0}
.tlmon{position:absolute;top:9px;font-family:'Barlow Condensed';font-weight:600;font-size:16px;letter-spacing:.03em;text-transform:uppercase;color:var(--dim);padding-left:8px}
.tlday{position:absolute;bottom:8px;font-size:12.5px;color:var(--faint);font-weight:600;transform:translateX(-50%)}
.tltodaylab{position:absolute;top:0;transform:translateX(-50%);font:800 10px Inter;letter-spacing:.09em;color:#fff;background:var(--hazard);padding:3px 8px 2px;border-radius:0 0 7px 7px;z-index:3}
.tlrow{display:flex;min-height:60px;border-bottom:1px solid var(--line);transition:background .12s;cursor:pointer}
.tlrow:last-child{border-bottom:none}
.tlrow:hover{background:var(--paper)}
.tlrow.u-red{box-shadow:inset 3px 0 0 var(--hazard)}
.tlrow.u-amber{box-shadow:inset 3px 0 0 var(--rental)}
.tllab{width:252px;flex:0 0 252px;border-right:1px solid var(--line);padding:0 18px;display:flex;align-items:center;gap:12px}
.tlmk{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:22px}
.tlmk.s::before{content:"";width:13px;height:13px;background:var(--ink);border-radius:2px;transform:rotate(45deg)}
.tlmk.r::before{content:"";width:19px;height:13px;border-radius:3px;background:var(--travel-bg);border:1px solid var(--travel-bd);border-left:3px solid var(--travel)}
.tllabtx{min-width:0;flex:1}
.tllabtx b{display:block;font-family:'IBM Plex Mono';font-weight:600;font-size:14.5px;letter-spacing:-.02em;line-height:1.3}
.tllabtx span{display:block;font-size:13px;color:var(--dim);line-height:1.25;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tlcal{position:relative;flex:1;min-width:0;overflow:hidden;background-image:repeating-linear-gradient(to right,var(--line) 0 1px,transparent 1px calc(100%/6))}
.tlband{position:absolute;top:0;bottom:0;background:rgba(192,57,43,.055);z-index:0}
.tltoday{position:absolute;top:0;bottom:0;width:2px;background:var(--hazard);opacity:.5;z-index:1}
.tlpk{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%);background:var(--card);border:2px solid var(--faint);z-index:5}
.tltrip{position:absolute;top:50%;height:4px;transform:translateY(-50%);border-radius:2px;background:var(--line2);z-index:2}
.tltrip.u-amber{background:var(--rental-bd)}
.tltrip.u-red{background:var(--hazard-bd)}
.tldep{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;transform:translate(-50%,-50%);background:var(--faint);border:2px solid var(--card);z-index:3}
.tldep.u-amber{background:var(--rental)}
.tldep.u-red{background:var(--hazard)}
.tldead{position:absolute;top:50%;transform:translate(-8px,-50%);display:flex;align-items:center;gap:8px;z-index:4;white-space:nowrap}
.tldead.lft{transform:translate(calc(-100% + 8px),-50%)}
.tldead.off{transform:translateY(-50%);gap:4px}
.tldead .chev{font:700 15px Inter;color:var(--faint)}
.tldead .dot{flex:0 0 auto;width:16px;height:16px;border-radius:3px;background:var(--ink);transform:rotate(45deg);box-shadow:0 0 0 3px var(--card)}
.tldead .dt{font:600 13.5px Inter;color:var(--ink)}
.tldead.u-amber .dot{background:var(--rental)}
.tldead.u-amber .dt{color:var(--rental)}
.tldead.u-red .dot{background:var(--hazard)}
.tldead.u-red .dt{color:var(--hazard)}
.tlwin{position:absolute;top:50%;height:30px;transform:translateY(-50%);border-radius:8px;background:var(--travel-bg);border:1px solid var(--travel-bd);border-left:3px solid var(--travel);display:flex;align-items:center;padding:0 11px;z-index:2;overflow:hidden}
.tlwin .dt{font:600 13px Inter;color:#5A4FB8;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tlwin.u-amber{background:var(--rental-bg);border-color:var(--rental-bd);border-left-color:var(--rental)}
.tlwin.u-amber .dt{color:var(--rental)}
.tlwin.u-red{background:var(--hazard-bg);border-color:var(--hazard-bd);border-left-color:var(--hazard)}
.tlwin.u-red .dt{color:var(--hazard)}
/* timeline view toggle + split-map */
.tlview{display:inline-flex;background:var(--card);border:1px solid var(--line2);border-radius:11px;overflow:hidden}
.tlview button{border:0;border-right:1px solid var(--line);background:none;font:600 14px Inter;color:var(--dim);padding:9px 16px;cursor:pointer}
.tlview button:last-child{border-right:0}
.tlview button.on{background:var(--ink);color:#fff}
.tlview button:hover:not(.on){background:var(--paper)}
.tlsplit{display:flex;gap:18px;align-items:flex-start}
.tlmain{flex:1;min-width:0}
#tlside{flex:0 0 50%;position:sticky;top:80px;height:calc(100vh - 165px);min-height:460px;display:none;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#E9F0F1;box-shadow:0 1px 2px rgba(31,34,38,.04),0 22px 46px -30px rgba(31,34,38,.26)}
#tlside.show{display:block}
#tlsmap{position:absolute;inset:0}
#tlsback{position:absolute;top:12px;right:12px;z-index:600;width:34px;height:34px;border:1px solid var(--line2);background:var(--card);border-radius:9px;font-size:18px;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
#tlsback:hover{border-color:var(--ink);color:var(--ink)}
#tlcard{position:absolute;top:12px;left:12px;width:330px;max-width:calc(100% - 64px);max-height:calc(100% - 24px);overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:0 14px 40px -12px rgba(31,34,38,.45);z-index:550}
.tlc-hd{display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:2}
.tlc-hd .code{font-family:'IBM Plex Mono';font-weight:600;font-size:14px}
.tlc-min{margin-left:auto;width:27px;height:27px;border:1px solid var(--line);background:var(--card);border-radius:7px;cursor:pointer;font-size:15px;color:var(--dim);display:flex;align-items:center;justify-content:center;line-height:1}
.tlc-min:hover{border-color:var(--ink);color:var(--ink)}
#tlcard.min{width:auto}
#tlcard.min .tlc-body{display:none}
#tlcard .dw-hd{padding:14px 16px 12px;border-bottom:0}
#tlcard .dw-cust{font-size:23px}
#tlcard .dw-do{padding:13px 16px;font-size:14px}
#tlcard .dw-sec{padding:14px 16px}
.tlrow.sel{background:var(--travel-bg)!important}
.cw tr.sel td{background:var(--travel-bg)!important}
.cw tr[data-job]{cursor:pointer}
.tltable .ty{font-size:10px;padding:2px 7px}
.miss{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:14px;background:#F1F0EC;color:var(--dim);margin:1px 0}
.miss.crit{background:var(--hazard-bg);color:var(--hazard)}
#mapbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
#mapbar .mbl{font:700 10.5px Inter;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
#mapbar select,#mapbar input[type=date]{font:600 13px Inter;border:1px solid var(--line2);background:var(--card);border-radius:9px;padding:7px 10px;color:var(--ink);cursor:pointer}
.mbtn{font:600 13px Inter;border:1.5px solid var(--line2);background:var(--card);color:var(--ink);border-radius:9px;padding:7px 12px;cursor:pointer}
.mbtn:hover{border-color:var(--ink)}
#mfcount{margin-left:auto;font-size:12.5px;color:var(--faint);font-weight:600}
#mapinner{position:relative}
#mapwrap.full{position:fixed;inset:0;z-index:5000;background:var(--paper);margin:0;padding:14px 20px;overflow:auto}
#mapwrap.full #map{height:calc(100vh - 96px)}
#tlmain .tlgrid{cursor:grab}
.tlmain.grabbing,.tlmain.grabbing .tlgrid,.tlmain.grabbing .tlrow,.tlmain.grabbing .tlcal{cursor:grabbing}
#bhmodal{position:fixed;inset:0;background:rgba(31,34,38,.32);display:none;align-items:center;justify-content:center;z-index:6000}
#bhmodal.show{display:flex}
.bhbox{background:var(--card);border:1px solid var(--line2);border-radius:16px;width:480px;max-width:94vw;box-shadow:0 24px 60px -16px rgba(31,34,38,.5);overflow:hidden}
.bhhd{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
.bhhd b{font-family:'Barlow Condensed';font-weight:600;font-size:20px}
.bhhd span{font-size:12.5px;color:var(--dim);font-family:'IBM Plex Mono'}
.bhx{margin-left:auto;width:32px;height:32px;border:1px solid var(--line);background:var(--card);border-radius:8px;font-size:18px;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.bhx:hover{border-color:var(--ink);color:var(--ink)}
.bhnote{font-size:13px;color:var(--dim);margin:14px 18px 10px;line-height:1.5}
.bhta{display:block;margin:0 18px;width:calc(100% - 36px);min-height:128px;border:1px solid var(--line2);border-radius:10px;padding:11px 13px;font:500 14px Inter;color:var(--ink);resize:vertical;line-height:1.55;box-sizing:border-box}
.bhbtns{display:flex;gap:9px;flex-wrap:wrap;padding:14px 18px 18px}
.bhbtns .acc{background:#25D366;color:#fff;border-color:#25D366;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.bhbtns .acc:hover{filter:brightness(.95)}
.dw-bh{margin-top:14px;width:100%;border:1.5px solid var(--rental-bd);background:var(--rental-bg);color:var(--rental);font:600 14px Inter;padding:10px;border-radius:10px;cursor:pointer;text-align:center}
.dw-bh:hover{border-color:var(--rental)}
.dw-bh.found{background:var(--fleet-bg);color:var(--fleet);border-color:var(--fleet-bd);cursor:default}
#mapwrap{position:relative}
#map{width:100%;height:calc(100vh - 210px);min-height:440px;border:1px solid var(--line);border-radius:14px;background:#E9F0F1}
#mapback{position:absolute;top:14px;left:14px;z-index:600;font:600 14px Inter;border:1.5px solid var(--line2);background:var(--card);border-radius:9px;padding:8px 12px;cursor:pointer}
/* detail drawer */
#dwbg{position:fixed;inset:0;background:rgba(31,34,38,.18);opacity:0;pointer-events:none;transition:opacity .2s;z-index:2900}
#dwbg.show{opacity:1;pointer-events:auto}

#drawer.show{transform:none}
.dw-x{position:absolute;top:16px;right:16px;width:34px;height:34px;border:1px solid var(--line);background:var(--card);border-radius:9px;font-size:19px;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.dw-x:hover{border-color:var(--ink);color:var(--ink)}
.dw-hd{padding:22px 24px 18px;border-bottom:1px solid var(--line)}
.dw-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.dw-code{font-family:'IBM Plex Mono';font-weight:600;font-size:17px;letter-spacing:-.02em}
.dw-cust{font-family:'Barlow Condensed';font-weight:600;font-size:30px;line-height:1.04;margin:7px 0 0;letter-spacing:.01em}
.dw-do{margin:0;padding:15px 24px;font-size:15px;font-weight:600;display:flex;gap:11px;align-items:flex-start;background:var(--paper);border-bottom:1px solid var(--line)}
.dw-do .k{font:700 10px Inter;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-top:3px;flex:0 0 auto}
.dw-do.u-red{background:var(--hazard-bg);color:var(--hazard)}

.dw-sec{padding:18px 24px;border-bottom:1px solid var(--line)}
.dw-sec h4{font:700 10.5px Inter;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:0 0 13px}
.dw-leg{display:flex;gap:13px;align-items:flex-start;position:relative}

.dw-leg.del .pin{border:0;width:14px;height:14px;border-radius:3px;background:var(--ink);transform:rotate(45deg);margin-top:4px}
.dw-leg.del.u-red .pin{background:var(--hazard)}
.dw-leg.del.u-amber .pin{background:var(--rental)}
.dw-leg .cnx{position:absolute;left:6px;top:18px;height:20px;width:2px;background:var(--line2)}
.dw-leg .pl{font:700 10px Inter;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.dw-leg .pv{font-size:15px;font-weight:600;margin-top:2px}
.dw-leg .ps{font-size:12.5px;color:var(--dim);margin-top:2px}
.dw-leg+.dw-leg{margin-top:18px}
.dw-mapbtn{margin-top:17px;width:100%;border:1.5px solid var(--line2);background:var(--card);color:var(--ink);font:600 14px Inter;padding:11px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.dw-mapbtn:hover{border-color:var(--ink)}
.dw-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px 18px}
.dw-f .fl{font:700 10px Inter;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.dw-f .fv{font-size:14.5px;font-weight:600;margin-top:3px}
.dw-f.full{grid-column:1/-1}
.dw-dims{display:flex;flex-wrap:wrap;gap:7px}
.dw-gap{display:flex;gap:9px;align-items:flex-start;background:var(--hazard-bg);border:1px solid var(--hazard-bd);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--hazard);font-weight:600}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:15px;opacity:0;pointer-events:none;transition:.25s;z-index:4000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<script>
"use strict";
/* ===== config ===== */
const SHEET_ID="1CkeM4UF6ohQdC17AVTNtUoQaM1E6vmnXuEnqgzZVLOs";
const JOBS_TAB="Long Distance Data", STORAGE_TAB="Storage Management", ROUTES_TAB="Routes";
const TRIP_FALLBACK=1, LEAVE_SOON=2, PICKUP_SOON=7, KEEP_PAST_DAYS=60;
const OUR_STATES=["NJ","PA","NY","DE","CT","MA"];
const ZIPDB=window.ZIPDB||{};
let JOBS=[], STORAGE={}, ROUTED=new Set(), TAB="timeline", TLVIEW="timeline", SELJOB=null, BACKHAUL_FOUND=new Set();
const LOCAL = location.hostname===""||location.hostname==="localhost"||location.hostname.indexOf("127.")===0||location.protocol==="file:";
function b64csv(b){ try{ return decodeURIComponent(escape(atob(b))); }catch(e){ try{ return atob(b); }catch(_){ return ""; } } }

/* ===== helpers ===== */
const $=s=>document.querySelector(s);
function esc(x){ return String(x==null?"":x).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function num(s){ if(s==null) return 0; const n=parseFloat(String(s).replace(/[$,]/g,"")); return isFinite(n)?n:0; }
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),3600); }
function pcsv(t){ const rows=[]; let r=[],c="",q=false;
  for(let i=0;i<t.length;i++){ const ch=t[i];
    if(q){ if(ch==='"'){ if(t[i+1]==='"'){c+='"';i++;} else q=false; } else c+=ch; }
    else { if(ch==='"')q=true; else if(ch===","){r.push(c);c="";} else if(ch==="\n"){r.push(c);rows.push(r);r=[];c="";} else if(ch!=="\r")c+=ch; } }
  if(c!==""||r.length){ r.push(c); rows.push(r); } return rows; }
function colmap(H){ const m={}; H.forEach((h,i)=>m[String(h).trim().toLowerCase()]=i); return m; }
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function midnight(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function today0(){ return midnight(new Date()); }
function parseDate(s){ s=String(s||"").trim(); if(!s) return null;
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(m){ let y=+m[3]; if(y<100)y+=2000; return new Date(y,+m[1]-1,+m[2]); } return null; }
function addDays(d,n){ if(!d) return null; const x=midnight(d); x.setDate(x.getDate()+n); return x; }
function daysFromToday(d){ if(!d) return null; return Math.round((midnight(d)-today0())/86400000); }
function fmt(d){ if(!d) return "?"; return MON[d.getMonth()]+" "+d.getDate(); }
function stateZip(s){ s=String(s||"").trim(); const st=(s.match(/[A-Za-z]{2}/)||[""])[0].toUpperCase(); const z=(s.match(/\d{5}/)||[""])[0]; return {state:st,zip:z}; }
function gviz(tab){ return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&headers=1&sheet="+encodeURIComponent(tab)+"&_t="+Date.now(); }

/* ===== data ===== */
function loadJobs(){
  return (LOCAL&&window.LD_LOCAL_JOBS_B64?Promise.resolve(b64csv(window.LD_LOCAL_JOBS_B64)):fetch(gviz(JOBS_TAB)).then(r=>r.text())).then(t=>{
    const rows=pcsv(t); if(rows.length<2){ JOBS=[]; return; }
    const c=colmap(rows[0]); const g=(r,k)=>{ const i=c[k]; return i==null?"":String(r[i]||"").trim(); };
    const out=[];
    rows.slice(1).forEach(r=>{
      const code=g(r,"job code"); if(!code) return;
      const isDelivered=/delivered/i.test(g(r,"is delivered"));
      const fad=parseDate(g(r,"final fad")||g(r,"fad by paper")||g(r,"fad (first available date)"));
      if(isDelivered) return;                              /* delivered to customer = out of planning */
      if(fad && daysFromToday(fad) < -KEEP_PAST_DAYS) return;  /* very old leftovers */
      const pz=stateZip(g(r,"pickup zip code")), dz=stateZip(g(r,"delivery zip code"));
      const jt=g(r,"job type");
      const stor=g(r,"is in storage");
      let trip=parseFloat(g(r,"estimated trip days")); trip=(isFinite(trip)&&trip>0)?trip:null;
      out.push({
        code, customer:g(r,"customer name"),
        type:/straight/i.test(jt)?"straight":"regular",
        eventDate:parseDate(g(r,"event date")),
        pickupState:pz.state, pickupZip:pz.zip, pickupCity:(g(r,"pickup city")||""),
        destState:dz.state, deliveryZip:dz.zip, destCity:(g(r,"moving to")||"").split(",").slice(0,1)[0],
        fad, timeframeRaw:g(r,"delivery time frame"),
        cf:num(g(r,"final cf"))||num(g(r,"estimated cf")), tripDays:trip,
        foreman:g(r,"forman"), carrier:g(r,"carrier"), carrierRate:g(r,"rate"),
        isDelivery:g(r,"is delivery"), pickupJobCode:g(r,"pickup job code"), eventTitle:g(r,"event title"), requestNo:g(r,"request #"),
        isDelivered:g(r,"is delivered"),
        inStorage:/true|yes|^y$|^1$/i.test(stor)||stor.charCodeAt(0)===10003,
        storLabel:g(r,"storage location label")||g(r,"storage location type")
      });
    });
    JOBS=out;
  }).catch(e=>{ JOBS=[]; });
}
function loadKV(tab, build, localB64){
  return (LOCAL&&localB64?Promise.resolve(b64csv(localB64)):fetch(gviz(tab)).then(r=>r.ok?r.text():"")).then(t=>{
    const s={}; try{ const rows=pcsv(t); if(rows.length<2) return s; const c=colmap(rows[0]); const g=(r,k)=>{ const i=c[k]; return i==null?"":String(r[i]||"").trim(); }; rows.slice(1).forEach(r=>build(s,g,r)); }catch(e){} return s;
  }).catch(()=>({}));
}
function loadStorage(){ return loadKV(STORAGE_TAB,(s,g,r)=>{ const code=g(r,"job code"); if(code) s[code]={ address:g(r,"storage address")||g(r,"address"), location:g(r,"storage location")||g(r,"storage location label"), unit:g(r,"storage unit")||g(r,"unit number"), cf:g(r,"storage cf")||g(r,"chargeable cf") }; }, window.LD_LOCAL_STORAGE_B64).then(s=>{STORAGE=s;}); }
function loadRoutes(){ return loadKV(ROUTES_TAB,(s,g,r)=>{ String(g(r,"job codes")||"").split(/[,;]+/).forEach(x=>{ x=x.trim(); if(x)s[x]=1; }); }).then(s=>{ ROUTED=new Set(Object.keys(s)); }).catch(()=>{}); }
/* ===== Google sign-in + Sheets write (persist accepted routes) ===== */
const G_CLIENT_ID="712386117874-epqesoppk5fftq0j2gpp7becbk7cu72q.apps.googleusercontent.com", G_SCOPE_VER="ld-sheets-1";
let GTOKEN=null,GTOKEXP=0,_gtc=null;
try{ const _g=JSON.parse(localStorage.getItem("ld_gtok")||"null"); if(_g&&_g.scope===G_SCOPE_VER&&_g.exp>Date.now()+60000){ GTOKEN=_g.t; GTOKEXP=_g.exp; } }catch(e){}
function gReady(){ return !!(window.google&&google.accounts&&google.accounts.oauth2); }
function ensureGToken(cb){
  if(GTOKEN&&Date.now()<GTOKEXP-60000) return cb();
  if(window._gsiFail||!gReady()){ toast("Google sign-in could not load here - open the hosted URL."); return; }
  _gtc=_gtc||google.accounts.oauth2.initTokenClient({client_id:G_CLIENT_ID,scope:"https://www.googleapis.com/auth/spreadsheets",callback:()=>{}});
  _gtc.callback=resp=>{ if(resp&&resp.access_token){ GTOKEN=resp.access_token; GTOKEXP=Date.now()+((resp.expires_in||3600)*1000); try{ localStorage.setItem("ld_gtok",JSON.stringify({t:GTOKEN,exp:GTOKEXP,scope:G_SCOPE_VER})); localStorage.setItem("ld_gconn",G_SCOPE_VER); }catch(e){} cb(); } else { toast("Sign-in failed"+((resp&&resp.error)?(": "+resp.error):"")); } };
  _gtc.requestAccessToken({prompt:localStorage.getItem("ld_gconn")===G_SCOPE_VER?"":"consent"});
}
async function shFetch(path,opt){ if(!GTOKEN)throw new Error("not connected"); const r=await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+path,Object.assign({headers:{"Authorization":"Bearer "+GTOKEN,"Content-Type":"application/json"}},opt||{})); if(!r.ok){ let b=""; try{b=await r.text();}catch(_){} let m=b; try{ const j=JSON.parse(b); if(j&&j.error&&j.error.message)m=j.error.message; }catch(_){} throw new Error("Sheets API "+r.status+(m?(" - "+m):"")); } return r.status===204?null:r.json(); }
async function shValues(tab){ try{ return (await shFetch("/values/"+encodeURIComponent("'"+tab+"'")+"?valueRenderOption=FORMATTED_VALUE")).values||[]; }catch(e){ if(/Unable to parse range|400/.test(String(e&&e.message)))return []; throw e; } }
async function shAppendRow(tab,obj){
  let vals; try{ vals=await shValues(tab); }catch(e){ vals=[]; }
  let header=vals[0]||[];
  if(!header.length){ try{ await shFetch(":batchUpdate",{method:"POST",body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})}); }catch(e){} header=Object.keys(obj); await shFetch("/values/"+encodeURIComponent("'"+tab+"'!A1")+"?valueInputOption=USER_ENTERED",{method:"PUT",body:JSON.stringify({values:[header]})}); }
  else { const miss=Object.keys(obj).filter(k=>header.indexOf(k)<0); if(miss.length){ header=header.concat(miss); await shFetch("/values/"+encodeURIComponent("'"+tab+"'!A1")+"?valueInputOption=USER_ENTERED",{method:"PUT",body:JSON.stringify({values:[header]})}); } }
  const row=header.map(h=>obj[h]!=null?String(obj[h]):""); await shFetch("/values/"+encodeURIComponent("'"+tab+"'")+":append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS",{method:"POST",body:JSON.stringify({values:[row]})});
}
function persistRoute(s){ if(!s) return; const rid="R"+Date.now().toString(36).slice(-5).toUpperCase(); const obj={"Route ID":rid,"Job Codes":s.codes.join(", "),"Truck":s.truck.n,"CF":Math.round(s.cf),"Stops":s.codes.length,"Created":new Date().toISOString().slice(0,10)}; toast("Saving route to the sheet..."); ensureGToken(()=>{ shAppendRow(ROUTES_TAB,obj).then(()=>{ s.codes.forEach(c=>ROUTED.add(c)); toast("Route "+rid+" saved - "+s.codes.length+" jobs."); renderRoutes(); computeAll(); }).catch(e=>{ toast("Save failed: "+((e&&e.message)||e)); }); }); }

/* ===== the engine: four separate dimensions per spec ===== */
function parseTimeframe(raw, fad){
  const s=String(raw||"").trim(); if(!s) return null;
  const m=s.match(/(\d{1,2}\/\d{1,2}\/\d{2,4})\s*[-to ]+\s*(\d{1,2}\/\d{1,2}\/\d{2,4})/i);
  if(m) return {end:parseDate(m[2]), label:s};
  const n=s.match(/(\d{1,3})/);
  if(n&&fad) return {end:addDays(fad,+n[1]), days:+n[1], label:n[1]+" days"};
  return null;
}
function computeJob(j){
  const isS=j.type==="straight";
  /* data gaps */
  const gaps=[];
  if(!j.fad) gaps.push("FAD");
  const tf=parseTimeframe(j.timeframeRaw,j.fad);
  if(!isS && !tf) gaps.push("Delivery timeframe");
  if(!j.destState && !j.deliveryZip) gaps.push("Delivery ZIP");
  if(!j.cf) gaps.push("CF");
  const critGap = gaps.indexOf("FAD")>=0 || (!isS && gaps.indexOf("Delivery timeframe")>=0);
  /* delivery model: Straight = fixed date; Regular = window */
  let deliverDate=null, winStart=null, winEnd=null, departBy=null, deliverLabel="", deliverSub="";
  if(isS){
    deliverDate=j.fad;
    departBy=j.fad?addDays(j.fad,-(j.tripDays||TRIP_FALLBACK)):null;
    deliverLabel=j.fad?("Deliver "+fmt(j.fad)):"No delivery date";
    deliverSub=j.fad?("fixed date · depart by "+fmt(departBy)+(j.tripDays?"":" (trip days assumed)")):"critical data gap";
  } else {
    winStart=j.fad; winEnd=tf?tf.end:null;
    deliverLabel=(winStart&&winEnd)?("Window "+fmt(winStart)+" – "+fmt(winEnd)):(winStart?("FAD "+fmt(winStart)):"No FAD");
    deliverSub=(winStart&&winEnd)?"flexible delivery window":(winStart?"missing timeframe — window unknown":"critical data gap");
  }
  /* operational state, computed (NOT from Current Location) */
  const dPick=daysFromToday(j.eventDate);
  let state;
  if(j.carrier) state="At Carrier";
  else if(j.inStorage) state="In Storage";
  else if(dPick==null) state="Unknown";
  else if(dPick>0) state="Not Picked Up";
  else if(dPick===0) state="Pickup Today";
  else state="Picked Up";
  /* urgency, priority order from spec */
  const dDeliver=isS?daysFromToday(deliverDate):null;
  const dWinEnd=!isS?daysFromToday(winEnd):null;
  const dDepart=isS?daysFromToday(departBy):null;
  let urg;
  if(critGap) urg={lvl:"gap",txt:"Missing data"};
  else if(isS && dDeliver!=null && dDeliver<0) urg={lvl:"red",txt:"Delivery date passed"};
  else if(!isS && dWinEnd!=null && dWinEnd<0) urg={lvl:"red",txt:"Delivery window expired"};
  else if(isS && dDepart!=null && dDepart<=0) urg={lvl:"red",txt:"Departure passed"};
  else if(state==="Pickup Today") urg={lvl:"amber",txt:"Pickup today"};
  else if(!isS && !j.carrier && dPick!=null && dPick>=0 && dPick<=PICKUP_SOON) urg={lvl:"amber",txt:"Carrier / route decision before pickup"};
  else if(j.inStorage && isS && dDepart!=null && dDepart<=LEAVE_SOON) urg={lvl:"amber",txt:"Pull from storage"};
  else if(isS && dDepart!=null && dDepart<=LEAVE_SOON) urg={lvl:"amber",txt:"Departure soon"};
  else urg={lvl:"green",txt:"On track"};
  /* route status (separate from urgency) */
  let route;
  if(ROUTED.has(j.code)) route="Accepted Route";
  else if(state==="At Carrier") route="—";
  else if(isS || winEnd) route="Route Candidate";
  else route="Not Routed";
  /* recommended action, plain language */
  const action=recAction(j,{isS,state,urg,gaps,deliverDate,winStart,winEnd,departBy,route,dPick,dDepart});
  return {isS,state,urg,route,action,gaps,critGap,deliverLabel,deliverSub,winEnd};
}
function recAction(j,c){
  if(c.gaps.length) return "Fix data: "+c.gaps.join(", ");
  if(c.state==="At Carrier") return "Track delivery in Carrier Watch";
  if(c.isS && c.urg.txt==="Delivery date passed") return "Deliver now — "+fmt(c.deliverDate)+" deadline is overdue";
  if(!c.isS && c.urg.txt==="Delivery window expired") return "Deliver now — delivery window has closed";
  if(c.isS && c.dDepart!=null && c.dDepart<=0) return "Start moving now — deliver "+fmt(c.deliverDate);
  if(c.isS && c.dDepart!=null && c.dDepart<=LEAVE_SOON) return "Plan departure by "+fmt(c.departBy);
  if(!c.isS && !j.carrier) return "Decide: assign carrier, or convert to Straight and route it";
  if(!c.isS && c.route==="Route Candidate") return "Consider converting Regular → Straight (route it within the window)";
  if(c.isS && !j.foreman) return "Assign foreman";
  if(j.inStorage) return "In storage — pull before route departure";
  if(c.state==="Not Picked Up") return "Scheduled — plan route or carrier";
  if(c.state==="Picked Up") return "In our possession — plan delivery or route";
  return "On track";
}
function groupOf(c){
  if(c.state==="At Carrier") return "carrier";
  if(c.route==="Accepted Route") return "accepted";
  if(c.critGap) return "data";
  if(c.urg.lvl==="red") return "critical";
  if(c.state==="Pickup Today"||c.state==="Not Picked Up") return "pickup";
  if(c.state==="Picked Up"||c.state==="In Storage") return "possession";
  return "candidates";
}
const GROUPS=[
  ["critical","Critical — needs action today"],
  ["data","Data gaps — blocking planning"],
  ["pickup","Pickup today / upcoming"],
  ["possession","In our possession"],
  ["candidates","Route candidates"],
  ["accepted","Accepted routes"]
];

/* ===== render ===== */
function pathLine(j){ return esc(j.pickupState||"?")+" "+esc(j.pickupZip||"")+" &#8594; "+esc(j.destState||"?")+" "+esc(j.deliveryZip||""); }
function jobCard(j,c){
  const u="u-"+c.urg.lvl;
  let chips='<span class="chip state"><i></i>'+esc(c.state)+'</span>';

/* ===== timeline (Straight fixed date vs Regular window) ===== */
function tlStart(){ return new Date(TLSTART||midnight(new Date())); }

function curveP(a,b,sg,sc){ sg=sg||1;sc=sc||1;const n=24,p=[],mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2,dx=b[0]-a[0],dy=b[1]-a[1],ln=Math.hypot(dx,dy)||1e-9,bw=Math.min(ln*0.18*sc,0.10*sc)*sg,cx=mx-dy/ln*bw,cy=my+dx/ln*bw;for(let i=0;i<=n;i++){const u=i/n;p.push([(1-u)*(1-u)*a[0]+2*(1-u)*u*cx+u*u*b[0],(1-u)*(1-u)*a[1]+2*(1-u)*u*cy+u*u*b[1]]);}return p; }

function initMap2(){ if(LMAP||typeof L==="undefined")return; const el=$("#map"); if(!el)return; try{ LMAP=L.map("map",{zoomControl:true}); L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"OpenStreetMap, CARTO"}).addTo(LMAP); LMAP.setView([39.5,-83],5); LLAYER=L.layerGroup().addTo(LMAP);}catch(e){LMAP=null;} }

(function(){ const tm=$("#tlmain"); if(!tm) return; let drag=false,sx=0,sStart=null,moved=false,calW=0,raf=0;
