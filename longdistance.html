<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Distance Planning &mdash; Zip To Zip</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onerror="window._gsiFail=1"></script>
<style>
:root{--bg:#F7F6F2;--paper:#F7F6F2;--card:#FFFFFF;--ink:#1F2329;--dim:#646B73;--faint:#969CA3;
  --line:#E6E4DC;--line2:#D3D0C6;
  --fleet:#6E9220;--fleet-bg:#F3F8E4;--fleet-bd:#D3E3A6;
  --rental:#B26B0B;--rental-bg:#FBF0DC;--rental-bd:#EDD6A8;
  --hazard:#B3362A;--hazard-bg:#FBE9E6;--hazard-bd:#F0C7C0;
  --travel:#6C5CE0;--travel-bg:#EFECFB;--travel-bd:#D6D0F5;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px;border:2px solid var(--paper)}
/* header */
header{display:flex;align-items:center;gap:16px;padding:13px 26px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1100;flex-wrap:wrap}
.back{flex:0 0 auto;width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line2);background:var(--card);color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;font-family:'Barlow Condensed'}
.back:hover{border-color:var(--ink);color:var(--ink)}
#brandlogo{height:40px;width:auto;display:block}
header h1{font-family:'Barlow Condensed';font-weight:600;font-size:29px;letter-spacing:.05em;text-transform:uppercase;line-height:1}
.hsub{color:var(--dim);font-size:14px}
.views{display:flex;gap:9px;margin-left:6px}
.vbtn{background:var(--card);border:1.5px solid var(--line2);border-radius:9px;font-family:'Inter';font-weight:600;font-size:15px;padding:8px 14px;cursor:pointer;color:var(--ink)}
.vbtn:hover{border-color:var(--ink)}
.vbtn.on{background:#8CAF2C;border-color:#8CAF2C;color:#15200A;font-weight:800}
.stats{display:flex;align-items:stretch;margin-left:auto}
.stat{display:flex;flex-direction:column;justify-content:center;gap:2px;padding:0 20px;border-left:1px solid var(--line)}
.stat:first-child{border-left:none}
.stat .v{font-family:'Barlow Condensed';font-weight:600;font-size:32px;line-height:1}
.stat .v.amber{color:var(--rental)}.stat .v.red{color:var(--hazard)}.stat .v.teal{color:var(--fleet)}
.stat .l{white-space:nowrap;color:var(--faint);font-size:13px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
#refreshbtn{background:var(--card);border:1.5px solid var(--line2);color:var(--ink);font-family:'Inter';font-weight:500;font-size:15px;padding:9px 14px;border-radius:10px;cursor:pointer;margin-left:14px}
#refreshbtn:hover{border-color:var(--ink)}
#rfstamp{font-size:13px;color:var(--faint);margin-left:10px}
/* rail */
.rail{padding:20px 26px 90px;max-width:1180px;margin:0 auto}
.railhead h2{font-family:'Barlow Condensed';font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:6px}
.basesec{margin:24px 0 13px;display:flex;align-items:baseline;gap:12px;border-bottom:2.5px solid var(--ink);padding-bottom:7px}
.basesec:first-child{margin-top:8px}
.basesec h3{font-family:'Barlow Condensed';font-size:25px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.basesec .meta{margin-left:auto;font-size:15px;color:var(--dim);font-weight:500}
/* card (dispatch route card) */
.card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--faint);border-radius:13px;padding:16px 20px;margin-bottom:14px;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 14px rgba(31,35,41,.08)}
.card.st-fleet{border-left-color:var(--fleet)}.card.st-rental{border-left-color:var(--rental)}.card.st-hazard{border-left-color:var(--hazard)}.card.st-travel{border-left-color:var(--travel)}
.cardtop{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.rpill{font-family:'IBM Plex Mono';font-size:14.5px;font-weight:500;color:var(--dim);border:1px solid var(--line2);border-radius:6px;padding:2px 8px}
.pathline{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
.jp{font-family:'Barlow Condensed';font-weight:600;font-size:21px;letter-spacing:.02em}
.jp.dest{color:var(--rental)}
.ja{color:var(--faint);font-size:16px}
.ldtag{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 9px;border-radius:6px}
.ldtag.straight{background:var(--rental-bg);color:var(--rental);border:1px solid var(--rental-bd)}
.ldtag.regular{background:var(--paper);color:var(--dim);border:1px solid var(--line2)}
.statwrap{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:1px;text-align:right}
.spill{font-size:14px;font-weight:700;letter-spacing:.02em;padding:3px 11px;border-radius:7px;white-space:nowrap}
.spill.hazard{background:var(--hazard-bg);color:var(--hazard);border:1px solid var(--hazard-bd)}
.spill.rental{background:var(--rental-bg);color:var(--rental);border:1px solid var(--rental-bd)}
.spill.fleet{background:var(--fleet-bg);color:var(--fleet);border:1px solid var(--fleet-bd)}
.spill.travel{background:var(--travel-bg);color:var(--travel);border:1px solid var(--travel-bd)}
.swhy{font-size:12.5px;color:var(--faint)}
.metaline{margin:9px 0 3px;font-size:15.5px;color:var(--dim)}
.metaline b{color:var(--ink);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 0}
.chip{font-size:14.5px;font-weight:500;color:var(--dim);background:var(--paper);border:1px solid var(--line);padding:3px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
.chip.warn{color:var(--hazard);border-color:var(--hazard-bd);background:var(--hazard-bg);font-weight:600}
.chip.data{color:var(--rental);border-color:var(--rental-bd);background:var(--rental-bg);font-weight:600;cursor:pointer}
.chip.stor{color:#8A530A;border-color:var(--rental-bd);background:var(--rental-bg);cursor:pointer}
.chip.ov{color:var(--travel);border-color:var(--travel-bd);background:var(--travel-bg)}
/* assignment block */
.assign{border-top:1px solid var(--line);margin-top:13px;padding-top:13px;display:flex;gap:13px;align-items:center;flex-wrap:wrap}
.arow{display:flex;gap:12px;align-items:center;flex:1;min-width:240px}
.aico{width:44px;height:44px;border-radius:50%;background:var(--paper);border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:600;font-size:16px;flex-shrink:0;color:var(--dim)}
.aico.teal{color:var(--fleet);border-color:var(--fleet-bd);background:var(--fleet-bg)}
.aico.amber{color:var(--hazard);border-color:var(--hazard-bd);background:var(--hazard-bg)}
.atext .t{font-size:16.5px;font-weight:600;line-height:1.3}
.atext .s{font-size:14px;color:var(--dim)}
.vbadge{display:inline-flex;align-items:center;gap:9px;font-size:15px;color:var(--ink)}
.vbadge .b{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:600;font-size:15px;border:1.5px solid var(--fleet-bd);background:var(--fleet-bg);color:var(--fleet)}
.abtn{background:var(--card);border:1.5px solid var(--line2);border-radius:9px;font-family:'Inter';font-weight:600;font-size:14.5px;padding:8px 14px;cursor:pointer;color:var(--ink)}
.abtn:hover{border-color:var(--ink)}
.abtn.amber{border-color:var(--hazard-bd);color:var(--hazard);background:var(--hazard-bg)}
.abtn.amber:hover{background:var(--hazard);color:#fff}
.empty{padding:54px 20px;text-align:center;color:var(--dim);background:var(--card);border:1px solid var(--line);border-radius:14px}
.empty b{display:block;font-family:'Barlow Condensed';font-size:21px;color:var(--ink);margin-bottom:6px}
/* route / journey map */
.layout{display:flex;align-items:flex-start}
.rail{flex:1 1 auto;min-width:0}
.layout.mapon .rail{max-width:none;margin:0}
#mapwrap{flex:0 0 auto;width:0;overflow:hidden;position:sticky;top:65px;height:calc(100vh - 65px);transition:width .4s cubic-bezier(.22,.8,.3,1);border-left:0 solid var(--line)}
.layout.mapon #mapwrap{width:46vw;border-left-width:1px}
@media(max-width:900px){.layout{flex-direction:column}#mapwrap{position:relative;top:0;height:0;width:100%!important;border-left:none}.layout.mapon #mapwrap{height:60vh}}
#map{width:100%;height:100%;background:#E9F0F1}
.leaflet-container{font-family:'Inter'}.leaflet-tile-pane{filter:saturate(.88)}
.vizbtn{background:var(--fleet-bg);border:1px solid var(--fleet-bd);color:var(--fleet);font-family:'Inter';font-weight:600;font-size:14.5px;padding:6px 12px;border-radius:8px;cursor:pointer}
.vizbtn:hover{background:var(--fleet);color:#fff}
.vizbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}
.pmark{width:15px;height:15px;border-radius:50%;background:#1F2329;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dmark{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#fff;border:3px solid var(--rental);font-family:'Barlow Condensed';font-weight:600;font-size:13px;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.2)}
.dmark.f{border-color:var(--travel)}
.maplegend{position:absolute;left:14px;bottom:14px;display:flex;gap:16px;font-size:13.5px;color:var(--dim);background:rgba(255,255,255,.94);padding:9px 14px;border:1px solid var(--line);border-radius:10px;z-index:600}
.maplegend span{display:flex;align-items:center;gap:7px}.maplegend i{width:20px;border-top:3px solid;border-radius:2px}
.mapcard{position:absolute;left:14px;top:14px;z-index:600;background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:12px;padding:14px 18px;max-width:min(440px,62%);box-shadow:0 4px 16px rgba(0,0,0,.09)}
.mapcard .mt{font-family:'Barlow Condensed';font-weight:600;font-size:21px;letter-spacing:.02em}
.mapcard .ms{font-size:14.5px;color:var(--dim);margin-top:4px;line-height:1.5}
.mapcard .step{font-size:14.5px;display:flex;gap:9px;position:relative;padding-left:16px;margin-top:7px;line-height:1.4}
.mapcard .step .dot{position:absolute;left:0;top:6px;width:9px;height:9px;border-radius:50%;background:var(--ink)}
.mapcard .step:not(:last-child)::after{content:'';position:absolute;left:4px;top:16px;bottom:-8px;width:1.5px;background:var(--line2)}
.mapfull{position:absolute;top:12px;right:12px;z-index:700;background:var(--card);border:1.5px solid var(--line2);border-radius:9px;font:600 14px Inter;padding:7px 11px;cursor:pointer;color:var(--ink)}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(31,34,38,.45);display:flex;align-items:center;justify-content:center;z-index:3000;padding:18px}
.mbox{background:var(--card);border-radius:16px;max-width:480px;width:100%;padding:22px 26px;box-shadow:0 24px 60px rgba(0,0,0,.3);position:relative}
.mbox h3{font-family:'Barlow Condensed';font-weight:600;font-size:23px;letter-spacing:.03em;margin-bottom:14px}
.mx{position:absolute;top:14px;right:16px;border:0;background:none;font-size:20px;cursor:pointer;color:var(--dim)}
.mrow{font-size:15.5px;margin:6px 0}.mrow .k{color:var(--faint);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.05em}
.mfield{margin:13px 0;display:flex;flex-direction:column;gap:6px}
.mfield label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.mfield input,.mfield select{font:inherit;font-size:15.5px;padding:10px 12px;border:1.5px solid var(--line2);border-radius:9px;background:var(--card);color:var(--ink);width:100%}
.mfoot{margin-top:16px;display:flex;gap:10px;justify-content:flex-end}
.mbtn.dark{background:var(--ink);border-color:var(--ink);color:#fff}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:15px;opacity:0;pointer-events:none;transition:.25s;z-index:4000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* timeline (gantt) */
#timelinewrap{padding:18px 26px 90px}
.tlbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:15px}
.tlnav{display:inline-flex;border:1px solid var(--line2);border-radius:11px;overflow:hidden;background:var(--card)}
.tlnav button{font:600 14px Inter;border:0;border-right:1px solid var(--line2);background:none;color:var(--ink);padding:7px 13px;cursor:pointer;transition:.14s}
.tlnav button:last-child{border-right:0}
.tlnav button:hover{background:var(--paper)}
.tlnav .tltodaybtn{font-weight:700}
.tlrange{font-family:'Barlow Condensed';font-weight:600;font-size:21px;letter-spacing:.01em;color:var(--ink)}
.tlsub{font-size:13px;color:var(--dim)}.tlsub b{color:var(--hazard);font-weight:700}
.tllegend{display:flex;gap:13px;flex-wrap:wrap;font-size:11.5px;color:var(--dim);margin-left:auto}
.tllegend span{display:flex;align-items:center;gap:6px}.tllegend i{width:15px;height:9px;border-radius:3px;flex:0 0 auto}
@keyframes tlfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tlgrid{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--card);box-shadow:0 6px 22px -12px rgba(31,34,38,.2),0 1px 3px rgba(31,34,38,.05);animation:tlfade .35s cubic-bezier(.22,.8,.3,1) both}
.tlhead{display:flex;height:38px;background:var(--paper);border-bottom:1px solid var(--line2);position:sticky;top:0;z-index:7}
.tlrow{display:flex;min-height:60px;border-bottom:1px solid var(--line);transition:background .14s}
.tlrow:last-child{border-bottom:none}
.tlrow:hover{background:#FAFAF8}
.tlrow.act{box-shadow:inset 3px 0 0 var(--hazard);background:linear-gradient(90deg,rgba(179,54,42,.04),transparent 300px)}
.tlrow.wn{box-shadow:inset 3px 0 0 var(--rental)}
.tllab{width:266px;flex:0 0 266px;border-right:1px solid var(--line);padding:8px 16px;display:flex;align-items:center;gap:12px}
.tlhlab{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em}
.tlav{width:34px;height:34px;flex:0 0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 12.5px Inter;color:#fff;background:#1E8E7E}
.tlav.car{background:var(--rental)}
.tlav.none{background:transparent;color:var(--faint);border:1.5px dashed var(--line2);font-size:18px;font-weight:400}
.tlinfo{min-width:0;display:flex;flex-direction:column;gap:2px}
.tll1{display:flex;align-items:baseline;gap:8px}
.tll1 .code{font-family:'IBM Plex Mono';font-weight:600;font-size:13.5px;letter-spacing:-.02em;color:var(--ink)}
.tlcf{font-size:11px;color:var(--faint);font-weight:600;white-space:nowrap}
.tlcust{font-size:13.5px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tlroute{font-size:11.5px;color:var(--faint);font-weight:600;letter-spacing:.03em;display:flex;align-items:center;gap:5px}
.tlroute b{color:var(--line2);font-weight:700}.tlroute .stp{color:var(--travel);opacity:.85}
.tlchip{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px 3px 8px;border-radius:20px;margin-top:1px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.tlchip i{width:6px;height:6px;border-radius:50%;flex:0 0 auto}
.tlchip.al{color:var(--hazard);background:var(--hazard-bg)}.tlchip.al i{background:var(--hazard)}
.tlchip.wn{color:var(--rental);background:var(--rental-bg)}.tlchip.wn i{background:var(--rental)}
.tltrack{position:relative;flex:1 1 auto;min-width:0;overflow:hidden;background-image:repeating-linear-gradient(to right,rgba(31,34,38,.045) 0 1px,transparent 1px calc(100%/6)),repeating-linear-gradient(to right,rgba(31,34,38,.013) 0 1px,transparent 1px calc(100%/42))}
.tlhtrack{background-image:repeating-linear-gradient(to right,rgba(31,34,38,.045) 0 1px,transparent 1px calc(100%/6))}
.tlpast{position:absolute;left:0;top:0;bottom:0;background:rgba(31,34,38,.028);z-index:0}
.tlwk{position:absolute;top:11px;font-size:12px;color:var(--dim);font-weight:600;padding-left:7px;font-family:'Barlow Condensed';letter-spacing:.03em}
.tltoday{position:absolute;top:0;bottom:0;width:2px;background:var(--hazard);z-index:2;opacity:.38}
.tlhead .tltoday{opacity:.85}
.tlnow{position:absolute;top:6px;width:9px;height:9px;border-radius:50%;background:var(--hazard);transform:translateX(-50%);z-index:8;box-shadow:0 0 0 3px rgba(179,54,42,.16)}
.tlconn{position:absolute;top:50%;height:2px;transform:translateY(-50%);background:rgba(31,34,38,.13);border-radius:2px;z-index:1}
.tlb{position:absolute;top:50%;transform:translateY(-50%);height:23px;min-width:52px;border-radius:7px;cursor:pointer;box-sizing:border-box;z-index:3;display:flex;align-items:center;padding:0 10px;font-size:11.5px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;box-shadow:inset 3px 0 0 rgba(0,0,0,.18),0 1px 2px rgba(31,34,38,.13);transition:box-shadow .14s}
.tlb:hover{box-shadow:inset 3px 0 0 rgba(0,0,0,.18),0 3px 9px rgba(31,34,38,.22);z-index:5}
.tlb.deliv{background:#B26B0B}
.tlb.deliv.carrier{background:#3E7CB1}
.tlb.deliv.ghost{background:transparent;border:1.5px dashed #3E7CB1;color:#3E7CB1;box-shadow:none;font-weight:700}
.tlb.deliv.late{background:var(--hazard)}
.tlb.deliv.noevent{background:#fff;border:1.5px dashed var(--hazard);color:var(--hazard);box-shadow:none;font-weight:700;cursor:default}
.tlb.pick{width:15px!important;min-width:0;height:15px;padding:0;border-radius:50%;background:#2E333A;border:2.5px solid #fff;box-shadow:0 1px 3px rgba(31,34,38,.3);z-index:4}
.tlb.pick:hover{transform:translateY(-50%) scale(1.16)}
.tlb.pick.noev{opacity:.4;cursor:default}
.tlbar-stor{position:absolute;top:50%;transform:translateY(-50%);height:27px;border-radius:8px;background:repeating-linear-gradient(45deg,rgba(108,92,224,.15) 0 8px,rgba(108,92,224,.03) 8px 16px);border:1px solid rgba(108,92,224,.26);z-index:1;display:flex;align-items:center;padding-left:11px;font-size:11px;font-weight:600;color:#5A4FB8;white-space:nowrap;overflow:hidden}
.tldep{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;transform:translateY(-50%);background:#B26B0B;border:2px solid #fff;box-shadow:0 1px 3px rgba(31,34,38,.3);z-index:5}
/* map view */
#ldfilter{font:600 13.5px Inter;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:9px;padding:7px 10px;cursor:pointer}
#mapviewwrap{padding:0 26px 30px}
.mvbar{display:flex;align-items:center;gap:18px;padding:12px 2px;font-size:12.5px;color:var(--dim);flex-wrap:wrap}
.mvlegend{display:flex;align-items:center;gap:7px}
.mvlegend i{width:18px;height:4px;border-radius:2px}.mvlegend .ic-s{background:#B26B0B}.mvlegend .ic-c{background:#3E7CB1}.mvlegend .ic-a{background:#C0392B}
.mvcount{margin-left:auto;font-weight:600;color:var(--ink)}
#ldmap{width:100%;height:calc(100vh - 215px);min-height:440px;border:1px solid var(--line);border-radius:16px;background:#E9F0F1;box-shadow:0 6px 22px -12px rgba(31,34,38,.2)}
.dmark2{display:flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 6px;border-radius:13px;background:#fff;border:2.5px solid #B26B0B;font-family:'Barlow Condensed';font-weight:600;font-size:12.5px;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.25);white-space:nowrap}
.dmark2.c{border-color:#3E7CB1}.dmark2.a{border-color:#C0392B}

<script>

};

const ASSIGN_DAYS = 7, LEAVE_SOON = 2, BACKHAUL_DAYS = 2, BACKHAUL_MIN = 300;
const SHEET_ID = "1CkeM4UF6ohQdC17AVTNtUoQaM1E6vmnXuEnqgzZVLOs";
const JOBS_TAB = "Long Distance Data", STORAGE_TAB = "Storage Management";
const ROUTES_TAB = "Routes", ASSIGN_TAB = "LD Assignments", BACKHAUL_TAB = "LD Backhaul";
const GCLIENT = "712386117874-epqesoppk5fftq0j2gpp7becbk7cu72q.apps.googleusercontent.com";
const ZIPDB = window.ZIPDB || {};
const LOCAL = location.hostname===""||location.hostname==="localhost"||location.hostname.indexOf("127.")===0||location.protocol==="file:";
function b64csv(b){ try{ return decodeURIComponent(escape(atob(b))); }catch(e){ try{ return atob(b); }catch(_){ return ""; } } }
let JOBS = [], STORAGE = {}, ROUTED = new Set(), ASSIGN = {}, BACKHAUL = {}, ROUTES = [];
let GTOKEN = null, GTOKEXP = 0, _tc = null;
let LMAP = null, LLAYER = null, VIZ = null;
let VIEW = "board", TLSTART = null; const TLDAYS = 42;
let FILTER = "all", FILTERREG = "all", FILTERST = "all", FILTERTY = "all", LMAP2 = null, LLAYER2 = null;
const ROUTE_WINDOW = 5;
const REGIONS = {Northeast:["NJ","NY","PA","CT","MA","RI","NH","VT","ME","DE","MD","DC"],Southeast:["VA","NC","SC","GA","FL","TN","KY","WV","AL","MS"],Midwest:["OH","MI","IN","IL","WI","MN","IA","MO","KS","NE","ND","SD"],South:["TX","OK","AR","LA","NM"],West:["CA","AZ","NV","UT","CO","WY","MT","ID","OR","WA"]};
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
try { const g = JSON.parse(localStorage.getItem("zd_ldtok") || "null"); if (g && g.exp > Date.now()+60000){ GTOKEN=g.t; GTOKEXP=g.exp; } } catch(e){}

const $ = s => document.querySelector(s);
function esc(x){ return String(x==null?"":x).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),4200); }
function num(s){ if(s==null) return 0; const n=parseFloat(String(s).replace(/[$,]/g,"")); return isFinite(n)?n:0; }
function pcsv(t){
  const rows=[]; let r=[], c="", q=false;
  for(let i=0;i<t.length;i++){ const ch=t[i];
    if(q){ if(ch==='"'){ if(t[i+1]==='"'){ c+='"'; i++; } else q=false; } else c+=ch; }
    else { if(ch==='"') q=true; else if(ch===","){ r.push(c); c=""; } else if(ch==="\n"){ r.push(c); rows.push(r); r=[]; c=""; } else if(ch!=="\r") c+=ch; }
  }
  if(c!==""||r.length){ r.push(c); rows.push(r); }
  return rows;
}
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function midnight(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function today0(){ return midnight(new Date()); }
function parseDate(s){
  s=String(s||"").trim(); if(!s) return null;
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(m){ let y=+m[3]; if(y<100)y+=2000; return new Date(y,+m[1]-1,+m[2]); }
  return null;
}
function fmtMDY(d){ if(!d) return ""; return ("0"+(d.getMonth()+1)).slice(-2)+"/"+("0"+d.getDate()).slice(-2)+"/"+String(d.getFullYear()).slice(-2); }
function daysFromToday(d){ if(!d) return null; return Math.round((midnight(d)-today0())/86400000); }
function weekStart(d){ const x=midnight(d); x.setDate(x.getDate()-x.getDay()); return x; }
function geo(zip){ zip=String(zip||"").replace(/\D/g,"").slice(0,5).padStart(5,"0"); const z=ZIPDB[zip]; return z?{lat:z[0],lon:z[1],city:z[2],state:z[3]}:null; }
function stateZip(s){ s=String(s||"").trim(); const st=(s.match(/[A-Za-z]{2}/)||[""])[0].toUpperCase(); const z=(s.match(/\d{5}/)||[""])[0]; return {state:st,zip:z}; }
function gviz(tab){ return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&headers=1&sheet="+encodeURIComponent(tab)+"&_t="+Date.now(); }
function colmap(H){ const m={}; H.forEach((h,i)=>m[String(h).trim().toLowerCase()]=i); return m; }
function modal(title, body, foot){
  const host=$("#modalhost");
  host.innerHTML='<div class="mbg"><div class="mbox"><button class="mx">&#10005;</button><h3>'+esc(title)+'</h3><div>'+body+'</div>'+(foot?'<div class="mfoot">'+foot+'</div>':'')+'</div></div>';
  const bg=host.querySelector(".mbg");
  bg.addEventListener("click", e=>{ if(e.target===bg) host.innerHTML=""; });
  host.querySelector(".mx").onclick=()=>host.innerHTML="";
}
function closeModal(){ $("#modalhost").innerHTML=""; }
function ensureToken(cb){
  if(GTOKEN && Date.now()<GTOKEXP-60000) return cb();
  if(window._gsiFail || !(window.google && google.accounts && google.accounts.oauth2))
    return modal("Sign-in needed", '<div class="mrow">Open this on the hosted GitHub Pages URL to sign in. Reading works without it; saving needs a quick Google sign-in.</div>');
  _tc = _tc || google.accounts.oauth2.initTokenClient({ client_id:GCLIENT, scope:"https://www.googleapis.com/auth/spreadsheets", callback:()=>{} });
  _tc.callback = resp => {
    if(resp && resp.access_token){
      GTOKEN=resp.access_token; GTOKEXP=Date.now()+((resp.expires_in||3600)*1000);
      try{ localStorage.setItem("zd_ldtok", JSON.stringify({t:GTOKEN,exp:GTOKEXP})); }catch(e){}
      cb();
    } else toast("Sign-in failed.");
  };
  _tc.requestAccessToken({ prompt: GTOKEN?"":"consent" });
}
function shFetch(path, opt){
  return fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+path,
    Object.assign({ headers:{ Authorization:"Bearer "+GTOKEN, "Content-Type":"application/json" } }, opt||{}))
    .then(r => { if(!r.ok) return r.text().then(b=>{ throw new Error("Sheets "+r.status); }); return r.status===204?null:r.json(); });
}
function shAppend(tab, obj){
  const enc=encodeURIComponent("'"+tab+"'");
  return shFetch("/values/"+enc+"?valueRenderOption=FORMATTED_VALUE").catch(()=>({})).then(v=>{
    let header=(v && v.values && v.values[0]) || [];
    let pre=Promise.resolve();
    if(!header.length){
      pre = shFetch(":batchUpdate",{ method:"POST", body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]}) }).catch(()=>{}).then(()=>{
        header=Object.keys(obj);
        return shFetch("/values/"+encodeURIComponent("'"+tab+"'!A1")+"?valueInputOption=USER_ENTERED",{ method:"PUT", body:JSON.stringify({values:[header]}) });
      });
    }
    return pre.then(()=>{
      const row=header.map(h=>obj[h]!=null?String(obj[h]):"");
      Object.keys(obj).forEach(k=>{ if(header.indexOf(k)<0) row.push(String(obj[k])); });
      return shFetch("/values/"+enc+":append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS",{ method:"POST", body:JSON.stringify({values:[row]}) });
    });
  });
}
/* ===== load ===== */
function loadJobs(){
  return (LOCAL&&window.LD_LOCAL_JOBS_B64?Promise.resolve(b64csv(window.LD_LOCAL_JOBS_B64)):fetch(gviz(JOBS_TAB)).then(r=>r.text())).then(t=>{
    const rows=pcsv(t); if(rows.length<2){ JOBS=[]; return; }
    const c=colmap(rows[0]); const g=(r,k)=>{ const i=c[k]; return i==null?"":String(r[i]||"").trim(); };
    /* every row is a calendar event. a DELIVERY event carries a Pickup Job Code linking back to its pickup; a PICKUP event leaves it blank. */
    const delByPickup={};
    rows.slice(1).forEach(r=>{
      const pjc=g(r,"pickup job code"); if(!pjc) return;
      delByPickup[pjc]={ id:g(r,"event id"), title:g(r,"event title"), date:parseDate(g(r,"event date")), loc:g(r,"location") };
    });
    const out=[];
    rows.slice(1).forEach(r=>{
      if(g(r,"pickup job code")) return;            /* delivery rows are attached to their pickup, not listed on their own */
      const isDel = g(r,"is delivered").toLowerCase()==="delivered" || g(r,"current location").toLowerCase()==="delivered";
      if(isDel) return;
      const code=g(r,"job code"); if(!code) return;
      const pz=stateZip(g(r,"pickup zip code")), dz=stateZip(g(r,"delivery zip code"));
      const pg=geo(pz.zip), dg=geo(dz.zip);
      const jt=g(r,"job type");
      const fad=parseDate(g(r,"final fad")||g(r,"fad by paper")||g(r,"fad (first available date)"));
      let trip=parseFloat(g(r,"estimated trip days")); trip=(isFinite(trip)&&trip>0)?trip:null;
      const stor=g(r,"is in storage"); const inStor=/yes|true|^y$|^1$/i.test(stor)||stor.charCodeAt(0)===10003;
      out.push({
        code, customer:g(r,"customer name"),
        type:/straight/i.test(jt)?"straight":"regular",
        pickupState:pg?pg.state:pz.state, destState:dg?dg.state:dz.state,
        pickup:pg?{lat:pg.lat,lon:pg.lon}:null, delivery:dg?{lat:dg.lat,lon:dg.lon}:null,
        pickupZip:pz.zip, deliveryZip:dz.zip,
        cf:num(g(r,"final cf"))||num(g(r,"estimated cf")),
        fad, timeframeRaw:g(r,"delivery time frame"), tripDays:trip,
        foreman:g(r,"forman"), carrier:g(r,"carrier"),
        currentLocation:g(r,"current location"),
        inStorage:inStor, storLabel:g(r,"storage location label")||g(r,"storage location type"),
        pickupDate:parseDate(g(r,"event date")),
        pickupEv:{ id:g(r,"event id"), title:g(r,"event title"), date:parseDate(g(r,"event date")), loc:g(r,"location") },
        deliverEv: delByPickup[code]||null
      });
    });
    JOBS=out.filter(j=>!j.fad||daysFromToday(j.fad)>=-45);
  }).catch(e=>{ JOBS=[]; });
}
function loadKV(tab, build, localB64){
  return (LOCAL&&localB64?Promise.resolve(b64csv(localB64)):fetch(gviz(tab)).then(r=>r.ok?r.text():"")).then(t=>{
    const s={};
    try{ const rows=pcsv(t); if(rows.length<2) return s;
      const c=colmap(rows[0]); const g=(r,k)=>{ const i=c[k]; return i==null?"":String(r[i]||"").trim(); };
      rows.slice(1).forEach(r=>build(s,g,r));
    }catch(e){}
    return s;
  }).catch(()=>({}));
}
function loadStorage(){ return loadKV(STORAGE_TAB,(s,g,r)=>{ const code=g(r,"job code"); if(code) s[code]={ type:g(r,"storage location type")||g(r,"location type")||"In storage", label:g(r,"storage location label")||g(r,"location label")||g(r,"location")||"" }; }, window.LD_LOCAL_STORAGE_B64).then(s=>{STORAGE=s;}); }
function loadRoutes(){ return loadKV(ROUTES_TAB,(s,g,r)=>{ const codes=String(g(r,"job codes")||"").split(/[,;]+/).map(x=>x.trim()).filter(Boolean); if(!codes.length) return; const id=g(r,"route id")||("R"+codes[0]); s[id]={id,region:g(r,"region"),truck:g(r,"truck"),foreman:g(r,"foreman"),depart:g(r,"depart"),deliver:g(r,"deliver by"),cf:num(g(r,"total cf")),codes}; }).then(s=>{ ROUTES=Object.values(s); ROUTED=new Set(); ROUTES.forEach(rt=>rt.codes.forEach(c=>ROUTED.add(c))); }); }
function loadAssign(){ return loadKV(ASSIGN_TAB,(s,g,r)=>{ const code=g(r,"job code"); if(code) s[code]={foreman:g(r,"foreman"),carrier:g(r,"carrier")}; }).then(s=>{ASSIGN=s;}); }
function loadBackhaul(){ return loadKV(BACKHAUL_TAB,(s,g,r)=>{ const code=g(r,"job code"); if(code) s[code]=1; }).then(s=>{ BACKHAUL=s; }); }
/* ===== derived ===== */
function foremanOf(j){ return (ASSIGN[j.code]&&ASSIGN[j.code].foreman)||j.foreman||""; }
function carrierOf(j){ return (ASSIGN[j.code]&&ASSIGN[j.code].carrier)||j.carrier||""; }
function isFar(j){ return j.destState && OUR_STATES.indexOf(j.destState)<0; }
function suggestTruck(j){ const ts=DATA.trucks.slice().sort((a,b)=>a.cf-b.cf); for(const t of ts) if(t.cf>=j.cf) return t; return ts[ts.length-1]; }
function spareCF(j){ const t=suggestTruck(j); return t ? t.cf - (j.cf||0) : 0; }
function leaveBy(j){ if(!j.fad) return null; return new Date(midnight(j.fad).getTime()-(j.tripDays||1)*86400000); }
function tfWindow(j){
  const s=String(j.timeframeRaw||"").trim();
  if(!s) return {kind:"missing"};
  const m=s.match(/(\d{1,2}\/\d{1,2}\/\d{2,4}|\d{4}-\d{2}-\d{2})\s*[-to ]+\s*(\d{1,2}\/\d{1,2}\/\d{2,4}|\d{4}-\d{2}-\d{2})/i);
  if(m){ return {kind:"range", end:parseDate(m[2]), label:s}; }
  const n=s.match(/^\s*(\d{1,3})\s*$/);
  if(n && j.fad){ const days=+n[1]; return {kind:"days", days, end:new Date(midnight(j.fad).getTime()+days*86400000), label:days+"-day window from FAD"}; }
  return {kind:"unknown", label:s};
}
function dataIssues(j){
  const out=[];
  if(!j.fad) out.push("No Final FAD");
  const tw=tfWindow(j);
  if(tw.kind==="missing") out.push("No delivery timeframe");
  else if(tw.kind==="unknown") out.push("Timeframe not understood");
  return out;
}
function status(j){
  if(ROUTED.has(j.code)) return {lvl:"travel",txt:"Routed",why:"in an accepted route"};

  jobs.forEach(j=>{ if(!j.pickup||!j.delivery) return; const s=status(j), isS=j.type==="straight"; const col=s.lvl==="hazard"?"#C0392B":(isS?"#B26B0B":"#3E7CB1"), cls=s.lvl==="hazard"?"a":(isS?"":"c"); const a=[j.pickup.lat,j.pickup.lon], b=[j.delivery.lat,j.delivery.lon]; trail(a,b,col,{w:3.5,dash:isS?null:"9 7"}); L.marker(a,{icon:L.divIcon({className:"",html:'<div class="pmark2"></div>',iconSize:[13,13],iconAnchor:[7,7]})}).addTo(LLAYER2).bindPopup(esc(j.code)+" pickup - "+esc(j.pickupState)); L.marker(b,{icon:L.divIcon({className:"",html:'<div class="dmark2 '+cls+'">'+esc(j.destState||"")+'</div>',iconSize:[30,30],iconAnchor:[15,15]})}).addTo(LLAYER2).on("click",()=>openEvent(j.code,"delivery")).bindPopup("<b>"+esc(j.customer||j.code)+"</b><br>"+esc(j.code)+" - deliver by "+esc(fmtMDY(j.fad))); pts.push(a,b); });
  if(pts.length) try{ LMAP2.fitBounds(pts,{padding:[55,55]}); }catch(e){}
}
function drawRouteJourney(s){
  if(!LMAP2||!LLAYER2) return; try{ LLAYER2.clearLayers(); }catch(e){} drawSeq++;
  const jobs=s.jobs.slice().filter(j=>j.pickup&&j.delivery).sort((a,b)=>midnight(a.fad)-midnight(b.fad));
  const base=ldBase(jobs[0]||{}), col="#B26B0B", pts=[base]; let prev=base, itin="";
  jobs.forEach((j,i)=>{ const p=[j.pickup.lat,j.pickup.lon]; trail(prev,p,"#1F6FD6",{w:2.5,dash:"6 7",scale:1.2}); smark(p,"P"+(i+1),"P",col,"<b>Load "+(i+1)+"</b> "+esc(j.code)+" - "+esc(j.pickupState)); pts.push(p); prev=p; itin+='<div class="itrow"><span class="ist p">P'+(i+1)+'</span>Load '+esc(j.code)+' &middot; '+esc(j.customer||j.pickupState)+'</div>'; });
  jobs.forEach((j,i)=>{ const d=[j.delivery.lat,j.delivery.lon]; trail(prev,d,col,{w:Math.max(3.5,Math.min((j.cf||500)/300,8))}); smark(d,"D"+(i+1),"D",col,"<b>Deliver "+(i+1)+"</b> "+esc(j.code)+" - "+esc(j.destState)+" by "+esc(fmtMDY(j.fad))); pts.push(d); prev=d; itin+='<div class="itrow"><span class="ist d">D'+(i+1)+'</span>Deliver '+esc(j.code)+' &middot; '+esc(j.destState)+' &middot; by '+fmtMDY(j.fad)+'</div>'; });

  L.marker(base,{icon:L.divIcon({className:"",html:'<div class="bmark2">'+esc((jobs[0]&&jobs[0].pickupState)||"NJ")+'</div>',iconSize:[36,36],iconAnchor:[18,18]}),zIndexOffset:600}).addTo(LLAYER2).bindPopup("Base &middot; pack the truck here");
  const mc=$("#mvcount"); if(mc) mc.innerHTML="Route &middot; "+esc(s.region)+" &middot; "+jobs.length+" deliveries &middot; "+Math.round(s.cf).toLocaleString()+" CF";
  const card=$("#mvcard"); if(card){ card.style.display=""; card.innerHTML='<div class="ith">'+esc(s.region)+' route</div><div class="itsub">pack '+jobs.length+', then deliver one by one &middot; Truck '+esc(s.truck.n)+' &middot; depart by '+fmtMDY(s.depart)+'</div>'+itin+'<div class="itrow"><span class="ist r">&#8617;</span>Return to base</div><button class="abtn" id="mvall">&#8592; Back to all trips</button>'; const ab=$("#mvall"); if(ab) ab.onclick=()=>{ MAPROUTE=null; renderMap(); }; }
  if(pts.length) try{ LMAP2.fitBounds(pts,{padding:[60,60]}); }catch(e){}

function routeJourney(s){ if(!s) return; MAPROUTE=s; setView("map"); }
/* ===== routing (consolidation) + backhaul ===== */
function sumCF(js){ return js.reduce((s,x)=>s+(x.cf||0),0); }
function maxTruckCF(){ return Math.max.apply(null,DATA.trucks.map(t=>t.cf)); }
function fitTruck(cf){ const ts=DATA.trucks.slice().sort((a,b)=>a.cf-b.cf); return ts.find(t=>t.cf>=cf)||ts[ts.length-1]; }
function mkSug(js,region){ const cf=sumCF(js), fads=js.map(x=>midnight(x.fad).getTime()), dmin=Math.min.apply(null,fads); return {codes:js.map(x=>x.code),jobs:js,region,cf,truck:fitTruck(cf),deliver:new Date(dmin),depart:new Date(dmin-2*86400000)}; }
function suggestRoutes(){
  const cand=filtered().filter(j=>!ROUTED.has(j.code)&&j.fad&&j.destState);
  const byReg={}; cand.forEach(j=>{ const r=regionOf(j.destState); (byReg[r]=byReg[r]||[]).push(j); });
  const mx=maxTruckCF(), out=[];
  Object.keys(byReg).forEach(r=>{
    const js=byReg[r].slice().sort((a,b)=>midnight(a.fad)-midnight(b.fad));
    let cur=[];
    js.forEach(j=>{
      if(!cur.length){ cur=[j]; return; }
      const within=Math.abs(daysFromToday(j.fad)-daysFromToday(cur[0].fad))<=ROUTE_WINDOW;
      if(within && (sumCF(cur)+(j.cf||0))<=mx) cur.push(j);
      else { if(cur.length>1) out.push(mkSug(cur,r)); cur=[j]; }
    });
    if(cur.length>1) out.push(mkSug(cur,r));
  });
  return out.sort((a,b)=>a.deliver-b.deliver);
}
function renderSuggest(){
  const host=$("#suggwrap"); if(!host) return;
  let html="";
  if(ROUTES.length){
    html+='<div class="suggsec"><h3>Active routes</h3><span class="meta">accepted &mdash; you deliver these yourself</span></div>'+
      ROUTES.map((r,i)=>'<div class="suggcard active"><div class="suggtop"><span class="suggreg ok">'+esc(r.region||"Route")+'</span><span class="suggmeta"><b>'+r.codes.length+'</b> jobs'+(r.cf?' &middot; <b>'+Math.round(r.cf).toLocaleString()+'</b> CF':'')+' &middot; Truck '+esc(r.truck||"?")+(r.foreman?' &middot; '+esc(r.foreman):'')+(r.depart?' &middot; depart '+esc(r.depart):'')+'</span><button class="abtn" data-rjourney="'+i+'">Journey &#9656;</button></div><div class="suggjobs">'+r.codes.map(c=>'<span class="suggjob done">&#10003; '+esc(c)+'</span>').join("")+'</div></div>').join("");
  }
  const sug=suggestRoutes(); window._SUG=sug;
  if(sug.length){
    html+='<div class="suggsec"><h3>Suggested routes</h3><span class="meta">consolidate &amp; deliver yourself &mdash; one truck instead of separate carriers</span></div>'+
      sug.map((s,i)=>'<div class="suggcard"><div class="suggtop"><span class="suggreg">'+esc(s.region)+'</span><span class="suggmeta"><b>'+s.codes.length+'</b> trips &middot; <b>'+Math.round(s.cf).toLocaleString()+'</b> CF &middot; Truck '+esc(s.truck.n)+' &middot; depart by '+fmtMDY(s.depart)+'</span><button class="abtn" data-journey="'+i+'">Journey</button><button class="abtn dark" data-route="'+i+'">Accept &amp; route</button></div><div class="suggjobs">'+s.jobs.map(j=>'<span class="suggjob">'+esc(j.code)+' <i>'+esc(j.destState)+'</i> '+fmtMDY(j.fad)+'</span>').join("")+'</div></div>').join("");
  }
  host.innerHTML=html;
  host.querySelectorAll("[data-route]").forEach(el=>el.onclick=()=>openRoute(window._SUG[+el.getAttribute("data-route")]));
  host.querySelectorAll("[data-journey]").forEach(el=>el.onclick=()=>routeJourney(window._SUG[+el.getAttribute("data-journey")]));
  host.querySelectorAll("[data-rjourney]").forEach(el=>el.onclick=()=>{ const r=ROUTES[+el.getAttribute("data-rjourney")]; const jobs=r.codes.map(c=>JOBS.find(j=>j.code===c)).filter(Boolean); if(jobs.length) routeJourney({region:r.region,jobs,cf:r.cf||0,truck:{n:r.truck},depart:parseDate(r.depart)||today0(),codes:r.codes}); });
}
function openRoute(s){ if(!s) return;
  modal("Create route &middot; "+esc(s.region),
    '<div class="mrow"><b>'+s.codes.length+'</b> trips &middot; <b>'+Math.round(s.cf).toLocaleString()+'</b> CF &middot; deliver by '+fmtMDY(s.deliver)+'</div>'+
    '<div class="mfield"><label>Truck</label><select class="rtruck">'+DATA.trucks.map(t=>'<option value="'+esc(t.n)+'"'+(t.n===s.truck.n?" selected":"")+'>'+esc(t.n)+' &middot; '+t.cf.toLocaleString()+' CF</option>').join("")+'</select></div>'+
    '<div class="mfield"><label>Foreman &mdash; we deliver this route</label><select class="rfore"><option value="">- pick foreman -</option>'+DATA.foremen.map(f=>'<option>'+esc(f)+'</option>').join("")+'</select></div>'+
    '<div class="mrow" style="color:var(--dim);font-size:13px">Jobs: '+esc(s.codes.join(", "))+' &middot; depart by '+fmtMDY(s.depart)+'</div>',
    '<button class="abtn" onclick="closeModal()">Cancel</button><button class="abtn dark" id="rsave">Create route</button>');
  $("#rsave").onclick=()=>createRoute(s,($(".rtruck")&&$(".rtruck").value)||"",($(".rfore")&&$(".rfore").value)||"");
}
function createRoute(s,truckN,fore){
  const id="R"+Date.now().toString(36).toUpperCase();
  const route={id,region:s.region,truck:truckN,foreman:fore,depart:fmtMDY(s.depart),deliver:fmtMDY(s.deliver),cf:Math.round(s.cf),codes:s.codes};
  const apply=()=>{ s.codes.forEach(c=>{ ROUTED.add(c); if(fore) ASSIGN[c]={foreman:fore,carrier:""}; }); ROUTES.push(route); closeModal(); toast("Route created - "+s.codes.length+" trips."); renderView(); };
  if(LOCAL){ apply(); return; }
  const obj={"Route ID":id,"Region":s.region,"Job Codes":s.codes.join(", "),"Truck":truckN,"Foreman":fore,"Depart":route.depart,"Deliver By":route.deliver,"Total CF":route.cf,"Created":new Date().toISOString()};
  ensureToken(()=>shAppend(ROUTES_TAB,obj).then(apply).catch(e=>modal("Couldn't save",'<div class="mrow">'+esc(e.message)+'</div><div class="mrow" style="color:var(--dim)">Open on the hosted URL and sign in to save routes.</div>')));
}
function openBackhaul(code){
  const j=JOBS.find(x=>x.code===code); if(!j) return;
  const spare=spareCF(j), t=suggestTruck(j), org=j.pickupState||"NJ";
  const msg="Zip To Zip - truck returning "+(j.destState||"?")+" to "+org+" around "+(j.fad?fmtMDY(j.fad):"soon")+". ~"+spare+" CF space free on the way back. Any cargo on this lane? Reply here.";
  modal("Backhaul broadcast &middot; "+esc(j.code),
    '<div class="mrow"><span class="k">Empty return</span><br>'+esc(j.destState||"?")+' &#8594; '+esc(org)+' &middot; ~'+spare+' CF free on Truck '+esc(t.n)+'</div>'+
    '<div class="mfield"><label>WhatsApp message (edit if needed)</label><textarea id="bhmsg" rows="4">'+esc(msg)+'</textarea></div>',
    '<button class="abtn" id="bhsend">Open WhatsApp</button><button class="abtn dark" id="bhfound">Mark cargo found</button>');
  $("#bhsend").onclick=()=>{ const m=($("#bhmsg")&&$("#bhmsg").value)||msg; window.open("https://wa.me/?text="+encodeURIComponent(m),"_blank","noopener"); };
  $("#bhfound").onclick=()=>{ const obj={"Job Code":code,"Lane":(j.destState||"?")+" -> "+org,"Spare CF":spare,"Found At":new Date().toISOString()}; ensureToken(()=>shAppend(BACKHAUL_TAB,obj).then(()=>{ BACKHAUL[code]=1; closeModal(); toast("Backhaul recorded."); renderView(); }).catch(e=>modal("Couldn't save",'<div class="mrow">'+esc(e.message)+'</div>'))); };
}
/* ===== timeline (gantt) ===== */
function tlStart(){ return TLSTART || weekStart(today0()); }
function tlShift(w){ const s=new Date(tlStart()); s.setDate(s.getDate()+w*7); TLSTART=midnight(s); renderTimeline(); }
function tlToday(){ TLSTART=null; renderTimeline(); }
function dIndex(d,start){ return d? Math.round((midnight(d).getTime()-start.getTime())/86400000) : null; }
function tlLegend(){
  return '<span><i style="background:#2E333A;width:10px;height:10px;border-radius:50%;border:1.5px solid #fff"></i>pickup</span>'+
    '<span><i style="background:#B26B0B"></i>we deliver</span>'+
    '<span><i style="background:#3E7CB1"></i>carrier</span>'+
    '<span><i style="background:repeating-linear-gradient(45deg,rgba(108,92,224,.4) 0 4px,rgba(108,92,224,.08) 4px 8px);border:1px solid rgba(108,92,224,.28)"></i>storage</span>';
}
function renderTimeline(){
  const host=$("#timelinewrap"); if(!host) return;
  const start=tlStart(), days=TLDAYS, dp=100/days;
  const end=new Date(start.getTime()+(days-1)*86400000);
  const jobs=filtered().sort((a,b)=>tlSortKey(a)-tlSortKey(b));
  const need=jobs.filter(j=>status(j).lvl==="hazard").length;
  let wk="";
  for(let w=0; w*7<days; w++){ const ws=new Date(start.getTime()+w*7*86400000); wk+='<span class="tlwk" style="left:'+(w*7*dp)+'%">'+MON[ws.getMonth()]+" "+ws.getDate()+'</span>'; }
  const tdi=dIndex(today0(),start);
  const todayLine=(tdi>=0&&tdi<days)?'<i class="tltoday" style="left:'+((tdi+0.5)*dp)+'%"></i><span class="tlnow" style="left:'+((tdi+0.5)*dp)+'%"></span>':"";
  const body=jobs.length? jobs.map(j=>tlRow(j,start,days,dp)).join("") : '<div class="empty" style="margin:34px auto"><b>No long-distance trips</b>Nothing not-delivered with an upcoming deadline.</div>';
  host.innerHTML=
    '<div class="tlbar"><div class="tlnav"><button data-tl="prev">&#8249;</button><button class="tltodaybtn" data-tl="today">Today</button><button data-tl="next">&#8250;</button></div><span class="tlrange">'+MON[start.getMonth()]+" "+start.getDate()+" &ndash; "+MON[end.getMonth()]+" "+end.getDate()+'</span><span class="tlsub">'+jobs.length+" trips"+(need?' &middot; <b>'+need+" need action</b>":"")+'</span><div class="tllegend">'+tlLegend()+'</div></div>'+
    '<div class="tlgrid"><div class="tlhead"><div class="tllab tlhlab">Job &middot; owner</div><div class="tltrack tlhtrack">'+wk+todayLine+'</div></div><div class="tlbody">'+body+'</div></div>';
  host.querySelectorAll("[data-tl]").forEach(el=>el.onclick=()=>{ const a=el.dataset.tl; a==="prev"?tlShift(-2):a==="next"?tlShift(2):tlToday(); });
  host.querySelectorAll("[data-ev]").forEach(el=>el.onclick=()=>openEvent(el.getAttribute("data-ev"), el.getAttribute("data-evk")));
}
function tlRow(j,start,days,dp){
  const s=status(j), isS=j.type==="straight";
  const alert=s.lvl==="hazard", warn=s.lvl==="rental";
  const who=isS?foremanOf(j):carrierOf(j);
  const pdi=dIndex(j.pickupDate,start);
  const fadDi=dIndex(j.fad,start);
  const dep=isS?leaveBy(j):null, depDi=dep?dIndex(dep,start):null;
  const tw=tfWindow(j), wend=tw.end?dIndex(tw.end,start):null;
  const tripStart=(isS&&depDi!=null&&fadDi!=null&&depDi<fadDi)?depDi:fadDi;
  const tdi=dIndex(today0(),start), inStor=(j.inStorage||STORAGE[j.code]);
  let bars=tdi>0?'<span class="tlpast" style="width:'+(Math.min(tdi,days)*dp)+'%"></span>':"";
  if(tdi>=0&&tdi<days) bars+='<i class="tltoday" style="left:'+((tdi+0.5)*dp)+'%"></i>';
  if(inStor && pdi!=null && tripStart!=null){ const a=Math.min(pdi,tripStart), b=Math.max(pdi,tripStart)+1; bars+='<span class="tlbar-stor" style="left:'+(a*dp)+'%;width:'+((b-a)*dp)+'%" title="In storage'+(j.storLabel?" - "+esc(j.storLabel):"")+'">'+esc(j.storLabel||"in storage")+'</span>'; }
  else if(pdi!=null && tripStart!=null && tripStart>pdi){ bars+='<span class="tlconn" style="left:'+(pdi*dp)+'%;width:'+((tripStart-pdi)*dp)+'%"></span>'; }
  if(fadDi!=null){
    if(isS){
      const a=(depDi!=null&&depDi<fadDi)?depDi:fadDi, w=Math.max(1,(fadDi-a)+1);
      bars+='<span class="tlb deliv" data-ev="'+esc(j.code)+'" data-evk="delivery" style="left:'+(a*dp)+'%;width:'+(w*dp)+'%" title="Depart '+esc(fmtMDY(dep))+' &middot; deliver by '+esc(fmtMDY(j.fad))+' ('+(j.tripDays||1)+'-day trip)">'+esc(fmtMDY(j.fad))+'</span>';
      if(depDi!=null && depDi<fadDi) bars+='<span class="tldep" style="left:'+(depDi*dp)+'%" title="Truck should depart '+esc(fmtMDY(dep))+'"></span>';
    } else {
      const b=(wend!=null&&wend>fadDi)?wend:fadDi, w=Math.max(1,(b-fadDi)+1);
      const ghost=!who, cls="tlb deliv carrier"+(ghost?" ghost":"");
      bars+='<span class="'+cls+'" data-ev="'+esc(j.code)+'" data-evk="delivery" style="left:'+(fadDi*dp)+'%;width:'+(w*dp)+'%" title="'+(ghost?"Carrier not assigned, ":"Carrier delivers by ")+esc(fmtMDY(j.fad))+'">'+esc(ghost?"no carrier":fmtMDY(j.fad))+'</span>';
    }
  }
  if(pdi!=null){ const hasEv=!!(j.pickupEv&&j.pickupEv.id); bars+='<span class="tlb pick'+(hasEv?'':' noev')+'"'+(hasEv?' data-ev="'+esc(j.code)+'" data-evk="pickup"':'')+' style="left:'+(pdi*dp)+'%" title="Pickup '+esc(fmtMDY(j.pickupDate))+'"></span>'; }
  const av=who?'<div class="tlav'+(isS?'':' car')+'">'+esc(initials(who))+'</div>':'<div class="tlav none">+</div>';
  const third=(alert||warn)?'<span class="tlchip '+(alert?'al':'wn')+'"><i></i>'+esc(s.txt)+'</span>':'<div class="tlroute">'+esc(j.pickupState||"?")+' <b>&#8594;</b> '+esc(j.destState||"?")+(inStor?' <span class="stp">&middot; storage</span>':'')+'</div>';
  return '<div class="tlrow'+(alert?' act':warn?' wn':'')+'"><div class="tllab">'+av+'<div class="tlinfo"><div class="tll1"><span class="code">'+esc(j.code)+'</span><span class="tlcf">'+Math.round(j.cf||0).toLocaleString()+' CF</span></div><div class="tlcust">'+esc(j.customer||"(no name)")+'</div>'+third+'</div></div><div class="tltrack">'+bars+'</div></div>';
}
function fmtFull(d){ return d? (DOW[d.getDay()]+", "+MON[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear()) : "(no date)"; }
function calLink(ev,j){ return "https://calendar.google.com/calendar/u/0/r/search?q="+encodeURIComponent((ev&&ev.title)||(j&&j.code)||""); }
function openEvent(code,kind){

    '<div class="mrow"><span class="k">'+(j.type==="straight"?"Foreman":"Carrier")+'</span><br>'+esc(who)+'</div>',
    '<a class="abtn" href="'+calLink(ev,j)+'" target="_blank" rel="noopener">Open in Google Calendar</a><button class="abtn dark" onclick="closeModal()">Close</button>');

function setView(v){
  VIEW=v;
  document.querySelectorAll(".vbtn").forEach(b=>b.classList.toggle("on", b.getAttribute("data-view")===v));
  const lay=$(".layout"); if(lay) lay.style.display=(v==="board")?"":"none";

  renderView();
}
function renderView(){ if(VIEW==="timeline") renderTimeline(); else if(VIEW==="map") renderMap(); else render(); }
/* ===== boot ===== */
function pull(){
  $("#rfstamp").textContent="Loading...";
  return Promise.all([loadJobs(),loadStorage(),loadRoutes(),loadAssign(),loadBackhaul()]).then(()=>{
    renderView();
    $("#rfstamp").textContent=JOBS.length+" trips";
  }).catch(e=>{ $("#rfstamp").textContent="load error"; });
}
$("#refreshbtn").addEventListener("click",pull);
document.querySelectorAll(".vbtn").forEach(b=>b.onclick=()=>setView(b.getAttribute("data-view")));
(function(){ const set=(id,fn)=>{ const e=$(id); if(e) e.onchange=()=>{ fn(e.value); renderView(); }; }; set("#ldfilter",v=>FILTER=v); set("#ldfreg",v=>FILTERREG=v); set("#ldfst",v=>FILTERST=v); set("#ldfty",v=>FILTERTY=v); })();
(function(){ const mf=$("#mapfull"); if(mf) mf.onclick=()=>{ const mw=$("#mapwrap"); if(mw&&mw.requestFullscreen) mw.requestFullscreen().catch(()=>{}); setTimeout(()=>{ try{ LMAP&&LMAP.invalidateSize(); }catch(e){} },300); }; })();
window.closeModal=closeModal;
pull();
</script>
