<style>
:root{
  --paper:#F7F6F2;--card:#FFFFFF;--ink:#1F2329;--dim:#646B73;--faint:#969CA3;--soft:#F1F0EA;
  --line:#E6E4DC;--line2:#D3D0C6;
  --acc:#B26B0B;--acc-bg:#FBF1DC;--acc-bd:#E9D08A;--acc-ink:#8A530A;
  --green:#1E7A3D;--green-bg:#E9F4EC;--green-bd:#BFE0C8;
  --red:#B3362A;--red-bg:#FBE9E6;--red-bd:#F0C7C0;
  --amber:#B26B0B;--amber-bg:#FBF0DC;--amber-bd:#EDD6A8;
  --blue:#1558d6;--blue-bg:#EEF3FE;--blue-bd:#C4D4F5;
  --purple:#6C5CE0;--purple-bg:#EFECFB;--purple-bd:#D6D0F5;
  --shadow:0 1px 2px rgba(31,35,41,.04),0 8px 24px rgba(31,35,41,.06);
}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace}
/* header bar */
.bar{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(31,35,41,.03)}
.bar-in{max-width:1640px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:11px 24px;flex-wrap:wrap}
.back{flex:0 0 auto;width:34px;height:34px;border-radius:10px;border:1px solid var(--line2);background:#fff;color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;font-family:'Barlow Condensed'}
.back:hover{border-color:var(--acc-bd);color:var(--acc);background:var(--acc-bg)}
.logo{height:30px;width:auto;display:block;flex:0 0 auto}
.htitle{font-family:'Barlow Condensed';font-weight:600;font-size:22px;letter-spacing:.05em;text-transform:uppercase;margin:0;line-height:1}
.hsub{font-size:12px;color:var(--dim);margin-top:2px}
.views{display:flex;gap:6px;margin-left:8px}
.vbtn{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line2);background:#fff;color:var(--dim);border-radius:9px;padding:7px 13px;cursor:pointer}
.vbtn:hover{border-color:var(--acc-bd);color:var(--ink)}
.vbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.hgrow{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{font:inherit;font-weight:600;font-size:13px;border:1px solid var(--line2);background:#fff;color:var(--ink);border-radius:9px;padding:7px 13px;cursor:pointer}
.btn:hover{border-color:#bdb9ac}
#rfstamp{font-size:12px;color:var(--dim)}
.wrap{max-width:1640px;margin:0 auto;padding:16px 24px 80px}
/* top strip */
.toprow{display:grid;grid-template-columns:1fr 1.4fr;gap:16px;margin-bottom:16px}
@media(max-width:1080px){.toprow{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.panelhd{font-family:'Barlow Condensed';font-weight:600;font-size:17px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);padding:12px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.panelhd .ct{margin-left:auto;font-family:'Inter';font-size:12px;font-weight:600;color:var(--faint);letter-spacing:0;text-transform:none}
.panelbody{padding:13px 15px;display:flex;flex-direction:column;gap:10px;max-height:340px;overflow:auto}
.none{color:var(--dim);font-size:13px;text-align:center;padding:18px 8px;line-height:1.5}
/* consolidation card */
.cons{border:1px solid var(--line2);border-radius:12px;padding:11px 13px;background:var(--paper)}
.cons.accepted{border-color:var(--green-bd);background:var(--green-bg)}
.cons .ch{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.cons .dest{font-family:'Barlow Condensed';font-weight:600;font-size:18px;color:var(--acc);text-transform:uppercase;letter-spacing:.02em}
.cons .when{font-size:12px;color:var(--dim)}
.cons .truck{margin-left:auto;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink)}
.cons .bar2{height:6px;border-radius:4px;background:var(--line);overflow:hidden;margin:7px 0}
.cons .bar2 i{display:block;height:100%;background:var(--green)}
.cons .bar2 i.over{background:var(--red)}
.cons .leg{font-size:12.5px;padding:2px 0;display:flex;gap:8px}
.cons .leg .star{color:var(--acc)}
.cons .leg.anchor{font-weight:600}
.cons .acts{margin-top:9px;display:flex;gap:8px;flex-wrap:wrap}
.mini{font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line2);background:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;color:var(--ink)}
.mini.go{background:var(--green);color:#fff;border-color:var(--green)}
.mini.go:hover{filter:brightness(1.07)}
.mini.acc{margin-left:auto;color:var(--green);font-weight:700;border:0;background:none;cursor:default}
/* storage summary */
.storrow{display:flex;align-items:center;gap:10px;font-size:13px;border:1px solid var(--line2);border-radius:11px;padding:8px 11px;background:var(--paper);cursor:pointer}
.storrow:hover{border-color:var(--acc-bd)}
.storrow .box{flex:0 0 auto;width:30px;height:30px;border-radius:8px;background:var(--acc-bg);border:1px solid var(--acc-bd);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:15px}
.storrow b{color:var(--ink)} .storrow .loc{margin-left:auto;font-family:'IBM Plex Mono';font-size:11.5px;color:var(--dim);text-align:right}
/* layout: list + map */
.layout{display:grid;grid-template-columns:1fr 420px;gap:16px;align-items:start}
@media(max-width:1160px){.layout{grid-template-columns:1fr}.mapside{position:static!important}}
.mapside{position:sticky;top:74px}
#map{height:560px;border-radius:14px;border:1px solid var(--line);overflow:hidden}
.layout.mapfull{grid-template-columns:1fr}
.layout.mapfull #map{height:74vh}
.leaflet-container{font-family:'Inter'}
#mapinfo{margin-top:9px;font-size:12.5px;color:var(--dim);min-height:18px}
.omark{width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid var(--dim);box-shadow:0 1px 4px rgba(0,0,0,.25)}
.dmark{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--acc);font-family:'Barlow Condensed';font-weight:600;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.25)}
/* week section */
.week{margin-bottom:18px}
.weekhd{display:flex;align-items:center;gap:10px;padding:5px 2px 9px;position:sticky;top:64px;z-index:5;background:linear-gradient(var(--paper) 72%,rgba(247,246,242,0))}
.weekhd h3{font-family:'Barlow Condensed';font-weight:600;font-size:18px;letter-spacing:.04em;text-transform:uppercase;margin:0}
.weekhd .wc{margin-left:auto;font-size:12px;color:var(--faint);font-weight:600}
/* job card */
.jc{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:0;margin-bottom:10px;overflow:hidden;display:flex}
.jc .edge{flex:0 0 5px;background:var(--line2)}
.jc.s-red .edge{background:var(--red)} .jc.s-amber .edge{background:var(--amber)} .jc.s-ok .edge{background:var(--green)} .jc.s-routed .edge{background:var(--purple)}
.jc.straight{} .jcin{flex:1 1 auto;padding:12px 15px;min-width:0}
.jc .top{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.jc .cust{font-weight:700;font-size:16px;color:var(--ink)}
.jc .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;padding:1px 9px;border-radius:20px;vertical-align:2px;margin-left:7px}
.tag.straight{background:var(--acc-bg);color:var(--acc-ink);border:1px solid var(--acc-bd)}
.tag.regular{background:var(--soft);color:var(--dim);border:1px solid var(--line2)}
.jc .pill{margin-left:auto;display:inline-flex;flex-direction:column;align-items:flex-end;gap:2px}
.spill{font-size:11.5px;font-weight:700;letter-spacing:.02em;padding:2px 10px;border-radius:20px;white-space:nowrap}
.spill.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.spill.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.spill.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.spill.routed{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.swhy{font-size:11px;color:var(--dim)}
.jc .route{margin-top:7px;font-weight:700;color:var(--ink);font-size:14.5px;letter-spacing:.01em}
.jc .route .ar{color:var(--faint);margin:0 5px;font-weight:400}
.jc .meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:7px 14px;color:var(--dim);font-size:12.5px}
.jc .meta b{color:var(--ink);font-variant-numeric:tabular-nums}
.jc .row2{margin-top:9px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;border-radius:9px;padding:5px 10px;border:1px solid var(--line2);background:#fff;color:var(--ink)}
.chip.assign{border-style:dashed}
.chip.warn{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.chip.stor{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc-ink);cursor:pointer}
.chip.ok{background:var(--green-bg);border-color:var(--green-bd);color:#1f5b34}
.chip.act{cursor:pointer}.chip.act:hover{border-color:var(--acc-bd)}
.chip .ico{font-size:13px}
.empty{padding:54px 20px;text-align:center;color:var(--dim);background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.empty b{display:block;font-family:'Barlow Condensed';font-size:20px;color:var(--ink);margin-bottom:6px}
/* calendar */
#calview .cweek{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
#calview .cwh{font-family:'Barlow Condensed';font-weight:600;font-size:16px;letter-spacing:.04em;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--line);color:var(--dim);display:flex}
#calview .cwh .n{margin-left:auto;font-family:'Inter';font-size:12px;color:var(--faint)}
#calview .cgrid{display:grid;grid-template-columns:repeat(7,1fr)}
#calview .cday{border-right:1px solid var(--line);border-top:1px solid var(--line);min-height:96px;padding:6px 7px}
#calview .cday:nth-child(7n){border-right:0}
#calview .cday .dn{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase}
#calview .cday.today .dn{color:var(--acc)}
#calview .cev{font-size:11px;font-weight:600;border-radius:6px;padding:2px 5px;margin-top:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#calview .cev.straight{background:var(--acc-bg);color:var(--acc-ink)}
#calview .cev.regular{background:var(--soft);color:var(--dim)}
#calview .cev.red{box-shadow:inset 0 0 0 1.5px var(--red)}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(20,25,30,.46);display:flex;align-items:center;justify-content:center;z-index:90;padding:18px}
.mbox{background:#fff;border-radius:16px;max-width:480px;width:100%;padding:20px 22px;box-shadow:0 20px 50px rgba(0,0,0,.3);position:relative;max-height:88vh;overflow:auto}
.mbox h3{font-family:'Barlow Condensed';font-weight:600;font-size:21px;text-transform:uppercase;letter-spacing:.03em;margin:0 0 12px}
.mx{position:absolute;top:12px;right:14px;border:0;background:none;font-size:18px;cursor:pointer;color:var(--dim)}
.mrow{font-size:13.5px;margin:5px 0;color:var(--ink)}.mrow .k{color:var(--dim)}
.mfield{margin:11px 0;display:flex;flex-direction:column;gap:5px}
.mfield label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.mfield input,.mfield select,.mfield textarea{font:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line2);border-radius:9px;background:#fff;color:var(--ink);width:100%}
.mwa{background:var(--soft);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:13px;white-space:pre-wrap;line-height:1.5;font-family:'IBM Plex Mono'}
.mfoot{margin-top:15px;display:flex;gap:9px;justify-content:flex-end;flex-wrap:wrap}
.mfoot .pri{background:var(--acc);color:#fff;border-color:var(--acc)}
.mfoot .pri.green{background:var(--green);border-color:var(--green)}
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:#1E2228;color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:120;box-shadow:0 10px 30px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
</style>
</head>

/* ============ tiny helpers ============ */
const $=s=>document.querySelector(s);
function esc(x){return String(x==null?"":x).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),4200);}
function num(s){if(s==null)return 0;const n=parseFloat(String(s).replace(/[$,]/g,""));return isFinite(n)?n:0;}
function pcsv(t){const rows=[];let r=[],c="",q=false;for(let i=0;i<t.length;i++){const ch=t[i];if(q){if(ch==='"'){if(t[i+1]==='"'){c+='"';i++;}else q=false;}else c+=ch;}else{if(ch==='"')q=true;else if(ch===","){r.push(c);c="";}else if(ch==="\n"){r.push(c);rows.push(r);r=[];c="";}else if(ch!=="\r")c+=ch;}}if(c!==""||r.length){r.push(c);rows.push(r);}return rows;}
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function midnight(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function today0(){return midnight(new Date());}
function parseDate(s){s=String(s||"").trim();if(!s)return null;let m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);if(m){let y=+m[3];if(y<100)y+=2000;return new Date(y,+m[1]-1,+m[2]);}return null;}

function daysFromToday(d){if(!d)return null;return Math.round((midnight(d)-today0())/86400000);}

function geo(zip){zip=String(zip||"").replace(/\D/g,"").slice(0,5).padStart(5,"0");const z=ZIPDB[zip];return z?{lat:z[0],lon:z[1],city:z[2],state:z[3]}:null;}
function stateZip(s){s=String(s||"").trim();const st=(s.match(/[A-Za-z]{2}/)||[""])[0].toUpperCase();const z=(s.match(/\d{5}/)||[""])[0];return {state:st,zip:z};}
function hav(a,b){if(!a||!b||a.lat==null||b.lat==null)return 9999;const R=3959,dLa=(b.lat-a.lat)*Math.PI/180,dLo=(b.lon-a.lon)*Math.PI/180,la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180;const h=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(h));}

/* ============ modal ============ */
function modal(title,bodyHTML,footHTML){
  const host=$("#modalhost");

    const isDel=g(r,"is delivered").toLowerCase()==="delivered"||g(r,"current location").toLowerCase()==="delivered";
    if(isDel)return;                                  // keep only NOT-delivered
    const code=g(r,"job code");if(!code)return;
    const pz=stateZip(g(r,"pickup zip code")),dz=stateZip(g(r,"delivery zip code"));

      pickup:pg?{lat:pg.lat,lon:pg.lon}:null, delivery:dg?{lat:dg.lat,lon:dg.lon}:null,
      pickupZip:pz.zip, deliveryZip:dz.zip,
      cf:num(g(r,"final cf"))||num(g(r,"estimated cf")),
      fad, timeframe:g(r,"delivery time frame"),
      tripDays:(()=>{const v=parseFloat(g(r,"estimated trip days"));return isFinite(v)&&v>0?v:null;})(),
      daysBefore:dRaw?parseInt(dRaw,10):null,
      foreman:g(r,"forman"), carrier:g(r,"carrier"), carrierPhone:g(r,"carrier phone"),
      sticker:g(r,"sticker"), blanket:g(r,"blanket"), salesRep:g(r,"sales rep 1"),

/* ============ derived per-job ============ */
function foremanOf(j){return (ASSIGN[j.code]&&ASSIGN[j.code].foreman)||j.foreman||"";}
function carrierOf(j){return (ASSIGN[j.code]&&ASSIGN[j.code].carrier)||j.carrier||"";}
function isFar(j){return j.destState&&OUR_STATES.indexOf(j.destState)<0;}
function deliveryDate(j){return j.fad;}                 // FAD = target delivery date
function leaveBy(j){const d=deliveryDate(j);if(!d)return null;return new Date(midnight(d).getTime()-(j.tripDays||1)*86400000);}
function status(j){
  if(ROUTED.has(j.code))return {lvl:"routed",txt:"Routed",why:"in an accepted route"};
  const dPick=daysFromToday(j.pickupDate);
  if(!j.fad)return {lvl:"amber",txt:"No delivery date",why:"FAD is blank — needs a date"};
  if(j.type==="straight"){
    if(!foremanOf(j)&&dPick!=null&&dPick<=ASSIGN_DAYS)return {lvl:"red",txt:"Needs foreman",why:"no foreman · pickup "+(dPick<0?"overdue":"in "+dPick+"d")};
    const lb=leaveBy(j),dl=daysFromToday(lb);
    // backhaul red: far move, near FAD, empty return, no backhaul found, big enough truck
    const dFad=daysFromToday(j.fad);
    if(isFar(j)&&dFad!=null&&dFad<=BACKHAUL_DAYS&&!BACKHAUL[j.code]&&j.cf>=0)
      return {lvl:"red",txt:"Find backhaul",why:"empty return from "+j.destState+" · no cargo found"};
    if(dl!=null&&dl<=0)return {lvl:"red",txt:"Send now",why:(j.tripDays||1)+"-day trip · deliver by "+fmtMDY(j.fad)};
    if(dl!=null&&dl<=LEAVE_SOON)return {lvl:"amber",txt:"Send soon",why:"leave by "+fmtMDY(lb)};
    return {lvl:"ok",txt:"On track",why:"leave by "+fmtMDY(lb)};
  }
  if(!carrierOf(j)&&dPick!=null&&dPick<=ASSIGN_DAYS)return {lvl:"red",txt:"Needs carrier",why:"no carrier · pickup "+(dPick<0?"overdue":"in "+dPick+"d")};
  if(!carrierOf(j))return {lvl:"amber",txt:"No carrier yet",why:"assign before pickup"};
  return {lvl:"ok",txt:"Carrier set",why:carrierOf(j)};
}
function sortKey(j){return [STORAGE[j.code]?0:1, j.fad?midnight(j.fad).getTime():9e15, j.pickupDate?midnight(j.pickupDate).getTime():9e15];}
function sortedJobs(){return JOBS.slice().sort((a,b)=>{const ka=sortKey(a),kb=sortKey(b);for(let i=0;i<ka.length;i++){if(ka[i]!==kb[i])return ka[i]-kb[i];}return 0;});}
/* ============ consolidation ============ */
function tfDays(j){const s=String(j.timeframe||"");const m=s.match(/(\d+)\s*(business\s*)?day/i);if(m)return Math.round(+m[1]*(m[2]?1.4:1));if(/-\s*(\d{1,2}\/\d{1,2}\/\d{2,4}|\d{4}-\d{2}-\d{2})/.test(s))return 60;const n=s.match(/^\s*(\d{1,3})\s*$/);if(n)return +n[1];return 14;}
function bigTruck(){return DATA.trucks.reduce((m,t)=>Math.max(m,t.cf),1848);}
function assignTruck(cf){const ts=DATA.trucks.slice().sort((a,b)=>a.cf-b.cf);for(const t of ts)if(t.cf>=cf)return t;return null;}
function consolidations(){
  const out=[];const big=bigTruck();
  const straights=JOBS.filter(j=>j.type==="straight"&&j.delivery&&j.fad);
  const regs=JOBS.filter(j=>j.type==="regular"&&j.delivery);
  straights.forEach(S=>{
    const Ds=midnight(S.fad),cands=[];
    regs.forEach(R=>{
      let fit=null;
      if(R.destState&&S.destState&&R.destState===S.destState)fit={mi:Math.round(hav(R.delivery,S.delivery)),why:"same state"};
      else{const d=hav(R.delivery,S.delivery);if(d<=220)fit={mi:Math.round(d),why:Math.round(d)+" mi"};}
      if(!fit)return;
      const rp=R.pickupDate?midnight(R.pickupDate):today0();
      const winEnd=new Date(rp.getTime()+tfDays(R)*86400000);
      if(Ds<rp||Ds>winEnd)return;
      cands.push({R,fit});
    });
    if(!cands.length)return;
    cands.sort((a,b)=>a.fit.mi-b.fit.mi);
    const grp=[];let cf=S.cf||0;
    cands.forEach(c=>{if(cf+(c.R.cf||0)<=big){grp.push(c);cf+=(c.R.cf||0);}});
    if(!grp.length)return;
    out.push({S,grp,cf,truck:assignTruck(cf)});
  });
  out.sort((a,b)=>midnight(a.S.fad)-midnight(b.S.fad));
  return out;
}

    L.polyline([[j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]],{color:"#fff",weight:7,opacity:.9}).addTo(LLAYER);
    L.polyline([[j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]],{color:j.type==="straight"?"#B26B0B":"#3B72B0",weight:4,opacity:.95,dashArray:"9 7"}).addTo(LLAYER);
    L.marker([j.pickup.lat,j.pickup.lon],{icon:L.divIcon({className:"",html:'<div class="omark"></div>',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(LLAYER).bindPopup("Pickup · "+esc(j.pickupState));
    L.marker([j.delivery.lat,j.delivery.lon],{icon:L.divIcon({className:"",html:'<div class="dmark">'+esc(j.destState||"")+'</div>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(LLAYER).bindPopup("<b>"+esc(j.customer)+"</b><br>"+esc(j.pickupState)+" → "+esc(j.destState)+"<br>"+(j.cf||0)+" CF · by "+fmtMDY(j.fad)).openPopup();
    LMAP.fitBounds([[j.pickup.lat,j.pickup.lon],[j.delivery.lat,j.delivery.lon]],{padding:[60,60]});
  }catch(e){}
  $("#mapinfo").innerHTML="<b>"+esc(j.customer||j.code)+"</b> — "+esc(j.pickupState)+" → "+esc(j.destState)+" · "+(j.cf||0)+" CF · deliver by "+fmtMDY(j.fad);
  setTimeout(()=>{try{LMAP.invalidateSize();}catch(e){}},150);
}
function showConsolMap(ci){const c=CONS[ci];if(!c)return;setView("map");initMap();if(!LMAP||!LLAYER)return;
  try{LLAYER.clearLayers();const jobs=[c.S].concat(c.grp.map(g=>g.R)),dest=c.S.delivery,pts=[];
    jobs.forEach(j=>{if(j.pickup&&dest){L.polyline([[j.pickup.lat,j.pickup.lon],[dest.lat,dest.lon]],{color:"#6C5CE0",weight:4,opacity:.92}).addTo(LLAYER);L.marker([j.pickup.lat,j.pickup.lon],{icon:L.divIcon({className:"",html:'<div class="omark"></div>',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(LLAYER);pts.push([j.pickup.lat,j.pickup.lon]);}});
    if(dest){L.marker([dest.lat,dest.lon],{icon:L.divIcon({className:"",html:'<div class="dmark">'+esc(c.S.destState||"")+'</div>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(LLAYER);pts.push([dest.lat,dest.lon]);}
    if(pts.length)LMAP.fitBounds(pts,{padding:[50,50]});
  }catch(e){}
  $("#mapinfo").innerHTML="Consolidated <b>"+esc(c.S.destState)+"</b> run · "+(c.grp.length+1)+" jobs · "+Math.round(c.cf)+" CF";
}
/* ============ actions (writes) ============ */
function acceptRoute(ci){const c=CONS[ci];if(!c)return;
  const codes=[c.S].concat(c.grp.map(g=>g.R)).map(j=>j.code).filter(Boolean);
  const ymd=c.S.fad?(""+c.S.fad.getFullYear()+("0"+(c.S.fad.getMonth()+1)).slice(-2)+("0"+c.S.fad.getDate()).slice(-2)):Date.now().toString(36);
  const id="RT-"+(c.S.destState||"XX")+"-"+ymd+"-"+Math.random().toString(36).slice(2,5).toUpperCase();
  const obj={"Route ID":id,"Date":c.S.fad?fmtMDY(c.S.fad):"","Destination":c.S.destState||"","Truck":c.truck?c.truck.n:"","Job Codes":codes.join(", "),"CF":Math.round(c.cf),"Created At":new Date().toISOString()};
  ensureToken(()=>shAppend(ROUTES_TAB,obj).then(()=>{codes.forEach(x=>ROUTED.add(x));toast("Route "+id+" saved.");renderConsol();renderList();}).catch(e=>modal("Couldn't save route","<div class=\"mrow\">"+esc(e.message)+"</div>")));
}
function openAssign(code){const j=JOBS.find(x=>x.code===code);if(!j)return;
  const isS=j.type==="straight";
  const body='<div class="mrow"><span class="k">'+esc(j.customer||"")+' · '+esc(j.pickupState)+' → '+esc(j.destState)+' · deliver by '+fmtMDY(j.fad)+'</span></div>'+
    (isS?'<div class="mfield"><label>Foreman (we deliver)</label><select class="asel"><option value="">— pick foreman —</option>'+DATA.foremen.map(f=>'<option>'+esc(f)+'</option>').join("")+'</select></div>'
       :'<div class="mfield"><label>Carrier (3rd-party delivery)</label><input class="asel" placeholder="Carrier name"></div>');
  modal((isS?"Assign foreman":"Assign carrier"),body,'<button class="mini" onclick="closeModal()">Cancel</button><button class="mini pri" id="asave">Save</button>');
  $("#asave").onclick=()=>{const v=($(".asel").value||"").trim();if(!v){toast("Pick/enter one first.");return;}
    const obj={"Job Code":code,"Foreman":isS?v:"","Carrier":isS?"":v,"Assigned At":new Date().toISOString()};
    ensureToken(()=>shAppend(ASSIGN_TAB,obj).then(()=>{ASSIGN[code]={foreman:isS?v:(ASSIGN[code]&&ASSIGN[code].carrier),carrier:isS?(ASSIGN[code]&&ASSIGN[code].foreman):v};if(isS)ASSIGN[code]={foreman:v,carrier:""};else ASSIGN[code]={foreman:"",carrier:v};closeModal();toast("Assigned.");renderList();}).catch(e=>modal("Couldn't save","<div class=\"mrow\">"+esc(e.message)+"</div>")));
  };
}
function openStorage(code){const s=STORAGE[code],j=JOBS.find(x=>x.code===code);if(!s)return;
  modal("Storage — "+esc((j&&j.customer)||code),
   '<div class="mrow"><span class="k">Where:</span> <b>'+esc(s.type||"—")+'</b></div>'+
   '<div class="mrow"><span class="k">Location / unit:</span> '+esc(s.label||s.unit||"—")+'</div>'+
   '<div class="mrow"><span class="k">CF in storage:</span> '+esc(s.cf||"—")+'</div>'+
   '<div class="mrow"><span class="k">In storage since:</span> '+esc(s.since||"—")+'</div>'+
   (j?'<div class="mrow"><span class="k">Deliver by:</span> '+(j.fad?fmtMDY(j.fad):"—")+' — pull from storage in time.</div>':""),
   '<button class="mini pri" onclick="closeModal()">Got it</button>');
}
function waMsg(j,kind){const home=DATA.bases[j.pickupState]?j.pickupState:"NJ";
  if(kind==="out")return "🚚 Going "+(j.pickupState||"NJ")+" → "+(j.destState||"?")+" around "+(j.fad?fmtMDY(j.fad):"TBD")+".\nHave ~"+(j.cf||0)+" CF and room for more — anyone needs a load on the way? Reply with pickup + drop + CF.";
  return "🔄 Truck returning from "+(j.destState||"?")+" → "+home+" around "+(j.fad?fmtMDY(new Date(midnight(j.fad).getTime()+(j.tripDays||2)*86400000)):"TBD")+", coming back EMPTY.\nLooking for cargo back to "+home+". What've you got?";
}
function openBackhaul(code){const j=JOBS.find(x=>x.code===code);if(!j)return;
  const body='<div class="mrow"><span class="k">'+esc(j.customer||"")+' · '+esc(j.pickupState)+' → '+esc(j.destState)+' · '+(j.cf||0)+' CF</span></div>'+
   '<div class="mfield"><label>Outbound message (spare space)</label><div class="mwa" id="wo">'+esc(waMsg(j,"out"))+'</div></div>'+
   '<div class="mfield"><label>Return message (empty back)</label><div class="mwa" id="wr">'+esc(waMsg(j,"ret"))+'</div></div>'+
   '<div class="mfield"><label>If someone gives you return cargo, record it:</label><input id="bhcargo" placeholder="e.g. 300 CF furniture, Orlando → Newark"></div>';
  modal("Backhaul — blast WhatsApp & record",body,
   '<button class="mini" id="cpout">Copy outbound</button><button class="mini" id="cpret">Copy return</button><button class="mini pri green" id="bhsave">Save found cargo</button>');
  const cp=(t)=>{try{navigator.clipboard.writeText(t);toast("Copied.");}catch(e){toast("Copy from the box above.");}};
  $("#cpout").onclick=()=>cp(waMsg(j,"out"));$("#cpret").onclick=()=>cp(waMsg(j,"ret"));
  $("#bhsave").onclick=()=>{const cargo=($("#bhcargo").value||"").trim();if(!cargo){toast("Type what cargo you found.");return;}
    const obj={"Job Code":code,"Cargo":cargo,"From":j.destState||"","To":j.pickupState||"NJ","Recorded At":new Date().toISOString()};
    ensureToken(()=>shAppend(BACKHAUL_TAB,obj).then(()=>{BACKHAUL[code]={cargo:cargo,from:j.destState,to:j.pickupState};closeModal();toast("Backhaul recorded.");renderList();}).catch(e=>modal("Couldn't save","<div class=\"mrow\">"+esc(e.message)+"</div>")));
  };
}
/* ============ views ============ */
function setView(v){VIEW=v;document.querySelectorAll(".vbtn").forEach(b=>b.classList.toggle("on",b.dataset.view===v));
  const lc=$("#leftcol"),lay=$(".layout");
  if(v==="map"){lc.classList.add("hidden");lay.classList.add("mapfull");initMap();drawAll();setTimeout(()=>{try{LMAP&&LMAP.invalidateSize();}catch(e){}},160);}
  else{lc.classList.remove("hidden");lay.classList.remove("mapfull");
    $("#listview").classList.toggle("hidden",v!=="list");
    $("#calview").classList.toggle("hidden",v!=="cal");
    if(v==="cal")renderCal();}
}
/* ============ boot ============ */
function renderAll(){renderStorage();renderConsol();renderList();if(VIEW==="cal")renderCal();drawAll();}
function pull(){$("#rfstamp").textContent="Loading…";
  return Promise.all([loadJobs(),loadStorage(),loadRoutes(),loadBackhaul(),loadAssign()]).then(()=>{
    renderAll();
    $("#rfstamp").textContent=JOBS.length+" jobs · "+new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  }).catch(e=>{$("#rfstamp").textContent="load error";});
}
document.querySelectorAll(".vbtn").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));
$("#refresh").addEventListener("click",pull);
window.closeModal=closeModal;
initMap();pull();
</script>
</body>
</html>
