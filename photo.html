<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Production Calendar · Zip To Zip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F6F2; --card:#FFFFFF; --ink:#1F2329; --dim:#646B73; --faint:#969CA3;
  --line:#E6E4DC; --line2:#D3D0C6; --soft:#F1F0EA;
  --acc:#B26B0B; --acc-bg:#FBF1DC; --acc-bd:#E9D08A; --acc-ink:#8A530A;
  --good:#2E7D46; --good-bg:#E9F4EC; --good-bd:#BFE0C8;
  --shadow:0 1px 2px rgba(31,35,41,.04),0 8px 24px rgba(31,35,41,.06);
}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.bar{position:sticky;top:0;z-index:30;background:rgba(247,246,242,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-in{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:13px;padding:12px 20px}
.dot{width:34px;height:34px;border-radius:10px;background:var(--acc-bg);border:1px solid var(--acc-bd);color:var(--acc);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.dot svg{width:19px;height:19px}
.htxt h1{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:21px;letter-spacing:.05em;text-transform:uppercase;margin:0;line-height:1}
.htxt .sub{font-size:12px;color:var(--dim);margin-top:3px}
.wrap{max-width:1080px;margin:0 auto;padding:16px 20px 70px}
.filters{display:flex;flex-direction:column;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:18px}
.frow{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.fl input[type=number],.fl input[type=date]{font:inherit;font-size:13.5px;font-weight:600;padding:7px 10px;border:1px solid var(--line2);border-radius:9px;background:var(--card);color:var(--ink)}
.fl input[type=number]{width:84px}.fl input[type=date]{width:148px}
.fl .pair{display:flex;gap:6px;align-items:center}.fl .pair span{color:var(--faint);font-size:12px}
.ms{position:relative}
.msbtn{font:inherit;font-size:13.5px;font-weight:600;padding:7px 12px;min-width:170px;border:1px solid var(--line2);border-radius:9px;background:var(--card);color:var(--ink);cursor:pointer;display:flex;align-items:center}
.msbtn:after{content:'\25BE';margin-left:auto;color:var(--faint);padding-left:8px}
.msbtn:hover{border-color:var(--acc-bd)}
.mspanel{position:absolute;top:calc(100% + 6px);left:0;z-index:40;display:none;background:var(--card);border:1px solid var(--line2);border-radius:11px;box-shadow:0 12px 30px rgba(0,0,0,.14);padding:8px;min-width:200px;max-height:300px;overflow:auto}
.mspanel.open{display:block}
.msopt{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
.msopt:hover{background:var(--soft)}.msopt input{margin:0;accent-color:var(--acc)}
.msclear{display:block;width:100%;text-align:left;border:0;background:none;color:var(--acc-ink);font:inherit;font-size:12px;font-weight:600;padding:7px 8px;cursor:pointer;border-top:1px solid var(--line);margin-top:4px}
.camfl{flex-direction:row;align-items:center;gap:9px}
.sw{position:relative;display:inline-block;width:44px;height:24px;cursor:pointer;flex:0 0 auto}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw .track{position:absolute;inset:0;background:var(--line2);border-radius:999px;transition:.18s}
.sw .track:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.sw input:checked + .track{background:var(--acc)}
.sw input:checked + .track:before{transform:translateX(20px)}
.count{margin-left:auto;text-align:right}
.count b{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:600;line-height:1;display:block;color:var(--acc-ink)}
.count span{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
/* schedule */
.day{margin-bottom:20px}
.dayhdr{display:flex;align-items:center;gap:10px;padding:6px 2px 10px;position:sticky;top:59px;z-index:10;background:linear-gradient(var(--paper) 70%,rgba(247,246,242,0))}
.dnum{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;letter-spacing:.03em;color:var(--ink);text-transform:uppercase}
.dbadge{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--dim);background:var(--card)}
.dbadge.today{color:var(--acc-ink);background:var(--acc-bg);border-color:var(--acc-bd)}
.dbadge.tom{color:#1d6fa5;background:#e6f1f8;border-color:#bcdcef}
.dcount{margin-left:auto;font-size:12px;color:var(--faint);font-weight:600}
.job{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:13px 15px;margin-bottom:9px}
.jtime{flex:0 0 auto;width:62px;text-align:center;line-height:1.15;padding-top:1px}
.jtime b{display:block;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;color:var(--ink)}
.jtime span{font-size:10.5px;font-weight:700;color:var(--faint);letter-spacing:.03em}
.jmain{flex:1 1 auto;min-width:0}
.jcust{font-weight:700;font-size:15.5px;color:var(--acc-ink);text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.jcust:hover{text-decoration:underline}
.jcust svg{width:13px;height:13px;opacity:.7;flex:0 0 auto}
.jcust.nolink{color:var(--ink);pointer-events:none}
.jcust.nolink svg{display:none}
.jmeta{margin-top:4px;display:flex;flex-wrap:wrap;align-items:center;gap:7px;color:var(--dim);font-size:12.5px}
.jmeta .sep{color:var(--line2)}
.route{font-weight:700;color:var(--ink);white-space:nowrap;letter-spacing:.02em}
.route .ar{color:var(--faint);font-weight:400;margin:0 3px}
.jt{display:inline-block;font-size:11px;font-weight:600;padding:1px 9px;border-radius:20px;background:var(--soft);color:var(--dim);border:1px solid var(--line);white-space:nowrap}
.sz{font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink)}
.jaddr{display:block;margin-top:6px;color:var(--ink);font-size:13px;text-decoration:none;font-weight:500}
.jaddr:hover{color:var(--acc-ink);text-decoration:underline}
.jaddr svg{width:12px;height:12px;opacity:.6;margin-right:3px;vertical-align:-1px}
.jfore{margin-top:8px;display:inline-flex;align-items:center;gap:7px;background:var(--good-bg);border:1px solid var(--good-bd);border-radius:9px;padding:5px 10px;font-size:12.5px;font-weight:600;color:#1f5b34}
.jfore svg{width:14px;height:14px;flex:0 0 auto}
.jfore .fname{color:var(--ink)}
.jfore a{color:#1f6f3f;text-decoration:none;font-weight:700;white-space:nowrap}
.jfore a:hover{text-decoration:underline}
.empty{padding:48px 24px;text-align:center;color:var(--dim);background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.empty b{display:block;font-family:'Barlow Condensed',sans-serif;font-size:20px;color:var(--ink);font-weight:600;margin-bottom:6px}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#1E2228;color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:600px){
  .bar-in{padding:10px 14px;gap:11px}.htxt h1{font-size:19px}
  .wrap{padding:14px 13px 60px}
  .filters{padding:12px 13px;gap:11px}.frow{gap:12px}
  .count{margin-left:0}.count b{font-size:25px}
  .fl input[type=date]{width:130px}.msbtn{min-width:142px}
  .dayhdr{top:55px}.dnum{font-size:16px}
  .job{padding:11px 12px;gap:11px}.jtime{width:50px}.jtime b{font-size:16px}
  .jcust{font-size:14.5px}
}
.connbtn{margin-left:auto;font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line2);background:var(--card);color:var(--dim);border-radius:9px;padding:7px 12px;cursor:pointer}
.connbtn:hover{border-color:var(--acc-bd);color:var(--ink)}
.jconf{margin-top:8px;display:inline-block;font-size:12.5px;font-weight:700}
.jconf.btn{cursor:pointer;border:1px solid var(--acc-bd);background:var(--acc-bg);color:var(--acc-ink);border-radius:9px;padding:6px 12px}
.jconf.btn:hover{filter:brightness(.97)}
.jconf.done{color:#1f6f3f;background:#e9f4ec;border:1px solid #bfe0c8;border-radius:9px;padding:5px 11px}
.jconf.taken{color:var(--faint);font-weight:600}
.cfm-bg{position:fixed;inset:0;background:rgba(20,28,40,.45);display:flex;align-items:center;justify-content:center;z-index:80;padding:18px}
.cfm{background:var(--card);border-radius:16px;max-width:380px;width:100%;padding:20px 22px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.cfm h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:20px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.03em}
.cfm-d{background:var(--soft);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
.cfm-d b{font-size:15px}.cfm-row{font-size:13px;color:var(--dim);margin-top:3px}
.cfm-note{font-size:12.5px;color:var(--dim);margin:13px 0}
.cfm-act{display:flex;gap:10px;justify-content:flex-end}
.cfm-act button{font:inherit;font-size:13.5px;font-weight:600;border-radius:9px;padding:9px 16px;cursor:pointer;border:1px solid var(--line2);background:var(--card);color:var(--ink)}
.cfm-ok{background:var(--acc);color:#fff;border-color:var(--acc)}
</style>
<script src="https://accounts.google.com/gsi/client" async defer onerror="window._gsiFail=1"></script>
</head>
<body>
<div class="bar"><div class="bar-in">
  <span class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
  <div class="htxt"><h1>Production Calendar</h1><div class="sub">Zip to Zip &middot; local jobs &middot; nearest first &middot; foreman for today &amp; tomorrow</div></div>
  <button class="connbtn" id="connbtn" onclick="connectGoogle()">Connect Google</button>
</div></div>
<div class="wrap">
  <div class="filters">
    <div class="frow">
      <div class="fl"><label>Pickup state</label><div class="ms" id="puMs"><button type="button" class="msbtn" id="puBtn">All states</button><div class="mspanel" id="puPanel"></div></div></div>
      <div class="fl camfl"><label>Only &#128248;</label><label class="sw"><input type="checkbox" id="fCam"><span class="track"></span></label></div>
    </div>
    <div class="frow">
      <div class="fl"><label>Min size</label><input id="fCF" type="number" value="1000" step="100"></div>
      <div class="fl"><label>Within (mi)</label><input id="fMax" type="number" value="50" step="1"></div>
      <div class="fl"><label>Dates</label><div class="pair"><input id="fFrom" type="date"><span>to</span><input id="fTo" type="date"></div></div>
      <div class="count"><b id="cnt">0</b><span>Total Jobs</span></div>
    </div>
  </div>
  <div id="out"></div>
</div>
<script src="zipdb.js?v=1"></script>
<script>
var ZIPDB=window.ZIPDB||{};
var SHEET_ID='1CkeM4UF6ohQdC17AVTNtUoQaM1E6vmnXuEnqgzZVLOs';
var SHEET_TAB='Google Calendar';
var CREW_TAB='Crew Members';
var GCAL_ID='contact@ziptozipmoving.com';
var JOBS=[], CREW={}, puSel=new Set(), CONFIRMED={};
var GCAL_CLIENT_ID='712386117874-epqesoppk5fftq0j2gpp7becbk7cu72q.apps.googleusercontent.com';
var GSCOPE_VER='cal+sheets-1', CONF_TAB='Photo Confirmations';
var GTOKEN=null,GTOKEXP=0,_tc=null;
try{var _g=JSON.parse(localStorage.getItem('zd_gtok')||'null');if(_g&&_g.scope===GSCOPE_VER&&_g.exp>Date.now()+60000){GTOKEN=_g.t;GTOKEXP=_g.exp;}}catch(e){}
function $(s){return document.querySelector(s);}
function esc(x){return String(x==null?'':x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function toast(m){var t=$('#toast');if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},4200);}
function gReady(){return !!(window.google&&google.accounts&&google.accounts.oauth2);}
function updateConnUI(){var b=$('#connbtn');if(b)b.textContent=GTOKEN?'Google \u2713':'Connect Google';}
function ensureToken(cb){
  if(GTOKEN&&Date.now()<GTOKEXP-60000)return cb();
  if(window._gsiFail||!gReady()){toast('Open this on the hosted (GitHub Pages) URL to sign in.');return;}
  _tc=_tc||google.accounts.oauth2.initTokenClient({client_id:GCAL_CLIENT_ID,scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/spreadsheets',callback:function(){}});
  _tc.callback=function(resp){if(resp&&resp.access_token){GTOKEN=resp.access_token;GTOKEXP=Date.now()+((resp.expires_in||3600)*1000);try{localStorage.setItem('zd_gtok',JSON.stringify({t:GTOKEN,exp:GTOKEXP,scope:GSCOPE_VER}));localStorage.setItem('zd_gconn',GSCOPE_VER);}catch(e){}updateConnUI();cb();}else toast('Sign-in failed.');};
  _tc.requestAccessToken({prompt:localStorage.getItem('zd_gconn')===GSCOPE_VER?'':'consent'});
}
function connectGoogle(){ensureToken(function(){updateConnUI();toast('Google connected.');});}
function shFetch(path,opt){return fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+path,Object.assign({headers:{'Authorization':'Bearer '+GTOKEN,'Content-Type':'application/json'}},opt||{})).then(function(r){if(!r.ok)return r.text().then(function(b){throw new Error('Sheets '+r.status+' '+String(b).slice(0,100));});return r.status===204?null:r.json();});}
function shAppendRow(tab,obj){var enc=encodeURIComponent("'"+tab+"'");return shFetch('/values/'+enc+'?valueRenderOption=FORMATTED_VALUE').catch(function(){return {};}).then(function(v){var vals=(v&&v.values)||[];var header=vals[0]||[];var pre=Promise.resolve();if(!header.length){pre=shFetch(':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})}).catch(function(){}).then(function(){header=Object.keys(obj);return shFetch('/values/'+encodeURIComponent("'"+tab+"'!A1")+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:[header]})});});}return pre.then(function(){var row=header.map(function(h){return obj[h]!=null?String(obj[h]):'';});Object.keys(obj).forEach(function(k){if(header.indexOf(k)<0)row.push(String(obj[k]));});return shFetch('/values/'+enc+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS',{method:'POST',body:JSON.stringify({values:[row]})});});});}
function loadConfirmations(){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&headers=1&sheet='+encodeURIComponent(CONF_TAB)+'&_t='+Date.now();
  return fetch(url).then(function(r){return r.ok?r.text():'';}).then(function(t){try{var rows=pcsv(t);if(rows.length>=2){var H=rows[0].map(function(x){return String(x).trim().toLowerCase();});var jd=H.indexOf('job date'),jc=H.indexOf('job code');rows.slice(1).forEach(function(r){var d=(jd>=0?r[jd]:'').trim(),c=(jc>=0?r[jc]:'').trim();if(d&&c)CONFIRMED[d]=c;});}}catch(e){}}).catch(function(){});
}
function jobByCode(c){for(var i=0;i<JOBS.length;i++)if(JOBS[i].jobCode===c)return JOBS[i];return null;}
function confirmBlock(j){
  if(!j.date)return '';
  var mine=CONFIRMED[j.date];
  if(mine===j.jobCode)return '<div class="jconf done">\u2713 You confirmed this job</div>';
  if(mine)return '<div class="jconf taken">Another job already confirmed for this day</div>';
  return '<button class="jconf btn" data-confirm="'+esc(j.jobCode)+'">\ud83d\udcf8 Confirm I will shoot this</button>';
}
function openConfirm(j){
  var ov=document.createElement('div');ov.className='cfm-bg';var dh=dayHeader(j.date);var tm=fmt12(j.tmin);
  ov.innerHTML='<div class="cfm"><h3>Confirm this shoot?</h3><div class="cfm-d"><div><b>'+esc(j.customer||'(no name)')+'</b></div><div class="cfm-row">'+esc(dh.label)+(j.tmin!=null?' \u00b7 '+esc(tm.t)+' '+esc(tm.ap):'')+'</div><div class="cfm-row">'+esc(j.jobCode)+' \u00b7 '+esc(j.puState||'?')+'\u2192'+esc(j.delState||'?')+' \u00b7 '+Math.round(j.cf||0).toLocaleString()+' CF</div><div class="cfm-row">'+esc(j.pickup||'')+'</div></div><p class="cfm-note">You can confirm only one job per day. Support will be notified you are going.</p><div class="cfm-act"><button class="cfm-cancel">Cancel</button><button class="cfm-ok">Yes, confirm</button></div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  ov.querySelector('.cfm-cancel').onclick=function(){ov.remove();};
  ov.querySelector('.cfm-ok').onclick=function(){ov.remove();doConfirm(j);};
}
function doConfirm(j){
  if(CONFIRMED[j.date]&&CONFIRMED[j.date]!==j.jobCode){toast('You already confirmed a job for that day.');render();return;}
  ensureToken(function(){
    shAppendRow(CONF_TAB,{'Job Date':j.date,'Job Code':j.jobCode,'Customer':j.customer||'','Pickup':j.pickup||'','Event Link':calEventLink(j.eventId),'Confirmed At':new Date().toISOString(),'Notify':'pending'})
      .then(function(){CONFIRMED[j.date]=j.jobCode;toast('\u2713 Confirmed \u2014 support will be notified.');render();})
      .catch(function(e){toast('Could not save: '+e.message);});
  });
}
function haversine(a,b,c,d){var R=3958.8,dl=(c-a)*Math.PI/180,dn=(d-b)*Math.PI/180,x=Math.sin(dl/2)*Math.sin(dl/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dn/2)*Math.sin(dn/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function zipFromAddr(s){var m=String(s||'').match(/\b(\d{5})(?:-\d{4})?\b(?!.*\b\d{5}\b)/);return m?m[1]:null;}
function geoFull(zip){var z=ZIPDB[zip];return z?{lat:z[0],lon:z[1],st:z[3]}:null;}
function homeCoord(){var z=geoFull('11223');return z||{lat:40.5971,lon:-73.9734};}
function calNumV(s){var m=String(s==null?'':s).replace(/[^0-9.\-]/g,'');var v=parseFloat(m);return isFinite(v)?v:null;}
function calEventLink(eid){eid=String(eid||'').split('@')[0];if(!eid)return '';try{var b=btoa(eid+' '+GCAL_ID).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');return 'https://calendar.google.com/calendar/u/0/r/eventedit/'+b;}catch(e){return 'https://calendar.google.com/calendar/u/0/r';}}
function mapsLink(a){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(a||'');}
function telHref(p){var d=String(p||'').replace(/\D/g,'');if(d.length===10)d='1'+d;return d?('tel:+'+d):'';}
function normEmail(s){s=String(s||'');var m=s.match(/<([^>]+)>/);if(m)s=m[1];return s.replace(/[\u200e\u200f\u202a-\u202e\u2066-\u2069\s]/g,'').toLowerCase();}
function cleanPhone(p){return String(p||'').replace(/[\u200e\u200f\u202a-\u202e\u2066-\u2069]/g,'').replace(/\s+/g,' ').trim();}
var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function isoLocal(dt){return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2);}
function parseDate(s){s=String(s||'').trim();var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return m[3]+'-'+('0'+m[1]).slice(-2)+'-'+('0'+m[2]).slice(-2);m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'-'+m[2]+'-'+m[3];m=s.match(/Date\((\d+),(\d+),(\d+)/);if(m)return m[1]+'-'+('0'+(+m[2]+1)).slice(-2)+'-'+('0'+m[3]).slice(-2);return '';}
function parseTimeMin(s){var m=String(s||'').match(/(\d{1,2}):(\d{2})/);if(!m)return null;var h=+m[1],mi=+m[2];if(h>23||mi>59)return null;return h*60+mi;}
function fmt12(min){if(min==null)return {t:'',ap:''};var h=Math.floor(min/60),m=min%60,ap=h<12?'AM':'PM',h12=h%12||12;return {t:h12+':'+('0'+m).slice(-2),ap:ap};}
function dayHeader(iso){var p=iso.split('-');var dt=new Date(+p[0],+p[1]-1,+p[2]);var today=isoLocal(new Date()),tom=isoLocal(new Date(Date.now()+86400000));var label=DOW[dt.getDay()]+', '+MON[dt.getMonth()]+' '+(+p[2]);var badge=iso===today?'today':(iso===tom?'tom':'');return {label:label,badge:badge,badgeTxt:badge==='today'?'Today':(badge==='tom'?'Tomorrow':'')};}
function pcsv(t){var rows=[],r=[],c='',q=false;for(var i=0;i<t.length;i++){var ch=t[i];if(q){if(ch==='"'){if(t[i+1]==='"'){c+='"';i++;}else q=false;}else c+=ch;}else{if(ch==='"')q=true;else if(ch===','){r.push(c);c='';}else if(ch==='\n'){r.push(c);rows.push(r);r=[];c='';}else if(ch!=='\r')c+=ch;}}if(c!==''||r.length){r.push(c);rows.push(r);}return rows;}
function calDescText(s){s=String(s||'');if(/<[a-z!\/]/i.test(s)){s=s.replace(/<br\s*\/?>/gi,'\n').replace(/<\/(div|p|li|tr|h[1-6])>/gi,'\n').replace(/<li[^>]*>/gi,'\n').replace(/<[^>]+>/g,'');}return s.replace(/&nbsp;/gi,' ').replace(/&amp;/gi,'&').replace(/&lt;/gi,'<').replace(/&gt;/gi,'>').replace(/&#39;|&apos;/gi,"'").replace(/&quot;/gi,'"');}
function parseLabels(desc){var o={};calDescText(desc).split(/\r?\n/).forEach(function(line){var m=line.match(/^\s*([A-Za-z][A-Za-z0-9 \/#%-]{1,40})\s*:\s*(.*)$/);if(m){var k=m[1].trim().toLowerCase();if(o[k]===undefined)o[k]=m[2].trim();}});return o;}
function buildJob(o){var pz=geoFull(zipFromAddr(o.pickup)),dz=geoFull(zipFromAddr(o.deliv));o.puState=pz?pz.st:'';o.delState=dz?dz.st:'';o.lat=pz?pz.lat:null;o.lon=pz?pz.lon:null;return o;}
function loadCrew(){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&headers=1&sheet='+encodeURIComponent(CREW_TAB)+'&_t='+Date.now();
  return fetch(url).then(function(r){return r.text();}).then(function(t){
    var rows=pcsv(t);if(rows.length<2)return;
    var H=rows[0].map(function(x){return String(x).trim().toLowerCase();});
    var iE=H.indexOf('primary email'),iP=H.indexOf('phone'),iF=H.indexOf('first name'),iL=H.indexOf('last name');
    rows.slice(1).forEach(function(r){var e=normEmail(iE>=0?(r[iE]||''):'');if(!e)return;var nm=((iF>=0?(r[iF]||''):'')+' '+(iL>=0?(r[iL]||''):'')).replace(/\s+/g,' ').trim();CREW[e]={name:nm,phone:(iP>=0?(r[iP]||''):'').trim()};});
  }).catch(function(){});
}
function loadSheet(){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&headers=1&sheet='+encodeURIComponent(SHEET_TAB)+'&_t='+Date.now();
  return fetch(url).then(function(r){return r.text();}).then(function(t){
    var rows=pcsv(t);if(rows.length<2){JOBS=[];return;}
    var H=rows[0].map(function(x){return String(x).trim().toLowerCase();});
    function ci(n){return H.indexOf(n);}
    var iLoc=ci('location'),iDesc=ci('description'),iDate=ci('event date'),iTitle=ci('event title'),iEid=ci('event id'),iMT=ci('moving type'),iStat=ci('entry status'),iFReq=ci('final request #'),iFJob=ci('final job code'),iFFE=ci('final forman email'),iFE=ci('forman email'),iJC=ci('job company');
    var out=[];
    rows.slice(1).forEach(function(r){
      if((r[iStat]||'').trim()!=='Correct Job')return;
      var title=(r[iTitle]||'').trim();
      if(/cancel/i.test(title))return;
      var fjob=(r[iFJob]||'').trim();if(!fjob)return;
      if((iJC>=0?(r[iJC]||''):'').trim().toLowerCase()!=='zip to zip')return;
      var L=parseLabels(r[iDesc]||'');
      out.push(buildJob({jobCode:fjob,requestNo:(r[iFReq]||'').trim(),date:parseDate(r[iDate]),tmin:parseTimeMin(r[iDate]),
        title:title,emoji:title.indexOf('📸')>=0,
        customer:(L['customer name']||'').trim(),
        pickup:(r[iLoc]||'').trim()||L['moving from']||'',deliv:(L['moving to']||'').trim(),
        cf:calNumV(L['total cf'])||0,mt:((r[iMT]||'').trim()||L['moving type']||''),
        eventId:(r[iEid]||'').trim(),
        foreman:((iFFE>=0?(r[iFFE]||''):'').trim()||(iFE>=0?(r[iFE]||''):'').trim())}));
    });
    JOBS=out;
  }).catch(function(e){toast('⚠ Could not read the sheet: '+e.message);});
}
function localJobs(){return JOBS.filter(function(j){return /local/i.test(j.mt)&&!/long/i.test(j.mt);});}
function finishLoad(){buildPuDropdown();render();updateConnUI();}
function updatePuBtn(){var b=$('#puBtn');if(!b)return;b.textContent=puSel.size?(puSel.size===1?Array.from(puSel)[0]:puSel.size+' states'):'All states';}
function buildPuDropdown(){
  var s={};localJobs().forEach(function(j){if(j.puState)s[j.puState]=1;});var list=Object.keys(s).sort();
  var panel=$('#puPanel');if(!panel)return;
  panel.innerHTML=list.map(function(v){return '<label class="msopt"><input type="checkbox" value="'+esc(v)+'"'+(puSel.has(v)?' checked':'')+'>'+esc(v)+'</label>';}).join('')+'<button type="button" class="msclear">Clear / All</button>';
  [].forEach.call(panel.querySelectorAll('input'),function(cb){cb.onchange=function(){if(cb.checked)puSel.add(cb.value);else puSel.delete(cb.value);updatePuBtn();render();};});
  panel.querySelector('.msclear').onclick=function(){puSel.clear();buildPuDropdown();updatePuBtn();render();};
  updatePuBtn();
}
function foremanBlock(j){
  if(!j.foreman)return '';
  var today=isoLocal(new Date()),tom=isoLocal(new Date(Date.now()+86400000));
  if(j.date!==today&&j.date!==tom)return '';
  var c=CREW[normEmail(j.foreman)];
  var nm=(c&&c.name)?c.name:j.foreman.split('@')[0];
  var ph=c?cleanPhone(c.phone):'';
  var tel=telHref(ph);
  var phHtml=ph?(tel?'<a href="'+esc(tel)+'">'+esc(ph)+'</a>':'<span>'+esc(ph)+'</span>'):'<span style="color:var(--faint);font-weight:600">no phone on file</span>';
  return '<div class="jfore"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-1a6 6 0 0 1 12 0v1"/><circle cx="10" cy="7" r="3.2"/><path d="M16.5 10.5a4 4 0 0 1 5 4V16"/></svg><span class="fname">'+esc(nm)+'</span> &middot; '+phHtml+'</div>';
}
function jobCard(r){
  var j=r.j,tm=fmt12(j.tmin);
  var ev=calEventLink(j.eventId);
  var cicon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>';
  var cust=esc(j.customer||'(no name)');
  var custHtml=ev?('<a class="jcust" href="'+ev+'" target="_blank" rel="noopener" title="Open calendar event">'+cust+cicon+'</a>')
                 :('<span class="jcust nolink">'+cust+'</span>');
  var route='<span class="route">'+esc(j.puState||'?')+'<span class="ar">→</span>'+esc(j.delState||'?')+'</span>';
  var pin='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.7-7-11a7 7 0 0 1 14 0c0 5.3-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>';
  return '<div class="job">'
    +'<div class="jtime"><b>'+esc(tm.t||'—')+'</b><span>'+esc(tm.ap)+'</span></div>'
    +'<div class="jmain">'
      +custHtml
      +'<div class="jmeta">'+route+'<span class="sep">·</span><span class="jt">'+esc(j.mt||'Local')+'</span><span class="sep">·</span><span class="sz">'+Math.round(j.cf||0).toLocaleString()+' CF</span><span class="sep">·</span><span>'+r.dist.toFixed(1)+' mi</span></div>'
      +'<a class="jaddr" href="'+mapsLink(j.pickup)+'" target="_blank" rel="noopener">'+pin+esc(j.pickup||'(no address)')+'</a>'
      +foremanBlock(j)
      +confirmBlock(j)
    +'</div></div>';
}
function render(){
  var out=$('#out');
  if(!JOBS.length){out.innerHTML='<div class="empty"><b>No jobs loaded</b>The Google Calendar sheet tab returned no usable rows.</div>';$('#cnt').textContent='0';return;}
  var H=homeCoord(),minCF=+$('#fCF').value||0,dMax=+$('#fMax').value;
  var camOnly=$('#fCam')&&$('#fCam').checked;
  var today=isoLocal(new Date());
  var fFrom=$('#fFrom').value||'',fTo=$('#fTo').value||'';
  var lo=fFrom&&fFrom>today?fFrom:today;
  var rows=[];
  JOBS.forEach(function(j){
    if(!/local/i.test(j.mt)||/long/i.test(j.mt))return;
    if((j.cf||0)<minCF)return;
    if(!j.date||j.date<lo)return;
    if(fTo&&j.date>fTo)return;
    if(puSel.size&&!puSel.has(j.puState))return;
    if(camOnly&&!j.emoji)return;
    if(j.lat==null||j.lon==null)return;
    var dist=haversine(H.lat,H.lon,j.lat,j.lon);
    if(dist>dMax)return;
    rows.push({j:j,dist:dist});
  });
  rows.sort(function(a,b){return (a.j.date||'').localeCompare(b.j.date||'')||((a.j.tmin==null?9999:a.j.tmin)-(b.j.tmin==null?9999:b.j.tmin))||(a.dist-b.dist);});
  $('#cnt').textContent=rows.length;
  if(!rows.length){out.innerHTML='<div class="empty"><b>Nothing matches</b>No local jobs fit these filters. Widen the distance, dates or states, lower the min size, or turn off the &#128248; filter.</div>';return;}
  var html='',curDate=null;
  rows.forEach(function(r){
    if(r.j.date!==curDate){
      if(curDate!==null)html+='</div></div>';
      curDate=r.j.date;
      var dh=dayHeader(curDate);
      var n=rows.filter(function(x){return x.j.date===curDate;}).length;
      html+='<div class="day"><div class="dayhdr"><span class="dnum">'+esc(dh.label)+'</span>'+(dh.badge?'<span class="dbadge '+dh.badge+'">'+esc(dh.badgeTxt)+'</span>':'')+'<span class="dcount">'+n+(n===1?' shoot':' shoots')+'</span></div><div class="jobs">';
    }
    html+=jobCard(r);
  });
  if(curDate!==null)html+='</div></div>';
  out.innerHTML=html;
}
['fCF','fMax','fFrom','fTo'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',render);});
var cam=$('#fCam');if(cam)cam.addEventListener('change',render);
$('#puBtn').addEventListener('click',function(e){e.stopPropagation();$('#puPanel').classList.toggle('open');});
document.addEventListener('click',function(e){var p=$('#puPanel');if(p&&p.classList.contains('open')&&!$('#puMs').contains(e.target))p.classList.remove('open');});
document.addEventListener('click',function(e){var b=e.target.closest&&e.target.closest('[data-confirm]');if(b){var j=jobByCode(b.getAttribute('data-confirm'));if(j)openConfirm(j);}});
Promise.all([loadCrew(),loadSheet(),loadConfirmations()]).then(finishLoad);
</script>
