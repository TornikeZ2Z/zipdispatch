  if(s==null||s==='')return null;

async function fetchTab(name){

  }
  for(const r of (T.rented||[])){
    if(!r['Truck N'])continue;
    const st=(r['Status']||'Active').trim();
    if(st&&st!=='Active')continue;
    const _rd=v=>{v=(v||'').trim();if(!v)return null;return /\//.test(v)?usDate(v):v;};
    trucks.push({n:r['Truck N'].trim(),status:'Active',cf:numV(r['CF']),
      maxCrew:numV(r['Max Crew Size'])||3,
      state:(r['Base']||'').trim(),type:/van/i.test(r['Type']||'')?'Van':'Truck',
      model:'rental'+((r['Provider']||'').trim()?' · '+r['Provider'].trim():''),reg:'rental',rented:true,rate:numV(r['Daily Rate'])||null,
      provider:(r['Provider']||'').trim()||null,rentStart:_rd(r['Rental Start']),rentEnd:_rd(r['Rental End']),
      fuel:(r['Fuel']||'').trim()||null,dayFee:numV(r['Daily Fee $'])||null,oneFee:numV(r['One-Time Fee $'])||null,perMile:numV(r['Per Mile $'])||null});
  }
  const rentalRates=[];
  for(const r of (T.rentalopts||[])){
    if(!r['Size']&&!r['Provider'])continue;
    rentalRates.push({provider:(r['Provider']||'').trim(),size:(r['Size']||'').trim(),
      cf:numV(r['CF']),maxCrew:numV(r['Max Crew']),rate:numV(r['Daily Rate']),
      base:(r['Base']||'').trim()||null});
  }
  const dayoffs=[];
  for(const r of T.offs){
    const a=usDate(r['Start Date']);if(!a||!r['Forman Name'])continue;
    const b=usDate(r['End Date'])||a;
    dayoffs.push([r['Forman Name'].trim(),isoD(a),isoD(b),(r['Note']||'').trim()]);
  }
  let scores={},scoreMonth=null;
  if(T.scores&&T.scores.length){
    const heads=Object.keys(T.scores[0]).filter(h=>h!=='Foreman');
    const limit=Date.now()+31*864e5;
    for(const h of heads.slice().sort((a,b)=>(usDate(a)||0)-(usDate(b)||0))){
      const hd=usDate(h);if(!hd||hd.getTime()>limit)continue;
      const col={};let any=false;
      for(const r of T.scores){const v=parseFloat(r[h]);if(!isNaN(v)&&r['Foreman']){col[r['Foreman'].trim()]=v;any=true;}}
      if(any){scores=col;scoreMonth=isoD(hd).slice(0,7);}
    }
  }
  const days={};let dropped=0;
  for(const r of T.jobs){
    if(!r['Job Code']){dropped++;continue;}
    const pz=zgeoJS(r['PIckup Zipcode']);
    if(!pz){dropped++;continue;}
    const dz=zgeoJS(r['Delivery Zipcode']);

    if(!start||!end){dropped++;continue;}
    start=r5js(start);end=r5js(end);
    let actH=durH(r['ACT Time']);
    if(actH==null)actH=Math.max((end-start)/36e5,2);
    if(isoD(end)!==isoD(start))end=new Date(start.getTime()+actH*36e5);
    if(end<=start)end=new Date(start.getTime()+Math.max(actH,2)*36e5);
    const toks=String(r['Event Title']||'').split('#');
    const _dayArrKey=isoD(start);
    const mf=toks.length>=3?(toks[1].trim()||null):null;
    const mt=toks.length>=4?(toks[2].trim()||null):null;
    (days[_dayArrKey]=days[_dayArrKey]||[]).push({
      idx:(days[_dayArrKey]||[]).length,
      eventId:(r['Event ID']||'').trim()||null,
      code:r['Job Code'].trim(),after:(r['After Job Code']||'').trim()||null,
      first:r['First Job of the Day']===''?true:!!parseFloat(r['First Job of the Day']),
      base:(r['Base']||'').trim()||null,pickup:pz,delivery:dz,
      pickupAddr:r['Location']||'',deliveryAddr:r['End Location']||'',
      cityFrom:(r['City From']||pz.city||'').trim()||pz.city,
      cityTo:(r['City To']||(dz?dz.city:'?')||'').trim()||(dz?dz.city:'?'),
      stateFrom:pz.state,stateTo:dz?dz.state:'',
      cf:numV(r['Total CF']),
      crew:Math.max(numV(r['Crew Size']),numV(r['Crew Size for Chain Moving']),numV(r['Crew Size at Pickup']),2),
      trucksQ:numV(r['Truck Quantity']),vansQ:numV(r['Van Quantity']),
      movingType:r['Moving Type']||'',packing:numV(r['Packing Estimate']),
      customer:r['Customer Name']||'',
      start:isoDT(start),end:isoDT(end),
      jobType:(r['Job Type']||'').trim()||null,
      straight:(function(){
        const jt=String(r['Job Type']||'');
        if(/straight/i.test(jt))return true;
        if(/regular/i.test(jt))return false;
        return /straight/i.test(String(r['Description']||'')+' '+String(r['Moving Type']||''));
      })(),
      piano:String(r['Event Title']||'').includes('🎹'),
      rescheduled:String(r['Event Title']||'').toUpperCase().includes('RESCHEDULED'),
      actH,mf,mt});
  }
  return {days,trucks,foremen,bases,dayoffs,scores,scoreMonth,rentalRates,dropped};
}
async function liveRefresh(){
  const btn=document.getElementById('refreshbtn');
  const orig=btn.textContent;
  btn.textContent='↻ Refreshing…';btn.disabled=true;
  const TABS=['List of Bases','Crew Members','Vehicles','Crew Day Offs','Foreman of the Month','Rented Trucks','Rental Options','Truck Holders'];
  const modal=openRfModal(TABS.concat(['Google Calendar jobs']));
  const get=(n,optional)=>fetchTab(n)
    .then(rows=>{rfStep(n,'ok',rows.length+' rows');return rows;})
    .catch(e=>{rfStep(n,optional?'ok':'fail',optional?'skipped — '+e.message:e.message);if(optional)return [];throw e;});
  try{
    const [bases,crew,vehicles,offs,scores,rented,rentalopts,holders,exrows]=await Promise.all([
      get('List of Bases'),get('Crew Members'),
      get('Vehicles'),get('Crew Day Offs'),get('Foreman of the Month',true),
      get('Rented Trucks',true),get('Rental Options',true),get('Truck Holders',true),get('Excluded Events',true)]);
    rfStep('build','run','rebuilding…');
    const fresh=rebuildFromTabs({jobs:[],bases,crew,vehicles,offs,scores,rented,rentalopts});
    if(!Object.keys(fresh.bases||{}).length||!(fresh.foremen||[]).length||!(fresh.trucks||[]).length)
      throw new Error('the sheet pull came back empty (bases/foremen/trucks missing) — kept the previous data');
    for(const r of (exrows||[])){
      if((r['Status']||'')==='Excluded'&&(r['Event Id']||'').trim())EXCL.add(r['Event Id'].trim());
    }
    persistToggles();
    DATA.holders={};
    for(const r of (holders||[])){
      const tn=(r['Truck N']||'').trim(),fn=(r['Foreman']||'').trim();
      if(!tn||!fn)continue;
      const f=fresh.foremen.find(x=>x.name===fn||x.nick===fn);
      if(f)DATA.holders[tn]=f.name;
    }
    DATA.trucks=fresh.trucks;DATA.foremen=fresh.foremen;
    DATA.bases=fresh.bases;DATA.dayoffs=fresh.dayoffs;DATA.scores=fresh.scores;DATA.scoreMonth=fresh.scoreMonth;DATA.rentalRates=fresh.rentalRates;
    DATA.fleetPulled=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});
    manualChains=[];AUTOOFFLIST.clear();DAYOFF.clear();CHANGED={};highlighted=null;mapMode='single';
    document.querySelector('.layout').classList.remove('mapon');
    computeAutoOff();rebuildRoutes();render();populateDays();updateHDate();
    rfStep('build','ok',DATA.foremen.length+' foremen · '+DATA.trucks.length+' trucks · '+DATA.dayoffs.length+' day-offs'+(fresh.scoreMonth?' · scores '+fresh.scoreMonth:''));
    rfStep('Google Calendar jobs','run','syncing…');
    if(!GTOKEN){
      rfStep('Google Calendar jobs','ok','not connected — jobs kept as-is (use 🗓 Connect Calendar)');
    } else {
      try{
        if(!CAL_FULL_DONE){const s=await calFullImport();rfStep('Google Calendar jobs','ok',s.ok+' jobs · '+s.days+' days — full import');}
        else{const s=await calSyncCore();rfStep('Google Calendar jobs','ok',s.add+' new · '+s.upd+' updated · '+s.del+' removed');}
      }catch(e){rfStep('Google Calendar jobs','err',String(e.message).slice(0,90));}
    }
    updateStamp();
    setTimeout(()=>modal.classList.remove('show'),1600);
    toast('Refresh complete — fleet from the sheet'+(GTOKEN?' · jobs synced from the calendar.':' · connect the calendar to sync jobs too.'));
  }catch(e){
    routes.forEach(r=>{r.baseOverride=null;r.pinForeman=null;r.pinTrucks=[];});
    manualChains=[];AUTOOFFLIST.clear();DAYOFF.clear();CHANGED={};highlighted=null;mapMode='single';
    document.querySelector('.layout').classList.remove('mapon');
    computeAutoOff();rebuildRoutes();render();populateDays();updateHDate();
    rfStep('build','fail','reset to the embedded snapshot instead');
    rfStep('Likely cause',(e&&e.message?e.message:'request blocked')+' — checklist: the sheet is shared as Anyone-with-link · Viewer; the page is opened from the live URL; tab names are unchanged.','fail');
    RF_ISSUES.push({key:'Likely cause',info:(e&&e.message?e.message:'request blocked')+' — checklist: sheet shared as Anyone-with-link · Viewer; page opened from the live URL; tab names unchanged.'});
  }
  rfFinish();
  btn.textContent=orig;btn.disabled=false;
}

function dayTag(d){
  if(d===TODAY_ISO)return ['today','tg-today'];
  const tom=new Date(Date.parse(TODAY_ISO+'T12:00')+86400000);
  const ti=tom.getFullYear()+'-'+String(tom.getMonth()+1).padStart(2,'0')+'-'+String(tom.getDate()).padStart(2,'0');
  if(d===ti)return ['tomorrow','tg-tom'];
  if(d<TODAY_ISO)return ['past','tg-past'];
  return null;
}

  }
}
window.addEventListener('resize',()=>{clearTimeout(window.__mlT);window.__mlT=setTimeout(applyMobileLayout,160);});
applyMobileLayout();
if(window.innerWidth<=MOBBP){try{setViewMode('timeline');}catch(e){}}
/* touch devices: tap a chip to read its explanation (hover titles don't exist on touch) */
document.addEventListener('click',e=>{
  try{
    if(!(window.matchMedia&&window.matchMedia('(hover: none)').matches))return;
    if(e.target.closest('select,input,a,button,.alday,[data-act]'))return;
    if(e.target.closest('#gmodal,#rfmodal,#leftbar'))return;
    const c=e.target.closest('.chip,.cmptag,.ronote,.shortchip,.confchip,.tllabel .nofor');
    if(c&&c.getAttribute&&c.getAttribute('title'))toast(c.getAttribute('title').length>260?c.getAttribute('title').slice(0,257)+'…':c.getAttribute('title'));
  }catch(err){}
});
</script>
</body>
</html>
