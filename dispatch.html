<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>Dispatch board — Jun 10, 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onerror="window._gsiFail=1"></script>
<style>
:root{--bg:#F7F6F2;
  --paper:#F7F6F2; --card:#FFFFFF; --ink:#1F2329; --dim:#646B73; --faint:#969CA3;
  --line:#E6E4DC; --line2:#D3D0C6;
  --fleet:#6E9220; --fleet-bg:#F3F8E4; --fleet-bd:#D3E3A6;
  --rental:#B26B0B; --rental-bg:#FBF0DC; --rental-bd:#EDD6A8;
  --hazard:#B3362A; --hazard-bg:#FBE9E6; --hazard-bd:#F0C7C0;
  --travel:#6C5CE0; --travel-bg:#EFECFB; --travel-bd:#D6D0F5;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px;border:2px solid var(--paper)}
::-webkit-scrollbar-track{background:transparent}

header{display:flex;align-items:center;gap:18px;padding:14px 28px;background:var(--card);border-bottom:1px solid var(--line);flex-wrap:nowrap;position:sticky;top:0;z-index:1100}
.brand{flex-shrink:0;width:360px;min-width:360px}
#brandlogo{height:44px;width:auto;display:block;align-self:flex-start}
#dlabel{display:flex;flex-direction:column;align-items:center;line-height:1.2}
#dlabel .dl1{font-weight:800}
#dlabel .dl2{font-size:14px;color:var(--dim);font-weight:600}
#hdate{display:none}
header .date{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:440px;display:block}
@media (max-width:1480px){header .date{max-width:300px}}
#daynav{flex-shrink:0}
.stats{flex:0 1 auto;min-width:0;margin-left:auto;overflow-x:auto;justify-content:flex-start;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
#rfwrap{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin-left:4px}
#rfstamp{font-size:13px;color:var(--faint);white-space:nowrap}
@media (max-width:1100px){header{flex-wrap:wrap}header .date{max-width:none}}
.brand{display:flex;flex-direction:column;gap:1px}
header h1{font-family:'Barlow Condensed';font-weight:600;font-size:30px;letter-spacing:.05em;text-transform:uppercase;line-height:1}
header .date{color:var(--dim);font-size:16px}
.stats{display:flex;align-items:stretch;gap:0}
.stat{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:0 26px;border-left:1px solid var(--line);text-align:left}
.stat:first-child{border-left:none}
.stat .v{font-family:'Barlow Condensed';font-weight:600;font-size:34px;line-height:1}
.stat .l{white-space:nowrap;color:var(--faint);font-size:14px;text-transform:uppercase;letter-spacing:.09em;font-weight:600}
.stat .v.amber{color:var(--rental)} .stat .v.teal{color:var(--fleet)}

#warnstrip{display:flex;flex-direction:column;gap:6px;padding:12px 28px;background:var(--rental-bg);border-bottom:1px solid var(--rental-bd)}
#warnstrip div{color:#7A4E10;font-size:16px;display:flex;align-items:baseline;gap:9px}
#warnstrip div::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--rental);flex-shrink:0;position:relative;top:0px}
#warnstrip b{font-weight:600}

.layout{display:flex;align-items:flex-start}
#mapwrap{position:relative;position:sticky;top:71px;height:calc(100vh - 71px);z-index:1}
#map{width:100%;height:100%;display:block;background:#E9F0F1}
.leaflet-container{font-family:'Inter',sans-serif;font-size:15px}
.leaflet-control-zoom a{color:var(--ink)!important;border-color:var(--line2)!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:19px!important}
.leaflet-control-attribution{font-size:11.5px!important;background:rgba(255,255,255,.75)!important}
.leaflet-tooltip.lpop, .lpop .leaflet-popup-content{font-size:15px}

.bmark{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#fff;border:3px solid var(--fleet);font-family:'Barlow Condensed';font-weight:600;font-size:14.5px;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.18)}
.bmark.amber{border-color:var(--rental)}
.bmark.idle{border-color:#ABB1AB;opacity:.7}
.pmark{width:15px;height:15px;border-radius:50%;background:#1F2329;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dmark{width:15px;height:15px;border-radius:50%;background:#fff;border:3.5px solid #1F2329;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dmark.f{border-color:var(--fleet)} .dmark.r{border-color:var(--rental)}
.lpop .leaflet-popup-content{margin:12px 15px;line-height:1.55}
.lpop .tt{font-weight:600;font-size:16px}
.lpop .ts{color:var(--dim);font-size:15px}

.maplegend{position:absolute;left:14px;bottom:14px;display:flex;gap:18px;font-size:15px;color:var(--dim);background:rgba(255,255,255,.94);padding:10px 16px;border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);z-index:800}
.maplegend span{display:flex;align-items:center;gap:8px;font-weight:500}
.sw{display:inline-block;width:22px;height:0;border-top:3px solid;border-radius:2px}
.sw.dash{border-top-style:dashed}

.mapcard{position:absolute;left:14px;top:14px;z-index:800;background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:12px;padding:15px 19px;width:clamp(560px,52vw,940px);box-shadow:0 4px 16px rgba(0,0,0,.09);max-height:calc(100% - 28px);display:flex;flex-direction:column}
.mchead{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mcbtns{display:flex;gap:6px;flex-shrink:0}
.mcmin,.mcx{background:var(--paper);border:1.5px solid var(--line2);border-radius:8px;font-family:'Inter';font-weight:700;cursor:pointer;color:var(--ink);font-size:14.5px;padding:4px 10px;line-height:1.2}
.mcx{color:var(--hazard)}
.mcmin:hover,.mcx:hover{border-color:var(--ink)}
.mcbody{overflow-y:auto;min-height:0;display:flex;flex-direction:column}
.mapcard.min{width:auto;min-width:0;padding:9px 12px}
.mapcard.min .mcbody{display:none}
.mapcard.min .mchead{gap:14px}
.mapcard .mt{font-family:'Barlow Condensed';font-weight:600;font-size:22px;letter-spacing:.02em}
.mapcard .ms{font-size:15px;color:var(--dim);margin-top:3px;line-height:1.5}
.mapcard .steps{margin-top:10px;display:flex;flex-direction:column;gap:7px;max-height:300px;overflow-y:auto;padding-right:4px}
.mapcard .step{font-size:15px;color:var(--ink);display:flex;gap:8px;position:relative;padding-left:17px;line-height:1.45}
.mapcard .step .dot{position:absolute;left:0;top:5px;width:9px;height:9px;border-radius:50%;background:var(--ink)}
.mapcard .step.tv .dot{background:var(--travel)}
.mapcard .step:not(:last-child)::after{content:'';position:absolute;left:4px;top:16px;bottom:-9px;width:1.5px;background:var(--line2)}
.mapcard .step.tv{color:var(--travel)}
.mapcard .step.late{color:var(--hazard);font-weight:600}
.mapcard .step.late .dot{background:var(--hazard)}
.rsrc{color:var(--faint);font-size:13.5px}
.mapcard .step .st{font-family:'IBM Plex Mono';font-size:14px;color:var(--dim);width:40px;flex-shrink:0;position:relative;top:1px}
.mapcard .stmi{color:var(--dim);font-weight:500}
.mapcard button{margin-top:11px;background:var(--ink);border:none;color:#fff;font-family:'Inter';font-weight:500;font-size:15px;padding:8px 15px;border-radius:8px;cursor:pointer}
.mapcard button:hover{background:#33383F}

.rail{padding:20px 24px 100px;min-height:calc(100vh - 71px)}
.rail{flex:1 1 auto;min-width:0;max-width:none;margin:0 auto;width:100%;transition:max-width .45s cubic-bezier(.22,.8,.3,1)}
.layout.mapon .rail{max-width:none}
.layout.tableon .rail{max-width:none}
#mapwrap{flex:0 0 auto;width:0;overflow:hidden;border-right:none;border-left:0 solid var(--line);transition:width .45s cubic-bezier(.22,.8,.3,1)}
.layout.mapon #mapwrap{width:46vw;border-left-width:1px}
.jpath{display:flex;align-items:center;flex-wrap:wrap;gap:5px;min-width:0;flex:1}
.jp{font-family:'Barlow Condensed';font-weight:600;font-size:20px;letter-spacing:.02em;line-height:1.2}
.jp.jb{background:var(--ink);color:#fff;font-size:15px;font-family:'Inter';font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:.04em}
.jp.jld{color:var(--rental)}
.ja{color:var(--faint);font-size:15.5px}
.metaline{margin:8px 0 3px;font-size:15.5px;color:var(--dim)}
.metaline .mono{font-size:14.5px;color:var(--faint)}
.fsub{font-weight:400;color:var(--dim);font-size:15px}
.vrow{display:flex;align-items:center;gap:10px;font-size:16px;color:var(--ink)}
.vbadge{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:600;font-size:15.5px;flex-shrink:0;border:1.5px solid var(--line2);background:var(--paper);color:var(--ink)}
.vbadge.teal{color:var(--fleet);border-color:var(--fleet-bd);background:var(--fleet-bg)}
.vbadge.amber{color:var(--rental);border-color:var(--rental-bd);background:var(--rental-bg)}
.vbadge.gray{opacity:.65}
.xrow{display:flex;gap:22px;flex-wrap:wrap;margin-top:8px}
.panelbox{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:0;margin-bottom:14px;overflow:hidden}
.panelbox summary{cursor:pointer;list-style:none;font-family:'Barlow Condensed';font-size:19px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);padding:13px 18px;display:flex;align-items:center;gap:8px}
.panelbox summary::before{content:'▸';font-size:13.5px;transition:transform .12s}
.panelbox[open] summary::before{transform:rotate(90deg)}
.panelbox summary:hover{color:var(--ink)}
.rcols{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:4px 18px 12px}
@media (max-width:920px){.rcols{grid-template-columns:1fr}}
.rcols h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:6px 0 8px;font-weight:600}
.rrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:15.5px}
.rrow:last-child{border-bottom:none}
.rtog{display:flex;align-items:center;gap:4px;font-size:12.5px;color:var(--faint);cursor:pointer}
.rtog input{accent-color:var(--hazard);cursor:pointer}
.rnick{font-weight:600;min-width:168px}
.rbase{color:var(--faint);font-size:14.5px;min-width:28px}
.rst{color:var(--dim);font-size:15px;flex:1;min-width:0;white-space:normal;line-height:1.4}
.rst.ron{color:var(--fleet);font-weight:500}
.rst.roff{color:var(--hazard);font-weight:600}
.panelbox .helpnote{padding:0 18px 14px}
#optipanel{display:none;background:var(--travel-bg);border:1px solid var(--travel-bd);border-radius:13px;padding:14px 18px;margin-bottom:14px}
.optihead{font-family:'Barlow Condensed';font-size:19px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--travel);margin-bottom:8px}
.optirow{display:flex;align-items:center;gap:14px;padding:9px 0;border-top:1px solid var(--travel-bd)}
.optitxt{flex:1;min-width:0;font-size:16px}
.optitxt b{font-weight:600}
.optisub{display:block;font-size:15px;color:var(--dim);margin-top:1px}
.optibtn{background:var(--travel);border:none;color:#fff;font-family:'Inter';font-weight:600;font-size:15.5px;padding:8px 16px;border-radius:8px;cursor:pointer}
.optibtn:hover{background:#5a4ad0}
.optiapplied{margin-top:10px;font-size:14px;color:var(--dim)}
.chgrouphead{font-size:14.5px;font-weight:700;color:var(--travel);margin:10px 0 6px}
.chgrouphead span{font-weight:400;color:var(--dim);font-size:14px;margin-left:6px}
.chainrow{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--travel-bd);border-radius:10px;padding:11px 14px;margin-bottom:8px}
.chmain{flex:1;min-width:0}
.chpair{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:15px}
.chjob i{font-style:normal;color:var(--faint);font-size:14px}
.chplus{color:var(--travel);font-weight:700}
.chkind{font-size:12.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:var(--travel-bg);color:var(--travel);border:1px solid var(--travel-bd);border-radius:6px;padding:2px 7px}
.chkind.manual{background:var(--paper);color:var(--dim);border-color:var(--line2)}
.chsub{font-size:14px;color:var(--dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chx{background:#fff;border:1px solid var(--line2);color:var(--hazard);font-family:'Inter';font-weight:600;font-size:14px;padding:7px 13px;border-radius:8px;cursor:pointer;flex-shrink:0}
.chx:hover{border-color:var(--hazard)}
#cmpsummary{display:none;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--travel);border-radius:12px;padding:12px 18px;margin-bottom:14px;font-size:15.5px;color:var(--dim)}
.ffsname{font-family:'Barlow Condensed';font-weight:600;font-size:23px;letter-spacing:.02em}
.ffsmeta{font-size:16px;color:var(--dim)}
.vizbtn{background:var(--fleet-bg);border:1px solid var(--fleet-bd);color:var(--fleet);font-family:'Inter';font-weight:600;font-size:15.5px;padding:7px 13px;border-radius:8px;cursor:pointer;margin-right:auto;transition:all .12s}
.vizbtn:hover{background:var(--fleet);color:#fff}
.vizbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}
#applybtn.locked{background:#C9CDD2;cursor:not-allowed}
#applybtn.locked:hover{background:#C9CDD2}
#locknote{position:fixed;top:84px;right:24px;z-index:2000;background:var(--ink);color:#fff;font-size:15px;line-height:1.5;padding:12px 16px;border-radius:10px;max-width:320px;box-shadow:0 6px 20px rgba(0,0,0,.18);opacity:0;transform:translateY(-6px);transition:opacity .2s,transform .2s;pointer-events:none}
#locknote.show{opacity:1;transform:none}
#alertbar{display:none;border-radius:13px;padding:13px 18px;margin-bottom:10px;border:1px solid}
#alertbar.crit{background:#FDECEC;border-color:#F0C0C0;border-left:5px solid var(--hazard)}
#alertbar.tight{background:#FFF7E8;border-color:#EAD9B0;border-left:5px solid #B26B0B}
.altitle{font-family:'Barlow Condensed';font-size:17px;font-weight:600;letter-spacing:.06em;margin-bottom:7px}
#alertbar.crit .altitle{color:var(--hazard)}
#alertbar.tight .altitle{color:#8A5A12}
.alrows{display:flex;flex-wrap:wrap;gap:8px}
.alday{background:#fff;border:1px solid var(--line2);border-radius:8px;padding:5px 11px;font-size:14.5px;cursor:pointer}
.alday.c{border-color:#E8AFAF}
.alday:hover{border-color:var(--ink)}
.almore{font-size:14px;color:var(--dim);align-self:center}
.alfix{margin-top:10px;padding-top:10px;border-top:1px dashed #E5C9C9;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.alfixlab{font-size:14.5px;font-weight:600;color:var(--ink)}
.almv{background:#fff;border:1px solid var(--line2);border-radius:9px;padding:6px 8px 6px 12px;font-size:14.5px;display:inline-flex;align-items:center;gap:9px}
.almvbtn{background:var(--ink);color:#fff;border:none;border-radius:7px;font-family:'Inter';font-weight:600;font-size:14px;padding:5px 11px;cursor:pointer}
.almvbtn:hover{background:#000}
#viewbar,#filterbar{display:flex;align-items:center;gap:11px;row-gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:10px 16px;margin-bottom:10px}
#filterbar{margin-bottom:14px}
.ddwrap{position:relative}
.ddbtn{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:8px 14px;cursor:pointer;color:var(--ink)}
.ddbtn:hover{border-color:var(--ink)}
.ddbtn.act{background:var(--ink);color:#fff;border-color:var(--ink)}
.ddpanel{display:none;position:absolute;top:calc(100% + 8px);left:0;z-index:1500;background:var(--card);border:1px solid var(--line2);border-radius:13px;box-shadow:0 14px 38px rgba(0,0,0,.16);min-width:230px;max-height:380px;overflow-y:auto;padding:6px}
.ddpanel.open{display:block}
.ddrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:15px}
.ddrow:hover{background:var(--paper)}
.ddrow.cur{background:var(--ink);color:#fff}
.ddrow.cur .ffct{color:#cfd3d8}
#resetov:disabled{opacity:.45;cursor:default;border-color:var(--line2)!important}
#gconn,#gdelta{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:8px 13px;cursor:pointer;color:var(--ink)}
#gconn:hover,#gdelta:hover{border-color:var(--ink)}
#gconn.gok{background:var(--fleet-bg);color:var(--fleet);border-color:var(--fleet)}
.gcalbtn{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:10px 14px;cursor:pointer;color:var(--ink)}
.gcalbtn:hover{border-color:var(--ink)}
.chip.tmove{background:#EDF3F1;border:1px solid #CFE0DB;color:#2E5F52;font-weight:600;letter-spacing:.02em}
.chip.tjob{background:#F0EFF7;border:1px solid #D8D5EA;color:#4E4690;font-weight:600;letter-spacing:.02em}
.rfrowbtns{display:flex;gap:8px}
#calpush{background:var(--card);border:1.5px solid var(--line2);border-radius:10px;font-family:'Inter';font-weight:600;font-size:15px;padding:9px 14px;cursor:pointer;color:var(--ink)}
#calpush:hover:not(:disabled){border-color:var(--fleet);color:var(--fleet)}
#calpush:disabled{opacity:.45;cursor:default}
#gmodal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(31,34,38,.45);align-items:center;justify-content:center}
#gmodal.show{display:flex}
#gmodal .gbody{font-size:15px;line-height:1.6;max-height:60vh;overflow:auto}
.gplan{border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-top:10px}
.gpcode{font-family:'IBM Plex Mono';font-weight:600;margin-bottom:7px}
.gphead{display:flex;flex-direction:column;gap:2px;margin-bottom:9px}
.gphead b{font-size:16.5px}
.gsub{font-size:15px;color:var(--ink);margin-bottom:6px}
.gqt{font-size:14px;color:var(--dim);line-height:1.55}
.gprow{display:flex;gap:12px;padding:4px 0;font-size:15px}
.gprow>span{width:84px;flex-shrink:0;color:var(--faint);font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding-top:2px}
.gold{color:var(--faint);text-decoration:line-through;text-decoration-color:#C8A0A0}
.gnew{font-weight:600}
.gchg{padding:5px 0;border-bottom:1px solid var(--line);font-size:15px}
.rfbox.gwide{width:min(980px,94vw)}
.rfbox.gxwide{width:min(1280px,96vw)}
.vrow{flex-wrap:wrap}
.vseg{display:inline-flex;align-items:center;gap:9px}
.vsep{color:var(--faint);font-weight:600;padding:0 2px}
.vizbtn.hdr{margin-left:auto;padding:7px 13px;font-size:15px;flex-shrink:0}
.cardtop .meter{margin-left:14px}
.chip.warn{background:#FBEFEA;border:1px solid #EBCDC2;color:#9A3E1D;font-weight:700}
.ajbar{display:flex;gap:14px;align-items:center;margin:2px 0 8px}
.ajbar input[type=text],.ajbar input:not([type=checkbox]){flex:1;border:1.5px solid var(--line2);border-radius:9px;padding:8px 12px;font-family:'Inter';font-size:15px}
.ajbar label{display:flex;gap:6px;align-items:center;font-size:15px;color:var(--dim);white-space:nowrap;cursor:pointer}
.gapply{margin-top:14px;margin-right:8px;background:var(--fleet);border:none;color:#fff;font-family:'Inter';font-weight:600;font-size:15px;padding:10px 18px;border-radius:9px;cursor:pointer}
.gclose{margin-top:14px;background:var(--ink);border:none;color:#fff;font-family:'Inter';font-weight:600;font-size:15px;padding:10px 18px;border-radius:9px;cursor:pointer}

.dpt{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:5px;padding:2px 6px}

#ffwrap{position:relative}

  const R=3959, dLa=(b.lat-a.lat)*Math.PI/180, dLo=(b.lon-a.lon)*Math.PI/180;
  const la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  const h=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

const jobKey=j=>j.eventId||('code:'+j.code);
const isDraftRoute=r=>!!r&&(r.legs||[]).length>0&&r.legs.every(l=>l._draft);
let EXCL=new Set(),FORCE=new Set();
try{EXCL=new Set(JSON.parse(localStorage.getItem('zd_excl')||'[]'));FORCE=new Set(JSON.parse(localStorage.getItem('zd_force')||'[]'));}catch(e){}
function persistToggles(){try{localStorage.setItem('zd_excl',JSON.stringify([...EXCL]));localStorage.setItem('zd_force',JSON.stringify([...FORCE]));}catch(e){}}
function buildRoutes(){
  const jobs=DATA.jobs.filter(j=>!EXCL.has(jobKey(j))), used=new Set(), routes=[];
  const cmap={}; manualChains.concat(AUTOCHAINS).forEach(c=>cmap[c.tail]=c.after);
  const aft=j=>cmap[j.code]||j.after;
  for(const h of jobs.filter(j=>j.first&&!aft(j))){
    if(used.has(h.code))continue;
    const legs=[h]; used.add(h.code);
    let cur=h;
    while(true){
      const next=jobs.find(j=>aft(j)===cur.code&&!used.has(j.code));
      if(!next)break;
      legs.push(next); used.add(next.code); cur=next;
    }
    routes.push(makeRoute(legs,routes.length));
  }
  for(const j of jobs){ if(!used.has(j.code)){routes.push(makeRoute([j],routes.length,true)); used.add(j.code);} }
  return routes;
}

function makeRoute(legs,idx,orphan=false){
  legs=legs.slice().sort((a,b)=>(Date.parse(a.start||0)||0)-(Date.parse(b.start||0)||0)); // legs[0] = the crew's first job of the day (base, leave-time, ETAs all key off this)
  const totalCF=legs.reduce((s,l)=>s+l.cf,0);
  const maxCF=Math.max(...legs.map(l=>l.cf));
  const crew=Math.max(...legs.map(l=>l.crew||0),2);
  const trucksNeeded=Math.max(...legs.map(l=>l.trucksQ||0));
  const vansNeeded=Math.max(...legs.map(l=>l.vansQ||0));
  const ordIdx=Math.min(...legs.map(l=>(l.idx!==undefined&&l.idx!==null)?l.idx:1e9));
  const isLD=legs.some(l=>/long\s*distance/i.test(l.movingType||''));
  legs.forEach(l=>{
    l._far=!!(l.delivery&&!INREGION(l.delivery));
    l._carrier=!l.straight&&!!l.delivery&&(l._far||/long/i.test(String(l.movingType||''))); // Regular LD = carrier ALWAYS (type-based) — crew loads at pickup, carrier hauls, crew returns to base
  });
  legs.forEach(l=>{
    const st=Date.parse(l.start||0);
    const act=(l.actH!=null&&l.actH>0)?l.actH:schedH(l);
    const dh=(l.pickup&&l.delivery&&!l._carrier)?hav(l.pickup,l.delivery)/35*1.15:0;
    l._endMs=st+(act+dh)*3600000; // approximate real end: travel to delivery + work
  });
  const ldDeparture=legs.some(l=>l._far&&l.straight);
  const hasCarrier=legs.some(l=>l._carrier);
  const laborOnly=legs.length>0&&legs.every(l=>/labor/i.test(l.jobType||''));
  const estimateVisit=legs.length>0&&legs.every(l=>/estimate/i.test(l.jobType||''));
  const flatRate=legs.some(l=>/flat/i.test(l.jobType||''));
  const packing=legs.reduce((s,l)=>s+(l.packing||0),0);
  const piano=legs.some(l=>l.piano);
  const pickupState=legs[0].pickup?legs[0].pickup.state:legs[0].stateFrom;
  let base=null,bd=1e9;
  if(legs[0].pickup){for(const [k,b] of Object.entries(DATA.bases)){const d=hav(legs[0].pickup,b); if(d<bd){bd=d;base=k;}}}
  else base=legs[0].base;
  return {id:'R'+(idx+1),legs,totalCF,maxCF,crew,trucksNeeded,vansNeeded,ordIdx,isLD,ldDeparture,hasCarrier,laborOnly,estimateVisit,flatRate,packing,piano,
          pickupState,nearestBase:base,baseDist:Math.round(bd),sheetBase:legs[0].base,base:null,orphan,
          stale:legs.some(l=>l.rescheduled)&&legs.length>1};
}

function scoreRoute(r,w){
  const cf=Math.min(r.totalCF/2500,1)*w.cf;
  const pk=Math.min(r.packing/1500,1)*w.pack;
  const ld=(r.isLD?1:0)*w.ld;
  const mt=Math.min(Math.max(r.trucksNeeded-1,0)+(r.vansNeeded&&r.trucksNeeded?0.5:0),1.5)/1.5*w.multi;
  const pi=(r.piano?1:0)*w.piano;
  const max=w.cf+w.pack+w.ld+w.multi+w.piano||1;
  return Math.round((cf+pk+ld+mt+pi)/max*100);
}

function evalForeman(f,r,ctx){
  let s=50; const pros=[],cons=[];
  if(f.status!=='Active'){s-=25;cons.push('backup pool (potential)');}
  if(!f.states.includes(r.pickupState)){s-=12;cons.push('not listed for '+r.pickupState);}
  if(f.base===r.base){s+=40;pros.push(r.base+' home base');}
  else{
    const scarce=ctx.pendingAt(f.base)>=ctx.homeAvail(f.base);
    if(scarce){s-=28;cons.push(f.base+' is short-staffed today');}
    else{s-=8;cons.push('travels from '+f.base);}
    const fb=DATA.bases[f.base],rb=DATA.bases[r.base];
    if(fb&&rb)s-=Math.min(hav(fb,rb)/12,12);
  }
  s+=f.bigJob*(Math.min(r.totalCF,2500)/2500)*8; if(f.bigJob>=4&&r.totalCF>900)pros.push('big jobs ★'+f.bigJob);
  s+=f.packSell*(Math.min(r.packing,1500)/1500)*6; if(f.packSell>=4&&r.packing>300)pros.push('sells packing ★'+f.packSell);
  if(r.isLD||r.hasCarrier){s+=f.ldPickup*5; if(f.ldPickup>=4)pros.push('LD pickup ★'+f.ldPickup);}
  if(r.ldDeparture&&!f.canLD){s-=40;cons.push('no long distance');}
  if(r.trucksNeeded>=2){if(f.multiTruck>=3){s+=f.multiTruck*4;pros.push('runs 2-truck jobs ★'+f.multiTruck);}else{s-=60;cons.push('no 2-truck experience');}}
  if(r.piano){if(f.piano){s+=12;pros.push('piano');}else{s-=60;cons.push('no piano');}}
  if(f.driver)s+=6; else{s-=10;cons.push('not a truck driver');}
  s+=f.stacking*1.5; if(f.stacking===5)pros.push('stacking ★5');
  s-=f.hourly*0.15;

  // Forman-of-the-Month: bounded ±12 bonus centered at 60
  const fsc=formanScore(f);
  if(fsc!==null){
    const bonus=Math.max(-12,Math.min(12,(fsc-60)*0.5));
    s+=bonus;
    if(bonus>=4)pros.push('Foreman score '+fsc);
    else if(bonus<=-4)cons.push('Foreman score '+fsc);
  }
  // premium jobs (big packing / hard routes) prefer top tier — soft gate, not a hard block
  const premium=r.packing>=800||r.score>=60;
  if(premium&&fsc!==null&&fsc<65){s-=15;cons.push('premium job — below top tier ('+fsc+')');}
  if(premium&&fsc!==null&&fsc>=65)pros.push('top-tier for premium job');
  // rest rotation: long consecutive streak = let them breathe
  const streak=ctx.streak?ctx.streak(f.name):0;
  if(streak>=6){s-=10;cons.push('worked '+streak+' days straight — rest due');}

  return {f,score:Math.round(s),pros,cons};
}

function assignAll(routes,w,baseMode){
  routes.forEach(r=>{
    r.base=r.baseOverride||((baseMode==='sheet'&&r.sheetBase&&DATA.bases[r.sheetBase])?r.sheetBase:r.nearestBase);
    r.score=scoreRoute(r,w);
    r.t0=Math.min(...r.legs.map(l=>Date.parse(l.start||0)));
    r.t1=Math.max(...r.legs.map(l=>l._endMs||Date.parse(l.end||l.start||0)));
    r.foreman=null;r.vehicles=[];
  });
  const order=[...routes].sort((a,b)=>b.score-a.score);
  const BUF=30*60000, busyF={}, busyT={};
  routes.forEach(r=>{
    const sl=[...r.legs].sort((a,b)=>Date.parse(a.start||0)-Date.parse(b.start||0));
    r._startLoc=sl[0].pickup||null;
    const last=sl[sl.length-1];
    if(last._carrier){
      const b=DATA.bases[r.base];
      r._endLoc=b?{lat:b.lat,lon:b.lon}:null;
      if(b&&last.pickup)r.t1+=hav(last.pickup,b)/35*3600000*1.15; // drive back to base with the goods
    } else {
      r._endLoc=(last.delivery&&INREGION(last.delivery))?last.delivery:null;
    }
  });
  const driveMs=(a,b)=>(a&&b)?hav(a,b)/35*3600000*1.15:0;
  const free=(map,key,r)=>!(map[key]||[]).some(iv=>{
    if(iv.rid===r.id)return false;
    if(iv.t1<=r.t0){            // existing booking ends before this route starts
      if(!iv.endLoc)return true;          // went long-distance — not back today
      return (r.t0-iv.t1)<(driveMs(iv.endLoc,r._startLoc)+BUF);
    }
    if(r.t1<=iv.t0){            // this route ends before existing booking starts
      if(!r._endLoc)return true;
      return (iv.t0-r.t1)<(driveMs(r._endLoc,iv.startLoc)+BUF);
    }
    return true;                // overlap
  });
  const book=(map,key,r)=>{(map[key]=map[key]||[]).push({t0:r.t0,t1:r.t1,rid:r.id,startLoc:r._startLoc,endLoc:r._endLoc});};
  // business rule: one foreman = one route per day. Multi-job days only via chains (one merged route).
  const freeF=(key,r)=>!(busyF[key]||[]).some(iv=>iv.rid!==r.id);
  const fbest={};
  for(const r of order){
    r._pinBusy=false;r._pinOff=false;r._noForeman=false;
    if(r.pinForeman==='__NONE__'){ r._noForeman=true; }
    else {
    if(r.pinForeman&&isOff(r.pinForeman)){r.pinForeman=null;r._pinOff=true;}
    if(r.pinForeman){
      const f=DATA.foremen.find(x=>x.name===r.pinForeman);
      if(f&&freeF(f.name,r))book(busyF,f.name,r);
      else r._pinBusy=true;
    }
    }
    r._pinIssues=[];
    r.pinTrucks=r.pinTrucks||[];
    for(const pn of r.pinTrucks){
      if(!pn||pn==='R26'||pn==='R20')continue;
      const pt=DATA.trucks.find(k=>k.n===pn&&k.status==='Active');
      if(pt&&free(busyT,pt.n,r)){
        book(busyT,pt.n,r);
        if(pt.state&&pt.state!==r.base)r._pinIssues.push(pt.n+' is '+pt.state+' fleet — this route departs '+r.base+' base, truck must be repositioned first');
      }
      else r._pinIssues.push(pn+' unavailable in this window — auto-assigned instead');
    }
  }
  computeStreaks();
  const ctx={pendingAt:b=>order.filter(x=>!x.foreman&&x.base===b).length,
             homeAvail:b=>DATA.foremen.filter(f=>f.base===b&&f.status==='Active').length,
             streak:n=>STREAKS[n]||0};
  for(const r of order){
    const evals=[];
    for(const f of DATA.foremen){
      if(f.status==='Cancelled')continue;
      if(isOff(f.name))continue;
      const busy=!freeF(f.name,r);
      const e=evalForeman(f,r,ctx); e.busy=busy;
      evals.push(e);
    }
    evals.sort((a,b)=>(a.busy-b.busy)||(b.score-a.score));
    r.candidates=evals.filter(e=>!e.busy).slice(0,4);
    let best=r._noForeman?null:(r.candidates[0]||null);
    if(!r._noForeman&&r.pinForeman&&!r._pinBusy){
      const pe=evals.find(e=>e.f.name===r.pinForeman);
      if(pe){best=pe;}
    } else if(best){book(busyF,best.f.name,r);}
    evals.forEach(e=>{
      if(e.busy||!best||e.f.name===best.f.name)return;
      const cur=fbest[e.f.name];
      if(!cur||e.score>cur.score)fbest[e.f.name]={score:e.score,route:r.id,winner:best.f.name,winScore:best.score};
    });
    r.foreman=best?best.f:null;
    r.foremanEval=best;
    r.foremanTravel=best&&best.f.base!==r.base;
    const need=[];r.rentals=0;r._crewGap=false;
    const atBase=ty=>DATA.trucks.filter(t=>t.status==='Active'&&t.state===r.base&&t.type===ty&&truckActiveOn(t,currentDay)&&!TRIPAWAY_T[_tn(t.n)]&&free(busyT,t.n,r));
    const take=t=>{book(busyT,t.n,r);need.push({kind:'fleet',t});};
    const _tnEff=(r.trucksOverride!=null?r.trucksOverride:r.trucksNeeded);
    const truckSlots=Math.max(_tnEff,(!_tnEff&&!r.vansNeeded)?1:0);
    const slotsSpec=[];
    for(let i=0;i<truckSlots;i++)slotsSpec.push('Truck');
    for(let i=0;i<r.vansNeeded;i++)slotsSpec.push('Van');
    r._slotsSpec=slotsSpec;
    slotsSpec.forEach((ty,s)=>{
      const primary=s===0&&ty==='Truck';
      const pin=r.pinTrucks[s]||null;
      if(primary){
        r._truckTrace=DATA.trucks.filter(k=>k.status==='Active'&&k.type===ty).map(k=>{
          let why,ok=false;
          const _H=DATA.holders||{};
          if(_H[k.n]&&(!r.foreman||_H[k.n]!==r.foreman.name)){const hf=DATA.foremen.find(x=>x.name===_H[k.n]);why='with '+(hf?hf.nick:_H[k.n])+' — locked pairing';}
          else if(!truckActiveOn(k,currentDay))why='rental active '+(k.rentStart||'?')+' → '+(k.rentEnd||'open-ended')+' — outside this day';
          else if(TRIPAWAY_T[_tn(k.n)])why='on a straight LD trip ('+TRIPAWAY_T[_tn(k.n)].code+') — back '+TRIPAWAY_T[_tn(k.n)].back;
          else if(k.state!==r.base)why=k.state+' fleet — wrong base';
          else if(!free(busyT,k.n,r))why='busy in this time window';
          else if(k.cf<r.maxCF)why=k.cf.toLocaleString()+' CF — smaller than the '+r.maxCF.toLocaleString()+' CF load';
          else if(k.maxCrew<r.crew)why='cab seats '+k.maxCrew+' — crew is '+r.crew;
          else{ok=true;why=k.cf.toLocaleString()+' CF · cab '+k.maxCrew+(isRentalTruck(k)?' · monthly rental':' · owned');}
          return {n:k.n,ok,why,cf:k.cf,rentedm:isRentalTruck(k)};
        }).sort((a,b)=>(b.ok-a.ok)||(a.cf-b.cf)).slice(0,8);
      }
      if(pin){
        const pt=DATA.trucks.find(k=>k.n===pin&&k.status==='Active');
        if(pt&&busyT[pt.n]&&busyT[pt.n].some(iv=>iv.rid===r.id)){
          take(pt);
          if(primary)r._truckChosen=pt.n;
          if(primary&&pt.cf<r.maxCF)r._pinIssues.push(pt.n+' is smaller than the biggest leg ('+r.maxCF.toLocaleString()+' CF)');
          if(primary&&pt.maxCrew<r.crew)r._pinIssues.push(pt.n+' cab fits '+pt.maxCrew+' — crew is '+r.crew);
          return;
        }
      }
      const H=DATA.holders||{};
      if(primary&&r.foreman){
        const hn=Object.keys(H).find(tn=>H[tn]===r.foreman.name);
        if(hn){
          const ht=DATA.trucks.find(k=>k.n===hn&&k.status==='Active'&&k.type===ty);
          if(ht&&free(busyT,ht.n,r)){
            take(ht);r._truckChosen=ht.n;
            if(ht.state&&ht.state!==r.base)r._pinIssues.push(ht.n+' is '+ht.state+' fleet — locked pairing with '+r.foreman.name+' kept, truck must reposition');
            if(ht.cf<r.maxCF)r._pinIssues.push(ht.n+' (paired with '+r.foreman.name+') is smaller than the '+r.maxCF.toLocaleString()+' CF load');
            return;
          }
        }
      }
      const cand=atBase(ty)
        .filter(t=>!need.some(x=>x.kind==='fleet'&&x.t.n===t.n))
        .filter(t=>!(H[t.n]&&(!r.foreman||H[t.n]!==r.foreman.name)))
        .filter(t=>primary?(t.cf>=r.maxCF&&t.maxCrew>=r.crew):true)
        .sort((a,b)=>(a.cf-b.cf));
      const pick=cand[0];
      if(pick){take(pick);if(primary)r._truckChosen=pick.n;}
      else{
        const sz=ty==='Van'?'20 ft van':(r.maxCF>RENTAL20_CF?'26 ft':'20 ft');
        if(currentDay<TODAY_ISO){
          // history: the day ran, so a rental truck WAS there — record it, don't alarm
          need.push({kind:'rental',sz});
          if(primary)r._truckChosen='Rental '+sz;
        } else {
          need.push({kind:'short',ty,sz});
          if(primary)r._truckChosen='— no truck free';
        }
      }
    });
    r.vehicles=need;
    r.short=need.filter(v=>v.kind==='short').length;
    r.rentals=need.filter(v=>v.kind==='rental'||(v.kind==='fleet'&&isRentalTruck(v.t))).length;
    r.status=(r.short>0||!r.foreman)?'short':(r.rentals>0?'rental':'fleet');
    // crew transport: how many cab seats do the assigned vehicles actually have?
    // fleet trucks carry their real cab; rentals/short slots assume a 3-seat cab (standard box-truck)
    {const _cab=need.reduce((s,v)=>s+(v.kind==='fleet'?(v.t.maxCrew||3):3),0);
     r._cabSeats=_cab;
     r._carNeed=(need.length>0&&r.crew>_cab)?(r.crew-_cab):0;
     r._crewGap=r._carNeed>0;}
  }  const assignedF=new Set(routes.map(r=>r.foreman&&r.foreman.name).filter(Boolean));
  const pickStates=new Set(routes.map(r=>r.pickupState).filter(Boolean));
  BENCH.foremen=DATA.foremen.filter(f=>f.status==='Active'&&!assignedF.has(f.name)&&!isOff(f.name)).map(f=>{
    let reason;
    if(![...pickStates].some(s=>f.states.includes(s)))reason='listed states ('+f.states.join(', ')+') do not match today\'s pickups';
    else if(fbest[f.name]){const b=fbest[f.name];reason='closest: '+b.route+' — scored '+b.score+', '+b.winner+' won with '+b.winScore;}
    else if(!f.driver)reason='not a truck driver — penalized on every route';
    else reason='outscored on every route today';
    return {f,reason};
  });
  const usedT=new Set(routes.flatMap(r=>r.vehicles.filter(v=>v.kind==='fleet').map(v=>v.t.n)));
  const routesAt={};routes.forEach(r=>routesAt[r.base]=(routesAt[r.base]||0)+1);
  const rentalAt={};routes.forEach(r=>{if(r.rentals)rentalAt[r.base]=true;});
  BENCH.trucks=DATA.trucks.filter(k=>k.status==='Active'&&!usedT.has(k.n)).map(k=>{
    let reason;
    if(!routesAt[k.state])reason='no routes from '+k.state+' base today';
    else reason='spare';
    return {t:k,reason};
  });
}

const WEIGHTS={cf:35,pack:20,ld:20,multi:15,piano:10};
function getW(){return WEIGHTS;}
let manualChains=[];
let AUTOCHAINS=[];
let TRIPAWAY={};let TRIPAWAY_T={};
const _tn=x=>String(x||'').replace(/[#\s]/g,'').toUpperCase();
function tripAwayMap(dayIso){
  const out={};const outT={};
  const d0=Date.parse(dayIso+'T12:00');
  for(let k=1;k<=10;k++){
    const dd=new Date(d0-k*86400000);
    const dIso=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
    for(const j of (DATA.days[dIso]||[])){
      if(!j.straight||!j.tripDays||j.tripDays<=1||(!j.mf&&!j.mt))continue;
      if(k<j.tripDays){
        const back=new Date(Date.parse(dIso+'T12:00')+j.tripDays*86400000);
        const backLbl=back.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        const f=j.mf?matchForeman(j.mf):null;
        if(f&&f.status==='Active')out[f.name]={code:j.code,back:backLbl};
        if(j.mt)String(j.mt).split(/[+,]/).forEach(tn=>{const kk=_tn(tn);if(kk&&DATA.trucks.some(x=>_tn(x.n)===kk))outT[kk]={code:j.code,back:backLbl};});
      }
    }
  }
  return {f:out,t:outT};
}
const AUTOOFFLIST=new Set();
const CHAIN_RULES={maxDriveMin:45,maxCF:700,lateMin:30,maxJobs:3,maxHomeHr:22};
const ACT_LOAD_SHARE=0.6; // owner rule: ACT splits 60% loading at pickup / 40% unloading at delivery
function companyOf(title, dateMs){
  var t=String(title||'').toLowerCase();
  var dv=(typeof dateMs==='number'&&isFinite(dateMs))?dateMs:Date.parse(dateMs);
  if(!isFinite(dv))dv=Infinity;
  var isBoston=/(\(Boston\)|MA\s*-|RI\s*-|NH\s*-)/.test(String(title||''));
  if(t.indexOf('liga')>=0 && dv<new Date(2025,0,1).getTime()) return 'Liga';
  if(t.indexOf('tuji')>=0) return 'Tuji';
  if(isBoston && dv<new Date(2026,3,20).getTime()) return 'Boston';
  if(t.indexOf('(virginia)')>=0 && dv<new Date(2026,2,26).getTime()) return 'Virginia';
  return 'Zip to Zip';
}
function coOf(j){ if(!j)return 'Zip to Zip'; if(j.company)return j.company; return companyOf(j.title||j.summary||'', Date.parse(j.start||0)); }
function detectAutoChains(rts){
  // Universal fit-based chaining (owner spec):
  //  - any job can chain, morning included
  //  - every job in a chain <= 700 CF
  //  - drive between jobs <= 45 min
  //  - arrive at the next customer no later than booked start + 30 min (early = wait, work starts at booked time)
  //  - lowest total route cost wins (empty drive INTO the job + empty drive home FROM it); never strand the crew far from base
  //  - up to 3 jobs per chain (3rd added on the next pass)
  //  - the whole chain finishes the same day
  const out=[];
  const tailsTaken=new Set();
  const singles=rts.filter(r=>r.legs.length===1&&!r.legs[0].after
      &&(r.legs[0].cf||0)<=CHAIN_RULES.maxCF
      &&!AUTOOFFLIST.has(r.legs[0].code))
    .sort((a,b)=>Date.parse(a.legs[0].start)-Date.parse(b.legs[0].start));
  for(const B of singles){
    if(B.ldDeparture)continue;          // straight LD departures are not chainable; carrier pickups are
    const lb=B.legs[0];
    if(!lb.pickup||!lb.delivery||!INREGION(lb.delivery))continue;
    const bt0=Date.parse(lb.start);
    let best=null;
    for(const A of rts){
      if(A===B||A.ldDeparture)continue;
      if(A.legs.length>=CHAIN_RULES.maxJobs)continue;            // chain is full
      if(A.legs.some(x=>(x.cf||0)>CHAIN_RULES.maxCF))continue;   // every job in the chain must be small
      if(tailsTaken.has(A.id))continue;                          // one new tail per head per pass
      const la=[...A.legs].sort((x,y)=>Date.parse(x.start||0)-Date.parse(y.start||0)).slice(-1)[0];
      if(!la.delivery||!INREGION(la.delivery))continue;

      const eta=at1+driveMs;
      if(eta>bt0+CHAIN_RULES.lateMin*60000)continue;             // on time, +30 min grace
      // same-day rule + total-route cost: the chained job becomes the route's LAST leg, so the crew
      // returns home from ITS delivery to A's base. Score link-in + return-home, and never strand them.
      const _ws=Math.max(eta,bt0);
      const _p2d=(lb.pickup&&lb.delivery)?hav(lb.pickup,lb.delivery)/35*3600000*1.15:0;
      const _done=_ws+((lb.actH||schedH(lb))*3600000)+_p2d;
      if(_done>Date.parse(String(lb.start).slice(0,10)+'T23:59'))continue;
      if(Math.max(A.crew,B.crew)>6)continue;                     // one cab carries the crew
      const _bA=DATA.bases[A.base];
      let _retMi=0; if(_bA&&lb.delivery){const _rrm=cachedRoadMi(lb.delivery,_bA);_retMi=(_rrm!=null?_rrm:hav(lb.delivery,_bA)*1.15);}

      const _cost=linkMi+_retMi;
      if(!best||_cost<best.cost)best={A,linkMi,la,cost:_cost,retMi:Math.round(_retMi),home:_home};
    }
    if(best){
      tailsTaken.add(best.A.id);
      out.push({tail:lb.code,after:best.la.code,auto:true,linkMi:Math.round(best.linkMi),returnMi:best.retMi,cost:Math.round(best.cost)});

}

const _RC={};
function rcInvalidate(day){if(day)delete _RC[day];else for(const k of Object.keys(_RC))delete _RC[k];}
function dayPlanOn(dayIso){
  if(_RC[dayIso])return _RC[dayIso];
  // run the real engine for that day — chains, exclusions, assignment with double-run reuse
  const keepJobs=DATA.jobs,keepAC=AUTOCHAINS,keepDay=currentDay;
  try{
    DATA.jobs=DATA.days[dayIso]||[];
    currentDay=dayIso;
    AUTOCHAINS=[];
    let rts=buildRoutes();
    for(let _g=0;_g<2;_g++){
      const det=detectAutoChains(rts);
      if(!det.length)break;
      AUTOCHAINS=AUTOCHAINS.concat(det);
      rts=buildRoutes();
    }
    assignAll(rts,getW(),'nearest');
    const byF={};rts.forEach(r=>{if(r.foreman)(byF[r.foreman.name]=byF[r.foreman.name]||[]).push(r.id);});
    const dd=Object.entries(byF).filter(([,ids])=>ids.length>1);
    _RC[dayIso]={routes:rts.length,unassigned:rts.filter(r=>!r.foreman).length,
      doubles:dd.length,
      dblTxt:dd.map(([n,ids])=>{const f=DATA.foremen.find(x=>x.name===n);return (f?f.name:n)+': '+ids.join('+');}).join(' · ')};
  }catch(e){ const n=(DATA.days[dayIso]||[]).filter(j=>!j.after&&!EXCL.has(jobKey(j))).length;_RC[dayIso]={routes:n,unassigned:0,doubles:0}; }
  finally{ DATA.jobs=keepJobs;AUTOCHAINS=keepAC;currentDay=keepDay; }
  return _RC[dayIso];
}
function estRoutesOn(dayIso){
  return dayPlanOn(dayIso).routes;

async function upgradeRoadMiles(){

  els.forEach(el=>{const k=el.dataset.q+'|'+el.dataset.p;(groups[k]=groups[k]||[]).push(el);});

function ldTripInfo(r){
  if(!r.ldDeparture)return null;
  const l=[...r.legs].reverse().find(x=>x.delivery&&!INREGION(x.delivery))||r.legs[r.legs.length-1];
  if(!l||!l.delivery)return null;
  const rm=cachedRoadMi(l.pickup||l.delivery,l.delivery);
  const mi=Math.round(rm!=null?rm:hav(l.pickup||l.delivery,l.delivery)*1.15);
  const days=1+Math.ceil(mi/550); // drive ~550 mi/day back after the job day
  const ret=new Date(Date.parse(currentDay+'T12:00')+days*86400000);
  return {mi,days,retIso:ret.toISOString().slice(0,10),
    retLbl:ret.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),
    city:l.cityTo};
}
function pathLine(r){
  const sl=[...r.legs].sort((a,b)=>Date.parse(a.start||0)-Date.parse(b.start||0));
  const base=DATA.bases[r.base];
  const bc=base?{lat:base.lat,lon:base.lon}:null;
  const parts=[{t:r.base+' Base',b:1,c:bc}];
  for(const l of sl){
    if(l.cityFrom&&parts[parts.length-1].t.toLowerCase()!==l.cityFrom.toLowerCase())parts.push({t:l.cityFrom,c:l.pickup});
    if(l._carrier)continue; // crew doesn't drive the carrier hop — delivery shown as a chip instead
    if(l.cityTo&&parts[parts.length-1].t.toLowerCase()!==l.cityTo.toLowerCase())parts.push({t:l.cityTo,c:l.delivery,ld:l._far});
  }
  if(!r.ldDeparture)parts.push({t:r.base+' Base',b:1,c:bc});
  else{const ti=ldTripInfo(r);if(ti)parts.push({t:'↩ '+r.base+' Base ~'+ti.retLbl,ret:1});}
  return '<div class="jpath">'+parts.map((p,i)=>{
    let arrow='';
    if(i>0){
      const q=parts[i-1];
      let mi='';
      if(p.c&&q.c){
        const rm=cachedRoadMi(q.c,p.c);
        const m=Math.round(rm!=null?rm:hav(q.c,p.c)*1.15);
        if(m>=1)mi='<i class="jmi'+(rm!=null?'':' est')+'" data-q="'+q.c.lat+','+q.c.lon+'" data-p="'+p.c.lat+','+p.c.lon+'">'+(rm!=null?'':'~')+(m>=100?m.toLocaleString():m)+' mi</i>';
      }
      arrow='<span class="ja">→'+mi+'</span>';
    }
    return arrow+'<span class="jp'+(p.b?' jb':'')+(p.ld?' jld':'')+(p.ret?' jret':'')+'">'+esc(p.t)+'</span>';
  }).join('')+'</div>';
}

function computeSuggestions(){
  const out=[];
  for(const A of routes){
    if(A.isLD||(A.trucksNeeded||0)>1||A.vansNeeded||A.crew>3)continue;
    if(Math.max(...A.legs.map(l=>l.actH||schedH(l)))>6)continue;
    const la=[...A.legs].sort((x,y)=>Date.parse(x.start||0)-Date.parse(y.start||0)).slice(-1)[0];
    if(!la.delivery||!INREGION(la.delivery))continue;
    for(const B of routes){
      if(B===A||B.isLD||B.crew>3||B.legs.length>1||(B.trucksNeeded||0)>1||B.vansNeeded)continue;
      const lb=B.legs[0];
      if(!lb.pickup||!lb.delivery||!INREGION(lb.delivery))continue;
      if(coOf(la)!==coOf(lb))continue;   // chain only within the same company
      const gapH=(B.t0-A.t1)/3600000;
      if(gapH<0.75||gapH>5)continue;
      const linkMi=hav(la.delivery,lb.pickup);
      if(gapH<linkMi/35+0.5)continue;
      if(Math.max(A.maxCF,B.maxCF)>1750||Math.max(A.crew,B.crew)>6)continue;
      const bA=DATA.bases[A.base],bB=DATA.bases[B.base];
      if(!bA||!bB)continue;
      const sep=hav(la.delivery,bA)+hav(bB,lb.pickup)+hav(lb.delivery,bB);
      const chained=linkMi+hav(lb.delivery,bA);
      const save=sep-chained;
      if(save<6)continue;
      {const _ws=Math.max(A.t1+linkMi/35*3600000,B.t0);
       const _p2d=hav(lb.pickup,lb.delivery)/35*3600000*1.15;
       const _done=_ws+((lb.actH||schedH(lb))*3600000)+_p2d;
       if(_done>Date.parse(String(lb.start).slice(0,10)+'T23:59'))continue;}
      out.push({A,B,la,lb,linkMi:Math.round(linkMi),save:Math.round(save),gapH});
    }
  }
  out.sort((a,b)=>b.save-a.save);
  const used=new Set(),res=[];
  for(const s of out){
    if(used.has(s.A.id)||used.has(s.B.id))continue;
    used.add(s.A.id);used.add(s.B.id);res.push(s);
  }
  return res.slice(0,4);
}

function curvePts(a,b,sign,scale){
  sign=sign||1;scale=scale||1;
  const n=24,pts=[];
  const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2;
  const dx=b[0]-a[0],dy=b[1]-a[1],len=Math.hypot(dx,dy)||1e-9;
  const bow=Math.min(len*0.18*scale,0.10*scale)*sign;
  const cx=mx-dy/len*bow,cy=my+dx/len*bow;
  for(let i=0;i<=n;i++){const u=i/n;
    pts.push([(1-u)*(1-u)*a[0]+2*(1-u)*u*cx+u*u*b[0],(1-u)*(1-u)*a[1]+2*(1-u)*u*cy+u*u*b[1]]);}
  return pts;
}
const havArr=(a,b)=>hav({lat:a[0],lon:a[1]},{lat:b[0],lon:b[1]});

const TRAVEL='#6C5CE0';
const hereCache={};
const HERE_KEY='0IGXB_hGz84InzFmhfCygxp27_54NI-LkjL6N5RSYT8';
function HEREKEY(){return HERE_KEY;}

function decodeFlexPoly(encoded){
  const DEC='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
  const idx={};[...DEC].forEach((c,i)=>idx[c]=i);
  let i=0;
  function varint(){let r=0,s=0,b;do{b=idx[encoded[i++]];r|=(b&31)<<s;s+=5;}while(b>=32);return r;}
  function svarint(){const r=varint();return (r&1)?~(r>>>1):(r>>>1);}
  varint();
  const meta=varint();
  const precision=meta&15, thirdDim=(meta>>4)&7;
  if(thirdDim)varint?0:0;
  const factor=Math.pow(10,precision);
  let lat=0,lng=0;const pts=[];
  while(i<encoded.length){
    lat+=svarint(); lng+=svarint();
    if(thirdDim)svarint();
    pts.push([lat/factor,lng/factor]);
  }
  return pts;
}

async function truckRoute(a,b){
  const key=HEREKEY(); if(!key)return null;
  const ck=a.join()+'|'+b.join();
  if(hereCache[ck]!==undefined)return hereCache[ck];
  const p=(async()=>{
    try{
      const u='https://router.hereapi.com/v8/routes?transportMode=truck&routingMode=fast&origin='+a[0]+','+a[1]
        +'&destination='+b[0]+','+b[1]+'&return=polyline,summary&apikey='+encodeURIComponent(key);
      const res=await fetch(u); if(!res.ok)throw 0;
      const j=await res.json();
      const sec=(j.routes&&j.routes[0]&&j.routes[0].sections)||[];
      if(!sec.length)throw 0;
      let pts=[],len=0,dur=0;
      for(const s of sec){pts=pts.concat(decodeFlexPoly(s.polyline));len+=s.summary.length;dur+=s.summary.duration;}
      const out={pts,mi:len/1609.34,min:dur/60};
      hereCache[ck]=out;return out;
    }catch(e){hereCache[ck]=null;return null;}
  })();
  hereCache[ck]=p;
  return p;
}
function cachedRoadMi(a,b){
  const e=hereCache[[a.lat,a.lon].join()+'|'+[b.lat,b.lon].join()];
  return (e&&typeof e==='object'&&!(e instanceof Promise)&&e.mi!=null)?e.mi:null;
}
const fmtRoad=rt=>rt?(rt.mi.toFixed(1)+' miles · '+Math.round(rt.min)+' min'):'';

function arrowAt(pts,col){
  const i=Math.floor(pts.length/2);
  const p=pts[i],q=pts[Math.min(i+1,pts.length-1)];
  const deg=Math.atan2(q[1]-p[1],q[0]-p[0])*180/Math.PI;
  return L.marker(p,{interactive:false,icon:L.divIcon({className:'',iconSize:[16,16],iconAnchor:[8,8],
    html:'<div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:11px solid '+col+';transform:rotate('+deg.toFixed(1)+'deg);filter:drop-shadow(0 0 1.5px #fff)"></div>'})}).addTo(layerG);
}

const tm=s=>s?s.slice(11):'';

function refreshMap(){
  initMap();
  layerG.clearLayers();
  drawSeq++;
  const seq=drawSeq;
  if(mapMode==='all'){drawAllJobs(seq);return;}
  const sel=routes.find(r=>r.id===highlighted);
  const mc=document.getElementById('mapcard');
  if(!sel){
    drawBases(null);
    mc.innerHTML='<div class="mt">Map is on standby</div><div class="ms">Press <b>Visualize journey</b> on any route card to draw its full day here with stop-by-stop ETAs.</div>';
    return;
  }
  const r=sel;
  const fleet=r.status!=='rental';
  const col=fleet?'#0F8A66':'#B26B0B';
  const base=DATA.bases[r.base];
  const basePt=base?[base.lat,base.lon]:null;
  const legs=[...r.legs].sort((a,b)=>Date.parse(a.start||0)-Date.parse(b.start||0)).filter(l=>l.pickup&&l.delivery);
  let prev=basePt, stopN=0, jobN=0;
  const pts=basePt?[basePt]:[];
  const items=[];
  const estMin=(a,b)=>Math.max(5,Math.round(havArr(a,b)/35*60*1.15)+4);

  function addTravel(from,to,label,kind){
    if(havArr(from,to)<0.35)return null;
    const KC={topickup:'#1F6FD6',between:'#8A63D2',return:'#6B7280'};
    const kcol=KC[kind]||TRAVEL;
    const cpts=curvePts(from,to,-1,1.7);
    const casing=L.polyline(cpts,{color:'#FFFFFF',weight:6.5,opacity:0.92,lineCap:'round',interactive:false}).addTo(layerG);
    const line=L.polyline(cpts,{color:kcol,weight:3,opacity:0.95,dashArray:'8 7',lineCap:'round',className:'flowline'}).addTo(layerG);
    line.on('mouseover',()=>line.setStyle({weight:4.5}));
    line.on('mouseout',()=>line.setStyle({weight:3}));
    const arrow=arrowAt(cpts,kcol);
    const it={type:kind||'travel',from,to,label,line,casing,arrow,fallback:estMin(from,to)};
    line.bindTooltip('<div class="tt">'+label+'</div><div class="ts">'+(kind==='topickup'?'empty drive to the pickup':kind==='between'?'empty drive between jobs':kind==='return'?'empty drive back to base':'empty travel')+'</div>',{sticky:true,className:'lpop',opacity:1});
    items.push(it);
    return it;
  }

  for(const l of legs){
    jobN++;
    const _cd=!!(l._carrier&&l.carrierDrop);
    const a=[l.pickup.lat,l.pickup.lon], b=_cd?[l.carrierDrop.lat,l.carrierDrop.lon]:[l.delivery.lat,l.delivery.lon];
    if(prev)addTravel(prev,a,jobN===1?('Leave '+r.base+' base → job #1'):('Travel to job #'+jobN),jobN===1?'topickup':'between');
    if(l._carrier&&!_cd){
      // crew loads at pickup; carrier hauls to destination; crew & truck return to base
      // regular moving: the carrier hauls the goods — the crew's world ends at the pickup, so no line is drawn to the far delivery
      const it={type:'job',leg:l,jobN,from:a,to:null,carrier:true,inreg:false,fallback:0};
      items.push(it);
      stopN++;stopMarker(a,stopN,'P',col,'<div class="tt">Stop '+stopN+' · job #'+jobN+' pickup (carrier move) · '+tm(l.start)+'</div><div class="ts">'+esc(l.pickupAddr||l.cityFrom)+'</div>');
      L.tooltip({permanent:true,direction:'top',offset:[0,-14],className:'placechip'})
        .setLatLng(a).setContent(esc((l.customer||l.cityFrom).split(' ')[0])+' · '+esc(l.cityFrom)).addTo(layerG);
      pts.push(a);
      prev=a;
      continue;
    }
    const inreg=_cd?true:INREGION(l.delivery);
    const cpts=curvePts(a,b,1,1);
    const w0=Math.max(4,Math.min(l.cf/300,8));
    const casing=L.polyline(cpts,{color:'#FFFFFF',weight:w0+3.5,opacity:0.95,lineCap:'round',interactive:false}).addTo(layerG);
    const line=L.polyline(cpts,{color:col,weight:w0,opacity:0.95,dashArray:r.ldDeparture?'10 8':null,lineCap:'round'}).addTo(layerG);
    line.on('mouseover',()=>line.setStyle({weight:w0+2}));
    line.on('mouseout',()=>line.setStyle({weight:w0}));
    line.bindTooltip('<div class="tt">Job #'+jobN+' · '+esc(l.code)+'</div><div class="ts">'+esc(l.cityFrom)+' → '+esc(l.cityTo)+' · '+l.cf.toLocaleString()+' CF · ACT '+fmtH(l.actH||schedH(l))+'</div>',{sticky:true,className:'lpop',opacity:1});
    arrowAt(cpts,col);
    const it={type:'job',leg:l,jobN,from:a,to:b,inreg,line,casing,fallback:estMin(a,b),cdrop:_cd};
    items.push(it);
    stopN++;stopMarker(a,stopN,'P',col,'<div class="tt">Stop '+stopN+' · job #'+jobN+' pickup · '+tm(l.start)+'</div><div class="ts">'+esc(l.pickupAddr||l.cityFrom)+'</div>');
    L.tooltip({permanent:true,direction:'top',offset:[0,-14],className:'placechip'})
      .setLatLng(a).setContent(esc((l.customer||l.cityFrom).split(' ')[0])+' · '+esc(l.cityFrom)).addTo(layerG);
    pts.push(a);
    stopN++;stopMarker(b,stopN,'D',col,'<div class="tt">Stop '+stopN+' · job #'+jobN+' delivery'+(inreg?'':' · long distance')+'</div><div class="ts">'+esc(l.deliveryAddr||l.cityTo)+(inreg?' · ETA in itinerary':'')+'</div>');
    if(!inreg)L.tooltip({permanent:true,direction:'top',offset:[0,-14],className:'placechip'})
      .setLatLng(b).setContent(esc(l.cityTo)+(l.stateTo?', '+esc(l.stateTo):'')).addTo(layerG);
    pts.push(b);
    if(inreg){ prev=b; } else { prev=null;
      if(basePt){
        const rp=curvePts(b,basePt,-1,1.4);
        const rl=L.polyline(rp,{color:TRAVEL,weight:2.5,opacity:0.55,dashArray:'3 9',lineCap:'round'}).addTo(layerG);
        rl.bindTooltip('<div class="tt">Return to '+r.base+' base</div><div class="ts">long distance — typically next day</div>',{sticky:true,className:'lpop',opacity:1});
      }
    }
  }
  if(prev&&basePt&&!r.ldDeparture)addTravel(prev,basePt,'Return to '+r.base+' base'+(r.hasCarrier?' with goods':''),'return');

  drawBases(r.base);
  if(basePt){
    L.tooltip({permanent:true,direction:'bottom',offset:[0,14],className:'placechip'})
      .setLatLng(basePt).setContent(r.base+' base').addTo(layerG);
  }
  if(pts.length)LMAP.flyToBounds(L.latLngBounds(pts),{duration:0.6,maxZoom:13,
    paddingTopLeft:[600,50],paddingBottomRight:[60,70]});

  mc.innerHTML='<div class="mchead"><div class="mt">'+r.id+' · day timeline</div>'
      +'<div class="mcbtns"><button class="mcx" title="Exit map">✕ Exit map</button></div></div>'
    +'<div class="mcbody">'
    +(function(){
        const sl2=[...r.legs].sort((a,b)=>Date.parse(a.start)-Date.parse(b.start));
        const endR=Math.max(...sl2.map(l=>l._endMs||Date.parse(l.end||l.start)));
        const bm=backAtBaseMs(r);
        const mt=[...new Set(sl2.map(l=>String(l.movingType||'').trim()).filter(Boolean))].join(' / ');
        const jt=[...new Set(sl2.map(l=>String(l.jobType||'').trim()).filter(Boolean))].join(' / ');
        const acts=sl2.reduce((s,l)=>s+(l.actH||0),0);
        return '<div class="minfo">'
        +'<div class="mirow"><b>'+esc(sl2.map(l=>l.customer||l.code).join(' + '))+'</b><span class="mono ts">'+sl2.map(l=>esc(l.code)).join(' · ')+'</span></div>'
        +'<div class="mirow">'+tm(sl2[0].start)+' – ~'+new Date(endR).toTimeString().slice(0,5)
          +' · '+r.totalCF.toLocaleString()+' CF · crew '+r.crew+(acts?' · ACT '+acts+'h':'')
          +(r.packing?' · packing $'+Math.round(r.packing).toLocaleString():'')
          +(bm!=null?(function(){const d=new Date(bm);if(d.getMinutes()||d.getSeconds())d.setHours(d.getHours()+1);d.setMinutes(0,0,0);return ' · <b>back ~'+d.toTimeString().slice(0,5)+'</b>';})():'')+(sl2[0].winEnd?' · ⏱ window until '+String(sl2[0].winEnd).slice(11,16):'')+(sl2[0].strict?' · ⏰ sharp start':'')+'</div>'
        +'<div class="mirow">'+typeChip(mt,'tmove',1)+typeChip(jt,'tjob',1)
          +'<span class="chip" title="Route difficulty 0–100 — hardest routes pick their foreman and trucks first">⚖ difficulty '+r.score+'</span>'
          +(sl2.some(l=>l._draft)?'<span class="chip" style="background:#FFF3D6;border-color:#EAD49A">📝 planning draft</span>':'')
          +(function(){const ws=sl2.flatMap(l=>jobChecks(l));return ws.length?'<span class="chip warnchip" title="'+esc(ws.join('\n'))+'">⚠ '+ws.length+' data warning'+(ws.length>1?'s':'')+'</span>':'';})()
          +sl2.filter(l=>l.eventId).map(l=>'<a class="chip calopen" target="_blank" rel="noopener" href="'+calEditUrl(l.eventId)+'" title="Open '+esc(l.code)+' in Google Calendar — edits sync back automatically">✎ '+esc(l.code)+'</a>').join('')
          +'</div>'
        +(r._pmWhy?'<div class="mirow pmwhy">🌗 '+esc(r._pmWhy)+'</div>':'')
        +'<div class="mirow">👷 '+(r.foreman?'<b>'+esc(r.foreman.nick)+'</b> ('+esc(r.foreman.name)+')':'<b class="nofor">⚠ NO FOREMAN</b>')+' · 🚚 '+(r.short?'<b class="nofor">'+esc(routeVehText(r))+'</b>':esc(routeVehText(r)))+(r._carNeed>0?' · 🚗 <b>+'+r._carNeed+' in a follow car</b> (cab seats '+r._cabSeats+', crew '+r.crew+')':'')+'</div>'
        +sl2.filter(l=>l._carrier).map(l=>'<div class="mirow cdwrap"><span class="ts" style="flex-shrink:0">🚛 '+esc(l.code)+' carrier drop-off</span><span class="cdcol"><input class="cdrop" data-code="'+esc(l.code)+'" value="'+esc(l.carrierDropAddr||'')+'" placeholder="default: crew returns to base — or type the carrier\'s address / zip"><span class="ajhint cdhint">'+(l.carrierDrop?'✓ '+esc(l.carrierDrop.city)+', '+esc(l.carrierDrop.state):'')+'</span></span></div>').join('')
        +'<div class="mirow mexcls">'+sl2.map(l=>'<span class="mexwrap"><label class="ajsw mexcl" title="Take '+esc(l.code)+' off the board (the calendar event stays untouched) or bring it back"><input type="checkbox" data-k="'+esc(jobKey(l))+'" data-t="'+esc(l.customer||l.code)+'" data-d="'+esc(currentDay)+'"'+(EXCL.has(jobKey(l))?'':' checked')+'><i></i></label><span class="ts">on board · '+esc(l.code)+'</span></span>').join('')+'</div>'
        +assignCtrlsHTML(r)
        +'</div>';
      })()
    +'<div class="steps" id="steps-'+seq+'"></div>'
    +'<div class="ms" id="daytot-'+seq+'" style="margin-top:6px"></div>'
    +'<button id="showall">← all routes</button>'
    +'</div>';
  mc.classList.remove('min');
  document.getElementById('showall').onclick=()=>{mapMode='all';highlighted=null;renderCards();refreshMap();};

  renderItinerary(r,items,seq,false);
  const fetches=items.filter(it=>it.from&&it.to).map(it=>
    truckRoute(it.from,it.to).then(rt=>{
      if(seq!==drawSeq||!rt)return;
      it.min=rt.min; it.mi=rt.mi;
      it.line.setLatLngs(rt.pts);
      if(it.casing)it.casing.setLatLngs(rt.pts);
      if(it.arrow){layerG.removeLayer(it.arrow);it.arrow=arrowAt(rt.pts,it.type==='job'?col:TRAVEL);}
    })
  );
  if(HEREKEY())Promise.all(fetches).then(()=>{if(seq===drawSeq)renderItinerary(r,items,seq,true);});
}

function schedH(l){
  const a=Date.parse(l.start||0),b=Date.parse(l.end||l.start||0);
  return Math.max((b-a)/3600000,1);
}
function fmtH(h){
  const m=Math.round(h*60),hh=Math.floor(m/60),mm=m%60;
  return hh+'h'+(mm?String(mm).padStart(2,'0'):'');
}
const fmtMs=ms=>new Date(ms).toTimeString().slice(0,5);

function renderItinerary(r,items,seq,resolved){
  const box=document.getElementById('steps-'+seq);
  const tot=document.getElementById('daytot-'+seq);
  if(!box)return;
  const rows=[];
  let cursor=null, totMi=0, totMin=0, empMi=0, empMin=0;
  const M=it=>it.min!=null?Math.round(it.min):it.fallback;
  const MI=it=>it.mi!=null?it.mi:((it.from&&it.to)?havArr(it.from,it.to)*1.15:0);
  let lastDone=null;
  for(const it of items){
    const min=M(it), mi=MI(it);
    if(it.type==='travel'||it.type==='return'){
      totMi+=mi;totMin+=min;empMi+=mi;empMin+=min;
      if(cursor===null){
        // leave base so as to hit job #1 scheduled start
        const next=items[items.indexOf(it)+1];
        const sched=next&&next.leg?Date.parse(next.leg.start):null;
        const dep=sched?sched-min*60000:null;
        rows.push({t:dep?fmtMs(dep):'',txt:it.label+' · '+min+' min · '+mi.toFixed(0)+' miles',travel:true});
        cursor=sched;
      } else if(it.type==='return'){
        const back=cursor+min*60000;
        rows.push({t:fmtMs(cursor),txt:it.label+' · '+min+' min · back ~'+fmtMs(back),travel:true});
        cursor=back;
      } else {
        const eta=cursor+min*60000;
        const next=items[items.indexOf(it)+1];
        const sched=next&&next.leg?Date.parse(next.leg.start):null;
        let note='';
        if(sched!=null){
          const dl=Date.parse(next.leg.winEnd||next.leg.start);
          const slack=Math.round((dl-eta)/60000);
          const lbl=next.leg.winEnd?('window until '+String(next.leg.winEnd).slice(11,16)):('scheduled '+fmtMs(sched));
          note=slack>=0?(' · ETA '+fmtMs(eta)+', '+lbl+' ('+slack+' min slack)')
                       :(' · ETA '+fmtMs(eta)+' — '+(-slack)+' min LATE vs '+lbl);
        }
        rows.push({t:fmtMs(cursor),txt:it.label+' · '+min+' min'+note,travel:true,warn:note.includes('LATE')});
        cursor=sched!=null?Math.max(eta,sched):eta;
      }
    } else {
      const l=it.leg;
      if(!l)continue;
      const act=l.actH||schedH(l);
      const sched=Date.parse(l.start);
      const arrive=cursor===null?sched:cursor;
      const workStart=Math.max(arrive,sched);
      totMi+=mi;totMin+=min;
      const loadMs=act*ACT_LOAD_SHARE*3600000;
      const unloadMs=act*(1-ACT_LOAD_SHARE)*3600000;
      const departP=workStart+loadMs;
      const etaD=departP+min*60000;
      const done=etaD+unloadMs;
      rows.push({t:fmtMs(workStart),txt:'Job #'+it.jobN+' · '+l.code+' · pickup '+l.cityFrom+' — '+(it.carrier?'load':'work')+' '+fmtH(act)+' (ACT)',travel:false});
      if(it.carrier){
        rows.push({t:'',txt:'Hand off to carrier — goods continue to '+l.cityTo+(l.stateTo?', '+l.stateTo:'')+' by carrier. Crew & truck head back with the load to base storage.',travel:true});
        cursor=done;lastDone=done;
      } else if(it.inreg){
        rows.push({t:fmtMs(departP),txt:(it.cdrop?'Drive load to carrier · ':'Drive to delivery · ')+min+' min · '+mi.toFixed(0)+' miles',travel:true});
        rows.push({t:fmtMs(etaD),txt:(it.cdrop?('Drop at carrier '+((l.carrierDrop&&l.carrierDrop.city)||'')+' — carrier hauls on to '+l.cityTo+', crew returns'):('Deliver '+l.cityTo))+' · ETA '+fmtMs(etaD)+' · done ~'+fmtMs(done),travel:false});
        cursor=done;lastDone=done;
      } else {
        const farMi=Math.round(MI(it));
        const farDrv=it.min!=null?(Math.floor(it.min/60)+'h'+String(Math.round(it.min%60)).padStart(2,'0')+' truck drive'):('~'+Math.round(farMi/52)+'h drive est');
        rows.push({t:fmtMs(departP),txt:'Departs long distance → '+l.cityTo+', '+l.stateTo+' · '+(it.mi!=null?'':'~')+farMi.toLocaleString()+' miles ('+farDrv+')',travel:true});
        {const ti=ldTripInfo(r);
        rows.push({t:'',txt:'No same-day return — long-distance departure. Truck & crew continue'+(ti?' to '+ti.city:'')+'; estimated back at '+r.base+' base ~'+(ti?ti.retLbl:'next days')+' (~'+farMi.toLocaleString()+' miles one-way).',travel:true});}
        cursor=null;
      }
    }
  }
  box.innerHTML=rows.map(s=>'<div class="step'+(s.travel?' tv':'')+(s.warn?' late':'')+'"><span class="dot"></span><span class="st">'+(s.t||'')+'</span><span>'+esc(s.txt)+'</span></div>').join('');
  tot.innerHTML='Day driving ~<b>'+Math.floor(totMin/60)+'h'+String(Math.round(totMin%60)).padStart(2,'0')+' · '+totMi.toFixed(0)+' miles</b>'
    +' · empty '+Math.round(empMin)+' min / '+empMi.toFixed(0)+' miles'
    +' <span class="rsrc">'+(resolved?'HERE truck routes':'straight-line estimate'+(HEREKEY()?' — refining…':''))+'</span>'
    +'<br><span class="rsrc">ACT split 60% loading / 40% unloading; work starts no earlier than the booked time.</span>';
}

function drawAllJobs(seq){
  const mc=document.getElementById('mapcard');
  const pts=[];
  const items=[];
  const vis=visibleRoutes();
  vis.forEach((r,idx)=>{
    const col=PALETTE[idx%PALETTE.length];
    // permanent info chip at the route's first pickup — foreman, trucks, customer at a glance
    const _fl=[...r.legs].sort((x,y)=>Date.parse(x.start||0)-Date.parse(y.start||0))[0];
    if(_fl&&_fl.pickup){
      const _tk=((r.short||0)>0?'<i class="mlno">NO TRUCK</i>'+((r.vehicles||[]).some(v=>v.kind!=='short')?' + '+esc(truckRefs(r)):''):esc(truckRefs(r)||'—'));
      const _fm=(r.foreman?esc(r.foreman.name):'<i class="mlno">NO FOREMAN</i>');
      const _cu=esc(String(_fl.customer||'').split(/\s+/).slice(0,2).join(' ').slice(0,20));
      L.marker([_fl.pickup.lat,_fl.pickup.lon],{interactive:false,zIndexOffset:900,
        icon:L.divIcon({className:'',iconSize:null,iconAnchor:[-9,30],
          html:'<div class="maplbl" style="border-left-color:'+col+'"><span class="mlr">'+r.id+(r.confirmed?' ✔':'')+'</span> '+_fm+' · '+_tk+(_cu?'<span class="mlc">'+_cu+'</span>':'')+'</div>'})}).addTo(layerG);
    }
    for(const l of r.legs){
      if(!l.pickup||!l.delivery)continue;
      const a=[l.pickup.lat,l.pickup.lon];
      if(!INREGION(l.delivery)){
        // long-distance leg: draw it heading out of the region, keep the map zoomed to the region
        pts.push(a);
        const bFar=[l.delivery.lat,l.delivery.lon];
        const cp=curvePts(a,bFar,1,1);
        const carrier=!!l._carrier;
        if(!carrier){
          const farCasing=L.polyline(cp,{color:'#FFFFFF',weight:6,opacity:0.8,lineCap:'round',interactive:false}).addTo(layerG);
          const farLine=L.polyline(cp,{color:col,weight:3.5,opacity:0.85,lineCap:'round',dashArray:'9 7'}).addTo(layerG);
          items.push({line:farLine,casing:farCasing,a,b:bFar});
          farLine.bindTooltip('<div class="tt">'+esc(l.customer||l.code)+'</div>'
            +'<div class="ts">'+esc(l.code)+' · '+r.id+' · long distance → '+esc(l.cityTo)+(l.delivery.state?', '+esc(l.delivery.state):'')+'</div>'
            +'<div class="ts">'+(cachedRoadMi(l.pickup,l.delivery)!=null?Math.round(cachedRoadMi(l.pickup,l.delivery)).toLocaleString():'~'+Math.round(hav(l.pickup,l.delivery)*1.15).toLocaleString())+' miles · '+l.cf.toLocaleString()+' CF · '+(r.foreman?esc(r.foreman.name):'')+'</div>'
            +'<div class="ts" style="color:var(--fleet)">click to open this route</div>',{sticky:true,className:'lpop',opacity:1});
          farLine.on('click',()=>selectRoute(r.id,true));
          farLine.on('mouseover',()=>farLine.setStyle({weight:6}));
          farLine.on('mouseout',()=>farLine.setStyle({weight:3.5}));
        }
        L.circleMarker(a,{radius:5,color:'#fff',weight:2,fillColor:col,fillOpacity:1}).addTo(layerG);
        continue;
      }
      const b=[l.delivery.lat,l.delivery.lon];
      const cpts=curvePts(a,b,1,1);
      const casing=L.polyline(cpts,{color:'#FFFFFF',weight:6,opacity:0.85,lineCap:'round',interactive:false}).addTo(layerG);
      const w0=Math.max(3,Math.min(l.cf/420,5.5));
      const line=L.polyline(cpts,{color:col,weight:w0,opacity:0.9,lineCap:'round',dashArray:r.ldDeparture?'9 7':null}).addTo(layerG);
      items.push({line,casing,a,b});
      line.on('mouseover',()=>line.setStyle({weight:w0+2.5}));
      line.on('mouseout',()=>line.setStyle({weight:w0}));
      line.bindTooltip('<div class="tt">'+esc(l.customer||l.code)+'</div>'
        +'<div class="ts">'+esc(l.code)+' · '+r.id+' · starts '+tm(l.start)+'</div>'
        +'<div class="ts">'+esc(l.cityFrom)+' → '+esc(l.cityTo)+' · '+l.cf.toLocaleString()+' CF · crew '+r.crew+'</div>'
        +'<div class="ts">'+(r.foreman?esc(r.foreman.name)+' · ':'')+r.vehicles.map(v=>v.kind==='fleet'?'Truck '+v.t.n:'rental '+v.sz).join(' + ')+'</div>'
        +'<div class="ts">click to open this route</div>',{sticky:true,className:'lpop',opacity:1});
      line.on('click',()=>selectRoute(r.id,true));
      L.circleMarker(a,{radius:4.5,color:'#fff',weight:1.6,fillColor:col,fillOpacity:1}).addTo(layerG).on('click',()=>selectRoute(r.id,true));
      pts.push(a,b);
    }
  });
  drawBases(null);
  if(pts.length)LMAP.flyToBounds(L.latLngBounds(pts),{duration:0.5,maxZoom:11,paddingTopLeft:[600,40],paddingBottomRight:[40,60]});
  mc.innerHTML='<div class="mchead"><div class="mt">All jobs — '+currentDay+'</div>'
      +'<div class="mcbtns"><button class="mcx" title="Exit map">✕ Exit map</button></div></div>'
    +'<div class="mcbody">'
    +'<div class="ms">'+vis.length+(filtersActive()?' of '+routes.length:'')+' routes'+(filtersActive()?' <b>(filters applied)</b>':'')+' · one color each · only loaded job legs shown. Hover for customer & details, click a line to open that route with full ETAs.</div>'
    +'<div class="ms rsrc" id="allrt-'+seq+'">'+(HEREKEY()?'Fetching truck routes…':'Straight-line preview')+'</div>'
    +'</div>';
  mc.classList.remove('min');
  if(HEREKEY())Promise.all(items.map(it=>truckRoute(it.a,it.b).then(rt=>{
    if(seq!==drawSeq||!rt)return;
    it.line.setLatLngs(rt.pts);
    it.casing.setLatLngs(rt.pts);
  }))).then(()=>{
    if(seq!==drawSeq)return;
    const el=document.getElementById('allrt-'+seq);
    if(el)el.textContent='All legs shown as real truck routes (HERE, cached).';
  });
  if(document.getElementById('showall'))document.getElementById('showall').onclick=exitMap;
}
function selectRoute(id,scrollCard){
  setTimeout(updateViewBtns,0);

  mapMode='single';
  highlighted=(highlighted===id)?null:id;
  const lay=document.querySelector('.layout');
  renderCards();
  const _mob=document.documentElement.classList.contains('mob');
  if(highlighted){
    const wasOn=lay.classList.contains('mapon');
    lay.classList.add('mapon');
    setTimeout(()=>{openMap();
      // on phones the map sits below the cards in the column layout — bring it into view so the drawn route is actually visible
      if(_mob){const mw=document.getElementById('mapwrap');if(mw)mw.scrollIntoView({behavior:'smooth',block:'start'});}
    },wasOn?60:480);
  } else {
    lay.classList.remove('mapon');
  }
  if(scrollCard&&highlighted&&!_mob){
    const c=document.querySelector('.card[data-r="'+highlighted+'"]');
    if(c)c.scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function renderMap(){
  if(document.querySelector('.layout').classList.contains('mapon'))refreshMap();
}
function refreshMapIfAll(){
  if(mapMode==='all'&&document.querySelector('.layout').classList.contains('mapon'))refreshMap();
}

let CHANGED={};
function vehRefs(r){return r.vehicles.map(v=>v.kind==='fleet'?v.t.n:(v.kind==='rental'?('R'+((v.sz||'').includes('26')?'26':'20')):'SHORT')).join('+');}
function takeSnap(){const s={};routes.forEach(r=>{s[r.legs[0].code]={f:r.foreman?r.foreman.name:null,b:r.base,v:vehRefs(r)};});return s;}
const ZD_KEY='zd_state_v1';
var EDIT_WINDOW_DAYS=4; // editable + pushable window: today plus the next 3 days
function tomorrowISO(){return new Date(new Date(TODAY_ISO+'T12:00').getTime()+86400000).toISOString().slice(0,10);}
function editEndISO(){return new Date(new Date(TODAY_ISO+'T12:00').getTime()+(EDIT_WINDOW_DAYS-1)*86400000).toISOString().slice(0,10);}
function canEdit(d){d=d||currentDay;return d>=TODAY_ISO&&d<=editEndISO();}
function canChain(d){d=d||currentDay;return d>=TODAY_ISO;} // chain / detach allowed on any non-past day; only calendar push is limited to today+tomorrow
function chainApply(fn){
  if(!canChain()){toast('🔒 Past day — review mode; chaining is disabled.');return;}
  highlighted=null;document.querySelector('.layout').classList.remove('mapon');

function sheetSaved(what){toast('✓ '+what+' — saved to the team sheet.');}
function sheetSaveFailed(what,e){
  gModal('⚠ Saved on the board — but NOT in the team sheet',
    '<div class="gsub">The '+esc(what)+' is live on this board, but writing it to the Google Sheet failed:</div>'
    +'<div class="skrow"><b>'+esc(e&&e.message?e.message:'request failed')+'</b><span>'
    +(GTOKEN?'If this mentions permissions, click 🗓 Connect Calendar once to re-approve with Sheets access.':'Click 🗓 Connect Calendar to grant access, then redo the change.')
    +'</span></div>');

async function dayOffToSheet(f,on){
  if(!GTOKEN){toast('Applied on the board. Connect the calendar button to also save day-offs to the team sheet.');return;}
  try{
    if(on){await shAppendRow('Crew Day Offs',{'Start Date':mdy(currentDay),'End Date':mdy(currentDay),'Forman Name':f.nick,'Note':SHEET_WRITE_NOTE});sheetSaved(f.nick+' marked off '+mdy(currentDay));}
    else{
      const ok=await shUpdateCellByMatch('Crew Day Offs',
        row=>(row['Forman Name']===f.nick||row['Forman Name']===f.name)&&row['Start Date']===mdy(currentDay)&&row['Note']===SHEET_WRITE_NOTE,
        'Note','removed by ZipDispatch');
      if(ok){await shUpdateCellByMatch('Crew Day Offs',row=>row['Forman Name']===f.nick&&row['Note']==='removed by ZipDispatch'&&row['Start Date']===mdy(currentDay),'Forman Name','');sheetSaved(f.nick+' back on '+mdy(currentDay));}
      else toast('Applied on the board. (No matching ZipDispatch day-off row found in the sheet — if it was added by hand, clear it there.)');
    }
  }catch(e){sheetSaveFailed('day-off',e);}
}
async function holderToSheet(truckN,foremanName){
  if(!GTOKEN)return toast('Pairing applied on the board. Connect the calendar button to also save it to the team sheet.');
  try{
    await shUpdateCellByMatch('Truck Holders',row=>row['Truck N']===truckN,'Foreman',foremanName||'');
    const vals=await shValues('Truck Holders').catch(()=>[]);
    const has=vals.slice(1).some(r=>r[1]===truckN||r[0]===truckN);
    if(!has&&foremanName)await shAppendRow('Truck Holders',{'Foreman':foremanName,'Truck N':truckN,'Note':SHEET_WRITE_NOTE});
    sheetSaved(foremanName?(truckN+' paired with '+foremanName):(truckN+' pairing cleared'));
  }catch(e){sheetSaveFailed('truck pairing',e);}
}

function lbPopover(btn,items){
  document.querySelectorAll('.lbpop').forEach(p=>p.remove());
  const pop=document.createElement('div');pop.className='lbpop';
  items.forEach(it=>{
    if(!it)return;
    const b=document.createElement('button');b.innerHTML=it.label;
    b.addEventListener('click',()=>{pop.remove();if(it.confirm){confirmDo(it.confirm.title,it.confirm.msg,it.fn);}else{it.fn();}});
    pop.appendChild(b);
  });
  btn.closest('.lbrow').appendChild(pop);
  setTimeout(()=>document.addEventListener('click',function h(){pop.remove();document.removeEventListener('click',h);}),0);
}

function findPlacements(job){
  const startSched=Date.parse(job.start.replace(' ','T'));
  const asap=job._asap;
  const nowMs=(currentDay===TODAY_ISO)?(Date.now()+30*60000):Date.parse(currentDay+'T08:00');
  const dur=h=>h*3600000;
  const jobWork=dur(job.actH)+(job.delivery?dur(TRAVELH(job.pickup,job.delivery)):0);
  const endLocOf=j=>(j.delivery&&INREGION(j.delivery))?j.delivery:j.pickup;
  const opts=[];
  // chains onto existing routes (covers busy + early-finishing foremen)
  for(const r of routes){
    if(!r.foreman||r.ldDeparture)continue;
    const headEndMs=Math.max(...r.legs.map(l=>l._endMs||Date.parse(l.end||l.start)));
    const headLoc=endLocOf([...r.legs].sort((a,b)=>Date.parse(a.start)-Date.parse(b.start))[r.legs.length-1]);
    const arrive=headEndMs+dur(TRAVELH(headLoc,job.pickup))+30*60000;
    const pickupAt=asap?Math.max(arrive,nowMs):startSched;
    if(!asap&&arrive>startSched)continue;            // can't make it in time
    if(pickupAt-r.t0<3*3600000)continue;             // 3-hour company rule
    if(job.crew>r.crew)continue;                     // can't grow a crew mid-day
    const v=(r.vehicles||[])[0];
    const vcf=v?(v.kind==='fleet'?v.t.cf:(v.sz==='26 ft'?1700:1100)):0;
    if(vcf<job.cf)continue;                          // their wheels must fit the load
    const backAt=pickupAt+jobWork+dur(TRAVELH(job.delivery&&INREGION(job.delivery)?job.delivery:job.pickup,DATA.bases[r.base]));
    opts.push({kind:'chain',r,f:r.foreman,pickupAt,backAt,cost:0,

      truckTxt:tk?('truck '+tk.n+' · '+tk.cf.toLocaleString()+' CF'):('no fitting '+f.base+' truck free — route will show TRUCK SHORT; add a dated rental after'),
      rental,crossBase,tk,

function backAtBaseMs(r){

  if(j.straight&&_isLD&&!j.tripDays&&!/same\s*day/i.test((j.jobType||'')+' '+(j.movingType||'')))out.push('Straight LD without "Estimated Trip Days" in the calendar — add it so the engine can block the foreman while he\'s on the road');
  const _blob=(j.customer||'')+' '+(j.jobType||'')+' '+(j.movingType||'')+' '+(j.code||'');
  if(/in.?home.{0,12}estimat|estimat.{0,12}in.?home|\bestimate\b|walk.?through|site (visit|survey)/i.test(_blob))out.push('Looks like an in-home estimate / site visit, not a move — if so, switch it off the board with the On-board toggle (your call, never automatic)');
  if(/local/i.test(String(j.movingType||''))&&j.actH&&j.actH>=12&&j.actH<14)out.push('Local Moving with ACT '+j.actH+'h — local jobs finish within a day; double-check the calendar');
  const h=+String(j.start).slice(11,13);
  const svc=/labor|estimate/i.test(j.jobType||'');
  if(h<6)out.push('⏰ starts '+String(j.start).slice(11,16)+' — we don\'t work this early; likely an AM/PM typo in the calendar');
  if(!j.delivery&&!svc&&!j.straight)out.push('no delivery zip found');
  if(!(j.cf>0)&&!svc)out.push('CF is 0');
  if(j.cf>3800){const _half=Math.round(j.cf/10);out.push('🔎 CF is '+j.cf.toLocaleString()+' — that\'s larger than a 5-bedroom house ('+(j.cf>8000?'almost certainly':'likely')+' a typo, e.g. an extra digit; did you mean ~'+_half.toLocaleString()+'?). No single truck or sensible crew fits this; fix the calendar CF or split the job.');}
  if(!(j.actH>0))out.push('no ACT time');

}

function parseLabels(desc){

async function forceImportEvent(eid){
  FORCE.add(eid);persistToggles();
  if(!GTOKEN)return toast('Saved — it will import on the next ↻ Refresh once the calendar is connected.');
  try{
    const ev=await gapiFetch('calendars/'+encodeURIComponent(GCAL_ID)+'/events/'+encodeURIComponent(eid));
    const job=parseCalEvent(ev);
    if(!job)return toast('Still cannot import it: '+(parseCalEvent.why||'unreadable')+'.');
    removeJobByEventId(eid);
    const day=job.start.slice(0,10);
    job.idx=(DATA.days[day]=DATA.days[day]||[]).length;
    DATA.days[day].push(job);
    CAL_SKIPPED=CAL_SKIPPED.filter(x=>x.eid!==eid);
    if(day===currentDay)DATA.jobs=DATA.days[day];
    rebuildRoutes();render();updateCalBtn();

  }catch(e){toast('⚠ could not fetch the event: '+e.message);}
}
function skipReport(dayOnly){
  const list=dayOnly?CAL_SKIPPED.filter(x=>x.d===currentDay):CAL_SKIPPED;

    +(x.snip?'<i class="sksnip">description reads: “'+esc(x.snip)+'…”</i>':'')
    +(/ON HOLD/i.test(x.why)&&x.eid?'<button class="skforce" data-eid="'+esc(x.eid)+'">Import anyway</button>':'')+'</div>';
  return '<details class="skiprep"'+(dayOnly?' open':'')+'><summary>'+list.length+' calendar event'+(list.length>1?'s':'')+' not imported — why</summary><div>'+list.slice(0,60).map(row).join('')+(list.length>60?'<div>…</div>':'')
    +'<div class="ts" style="margin-top:8px">Fix in Google Calendar (usually: add a <b>Job Code:</b> line and a zip code in <b>Moving From</b> to the description), then hit ↻ Refresh.</div></div></details>';
}

}

function zgeoJS(z){

  z=String(z).replace(/\D/g,'').slice(0,5).padStart(5,'0');

  return e?{zip:z,lat:e[0],lon:e[1],city:e[2],state:e[3]}:null;
}
function parseCSV(s){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<s.length;i++){const ch=s[i];
    if(q){ if(ch==='"'){ if(s[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true;
      else if(ch===','){row.push(cur);cur='';}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(ch!=='\r')cur+=ch; } }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}
