const $=id=>document.getElementById(id);
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDay(iso){const d=new Date(Date.parse(iso+'T12:00'));return {dow:DOW[d.getDay()],dn:d.getDate(),mon:MON[d.getMonth()]};}
function fmtMs(ms){const d=new Date(ms);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function hmPretty(ms){let h=new Date(ms).getHours(),m=new Date(ms).getMinutes();const ap=h<12?'am':'pm';let h12=h%12;if(h12===0)h12=12;return h12+(m?':'+String(m).padStart(2,'0'):'')+ap;}
function havArr(a,b){return hav({lat:a[0],lon:a[1]},{lat:b[0],lon:b[1]});}

/* ===== HERE truck routing (reuses engine_core's hereCache so drawn routes warm cachedRoadMi) ===== */
const HERE_KEY='0IGXB_hGz84InzFmhfCygxp27_54NI-LkjL6N5RSYT8';
function decodeFlexPoly(encoded){
  const DEC='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
  const idx={};[...DEC].forEach((c,i)=>idx[c]=i);let i=0;
  function varint(){let r=0,s=0,b;do{b=idx[encoded[i++]];r|=(b&31)<<s;s+=5;}while(b>=32);return r;}
  function svarint(){const r=varint();return (r&1)?~(r>>>1):(r>>>1);}
  varint();const meta=varint();const precision=meta&15,thirdDim=(meta>>4)&7;const factor=Math.pow(10,precision);
  let lat=0,lng=0;const pts=[];while(i<encoded.length){lat+=svarint();lng+=svarint();if(thirdDim)svarint();pts.push([lat/factor,lng/factor]);}return pts;
}
async function truckRoute(a,b){
  const ck=a.join()+'|'+b.join();if(hereCache[ck]!==undefined)return hereCache[ck];
  const p=(async()=>{try{
    const u='https://router.hereapi.com/v8/routes?transportMode=truck&routingMode=fast&origin='+a[0]+','+a[1]+'&destination='+b[0]+','+b[1]+'&return=polyline,summary&apikey='+encodeURIComponent(HERE_KEY);
    const res=await fetch(u);if(!res.ok)throw 0;const j=await res.json();const sec=(j.routes&&j.routes[0]&&j.routes[0].sections)||[];if(!sec.length)throw 0;
    let pts=[],len=0,dur=0;for(const s of sec){pts=pts.concat(decodeFlexPoly(s.polyline));len+=s.summary.length;dur+=s.summary.duration;}
    const out={pts,mi:len/1609.34,min:dur/60};hereCache[ck]=out;return out;
  }catch(e){hereCache[ck]=null;return null;}})();
  hereCache[ck]=p;return p;
}

/* ===== Google Calendar connect (reused from dispatcher) ===== */
const GCAL_ID='contact@ziptozipmoving.com';
const GCAL_CLIENT_ID='712386117874-epqesoppk5fftq0j2gpp7becbk7cu72q.apps.googleusercontent.com';
let GTOKEN=null,GTOKEXP=0,_tokenClient=null;
try{const _g=JSON.parse(localStorage.getItem('zd_gtok')||'null');if(_g&&_g.exp>Date.now()+60000){GTOKEN=_g.t;GTOKEXP=_g.exp;}}catch(e){}
function gcalReady(){return !!(window.google&&google.accounts&&google.accounts.oauth2);}
function ensureGToken(cb){
  if(GTOKEN&&Date.now()<GTOKEXP-60000)return cb();
  if(window._gsiFail||!gcalReady())return gModal('Google sign-in unavailable here','The Google sign-in library could not load (previews block it). Open this on its hosted GitHub Pages URL and it will work.');
  _tokenClient=_tokenClient||google.accounts.oauth2.initTokenClient({client_id:GCAL_CLIENT_ID,scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/spreadsheets',callback:()=>{}});
  _tokenClient.callback=resp=>{
    if(resp&&resp.access_token){GTOKEN=resp.access_token;GTOKEXP=Date.now()+((resp.expires_in||3600)*1000);
      try{localStorage.setItem('zd_gtok',JSON.stringify({t:GTOKEN,exp:GTOKEXP}));localStorage.setItem('zd_gconn','1');}catch(e){}
      updateCalBtns();cb();}
    else gModal('Sign-in failed',esc((resp&&resp.error)||'no token returned'));
  };
  _tokenClient.requestAccessToken({prompt:(GTOKEN||localStorage.getItem('zd_gconn'))?'':'consent'});
}
async function gapiFetch(path,opts){
  const r=await fetch('https://www.googleapis.com/calendar/v3/'+path,Object.assign({},opts,{headers:Object.assign({Authorization:'Bearer '+GTOKEN,'Content-Type':'application/json'},(opts&&opts.headers)||{})}));
  if(!r.ok)throw new Error('Calendar API '+r.status+' — '+(await r.text()).slice(0,160));
  return r.status===204?null:r.json();
}

async function showRoute(rec, kind, title, sub){
  openMapPane();
  if(LAYER)LAYER.clearLayers();
  const geo=rec.geo||[];
  // journey panel
  $('mapcard').style.display='';
  $('mapcard').classList.remove('min');
  $('mapcard').innerHTML='<div class="mchead"><div class="mt">'+esc(title)+'</div><div class="mcbtns"><button class="mcmin" title="Minimize">–</button><button class="mcx" title="Close">✕ Exit</button></div></div>'
    +'<div class="mcbody"><div class="ms">'+sub+'</div><div class="steps">'+journeySteps(rec,kind)+'</div></div>';
  $('mapcard').querySelector('.mcx').onclick=exitMap;
  $('mapcard').querySelector('.mcmin').onclick=function(){const c=$('mapcard');c.classList.toggle('min');this.textContent=c.classList.contains('min')?'+':'–';};
  if(!geo.length){setTimeout(()=>{if(LMAP)LMAP.invalidateSize();},120);return;}
  CUSEQ++; const seq=CUSEQ;
  const col='#0F8A66';                 // pre-assignment -> fleet green, same as the board + the routes view
  const pts=[]; let prev=null, stopN=0; const items=[];
  const estMin=(a,b)=>Math.max(5,Math.round(havArr(a,b)/35*60*1.15)+4);
  function travelLeg(from,to,label,reposition){
    const kcol=reposition?'#8A63D2':TRAVEL;
    const cpts=curvePts(from,to,-1,1.7);
    const casing=L.polyline(cpts,{color:'#FFFFFF',weight:6.5,opacity:0.92,lineCap:'round',interactive:false}).addTo(LAYER);
    const line=L.polyline(cpts,{color:kcol,weight:3,opacity:0.95,dashArray:'8 7',lineCap:'round',className:'flowline'}).addTo(LAYER);
    line.on('mouseover',()=>line.setStyle({weight:4.5})); line.on('mouseout',()=>line.setStyle({weight:3}));
    line.bindTooltip('<div class="tt">'+label+'</div><div class="ts">empty drive \u00b7 reposition'+(rec.linkMin!=null?' \u00b7 '+rec.linkMin+' min':'')+(rec.linkMi!=null?' \u00b7 '+rec.linkMi+' mi':'')+'</div>',{sticky:true,className:'lpop',opacity:1});
    const arrow=arrowAt(cpts,kcol);
    const it={kind:'travel',from,to,line,casing,arrow,fallback:estMin(from,to)}; items.push(it); return it;
  }
  for(const s of geo){
    const pt=[s.lat,s.lon];
    if(s.kind==='A'){
      L.marker(pt,{zIndexOffset:400,icon:L.divIcon({className:'',iconSize:[18,18],iconAnchor:[9,9],html:'<div style="width:14px;height:14px;border-radius:50%;background:#6B7280;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>'})}).addTo(LAYER).bindTooltip('<div class="tt">Crew finishes the previous job here</div><div class="ts">'+esc(rec.anchorCustomer||s.customer||'')+(rec.anchorCity?' \u00b7 '+esc(rec.anchorCity):'')+'</div>',{direction:'top',offset:[0,-10],className:'lpop',opacity:1});
      L.tooltip({permanent:true,direction:'bottom',offset:[0,12],className:'placechip'}).setLatLng(pt).setContent('finishes '+esc((rec.anchorCustomer||'prev').split(' ')[0])).addTo(LAYER);
      pts.push(pt); prev=pt; continue;
    }
    if(s.kind==='P'){
      if(prev)travelLeg(prev,pt,'Reposition to job pickup',true);
      stopN++; stopMarker(pt,stopN,'P',col,'<div class="tt">Stop '+stopN+' \u00b7 pickup'+(rec.window?' \u00b7 ask '+rec.window.text:'')+'</div><div class="ts">'+esc(rec.customer||s.customer||'')+' \u00b7 '+esc(rec.city||'')+'</div>');
      L.tooltip({permanent:true,direction:'top',offset:[0,-14],className:'placechip'}).setLatLng(pt).setContent(esc((rec.customer||s.customer||'pickup').split(' ')[0])+(rec.city?' \u00b7 '+esc(rec.city):'')).addTo(LAYER);
      pts.push(pt); prev=pt; continue;
    }
    if(s.kind==='D'){
      if(prev){const cpts=curvePts(prev,pt,1,1); const w0=Math.max(4,Math.min((rec.cf||300)/300,8));
        const casing=L.polyline(cpts,{color:'#FFFFFF',weight:w0+3.5,opacity:0.95,lineCap:'round',interactive:false}).addTo(LAYER);
        const line=L.polyline(cpts,{color:col,weight:w0,opacity:0.95,lineCap:'round'}).addTo(LAYER);
        line.on('mouseover',()=>line.setStyle({weight:w0+2})); line.on('mouseout',()=>line.setStyle({weight:w0}));
        line.bindTooltip('<div class="tt">Loaded \u00b7 '+(rec.cf||0).toLocaleString()+' CF</div><div class="ts">'+esc(rec.city||'')+' \u2192 '+esc(rec.deliveryCity||'')+'</div>',{sticky:true,className:'lpop',opacity:1});
        arrowAt(cpts,col);
        items.push({kind:'job',from:prev,to:pt,line,casing,fallback:estMin(prev,pt)});
      }
      stopN++; stopMarker(pt,stopN,'D',col,'<div class="tt">Stop '+stopN+' \u00b7 delivery</div><div class="ts">'+esc(rec.deliveryCity||'')+'</div>');
      L.tooltip({permanent:true,direction:'top',offset:[0,-14],className:'placechip'}).setLatLng(pt).setContent(esc(rec.deliveryCity||'delivery')).addTo(LAYER);
      pts.push(pt); prev=pt; continue;
    }
  }
  drawBasesCU(null);
  if(pts.length)LMAP.flyToBounds(L.latLngBounds(pts),{duration:0.6,maxZoom:13,paddingTopLeft:[480,40],paddingBottomRight:[40,60]});
  setTimeout(()=>{if(LMAP)LMAP.invalidateSize();},120);
  const fetches=items.filter(it=>it.from&&it.to).map(it=>truckRoute(it.from,it.to).then(rt=>{ if(seq!==CUSEQ||!rt)return; if(it.line)it.line.setLatLngs(rt.pts); if(it.casing)it.casing.setLatLngs(rt.pts); if(it.arrow){LAYER.removeLayer(it.arrow); it.arrow=arrowAt(rt.pts,it.kind==='job'?col:'#8A63D2');} }));
  if(HERE_KEY)Promise.all(fetches).catch(()=>{});
}
function step(t,txt,tv,late){return '<div class="step'+(tv?' tv':'')+(late?' late':'')+'"><span class="dot"></span><span class="st">'+(t||'')+'</span><span>'+txt+'</span></div>';}
function journeySteps(rec,kind){
  // rec carries: anchorCustomer, anchorCity, anchorEndMs, linkMin, linkMi, askArriveMs|arriveMs, window, customer, city, deliveryCity, actH
  const arrive=rec.askArriveMs!=null?rec.askArriveMs:rec.arriveMs;
  const rows=[];
  if(rec.anchorEndMs!=null){
    rows.push(step(fmtMs(rec.anchorEndMs),'Crew finishes <b>'+esc(rec.anchorCustomer||'previous job')+'</b> · '+esc(rec.anchorCity||''),false));
    rows.push(step(fmtMs(rec.anchorEndMs),'Drive to '+esc(rec.city||'pickup')+' · '+(rec.linkMin!=null?rec.linkMin+' min · ':'')+(rec.linkMi!=null?rec.linkMi+' mi':''),true));
  }
  if(arrive!=null){
    const win=rec.window?rec.window.text:fmtMs(arrive);
    rows.push(step(fmtMs(arrive),'Arrive <b>'+esc(rec.customer||'')+'</b> · pickup '+esc(rec.city||'')+' · ask window '+win,false));
    const act=rec.actH||3;
    const load=act*0.6*3600000;
    const departP=arrive+load;
    rows.push(step(fmtMs(departP),'Load ~'+(Math.round(act*0.6*10)/10)+'h, then drive to delivery',true));
    const done=departP + 30*60000 + act*0.4*3600000;
    rows.push(step(fmtMs(done),'Deliver '+esc(rec.deliveryCity||'')+' · done ~'+fmtMs(done),false));
  }
  return rows.join('');
}

/* ===== dispatcher-style route map — ported verbatim from the logistics board ===== */
const TRAVEL='#6C5CE0';
const tmCU=s=>s?String(s).slice(11,16):'';
function fmtH(h){const m=Math.round(h*60),hh=Math.floor(m/60),mm=m%60;return hh+'h'+(mm?String(mm).padStart(2,'0'):'');}
function curvePts(a,b,sign,scale){sign=sign||1;scale=scale||1;const n=24,pts=[];const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2;const dx=b[0]-a[0],dy=b[1]-a[1],len=Math.hypot(dx,dy)||1e-9;const bow=Math.min(len*0.18*scale,0.10*scale)*sign;const cx=mx-dy/len*bow,cy=my+dx/len*bow;for(let i=0;i<=n;i++){const u=i/n;pts.push([(1-u)*(1-u)*a[0]+2*(1-u)*u*cx+u*u*b[0],(1-u)*(1-u)*a[1]+2*(1-u)*u*cy+u*u*b[1]]);}return pts;}
function arrowAt(pts,col){const i=Math.floor(pts.length/2);const p=pts[i],q=pts[Math.min(i+1,pts.length-1)];const deg=Math.atan2(q[1]-p[1],q[0]-p[0])*180/Math.PI;return L.marker(p,{interactive:false,icon:L.divIcon({className:'',iconSize:[16,16],iconAnchor:[8,8],html:'<div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:11px solid '+col+';transform:rotate('+deg.toFixed(1)+'deg);filter:drop-shadow(0 0 1.5px #fff)"></div>'})}).addTo(LAYER);}
function stopMarker(pt,label,kind,col,popup){const style=kind==='P'?'background:#1F2329;color:#fff;border:3px solid #fff;':'background:#fff;color:'+col+';border:3px solid '+col+';';const mk=L.marker(pt,{zIndexOffset:500,icon:L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,13],html:'<div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed;font-weight:600;font-size:13px;box-shadow:0 1px 5px rgba(0,0,0,.28);'+style+'">'+label+'</div>'})}).addTo(LAYER);if(popup)mk.bindPopup(popup,{className:'lpop'});return mk;}
function drawBasesCU(focusBase){for(const[k,b]of Object.entries(DATA.bases)){if(focusBase&&k!==focusBase)continue;const mk=L.marker([b.lat,b.lon],{icon:L.divIcon({className:'',html:'<div class="bmark">'+k+'</div>',iconSize:[32,32],iconAnchor:[16,16]}),zIndexOffset:600}).addTo(LAYER);mk.bindTooltip(k+' base \u2014 '+b.city,{direction:'top',offset:[0,-12]});}}
function backAtBaseMs(r){if(r.ldDeparture||!r.base||!DATA.bases[r.base])return null;const sl=[...r.legs].sort((a,b)=>Date.parse(a.start||0)-Date.parse(b.start||0));const bb=DATA.bases[r.base];const lastLeg=sl[sl.length-1];let backMs=r.t1!=null?r.t1:Date.parse(lastLeg.end||lastLeg.start);{const from=lastLeg._carrier?(lastLeg.carrierDrop||null):((lastLeg.delivery&&INREGION(lastLeg.delivery))?lastLeg.delivery:lastLeg.pickup);if(from)backMs+=hav(from,bb)/35*3600000*1.15;}return backMs;}

var DECLINED_CUSTS=loadDeclC();   // {iso:{customerName:[ids]}} — once you've spoken to a customer, they're off the table for that day (call OR move)
function declCustSet(iso){return new Set(Object.keys(DECLINED_CUSTS[iso]||{}));}
function recordDecline(iso,cust,id){ if(!cust)return; DECLINED_CUSTS[iso]=DECLINED_CUSTS[iso]||{}; var arr=DECLINED_CUSTS[iso][cust]||[]; if(arr.indexOf(id)<0)arr.push(id); DECLINED_CUSTS[iso][cust]=arr; saveDeclC(); }
function undoDecline(iso,cust){ if(DECLINED_CUSTS[iso]){delete DECLINED_CUSTS[iso][cust];saveDeclC();} Object.keys(SHEET_RES[iso]||{}).forEach(function(code){if(SHEET_RES[iso][code].customer===cust)logDecision(iso,code,cust,SHEET_RES[iso][code].kind||'','reopened','');});
  var c2={}; ((CURPLAN&&CURPLAN.callPool)||[]).forEach(function(c){c2[c.tail]=c.customer;}); ((CURPLAN&&CURPLAN.movePool)||[]).forEach(function(m){c2[m.code]=m.customer;});
  Object.keys(STATUS).forEach(function(k){ if(STATUS[k]==='declined'&&k.indexOf(iso+'|')===0){ var code=k.split('|').slice(3).join('|'); if(c2[code]===cust) delete STATUS[k]; } }); saveStatus(STATUS); }
function incomingMoves(iso){try{return Object.keys(CONFIRMED_MOVES).map(k=>CONFIRMED_MOVES[k]).filter(m=>m.to===iso);}catch(e){return [];}}
function distroChecks(td){
  var afterMap={}, pm=[];
  td.routes.forEach(function(r){
    r.legs.forEach(function(l){ if(l.after){(afterMap[l.after]=afterMap[l.after]||[]).push(l.customer||l.code);} });

function routeSteps(route){

function renderItineraryCU(r,items,seq,resolved){
  const box=document.getElementById('cu-steps-'+seq); const tot=document.getElementById('cu-daytot-'+seq);
  if(!box)return;
  const rows=[]; let cursor=null, totMi=0, totMin=0, empMi=0, empMin=0;
  const M=it=>it.min!=null?Math.round(it.min):it.fallback;
  const MI=it=>it.mi!=null?it.mi:((it.from&&it.to)?havArr(it.from,it.to)*1.15:0);
  for(const it of items){
    const min=M(it), mi=MI(it);
    if(it.type==='travel'||it.type==='topickup'||it.type==='between'||it.type==='return'){
      totMi+=mi;totMin+=min;empMi+=mi;empMin+=min;
      if(cursor===null){
        const next=items[items.indexOf(it)+1];
        const sched=next&&next.leg?Date.parse(next.leg.start):null;
        const dep=sched?sched-min*60000:null;
        rows.push({t:dep?fmtMs(dep):'',txt:it.label+' \u00b7 '+min+' min \u00b7 '+mi.toFixed(0)+' miles',travel:true});
        cursor=sched;
      } else if(it.type==='return'){
        const back=cursor+min*60000;
        rows.push({t:fmtMs(cursor),txt:it.label+' \u00b7 '+min+' min \u00b7 back ~'+fmtMs(back),travel:true});
        cursor=back;
      } else {
        const eta=cursor+min*60000;
        const next=items[items.indexOf(it)+1];
        const sched=next&&next.leg?Date.parse(next.leg.start):null;
        let note='';
        if(sched!=null){
          const dl=Date.parse(next.leg.winEnd||next.leg.start);
          const slack=Math.round((dl-eta)/60000);
          const lbl=next.leg.winEnd?('window until '+String(next.leg.winEnd).slice(11,16)):('scheduled '+fmtMs(sched));
          note=slack>=0?(' \u00b7 ETA '+fmtMs(eta)+', '+lbl+' ('+slack+' min slack)'):(' \u00b7 ETA '+fmtMs(eta)+' \u2014 '+(-slack)+' min LATE vs '+lbl);
        }
        rows.push({t:fmtMs(cursor),txt:it.label+' \u00b7 '+min+' min'+note,travel:true,warn:note.includes('LATE')});
        cursor=sched!=null?Math.max(eta,sched):eta;

    } else {
      const l=it.leg; if(!l)continue;
      const act=l.actH||schedH(l);
      const sched=Date.parse(l.start);
      const arrive=cursor===null?sched:cursor;
      const workStart=Math.max(arrive,sched);
      totMi+=mi;totMin+=min;
      const loadMs=act*ACT_LOAD_SHARE*3600000;
      const unloadMs=act*(1-ACT_LOAD_SHARE)*3600000;
      const departP=workStart+loadMs;
      const etaD=departP+min*60000;
      const done=etaD+unloadMs;
      rows.push({t:fmtMs(workStart),txt:'Job #'+it.jobN+' \u00b7 '+l.code+' \u00b7 pickup '+l.cityFrom+' \u2014 '+(it.carrier?'load':'work')+' '+fmtH(act)+' (ACT)',travel:false});
      if(it.carrier){
        rows.push({t:'',txt:'Hand off to carrier \u2014 goods continue to '+l.cityTo+(l.stateTo?', '+l.stateTo:'')+' by carrier. Crew & truck head back to base.',travel:true});
        cursor=done;
      } else if(it.inreg){
        rows.push({t:fmtMs(departP),txt:'Drive to delivery \u00b7 '+min+' min \u00b7 '+mi.toFixed(0)+' miles',travel:true});
        rows.push({t:fmtMs(etaD),txt:'Deliver '+l.cityTo+' \u00b7 ETA '+fmtMs(etaD)+' \u00b7 done ~'+fmtMs(done),travel:false});
        cursor=done;
      } else {
        const farMi=Math.round(MI(it));
        const farDrv=it.min!=null?(Math.floor(it.min/60)+'h'+String(Math.round(it.min%60)).padStart(2,'0')+' truck drive'):('~'+Math.round(farMi/52)+'h drive est');
        rows.push({t:fmtMs(departP),txt:'Departs long distance \u2192 '+l.cityTo+(l.stateTo?', '+l.stateTo:'')+' \u00b7 '+(it.mi!=null?'':'~')+farMi.toLocaleString()+' miles ('+farDrv+')',travel:true});
        rows.push({t:'',txt:'No same-day return \u2014 long-distance departure. Truck & crew continue; back at '+r.base+' base over the next day(s).',travel:true});
        cursor=null;
      }
    }
  }
  box.innerHTML=rows.map(s=>'<div class="step'+(s.travel?' tv':'')+(s.warn?' late':'')+'"><span class="dot"></span><span class="st">'+(s.t||'')+'</span><span>'+esc(s.txt)+'</span></div>').join('');
  tot.innerHTML='Day driving ~<b>'+Math.floor(totMin/60)+'h'+String(Math.round(totMin%60)).padStart(2,'0')+' \u00b7 '+totMi.toFixed(0)+' miles</b> \u00b7 empty '+Math.round(empMin)+' min / '+empMi.toFixed(0)+' miles <span class="rsrc">'+(resolved?'HERE truck routes':'straight-line estimate'+(HERE_KEY?' \u2014 refining\u2026':''))+'</span><br><span class="rsrc">ACT split 60% loading / 40% unloading; work starts no earlier than the booked time.</span>';
}

  [...RR].sort((x,y)=>(x.base||'').localeCompare(y.base||'')||((x.t0||0)-(y.t0||0))).forEach(r=>{(byB[r.base]=byB[r.base]||[]).push(r);});

  const _ghostRow=(g)=>{const gl=Math.max(0,pos(g.origStartMs));const gr=Math.min(100,pos(g.origEndMs||g.origStartMs));const gw=Math.max(3,gr-gl);const dest=g.kind==='call'?('now '+hmPretty(g.newStartMs||g.arriveMs)+', after '+(jobCust(td,g.after)||g.after)):('moved to '+fmtDay(g.to).mon+' '+fmtDay(g.to).dn);return '<div class="tlrow ghostrow" data-base="'+esc(g.base)+'"'+(COLLAPSED.has(g.base)?' style="display:none"':'')+' title="'+esc(g.customer+' \u2014 '+dest)+'"><div class="tllabel"><b>'+esc(g.customer)+'</b><span>was '+hmPretty(g.origStartMs)+' \u2192 '+esc(dest)+'</span></div><div class="tltrack"><div class="tlblock ghostblk '+(g.kind==='call'?'gcall':'gmove')+'" style="left:'+gl+'%;width:'+gw+'%">was here</div></div></div>';};
  const _bases=[...new Set([...Object.keys(byB),...Object.keys(_gByB)])].sort();

  scale+='</div></div>';

  return '<div id="cltl" class="tlwrap">'+scale+_inc+rows+'</div>';
}

function dayJobOptions(td, selCode){

function parsePhone(j){ if(!j)return null; var d=j.description||j.notes||j.summary||j.desc||''; var m=String(d).match(/customer\s*mobile\s*[:\-]?\s*([+0-9()\s.\-]{7,})/i); var p=m?m[1]:(j.phone||j.mobile||j.tel||j.phoneNumber||null); return p?String(p).replace(/\s+/g,' ').trim():null; }

function renderDay(iso){
  const horizon=scanHorizon(windowStart(),7);
  const plan=cleanupPlan(iso,horizon);
  const declined=declinedSetFor(iso);
  const slots=resolveSlots(plan,declined,new Set([...declCustSet(iso),...sheetExcluded(iso)]));
  CURPLAN=plan; RECS={}; ACTIVE_ROUTE=null;
  // pending changes from confirmed slots -> apply to the timeline so the chip re-routes (and mark what Update will write)
  const changes={};
  slots.slots.forEach(s=>{ if(!s.current)return; const k=s.current.kind, rec=s.current.rec; const id=sKey(iso,s.index,k,k==='call'?rec.tail:rec.code);
    if(STATUS[id]==='confirmed'){ if(k==='call') changes[rec.tail]={kind:'call', after:(LEADS[lKey(iso,s.index,rec.tail)]||rec.after), arriveMs:rec.arriveMs}; else changes[rec.code]={kind:'move', to:rec.to}; } });
  CURCHANGES=changes;
  const td=timelineData(iso, changes);
  const distro=distroChecks(td); const incoming=incomingMoves(iso);
  const f=fmtDay(iso); const st=plan.status;
  const chip=st==='short'?{c:'short',t:'over by '+Math.abs(plan.spare)}:st==='tight'?{c:'tight',t:'full \u00b7 no buffer'}:{c:'ok',t:plan.spare+' crews free'};
  let h='<div class="daycard"><div class="dchead"><div><h2>'+f.dow+', '+f.mon+' '+f.dn+'</h2><div class="dcsum"><b>'+plan.routes+'</b> routes vs <b>'+plan.availableCore+'</b> core crews \u00b7 aim \u2264'+plan.target+(plan.coreOff.length?' \u00b7 '+plan.coreOff.length+' off':'')+'</div></div><span class="schip '+chip.c+'">'+chip.t+'</span></div><div class="dcbody">';
  h+='<div class="fixpanel">';
  if(distro.doubleChains.length){ distro.doubleChains.forEach(dc=>{ h+='<div class="distalert">\u26a0 Double chaining \u2014 <b>'+esc(dc.tails.join(' & '))+'</b> are both chained after <b>'+esc(dc.lead)+'</b>. One crew can\u2019t do both \u2014 split one off.</div>'; }); }
  if(distro.standalonePM.length){ h+='<div class="distinfo">\ud83d\udd17 Afternoon job'+(distro.standalonePM.length>1?'s':'')+' running solo (no feasible chain found): '+esc(distro.standalonePM.join(', '))+'.</div>'; }
  if(plan.standardChains.length){h+='<div class="fixinfo"><span class="tlbl free">free</span> '+plan.standardChains.length+' afternoon job'+(plan.standardChains.length>1?'s':'')+' auto-chained (extra-chain, no call): '+plan.standardChains.map(c=>esc(c.customer||c.tail)+' after '+esc(c.anchorCustomer||c.after)).join('; ')+'.</div>';}
  if(st==='ok'){
    h+='<div class="cres ok">\u2713 This day holds its '+plan_buffer()+'-crew buffer ('+plan.spare+' free). Nothing to resolve.</div>';
  }else{
    var _post=td.routes.length, _nchg=Object.keys(changes).length;
    if(_nchg>0 && _post<=plan.target){ h+='<div class="cres win">\ud83c\udf89 With your '+_nchg+' confirmed change'+(_nchg>1?'s':'')+', '+f.mon+' '+f.dn+' is back to a full '+plan_buffer()+'-crew buffer \u2014 '+(plan.availableCore-_post)+' free. Nicely done.</div>'; }
    else if(_nchg>0 && _post<=plan.availableCore){ h+='<div class="cres okwin">\u2713 Your '+_nchg+' change'+(_nchg>1?'s':'')+' clear'+(_nchg>1?'':'s')+' the shortage \u2014 now '+_post+'/'+plan.availableCore+' crews running.'+(_post>plan.target?(' Free '+(_post-plan.target)+' more to rebuild the buffer.'):'')+'</div>'; }
    h+='<div class="fixnote">Each step below frees one crew-day \u2014 work them top to bottom.</div>';
    h+='<div class="fixhead">'+(st==='short'?('Free '+plan.gapToCover+' crew'+(plan.gapToCover>1?'s':'')+' to clear the shortage'+(plan.gapToBuffer>plan.gapToCover?(' \u00b7 +'+(plan.gapToBuffer-plan.gapToCover)+' more rebuilds the buffer'):'')):('Optional \u2014 free up to '+plan.gapToBuffer+' crew'+(plan.gapToBuffer>1?'s':'')+' to rebuild the buffer'))+'</div>';
    const confirmedLeads={};
    slots.slots.forEach(s=>{if(s.current&&s.current.kind==='call'){const id=sKey(iso,s.index,'call',s.current.rec.tail);if(STATUS[id]==='confirmed'){const lead=LEADS[lKey(iso,s.index,s.current.rec.tail)]||s.current.rec.after;confirmedLeads[lead]=(confirmedLeads[lead]||0)+1;}}});
    const dupLeads=new Set(Object.keys(confirmedLeads).filter(k=>confirmedLeads[k]>1));
    slots.slots.forEach(s=>{h+=renderSlot(iso,s,td,dupLeads);});
    const anyConfirmed=slots.slots.some(s=>{if(!s.current)return false;const id=sKey(iso,s.index,s.current.kind,s.current.kind==='call'?s.current.rec.tail:s.current.rec.code);return STATUS[id]==='confirmed';});
    h+='<div class="calbar">'+(dupLeads.size?'<span class="dupwarn">\u26a0 Two re-chains share a lead \u2014 fix before updating.</span>':'')+'<button class="cb upd" id="updcal" '+((anyConfirmed&&!dupLeads.size)?'':'disabled')+'>\u2934 Update calendar</button><span class="cmuted">write-back parked \u2014 confirms saved here for now</span></div>';
    if(slots.declinedCusts&&slots.declinedCusts.length){ h+='<div class="declog"><span class="decllbl">\u2715 Declined \u2014 won\u2019t suggest again (you\u2019ve already spoken to them):</span> '+slots.declinedCusts.map(function(c){return '<span class="declchip">'+esc(c)+'<button class="declundo" data-undocust="'+esc(c)+'" title="Undo \u2014 put this customer back as an option">\u21ba</button></span>';}).join('')+'</div>'; }
  }
  h+='</div>';
  if(td.movedOut&&td.movedOut.length){h+='<div class="movedout">\u2197 Moved off this day ('+td.movedOut.length+'): '+td.movedOut.map(m=>esc(m.customer)+' \u2192 '+fmtDay(m.to).mon+' '+fmtDay(m.to).dn).join(', ')+'</div>';}
  h+='<div class="tlbar"><div class="tltitle">Routes on '+f.dow+' '+f.dn+' \u2014 click any to see the whole run</div><div class="tlleg"><i style="background:#6E9220"></i>local <i style="background:#C98A1B"></i>long <i style="background:#6C4FD8"></i>straight <i style="background:#5B6770"></i>labor <span class="lgchg"></span>pending change</div></div>';
  h+=tlChunk(td, changes, incoming);
  h+='</div></div>';
  $('daydetail').innerHTML=h;
  bindDay(iso);
}

function bindDay(iso){
  const root=$('daydetail');
  root.querySelectorAll('.cb[data-act]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();
    const id=b.dataset.id, act=b.dataset.act;
    const _code=id.split('|').slice(3).join('|'), _kind=id.split('|')[2], _cust=SLOTCUST[id]||b.dataset.cust||b.dataset.mvcust||'';
    if(act==='accept'){ setStatus(id,'accepted'); logDecision(iso,_code,_cust,_kind,'accepted',''); }
    else if(act==='decline'){ if(b.dataset.cust)recordDecline(iso,b.dataset.cust,id); setStatus(id,'declined'); logDecision(iso,_code,_cust,_kind,'declined',''); }
    else if(act==='reopen'){ if(b.dataset.mvcode){delete CONFIRMED_MOVES[b.dataset.mvcode];saveMoves();} setStatus(id,null); logDecision(iso,_code,_cust,_kind,'reopened',''); }

    renderDay(iso); renderHorizon();

    const rt=r.route; const title=rt.id+' \u00b7 '+(rt.legs.length>1?rt.legs.length+' jobs':((rt.legs[0].cityFrom||'')+' \u2192 '+(rt.legs[0].cityTo||'')));
    const sub='Base '+esc(rt.base||'')+' \u00b7 '+(rt.totalCF||0).toLocaleString()+' CF \u00b7 the whole run for this day.';
    showRouteJourney(rt, title, sub);
  }));
  root.querySelectorAll('#cltl .tlsep[data-b]').forEach(sep=>sep.addEventListener('click',()=>{ const b=sep.dataset.b; if(COLLAPSED.has(b))COLLAPSED.delete(b); else COLLAPSED.add(b); root.querySelectorAll('#cltl .tlrow[data-base="'+b+'"]').forEach(r=>{r.style.display=COLLAPSED.has(b)?'none':'';}); const c=sep.querySelector('.tlcaret'); if(c)c.textContent=COLLAPSED.has(b)?'\u25b8':'\u25be'; }));
  const up=$('updcal'); if(up)up.addEventListener('click',()=>{ if(!up.disabled)showUpdateSummary(); });
}
/* ===== calendar write-back (cleanup): re-chain + date move, final-face ===== */
function upsertField(desc,label,value){desc=desc==null?'':String(desc);value=value==null?'':String(value);const lines=desc.split('\n');const rx=new RegExp('^\\s*'+label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*:','i');let found=false;for(let i=0;i<lines.length;i++){if(rx.test(lines[i])){lines[i]=label+': '+value;found=true;break;}}if(!found)lines.push(label+': '+value);return lines.join('\n');}
function setForemanGuest(attendees,newEmail,foremanEmails){const set=new Set((foremanEmails||[]).map(e=>String(e).toLowerCase()));let att=(attendees||[]).slice().filter(a=>{const e=(a.email||'').toLowerCase();if(!e)return true;if(set.has(e))return false;return true;});if(newEmail){const ne=newEmail.toLowerCase();if(!att.some(a=>(a.email||'').toLowerCase()===ne))att.push({email:newEmail});}return att;}
function foremanEmailSet(){return (DATA.foremen||[]).map(f=>(f.email||'')).filter(Boolean);}
function emailForNick(nick){const f=(DATA.foremen||[]).find(x=>(x.nick||'').toLowerCase()===String(nick||'').toLowerCase());return (f&&f.email)||'';}
function parseTitleTag(title){const p=String(title||'').split('#');return p.length>=3?{nick:p[1],truck:p[2]}:{nick:'',truck:''};}
function newTitle(oldTitle,nick,truckTok){const p=String(oldTitle||'').split('#');if(p.length>=3){p[1]=nick;p[2]=truckTok;return p.join('#');}return String(oldTitle||'')+' #'+nick+'#'+truckTok+'#';}
function calActions(){
  const out=[]; if(!CURPLAN)return out;
  const chg=CURCHANGES||{};
  Object.keys(chg).forEach(function(code){
    const c=chg[code]; const j=jobByCode(code); if(!j||!j.eventId)return;
    if(c.kind==='call'){
      const lead=c.after; const lj=lead?jobByCode(lead):null;
      const rec=((CURPLAN.callPool||[]).find(function(x){return x.tail===code;}))||{};
      const arrive=rec.askArriveMs!=null?rec.askArriveMs:rec.arriveMs;
      out.push({kind:'rechain',code:code,eventId:j.eventId,customer:j.customer||c.customer,
        leadCode:lead,leadCustomer:(lj&&lj.customer)||'',leadEventId:(lj&&lj.eventId)||null,newStartMs:arrive});
    } else if(c.kind==='move'){
      out.push({kind:'date',code:code,eventId:j.eventId,customer:j.customer,toDay:c.to});
    }
  });
  return out;
}
async function executeCalWrites(){
  const acts=calActions();
  if(!acts.length){gModal('Nothing to write','<div class="gsub">No confirmed changes on this day yet.</div>');return;}
  let ok=0,fail=0;const errs=[];
  const pad=n=>String(n).padStart(2,'0');
  const fmtLocal=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
  for(const a of acts){
    try{
      const ev=await gapiFetch(evPath(a.eventId));
      const tz=(ev.start&&ev.start.timeZone)||'America/New_York';
      const durMs=(Date.parse(ev.end&&ev.end.dateTime)-Date.parse(ev.start&&ev.start.dateTime))||3*3600000;
      if(a.kind==='rechain'){
        let leadNick='',leadTruck='';
        if(a.leadEventId){try{const lev=await gapiFetch(evPath(a.leadEventId));const tg=parseTitleTag(lev.summary);leadNick=tg.nick;leadTruck=tg.truck;}catch(e){}}
        let desc=ev.description||'';
        if(a.leadCode)desc=upsertField(desc,'After Job Code',a.leadCode);
        desc=upsertField(desc,'After Customer Name',a.leadCustomer||'');
        if(leadTruck)desc=upsertField(desc,'Truck #',leadTruck);
        desc=upsertField(desc,'Support Chained','Yes');
        const body={description:desc};
        if(leadNick)body.summary=newTitle(ev.summary,leadNick,leadTruck);
        body.attendees=setForemanGuest(ev.attendees,emailForNick(leadNick),foremanEmailSet());
        if(a.newStartMs!=null){const day=String(ev.start.dateTime||'').slice(0,10)||(SELECTED||CURPLAN.iso);const sd=day+'T'+fmtMs(a.newStartMs)+':00';body.start={dateTime:sd,timeZone:tz};body.end={dateTime:fmtLocal(new Date(Date.parse(sd)+durMs)),timeZone:tz};}
        await gapiFetch(evPath(a.eventId),{method:'PATCH',body:JSON.stringify(body)});
      } else {
        const clock=(ev.start.dateTime||'').slice(11,16)||'09:00';
        const sdt=a.toDay+'T'+clock+':00';
        await gapiFetch(evPath(a.eventId),{method:'PATCH',body:JSON.stringify({start:{dateTime:sdt,timeZone:tz},end:{dateTime:fmtLocal(new Date(Date.parse(sdt)+durMs)),timeZone:tz}})});
      }
      ok++;
    }catch(e){fail++;errs.push(a.code+': '+e.message);}
  }
  $('gmodalhost').innerHTML='';
  gModal('Calendar updated','<div class="gsub">\u2705 '+ok+' change'+(ok!==1?'s':'')+' written'+(fail?' \u00b7 \u26a0 '+fail+' failed':'')+'.</div>'+(fail?'<div class="gqt">'+esc(errs.slice(0,4).join(' \u00b7 '))+'</div>':'')+'<div class="gqt">Press Update Calendar to re-pull and see them reflected here.</div>');
}
function showUpdateSummary(){
  const iso=SELECTED; const chg=CURCHANGES||{}; const ents=Object.keys(chg);
  if(!ents.length){gModal('Nothing confirmed yet','<div class="gsub">Mark the calls you\u2019ve agreed and the dates you\u2019ve moved as <b>confirmed</b> first \u2014 then this shows the summary of what will change.</div>');return;}
  const calls=ents.filter(c=>chg[c].kind==='call'), moves=ents.filter(c=>chg[c].kind==='move');
  const nm=c=>{const j=jobByCode(c);return esc((j&&j.customer)||c);};
  let html='<div class="gsub">Review before writing \u2014 changes confirmed for <b>'+fmtDay(iso).dow+' '+fmtDay(iso).mon+' '+fmtDay(iso).dn+'</b>:</div>';
  if(calls.length){html+='<div class="sumsec"><h4>\ud83d\udcde Re-chained \u2014 '+calls.length+'</h4><ul>'+calls.map(c=>'<li>'+nm(c)+' \u2192 runs after <b>'+nm(chg[c].after)+'</b> (afternoon)</li>').join('')+'</ul></div>';}
  if(moves.length){html+='<div class="sumsec"><h4>\ud83d\udcc5 Date moves \u2014 '+moves.length+'</h4><ul>'+moves.map(c=>'<li>'+nm(c)+' \u2192 <b>'+fmtDay(chg[c].to).dow+' '+fmtDay(chg[c].to).mon+' '+fmtDay(chg[c].to).dn+'</b></li>').join('')+'</ul></div>';}
  html+='<div class="sumnet">Net effect: frees <b>'+ents.length+'</b> crew-day'+(ents.length>1?'s':'')+' on this date.</div>';
  var box=gModal('Update summary \u2014 '+ents.length+' change'+(ents.length>1?'s':''), html, '<button class="cb" id="sumcancel">Cancel</button> <button class="cb yes" id="sumconfirm">Confirm \u0026 update calendar</button>');
  box.querySelector('#sumcancel').onclick=function(){$('gmodalhost').innerHTML='';};
  box.querySelector('#sumconfirm').onclick=function(){$('gmodalhost').innerHTML='';ensureGToken(function(){executeCalWrites();});};
}

function plan_buffer(){return (typeof CLEAN!=='undefined'&&CLEAN.buffer)||2;}

/* ===== Update Calendar: write agreed actions ===== */
function agreedActions(){
  const out=[];
  if(!CURPLAN)return out;
  const iso=CURPLAN.iso;
  CURPLAN.extraChains.forEach(e=>{const id=iso+'|call|'+e.tail;if(STATUS[id]==='done'){const j=jobByCode(e.tail);if(j&&j.eventId)out.push({kind:'time',code:e.tail,eventId:j.eventId,customer:e.customer,newStartMs:e.askArriveMs,day:iso});}});
  CURPLAN.moves.forEach(m=>{const id=iso+'|move|'+m.code;if(STATUS[id]==='done'){const j=jobByCode(m.code);if(j&&j.eventId)out.push({kind:'date',code:m.code,eventId:j.eventId,customer:m.customer,toDay:m.to,keepStart:String(j.start).slice(11)});}});
  return out;
}
function updateCalendarFlow(){
  ensureGToken(async()=>{
    const acts=agreedActions();
    if(!acts.length){gModal('Nothing to write yet','Mark the calls you\u2019ve <b>agreed</b> and the dates you\u2019ve <b>moved</b> (green buttons) on this day, then press Update calendar. Declined and to-do items are skipped.');return;}
    const list=acts.map(a=>a.kind==='time'
      ?'<li><b>'+esc(a.customer||a.code)+'</b>: change start time to <b>'+fmtMs(a.newStartMs)+'</b> (same day)</li>'
      :'<li><b>'+esc(a.customer||a.code)+'</b>: move to <b>'+a.toDay+'</b> (keep '+a.keepStart.slice(0,5)+')</li>').join('');
    const box=gModal('Write '+acts.length+' change'+(acts.length>1?'s':'')+' to the calendar?','<div class="gsub">These edit real calendar events. Only items you marked agreed/moved are included.</div><ul style="margin:10px 0 0 18px;line-height:1.7">'+list+'</ul>',
      '<button class="cb" id="cancelw">Cancel</button> <button class="cb on-done" id="dow">Write '+acts.length+' change'+(acts.length>1?'s':'')+'</button>');
    box.querySelector('#cancelw').onclick=()=>$('gmodalhost').innerHTML='';
    box.querySelector('#dow').onclick=async()=>{
      box.querySelector('#dow').textContent='Writing…';box.querySelector('#dow').disabled=true;
      let ok=0,fail=0;
      for(const a of acts){
        try{
          const ev=await gapiFetch(evPath(a.eventId));
          const tz=(ev.start&&ev.start.timeZone)||'America/New_York';
          let sd,ed;
          if(a.kind==='time'){
            const day=String((ev.start.dateTime||'')).slice(0,10)||a.day;
            sd=day+'T'+fmtMs(a.newStartMs)+':00';
            const durMs=(Date.parse(ev.end.dateTime)-Date.parse(ev.start.dateTime))||3*3600000;
            ed=new Date(Date.parse(sd)+durMs);
            const pad=n=>String(n).padStart(2,'0');const f=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
            await gapiFetch(evPath(a.eventId),{method:'PATCH',body:JSON.stringify({start:{dateTime:sd,timeZone:tz},end:{dateTime:f(ed),timeZone:tz}})});
          } else {
            const oldStart=ev.start.dateTime||'';const clock=oldStart.slice(11,16)||a.keepStart.slice(0,5);
            const sdt=a.toDay+'T'+clock+':00';
            const durMs=(Date.parse(ev.end.dateTime)-Date.parse(ev.start.dateTime))||3*3600000;
            const pad=n=>String(n).padStart(2,'0');const f=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
            const edt=f(new Date(Date.parse(sdt)+durMs));
            await gapiFetch(evPath(a.eventId),{method:'PATCH',body:JSON.stringify({start:{dateTime:sdt,timeZone:tz},end:{dateTime:edt,timeZone:tz}})});
          }
          ok++;
        }catch(e){fail++;}
      }
      $('gmodalhost').innerHTML='';
      gModal('Calendar updated', '<div class="gsub">✅ '+ok+' change'+(ok!==1?'s':'')+' written'+(fail?' · ⚠ '+fail+' failed':'')+'.</div><div class="gqt">Re-pull from the calendar to see them reflected here.</div>');
    };
  });
}

/* ===== boot ===== */
/* ===== team-sheet sync: day-offs IN (live) + decisions OUT (shared across computers) — mirrors the dispatcher ===== */
const SHEET_ID='1CkeM4UF6ohQdC17AVTNtUoQaM1E6vmnXuEnqgzZVLOs';
const LOGTAB='ZipDispatch Cleanup Log';
var SHEET_RES={};                 // {iso:{code:{customer,kind,action,detail}}} replayed from the log tab
var SLOTCUST={};                  // id -> customer, so decisions can be logged without threading recs
var SHEET_DEV=(function(){try{var d=localStorage.getItem('zc_dev');if(!d){d='c'+Math.random().toString(36).slice(2,7);localStorage.setItem('zc_dev',d);}return d;}catch(e){return 'c';}})();
function colA1(i){let s='';i++;while(i){s=String.fromCharCode(65+(i-1)%26)+s;i=Math.floor((i-1)/26);}return s;}
async function shFetch(path,opt){
  if(!GTOKEN)throw new Error('not connected');
  const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+path,Object.assign({headers:{'Authorization':'Bearer '+GTOKEN,'Content-Type':'application/json'}},opt||{}));
  if(r.status===403)throw new Error('Google needs the Sheets permission \u2014 click Connect once to re-approve');
  if(!r.ok)throw new Error('Sheets API HTTP '+r.status);
  return r.json();
}
async function shValues(tab){return (await shFetch('/values/'+encodeURIComponent("'"+tab+"'")+'?valueRenderOption=FORMATTED_VALUE')).values||[];}
async function shAppendRow(tab,obj){
  let vals; try{vals=await shValues(tab);}catch(e){vals=[];}
  let header=vals[0]||[];
  if(!header.length){
    try{await shFetch(':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})});}catch(e){}
    header=Object.keys(obj);
    await shFetch('/values/'+encodeURIComponent("'"+tab+"'!A1")+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:[header]})});
  }
  const row=header.map(h=>obj[h]!=null?String(obj[h]):'');
  Object.keys(obj).forEach(k=>{if(!header.includes(k))row.push(String(obj[k]));});
  await shFetch('/values/'+encodeURIComponent("'"+tab+"'")+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS',{method:'POST',body:JSON.stringify({values:[row]})});
}
function mdyToIso(s){if(!s)return '';const p=String(s).trim().split('/');if(p.length!==3)return '';const m=('0'+p[0].trim()).slice(-2),d=('0'+p[1].trim()).slice(-2);let y=p[2].trim();if(y.length===2)y='20'+y;return y+'-'+m+'-'+d;}
function hasLocalStatus(iso,code){return Object.keys(STATUS).some(k=>k.indexOf(iso+'|')===0 && STATUS[k] && k.split('|').slice(3).join('|')===code);}
function sheetExcluded(iso){
  const s=new Set(); const m=SHEET_RES[iso]||{};
  Object.keys(m).forEach(code=>{const r=m[code]||{};
    if(r.action==='declined'){ if(r.customer)s.add(r.customer); }
    else if(r.action==='accepted'||r.action==='confirmed'){ if(r.customer&&!hasLocalStatus(iso,code))s.add(r.customer); }
  });
  return s;
}
function logDecision(iso,code,customer,kind,action,detail){
  SHEET_RES[iso]=SHEET_RES[iso]||{};
  if(action==='reopened')delete SHEET_RES[iso][code]; else SHEET_RES[iso][code]={customer:customer,kind:kind,action:action,detail:detail||''};
  if(GTOKEN){ shAppendRow(LOGTAB,{'Timestamp':new Date().toISOString(),'Date':iso,'Job Code':code,'Customer':customer||'','Kind':kind||'','Action':action,'Detail':detail||'','By':SHEET_DEV}).catch(()=>{}); }
}
/* ===== live roster from the sheet (matches dispatcher's rebuildFromTabs) + rental tab bootstrap ===== */
function numVcu(x){const v=parseFloat(String(x==null?'':x).replace(/[^0-9.\-]/g,''));return isNaN(v)?0:v;}
function crewToForemen(rows){
  if(!rows||!rows.length)return [];
  const h=rows[0]; const idx=n=>h.indexOf(n); const out=[];
  for(let i=1;i<rows.length;i++){const r=rows[i]||[]; const get=n=>{const k=idx(n);return k<0?'':(r[k]||'');};
    if(!/orman/.test(String(get('Main Role'))))continue;
    const st=String(get('Status')||'').trim(); if(st!=='Active'&&st!=='Potential')continue;
    const ni=c=>{const v=parseFloat(get(c));return isNaN(v)?0:Math.round(v);};
    out.push({name:((get('First Name')||'').trim()+' '+(get('Last Name')||'').trim()).trim(),
      nick:(get('Nickname')||'').trim()||(get('First Name')||'').trim(),status:st,
      base:(get('Base Location')||'').trim(),
      states:String(get('List of States they can work')||'').split(',').map(s=>s.trim()).filter(Boolean),
      bigJob:ni('Can do Big Job'),ldPickup:ni('Long Distance Pickiup'),packSell:ni('Can sell Packing'),
      stacking:ni('Stacking'),multiTruck:ni('More Then 1 Truck Job'),piano:ni('Piano')===1,
      driver:ni('Truck Driving')===1,canLD:ni('Can do Long Distance')===1,
      email:(get('Primary Email')||'').trim()||null,
      hourly:numVcu(get('Local Moving Hourly Rate')),daily:numVcu(get('Long Distance Daily Rate'))});
  }
  return out;
}
async function shEnsureTab(name,headers){
  try{const v=await shValues(name); if(v&&v.length)return;}catch(e){}
  try{await shFetch(':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:name}}}]})});}catch(e){}
  try{await shFetch('/values/'+encodeURIComponent("'"+name+"'!A1")+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:[headers]})});}catch(e){}
}
const RENTED_HEADERS=['Status','Truck N','CF','Max Crew Size','Base','Type','Provider','Daily Rate','Daily Fee $','One-Time Fee $','Per Mile $','Rental Start','Rental End','Fuel','Notes'];
async function syncFromSheet(){
  if(!GTOKEN)return;
  try{ const v=await shValues('Crew Day Offs');
    if(v&&v.length>1){ const h=v[0],iS=h.indexOf('Start Date'),iE=h.indexOf('End Date'),iN=h.indexOf('Forman Name'),iT=h.indexOf('Note');
      const off=[]; for(let i=1;i<v.length;i++){const r=v[i]||[];const nm=(r[iN]||'').trim(),a=mdyToIso(r[iS]),b=mdyToIso(r[iE]||r[iS]);if(nm&&a)off.push([nm,a,b||a,(r[iT]||'').trim()]);}
      if(off.length){DATA.dayoffs=off;APD=null;}
    }
  }catch(e){}
  try{ const cv=await shValues('Crew Members'); const fm=crewToForemen(cv); if(fm.length){DATA.foremen=fm;APD=null;} }catch(e){}
  shEnsureTab('Rented Trucks',RENTED_HEADERS);
  try{ const v=await shValues(LOGTAB);
    if(v&&v.length>1){ const h=v[0],cD=h.indexOf('Date'),cC=h.indexOf('Job Code'),cU=h.indexOf('Customer'),cK=h.indexOf('Kind'),cA=h.indexOf('Action'),cT=h.indexOf('Detail');
      SHEET_RES={};
      for(let i=1;i<v.length;i++){const r=v[i]||[];const iso=(r[cD]||'').trim(),code=(r[cC]||'').trim();if(!iso||!code)continue;
        const cust=(r[cU]||'').trim(),kind=(r[cK]||'').trim(),act=(r[cA]||'').trim(),det=(r[cT]||'').trim();
        SHEET_RES[iso]=SHEET_RES[iso]||{};
        if(act==='reopened'){delete SHEET_RES[iso][code]; if(kind==='move')delete CONFIRMED_MOVES[code];}
        else{SHEET_RES[iso][code]={customer:cust,kind:kind,action:act,detail:det};
          if(kind==='move'&&(act==='confirmed'||act==='accepted')){CONFIRMED_MOVES[code]={code:code,customer:cust,from:iso,to:det,startMs:(Date.parse(det+' 09:00')||Date.parse(det)||0)};}
        }
      }
    }
  }catch(e){}
  APD=null; try{ renderHorizon(); if(SELECTED)renderDay(SELECTED); }catch(e){}
}
$('calbtn').addEventListener('click',()=>{ if(GTOKEN){ syncFromSheet().catch(function(){}).then(function(){showUpdateSummary();}); } else ensureGToken(()=>{updateCalBtns();syncFromSheet();gModal('Connected &amp; synced','<div class="gsub">\u2705 Connected \u2014 day-offs now load from the sheet and every accept/decline/move is shared with the rest of the team automatically. Calendar write-back stays parked until verified.</div>');}); });
$('fromDate').addEventListener('change',()=>{SELECTED=null;HZPAGE=0;boot();});
function boot(){
  if(!$('fromDate').value)$('fromDate').value=TODAY_ISO;
  $('rfstamp').textContent='jobs through '+Object.keys(DATA.days).sort().slice(-1)[0]+' \u00b7 '+DATA.foremen.filter(f=>f.status!=='Active'&&f.status!=='Cancelled').length+' backup crews held';
  updateCalBtns();
  renderHorizon();
  const fs=WINDOW.find(d=>d.status==='short')||WINDOW.find(d=>d.status==='tight')||WINDOW[0];
  if(fs){SELECTED=fs.iso;renderHorizon();renderDay(SELECTED);}
  else $('daydetail').innerHTML='<div class="pickprompt">No calendar days in this range. Pick another start date above.</div>';
  if(GTOKEN)syncFromSheet();
}
boot();
