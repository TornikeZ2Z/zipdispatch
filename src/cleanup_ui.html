function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDay(iso){const d=new Date(Date.parse(iso+'T12:00'));return {dow:DOW[d.getDay()],dn:d.getDate(),mon:MON[d.getMonth()]};}
function fmtMs(ms){const d=new Date(ms);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function hmPretty(ms){let h=new Date(ms).getHours(),m=new Date(ms).getMinutes();const ap=h<12?'am':'pm';let h12=h%12;if(h12===0)h12=12;return h12+(m?':'+String(m).padStart(2,'0'):'')+ap;}
function havArr(a,b){return hav({lat:a[0],lon:a[1]},{lat:b[0],lon:b[1]});}

/* ===== HERE truck routing (reuses engine_core's hereCache so drawn routes warm cachedRoadMi) ===== */
const HERE_KEY='0IGXB_hGz84InzFmhfCygxp27_54NI-LkjL6N5RSYT8';
function decodeFlexPoly(encoded){
  const DEC='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
  const idx={};[...DEC].forEach((c,i)=>idx[c]=i);let i=0;
  function varint(){let r=0,s=0,b;do{b=idx[encoded[i++]];r|=(b&31)<<s;s+=5;}while(b>=32);return r;}
  function svarint(){const r=varint();return (r&1)?~(r>>>1):(r>>>1);}
  varint();const meta=varint();const precision=meta&15,thirdDim=(meta>>4)&7;const factor=Math.pow(10,precision);
  let lat=0,lng=0;const pts=[];while(i<encoded.length){lat+=svarint();lng+=svarint();if(thirdDim)svarint();pts.push([lat/factor,lng/factor]);}return pts;
}
async function truckRoute(a,b){
  const ck=a.join()+'|'+b.join();if(hereCache[ck]!==undefined)return hereCache[ck];
  const p=(async()=>{try{
    const u='https://router.hereapi.com/v8/routes?transportMode=truck&routingMode=fast&origin='+a[0]+','+a[1]+'&destination='+b[0]+','+b[1]+'&return=polyline,summary&apikey='+encodeURIComponent(HERE_KEY);
    const res=await fetch(u);if(!res.ok)throw 0;const j=await res.json();const sec=(j.routes&&j.routes[0]&&j.routes[0].sections)||[];if(!sec.length)throw 0;
    let pts=[],len=0,dur=0;for(const s of sec){pts=pts.concat(decodeFlexPoly(s.polyline));len+=s.summary.length;dur+=s.summary.duration;}
    const out={pts,mi:len/1609.34,min:dur/60};hereCache[ck]=out;return out;
  }catch(e){hereCache[ck]=null;return null;}})();
  hereCache[ck]=p;return p;
}

const GCAL_ID='contact@ziptozipmoving.com';
const GCAL_CLIENT_ID='712386117874-epqesoppk5fftq0j2gpp7becbk7cu72q.apps.googleusercontent.com';
let GTOKEN=null,GTOKEXP=0,_tokenClient=null;
try{const _g=JSON.parse(localStorage.getItem('zd_gtok')||'null');if(_g&&_g.exp>Date.now()+60000){GTOKEN=_g.t;GTOKEXP=_g.exp;}}catch(e){}
function gcalReady(){return !!(window.google&&google.accounts&&google.accounts.oauth2);}
function ensureGToken(cb){
  if(GTOKEN&&Date.now()<GTOKEXP-60000)return cb();
  if(window._gsiFail||!gcalReady())return gModal('Google sign-in unavailable here','The Google sign-in library could not load (previews block it). Open this on its hosted GitHub Pages URL and it will work.');
  _tokenClient=_tokenClient||google.accounts.oauth2.initTokenClient({client_id:GCAL_CLIENT_ID,scope:'https://www.googleapis.com/auth/calendar.events',callback:()=>{}});
  _tokenClient.callback=resp=>{
    if(resp&&resp.access_token){GTOKEN=resp.access_token;GTOKEXP=Date.now()+((resp.expires_in||3600)*1000);
      try{localStorage.setItem('zd_gtok',JSON.stringify({t:GTOKEN,exp:GTOKEXP}));localStorage.setItem('zd_gconn','1');}catch(e){}
      updateCalBtns();cb();}
    else gModal('Sign-in failed',esc((resp&&resp.error)||'no token returned'));
  };
  _tokenClient.requestAccessToken({prompt:(GTOKEN||localStorage.getItem('zd_gconn'))?'':'consent'});
}
async function gapiFetch(path,opts){
  const r=await fetch('https://www.googleapis.com/calendar/v3/'+path,Object.assign({},opts,{headers:Object.assign({Authorization:'Bearer '+GTOKEN,'Content-Type':'application/json'},(opts&&opts.headers)||{})}));
  if(!r.ok)throw new Error('Calendar API '+r.status+' — '+(await r.text()).slice(0,160));
  return r.status===204?null:r.json();
}

async function showRoute(rec, kind, title, sub){
  openMapPane();
  if(LAYER)LAYER.clearLayers();
  const geo=rec.geo||[];
  // journey panel
  $('mapcard').style.display='';

  $('mapcard').querySelector('.mcx').onclick=exitMap;
  $('mapcard').querySelector('.mcmin').onclick=function(){const c=$('mapcard');c.classList.toggle('min');this.textContent=c.classList.contains('min')?'+':'–';};
  if(!geo.length){return;}
  const pts=geo.map(s=>[s.lat,s.lon]);
  geo.forEach(s=>{
    const col=s.kind==='A'?'#646B73':s.kind==='P'?'#1F2329':'#6E9220';
    const txt=s.kind==='A'?'●':s.kind;
    L.marker([s.lat,s.lon],{zIndexOffset:600,icon:L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,13],html:'<div style="background:'+col+';color:#fff;border:3px solid #fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.3)">'+txt+'</div>'})}).addTo(LAYER).bindTooltip((s.customer?esc(s.customer)+' — ':'')+esc(s.label),{direction:'top',offset:[0,-12],className:'lpop'});
  });
  LMAP.fitBounds(L.latLngBounds(pts).pad(0.28));
  for(let i=0;i<geo.length-1;i++){
    const a=[geo[i].lat,geo[i].lon],b=[geo[i+1].lat,geo[i+1].lon];
    const reposition=geo[i].kind==='A';let line=[a,b];
    try{const rt=await truckRoute(a,b);if(rt&&rt.pts&&rt.pts.length)line=rt.pts;}catch(e){}
    L.polyline(line,{color:'#FFFFFF',weight:6.5,opacity:.92,lineCap:'round'}).addTo(LAYER);
    L.polyline(line,{color:reposition?'#B26B0B':'#6C5CE0',weight:3,opacity:.95,dashArray:reposition?'8 7':null,lineCap:'round'}).addTo(LAYER);
  }
  setTimeout(()=>{if(LMAP){LMAP.invalidateSize();LMAP.fitBounds(L.latLngBounds(pts).pad(0.28));}},140);
}
function step(t,txt,tv,late){return '<div class="step'+(tv?' tv':'')+(late?' late':'')+'"><span class="dot"></span><span class="st">'+(t||'')+'</span><span>'+txt+'</span></div>';}
function journeySteps(rec,kind){
  // rec carries: anchorCustomer, anchorCity, anchorEndMs, linkMin, linkMi, askArriveMs|arriveMs, window, customer, city, deliveryCity, actH
  const arrive=rec.askArriveMs!=null?rec.askArriveMs:rec.arriveMs;
  const rows=[];
  if(rec.anchorEndMs!=null){
    rows.push(step(fmtMs(rec.anchorEndMs),'Crew finishes <b>'+esc(rec.anchorCustomer||'previous job')+'</b> · '+esc(rec.anchorCity||''),false));
    rows.push(step(fmtMs(rec.anchorEndMs),'Drive to '+esc(rec.city||'pickup')+' · '+(rec.linkMin!=null?rec.linkMin+' min · ':'')+(rec.linkMi!=null?rec.linkMi+' mi':''),true));
  }
  if(arrive!=null){
    const win=rec.window?rec.window.text:fmtMs(arrive);
    rows.push(step(fmtMs(arrive),'Arrive <b>'+esc(rec.customer||'')+'</b> · pickup '+esc(rec.city||'')+' · ask window '+win,false));
    const act=rec.actH||3;
    const load=act*0.6*3600000;
    const departP=arrive+load;
    rows.push(step(fmtMs(departP),'Load ~'+(Math.round(act*0.6*10)/10)+'h, then drive to delivery',true));
    const done=departP + 30*60000 + act*0.4*3600000;
    rows.push(step(fmtMs(done),'Deliver '+esc(rec.deliveryCity||'')+' · done ~'+fmtMs(done),false));
  }
  return rows.join('');
}

function distroChecks(td){
  var afterMap={}, pm=[];
  td.routes.forEach(function(r){
    r.legs.forEach(function(l){ if(l.after){(afterMap[l.after]=afterMap[l.after]||[]).push(l.customer||l.code);} });
    if(r.legs.length===1){var l=r.legs[0];var h=new Date(l.start).getHours();var lng=/long/i.test(String(l.movingType||''))||l._far;if(h>=12 && !lng && !l.after && !l._rechained){pm.push(l.customer||l.code);}}
  });
  var dbl=Object.keys(afterMap).filter(function(k){return afterMap[k].length>=2;}).map(function(k){return {lead:jobCust(td,k)||k, tails:afterMap[k]};});
  return {doubleChains:dbl, standalonePM:pm};
}
function sKey(iso,slot,kind,id){return iso+'|slot'+slot+'|'+kind+'|'+id;}
function lKey(iso,slot,tail){return iso+'|slot'+slot+'|'+tail;}
function declinedSetFor(iso){const s=new Set();Object.keys(STATUS).forEach(k=>{if(STATUS[k]==='declined'){const p=k.split('|');if(p[0]===iso)s.add(p.slice(1).join('|'));}});return s;}

function routeGeo(route){
  const sl=[...route.legs].sort((a,b)=>Date.parse(a.start)-Date.parse(b.start)); const stops=[];
  sl.forEach(l=>{ const p=ptOf(l.pickup), d=ptOf(l.delivery);
    if(p)stops.push({lat:p.lat,lon:p.lon,kind:'P',label:'pickup \u00b7 '+(l.cityFrom||''),customer:l.customer||''});
    if(d)stops.push({lat:d.lat,lon:d.lon,kind:'D',label:'delivery \u00b7 '+(l.cityTo||''),customer:l.customer||''}); });
  return stops;
}
function routeSteps(route){
  const sl=[...route.legs].sort((a,b)=>Date.parse(a.start)-Date.parse(b.start));
  const rows=[]; let prevDoneMs=null;
  sl.forEach((l,i)=>{ const st=Date.parse(l.start); const act=(l.actH||schedH(l)||3);
    if(i>0&&prevDoneMs!=null) rows.push(step(fmtMs(prevDoneMs),'Reposition to <b>'+esc(l.customer||l.code)+'</b> \u00b7 '+esc(l.cityFrom||''),true));
    rows.push(step(fmtMs(st),'Arrive <b>'+esc(l.customer||l.code)+'</b> \u00b7 pickup '+esc(l.cityFrom||'')+' \u00b7 '+(l.cf||0).toLocaleString()+' CF',false));
    const loadMs=st+act*0.6*3600000;
    rows.push(step(fmtMs(loadMs),'Load ~'+(Math.round(act*0.6*10)/10)+'h, drive to '+esc(l.cityTo||'delivery'),true));
    const doneMs=loadMs+30*60000+act*0.4*3600000;
    rows.push(step(fmtMs(doneMs),'Deliver '+esc(l.cityTo||'')+' \u00b7 done ~'+fmtMs(doneMs),false));
    prevDoneMs=doneMs;
  });
  return rows.join('');
}

  setTimeout(()=>{if(LMAP){LMAP.invalidateSize();LMAP.fitBounds(L.latLngBounds(pts).pad(0.28));}},140);

/* build the dispatcher .tl* timeline markup; routes (not individual moves), no foreman, pending changes highlighted */
function tlChunk(td, changes, incoming){
  changes=changes||{};
  let RR=td.routes.slice();
  if(BASEFILTER.size) RR=RR.filter(r=>BASEFILTER.has(r.base));
  if(!RR.length) return '<div id="cltl" class="tlwrap"><div class="tlempty">No routes for the selected base'+(BASEFILTER.size>1?'s':'')+' on this day.</div></div>';
  let minH=8,maxH=18;
  const legBlocks=r=>{const sl=[...r.legs].sort((a,b)=>Date.parse(a.start)-Date.parse(b.start));return sl.map((l,i)=>{const st=Date.parse(l.start);const multi=l._far&&l.straight;let en=multi?null:(l._endMs||Date.parse(l.end||l.start));const nd=en&&new Date(en).getDate()!==new Date(st).getDate();return {r,l,i,n:sl.length,st,en,nd,multi};});};
  RR.forEach(r=>legBlocks(r).forEach(b=>{minH=Math.min(minH,new Date(b.st).getHours());if(b.en&&!b.nd)maxH=Math.max(maxH,new Date(b.en).getHours()+1);}));
  const A=Math.max(0,minH-1),B=Math.min(24,Math.max(maxH+1,19)),SPAN=(B-A)*60;
  const pos=ms=>{const d=new Date(ms);return ((d.getHours()*60+d.getMinutes())-A*60)/SPAN*100;};
  const kindCol=l=>{const jt=String(l.jobType||''),mt=String(l.movingType||'');if(/labor/i.test(jt))return '#5B6770';const ld=/long/i.test(mt)||l._far;if(ld&&(l.straight||/straight/i.test(jt)))return '#6C4FD8';if(ld)return '#C98A1B';return '#6E9220';};
  const shortIds=new Set(td.shortIds||[]);
  const mkB=b=>{const left=Math.max(0,pos(b.st));const right=(b.multi||b.nd)?100:Math.min(100,pos(b.en));const w=Math.max(2.5,right-left);const cf=(b.l.cf||0).toLocaleString();
    const chg=changes[b.l.code]; const chgTag=chg?(chg.kind==='move'?' \u00b7 \u2192 moving '+fmtDay(chg.to).mon+' '+fmtDay(chg.to).dn:' \u00b7 \u2192 re-chained'):'';
    const lbl=(b.n>1?(b.i+1)+'/'+b.n+' \u00b7 ':'')+(b.l.cityFrom||'')+' \u2192 '+(b.l.cityTo||'labor')+' \u00b7 '+cf+' CF'+chgTag+(b.multi?' \u00b7 \u2192 multi':(b.nd?' \u00b7 \u2192 next day':''));
    const tip=b.r.id+' \u00b7 '+(b.l.code||'')+' \u00b7 '+(b.l.cityFrom||'')+' \u2192 '+(b.l.cityTo||'\u2014')+' \u00b7 '+hmPretty(b.st)+(b.en?'\u2013'+new Date(b.en).toTimeString().slice(0,5):'')+' \u00b7 '+cf+' CF'+(chg?' \u00b7 PENDING CHANGE \u2014 Update will write this':'');
    return '<div class="tlblock'+(b.multi?' ld':'')+(b.nd?' nd':'')+(chg?' tlchg '+(chg.kind==='move'?'chgmove':'chgcall'):'')+'" style="left:'+left+'%;width:'+w+'%;'+(chg?'':'background:'+kindCol(b.l))+'" title="'+esc(tip)+'">'+esc(lbl)+'</div>';};
  const trackOf=r=>legBlocks(r).map(mkB).join('');
  let rows=''; const byB={};
  [...RR].sort((x,y)=>(x.base||'').localeCompare(y.base||'')||((x.t0||0)-(y.t0||0))).forEach(r=>{(byB[r.base]=byB[r.base]||[]).push(r);});
  const _ghosts=(td.ghosts||[]).filter(g=>!BASEFILTER.size||BASEFILTER.has(g.base));
  const _gByB={}; _ghosts.forEach(g=>{(_gByB[g.base]=_gByB[g.base]||[]).push(g);});
  const _ghostRow=(g)=>{const gl=Math.max(0,pos(g.origStartMs));const gr=Math.min(100,pos(g.origEndMs||g.origStartMs));const gw=Math.max(3,gr-gl);const dest=g.kind==='call'?('now '+hmPretty(g.newStartMs||g.arriveMs)+', after '+(jobCust(td,g.after)||g.after)):('moved to '+fmtDay(g.to).mon+' '+fmtDay(g.to).dn);return '<div class="tlrow ghostrow" data-base="'+esc(g.base)+'"'+(COLLAPSED.has(g.base)?' style="display:none"':'')+' title="'+esc(g.customer+' \u2014 '+dest)+'"><div class="tllabel"><b>'+esc(g.customer)+'</b><span>was '+hmPretty(g.origStartMs)+' \u2192 '+esc(dest)+'</span></div><div class="tltrack"><div class="tlblock ghostblk '+(g.kind==='call'?'gcall':'gmove')+'" style="left:'+gl+'%;width:'+gw+'%">was here</div></div></div>';};
  const _bases=[...new Set([...Object.keys(byB),...Object.keys(_gByB)])].sort();
  for(const bb of _bases){
    const rs=byB[bb]||[];
    rows+='<div class="tlsep" data-b="'+esc(bb)+'"><span class="tlcaret">'+(COLLAPSED.has(bb)?'\u25b8':'\u25be')+'</span><h4>'+esc(bb)+' BASE</h4><span class="tlmeta">'+rs.length+' route'+(rs.length!==1?'s':'')+((_gByB[bb]||[]).length?' \u00b7 '+(_gByB[bb]).length+' moved':'')+'</span></div>';
    for(const r of rs){RECS['rt|'+r.id]={route:r};
      const cf=(r.totalCF||r.legs.reduce((s,l)=>s+(l.cf||0),0)).toLocaleString();
      const isShort=shortIds.has(r.id); const hasChg=r.legs.some(l=>changes[l.code]);
      const jobN=r.legs.length>1?(r.legs.length+' jobs'):((r.legs[0]&&r.legs[0].cityFrom||'')+' \u2192 '+(r.legs[0]&&r.legs[0].cityTo||''));
      const r1=r.id+(r.legs.length>1?' \u26d3':'')+' \u00b7 '+cf+' CF';
      const r2=jobN+(isShort?' \u00b7 \u26a0 overflow':'');
      rows+='<div class="tlrow clickable'+(isShort?' tlshortrow':'')+(hasChg?' rowchg':'')+'" data-rt="rt|'+r.id+'" data-base="'+esc(bb)+'"'+(COLLAPSED.has(bb)?' style="display:none"':'')+' title="Click to see the whole route on the map"><div class="tllabel"><b>'+esc(r1)+'</b><span>'+esc(r2)+'</span></div><div class="tltrack">'+trackOf(r)+'</div></div>';}
    (_gByB[bb]||[]).forEach(g=>{rows+=_ghostRow(g);});
  }
  let scale='<div class="tlrow scale"><div class="tllabel"></div><div class="tltrack">';
  for(let h=A;h<=B;h++){const p=(h-A)*60/SPAN*100;scale+='<div class="tlgrid" style="left:'+p+'%"></div>'+(h<B?'<div class="tlhr" style="left:'+p+'%">'+(h%24)+':00</div>':'');}
  scale+='</div></div>';
  let _inc='';
  if(incoming&&incoming.length){ _inc='<div class="tlsep incsep"><span class="tlcaret"></span><h4>\u2193 INCOMING (from your moves)</h4><span class="tlmeta">'+incoming.length+' job'+(incoming.length>1?'s':'')+'</span></div>'; incoming.forEach(m=>{const il=Math.max(0,pos(m.startMs||Date.parse(m.to)));_inc+='<div class="tlrow incomingrow" title="'+esc(m.customer+' moving in from '+m.from)+'"><div class="tllabel"><b>'+esc(m.customer)+'</b><span>\u2190 from '+fmtDay(m.from).mon+' '+fmtDay(m.from).dn+'</span></div><div class="tltrack"><div class="tlblock ghostblk gin" style="left:'+il+'%;width:6%">incoming</div></div></div>';}); }
  return '<div id="cltl" class="tlwrap">'+scale+_inc+rows+'</div>';
}

function dayJobOptions(td, selCode){
  const seen=new Set(); let opts='';
  td.routes.forEach(r=>r.legs.forEach(l=>{if(!l.code||seen.has(l.code))return;seen.add(l.code);opts+='<option value="'+esc(l.code)+'"'+(l.code===selCode?' selected':'')+'>'+esc((l.customer||l.code)+' \u00b7 '+l.code)+'</option>';}));
  return opts;
}

function renderSlot(iso, s, td, dupLeads){

    const desc='<div class="slotdesc">'+esc(rec.city||'')+' \u00b7 '+rec.cf+' CF \u00b7 booked '+hmPretty(rec.origStartMs)+'. Ask to flip to the afternoon \u2014 arrive <span class="win">'+rec.window.text+'</span>, chaining after <b>'+esc(rec.anchorCustomer||rec.after)+'</b>. Offer \u0024'+rec.discount+'.</div>';

    if(stt==='todo'){ body=desc+script+'<div class="ibtns"><span class="ask">Talked to the client?</span><button class="cb yes" data-act="accept" data-id="'+id+'">Accepted</button><button class="cb" data-act="decline" data-id="'+id+'">Declined</button>'+routeBtn(id,rec,'call')+'</div>'; }
    else if(stt==='accepted'){ const lk=lKey(iso,s.index,rec.tail); const lead=LEADS[lk]||rec.after; body=desc+'<div class="leadrow"><label>Runs after (lead job):</label><select class="leadsel" data-lk="'+lk+'">'+dayJobOptions(td,lead)+'</select></div><div class="ibtns"><button class="cb yes" data-act="confirm" data-id="'+id+'" data-lk="'+lk+'">Confirm re-chain</button><button class="cb" data-act="decline" data-id="'+id+'">Client declined instead</button></div>'; }
    else if(stt==='confirmed'){ const lk=lKey(iso,s.index,rec.tail); const lead=LEADS[lk]||rec.after; const dup=dupLeads.has(lead); body='<div class="confirmed'+(dup?' dup':'')+'">\u2713 Confirmed \u2014 '+esc(rec.customer||rec.tail)+' arrives '+rec.window.text+', runs after <b>'+esc(jobCust(td,lead))+'</b>.'+(dup?' <span class="dupwarn">\u26a0 same lead as another re-chain \u2014 re-do this.</span>':'')+'<button class="cb undo" data-act="reopen" data-id="'+id+'">change</button></div>'; }

    head='<b><span class="tlbl move">\ud83d\udcc5 move date</span> '+esc(rec.customer||rec.code)+'</b> '+tag+' <span class="stag $">\u002450</span>';

    const script='<div class="iscript">\u201cWould '+tf.dow+', '+tf.mon+' '+tf.dn+' work instead?'+(sl.fresh?'':' We\u2019d arrive around '+sl.window.text+'.')+' We\u2019ll take \u002450 off for changing the date.\u201d</div>';
    if(stt==='todo'){ body=desc+script+'<div class="ibtns"><span class="ask">Client OK to move?</span><button class="cb yes" data-act="accept" data-id="'+id+'">Accepted</button><button class="cb" data-act="decline" data-id="'+id+'">Declined</button>'+routeBtn(id,sl,'move')+'</div>'; }
    else if(stt==='accepted'){ body=desc+'<div class="ibtns"><button class="cb yes" data-act="confirm" data-id="'+id+'" data-mvcode="'+esc(rec.code)+'" data-mvto="'+rec.to+'" data-mvcust="'+esc(rec.customer||rec.code)+'" data-mvstart="'+((function(){var j=jobByCode(rec.code);return j?Date.parse(rec.to+' '+String(j.start).slice(11)):Date.parse(rec.to);})())+'">Confirm move to '+tf.mon+' '+tf.dn+'</button><button class="cb" data-act="decline" data-id="'+id+'">Client declined instead</button></div>'; }
    else if(stt==='confirmed'){ body='<div class="confirmed">\u2713 Confirmed \u2014 '+esc(rec.customer||rec.code)+' moved to '+tf.dow+' '+tf.mon+' '+tf.dn+'.<button class="cb undo" data-act="reopen" data-id="'+id+'" data-mvcode="'+esc(rec.code)+'">change</button></div>'; }

function routeBtn(id,rec,kind){RECS[id+'|r']={rec,kind};return '<button class="cb route" data-route="'+id+'|r">\ud83d\uddfa route</button>';}
function jobCust(td,code){let n=code;td.routes.forEach(r=>r.legs.forEach(l=>{if(l.code===code)n=l.customer||code;}));return n;}
function parsePhone(j){ if(!j)return null; var d=j.description||j.notes||j.summary||j.desc||''; var m=String(d).match(/customer\s*mobile\s*[:\-]?\s*([+0-9()\s.\-]{7,})/i); var p=m?m[1]:(j.phone||j.mobile||j.tel||j.phoneNumber||null); return p?String(p).replace(/\s+/g,' ').trim():null; }

function renderDay(iso){
  const horizon=scanHorizon(windowStart(),7);
  const plan=cleanupPlan(iso,horizon);
  const declined=declinedSetFor(iso);
  const slots=resolveSlots(plan,declined);
  CURPLAN=plan; RECS={}; ACTIVE_ROUTE=null;
  // pending changes from confirmed slots -> apply to the timeline so the chip re-routes (and mark what Update will write)
  const changes={};
  slots.slots.forEach(s=>{ if(!s.current)return; const k=s.current.kind, rec=s.current.rec; const id=sKey(iso,s.index,k,k==='call'?rec.tail:rec.code);
    if(STATUS[id]==='confirmed'){ if(k==='call') changes[rec.tail]={kind:'call', after:(LEADS[lKey(iso,s.index,rec.tail)]||rec.after), arriveMs:rec.arriveMs}; else changes[rec.code]={kind:'move', to:rec.to}; } });
  CURCHANGES=changes;
  const td=timelineData(iso, changes);
  const distro=distroChecks(td); const incoming=incomingMoves(iso);
  const f=fmtDay(iso); const st=plan.status;
  const chip=st==='short'?{c:'short',t:'over by '+Math.abs(plan.spare)}:st==='tight'?{c:'tight',t:'full \u00b7 no buffer'}:{c:'ok',t:plan.spare+' crews free'};
  let h='<div class="daycard"><div class="dchead"><div><h2>'+f.dow+', '+f.mon+' '+f.dn+'</h2><div class="dcsum"><b>'+plan.routes+'</b> routes vs <b>'+plan.availableCore+'</b> core crews \u00b7 aim \u2264'+plan.target+(plan.coreOff.length?' \u00b7 '+plan.coreOff.length+' off':'')+'</div></div><span class="schip '+chip.c+'">'+chip.t+'</span></div><div class="dcbody">';
  h+='<div class="fixpanel">';
  if(distro.doubleChains.length){ distro.doubleChains.forEach(dc=>{ h+='<div class="distalert">\u26a0 Double chaining \u2014 <b>'+esc(dc.tails.join(' & '))+'</b> are both chained after <b>'+esc(dc.lead)+'</b>. One crew can\u2019t do both \u2014 split one off.</div>'; }); }
  if(distro.standalonePM.length){ h+='<div class="distinfo">\ud83d\udd17 Afternoon job'+(distro.standalonePM.length>1?'s':'')+' running solo (no feasible chain found): '+esc(distro.standalonePM.join(', '))+'.</div>'; }
  if(plan.standardChains.length){h+='<div class="fixinfo"><span class="tlbl free">free</span> '+plan.standardChains.length+' afternoon job'+(plan.standardChains.length>1?'s':'')+' auto-chained (extra-chain, no call): '+plan.standardChains.map(c=>esc(c.customer||c.tail)+' after '+esc(c.anchorCustomer||c.after)).join('; ')+'.</div>';}
  if(st==='ok'){
    h+='<div class="cres ok">\u2713 This day holds its '+plan_buffer()+'-crew buffer ('+plan.spare+' free). Nothing to resolve.</div>';
  }else{
    var _post=td.routes.length, _nchg=Object.keys(changes).length;
    if(_nchg>0 && _post<=plan.target){ h+='<div class="cres win">\ud83c\udf89 With your '+_nchg+' confirmed change'+(_nchg>1?'s':'')+', '+f.mon+' '+f.dn+' is back to a full '+plan_buffer()+'-crew buffer \u2014 '+(plan.availableCore-_post)+' free. Nicely done.</div>'; }
    else if(_nchg>0 && _post<=plan.availableCore){ h+='<div class="cres okwin">\u2713 Your '+_nchg+' change'+(_nchg>1?'s':'')+' clear'+(_nchg>1?'':'s')+' the shortage \u2014 now '+_post+'/'+plan.availableCore+' crews running.'+(_post>plan.target?(' Free '+(_post-plan.target)+' more to rebuild the buffer.'):'')+'</div>'; }
    h+='<div class="fixnote">Each step below frees one crew-day \u2014 work them top to bottom.</div>';
    h+='<div class="fixhead">'+(st==='short'?('Free '+plan.gapToCover+' crew'+(plan.gapToCover>1?'s':'')+' to clear the shortage'+(plan.gapToBuffer>plan.gapToCover?(' \u00b7 +'+(plan.gapToBuffer-plan.gapToCover)+' more rebuilds the buffer'):'')):('Optional \u2014 free up to '+plan.gapToBuffer+' crew'+(plan.gapToBuffer>1?'s':'')+' to rebuild the buffer'))+'</div>';
    const confirmedLeads={};
    slots.slots.forEach(s=>{if(s.current&&s.current.kind==='call'){const id=sKey(iso,s.index,'call',s.current.rec.tail);if(STATUS[id]==='confirmed'){const lead=LEADS[lKey(iso,s.index,s.current.rec.tail)]||s.current.rec.after;confirmedLeads[lead]=(confirmedLeads[lead]||0)+1;}}});
    const dupLeads=new Set(Object.keys(confirmedLeads).filter(k=>confirmedLeads[k]>1));
    slots.slots.forEach(s=>{h+=renderSlot(iso,s,td,dupLeads);});
    const anyConfirmed=slots.slots.some(s=>{if(!s.current)return false;const id=sKey(iso,s.index,s.current.kind,s.current.kind==='call'?s.current.rec.tail:s.current.rec.code);return STATUS[id]==='confirmed';});
    h+='<div class="calbar">'+(dupLeads.size?'<span class="dupwarn">\u26a0 Two re-chains share a lead \u2014 fix before updating.</span>':'')+'<button class="cb upd" id="updcal" '+((anyConfirmed&&!dupLeads.size)?'':'disabled')+'>\u2934 Update calendar</button><span class="cmuted">write-back parked \u2014 confirms saved here for now</span></div>';
  }
  h+='</div>';
  if(td.movedOut&&td.movedOut.length){h+='<div class="movedout">\u2197 Moved off this day ('+td.movedOut.length+'): '+td.movedOut.map(m=>esc(m.customer)+' \u2192 '+fmtDay(m.to).mon+' '+fmtDay(m.to).dn).join(', ')+'</div>';}
  h+='<div class="tlbar"><div class="tltitle">Routes on '+f.dow+' '+f.dn+' \u2014 click any to see the whole run</div><div class="tlleg"><i style="background:#6E9220"></i>local <i style="background:#C98A1B"></i>long <i style="background:#6C4FD8"></i>straight <i style="background:#5B6770"></i>labor <span class="lgchg"></span>pending change</div></div>';
  h+=tlChunk(td, changes, incoming);
  h+='</div></div>';
  $('daydetail').innerHTML=h;
  bindDay(iso);
}

function bindDay(iso){
  const root=$('daydetail');
  root.querySelectorAll('.cb[data-act]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();
    const id=b.dataset.id, act=b.dataset.act;
    if(act==='accept')setStatus(id,'accepted');
    else if(act==='decline')setStatus(id,'declined');
    else if(act==='reopen'){ if(b.dataset.mvcode){delete CONFIRMED_MOVES[b.dataset.mvcode];saveMoves();} setStatus(id,null); }
    else if(act==='confirm'){ if(b.dataset.lk){const sel=root.querySelector('.leadsel[data-lk="'+b.dataset.lk+'"]');if(sel){LEADS[b.dataset.lk]=sel.value;saveLeads();}} if(b.dataset.mvcode){CONFIRMED_MOVES[b.dataset.mvcode]={code:b.dataset.mvcode,customer:b.dataset.mvcust,from:iso,to:b.dataset.mvto,startMs:(+b.dataset.mvstart||Date.parse(b.dataset.mvto))};saveMoves();} setStatus(id,'confirmed'); }
    renderDay(iso); renderHorizon();
  }));
  root.querySelectorAll('.leadsel').forEach(s=>s.addEventListener('click',e=>e.stopPropagation()));
  root.querySelectorAll('.leadsel').forEach(s=>s.addEventListener('change',()=>{LEADS[s.dataset.lk]=s.value;saveLeads();}));
  root.querySelectorAll('.cb.route[data-route]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();
    const r=RECS[b.dataset.route]; if(!r)return;
    document.querySelectorAll('.cb.route.active').forEach(x=>x.classList.remove('active'));
    if(ACTIVE_ROUTE===b.dataset.route){exitMap();ACTIVE_ROUTE=null;return;}
    b.classList.add('active'); ACTIVE_ROUTE=b.dataset.route;
    const rec=r.rec, kind=r.kind;
    const title=rec.customer||rec.tail||'Route';
    const sub=kind==='call'?('Chain after <b>'+esc(rec.anchorCustomer||'')+'</b> if they accept '+(rec.window?rec.window.text:'')+'.'):(rec.fresh?'Runs as its own crew on the new day.':'On the new day, after <b>'+esc(rec.anchorCustomer||'')+'</b>.');
    showRoute(rec,kind,title,sub);
  }));
  // click a route ROW (or any bar in it) -> show the whole route on the map
  root.querySelectorAll('.tlrow.clickable[data-rt]').forEach(row=>row.addEventListener('click',()=>{
    const r=RECS[row.dataset.rt]; if(!r||!r.route)return;
    document.querySelectorAll('.tlrow.rtsel').forEach(x=>x.classList.remove('rtsel'));
    if(ACTIVE_ROUTE===row.dataset.rt){exitMap();ACTIVE_ROUTE=null;return;}
    row.classList.add('rtsel'); ACTIVE_ROUTE=row.dataset.rt;
    const rt=r.route; const title=rt.id+' \u00b7 '+(rt.legs.length>1?rt.legs.length+' jobs':((rt.legs[0].cityFrom||'')+' \u2192 '+(rt.legs[0].cityTo||'')));
    const sub='Base '+esc(rt.base||'')+' \u00b7 '+(rt.totalCF||0).toLocaleString()+' CF \u00b7 the whole run for this day.';
    showRouteJourney(rt, title, sub);
  }));
  root.querySelectorAll('#cltl .tlsep[data-b]').forEach(sep=>sep.addEventListener('click',()=>{ const b=sep.dataset.b; if(COLLAPSED.has(b))COLLAPSED.delete(b); else COLLAPSED.add(b); root.querySelectorAll('#cltl .tlrow[data-base="'+b+'"]').forEach(r=>{r.style.display=COLLAPSED.has(b)?'none':'';}); const c=sep.querySelector('.tlcaret'); if(c)c.textContent=COLLAPSED.has(b)?'\u25b8':'\u25be'; }));
  const up=$('updcal'); if(up)up.addEventListener('click',()=>{ if(up.disabled)return;
    const chg=CURCHANGES||{}; const ents=Object.keys(chg);
    if(!ents.length){gModal('Nothing confirmed yet','<div class="gsub">Mark the calls you\u2019ve agreed and the dates you\u2019ve moved as <b>confirmed</b> first \u2014 then this shows the summary.</div>');return;}
    const calls=ents.filter(c=>chg[c].kind==='call'), moves=ents.filter(c=>chg[c].kind==='move');
    const nm=c=>{const j=jobByCode(c);return esc((j&&j.customer)||c);};
    let html='<div class="gsub">Changes you confirmed for <b>'+fmtDay(iso).dow+' '+fmtDay(iso).mon+' '+fmtDay(iso).dn+'</b>. Write-back is parked \u2014 this is the summary that will be applied once it\u2019s unlocked.</div>';
    if(calls.length){html+='<div class="sumsec"><h4>\ud83d\udcde Re-chained \u2014 '+calls.length+'</h4><ul>'+calls.map(c=>'<li>'+nm(c)+' \u2192 runs after <b>'+nm(chg[c].after)+'</b> (afternoon)</li>').join('')+'</ul></div>';}
    if(moves.length){html+='<div class="sumsec"><h4>\ud83d\udcc5 Date moves \u2014 '+moves.length+'</h4><ul>'+moves.map(c=>'<li>'+nm(c)+' \u2192 <b>'+fmtDay(chg[c].to).dow+' '+fmtDay(chg[c].to).mon+' '+fmtDay(chg[c].to).dn+'</b></li>').join('')+'</ul></div>';}
    html+='<div class="sumnet">Net effect: frees <b>'+ents.length+'</b> crew-day'+(ents.length>1?'s':'')+' on this date.</div>';
    var box=gModal('Update summary \u2014 '+ents.length+' change'+(ents.length>1?'s':''), html, '<button class="cb" id="sumcancel">Cancel</button> <button class="cb yes" id="sumconfirm">Confirm \u0026 update calendar</button>');
    box.querySelector('#sumcancel').onclick=function(){$('gmodalhost').innerHTML='';};
    box.querySelector('#sumconfirm').onclick=function(){$('gmodalhost').innerHTML='';gModal('Calendar write-back is paused','<div class="gsub">\u2705 Your '+ents.length+' change'+(ents.length>1?'s are':' is')+' confirmed and saved here. The actual calendar write is intentionally paused until we verify it end-to-end \u2014 it\u2019ll push automatically once we switch it on.</div>');};
  });
}
function plan_buffer(){return (typeof CLEAN!=='undefined'&&CLEAN.buffer)||2;}

/* ===== Update Calendar: write agreed actions ===== */
function agreedActions(){
  const out=[];
  if(!CURPLAN)return out;
  const iso=CURPLAN.iso;
  CURPLAN.extraChains.forEach(e=>{const id=iso+'|call|'+e.tail;if(STATUS[id]==='done'){const j=jobByCode(e.tail);if(j&&j.eventId)out.push({kind:'time',code:e.tail,eventId:j.eventId,customer:e.customer,newStartMs:e.askArriveMs,day:iso});}});
  CURPLAN.moves.forEach(m=>{const id=iso+'|move|'+m.code;if(STATUS[id]==='done'){const j=jobByCode(m.code);if(j&&j.eventId)out.push({kind:'date',code:m.code,eventId:j.eventId,customer:m.customer,toDay:m.to,keepStart:String(j.start).slice(11)});}});
  return out;
}
function updateCalendarFlow(){
  ensureGToken(async()=>{
    const acts=agreedActions();
    if(!acts.length){gModal('Nothing to write yet','Mark the calls you\u2019ve <b>agreed</b> and the dates you\u2019ve <b>moved</b> (green buttons) on this day, then press Update calendar. Declined and to-do items are skipped.');return;}
    const list=acts.map(a=>a.kind==='time'
      ?'<li><b>'+esc(a.customer||a.code)+'</b>: change start time to <b>'+fmtMs(a.newStartMs)+'</b> (same day)</li>'
      :'<li><b>'+esc(a.customer||a.code)+'</b>: move to <b>'+a.toDay+'</b> (keep '+a.keepStart.slice(0,5)+')</li>').join('');
    const box=gModal('Write '+acts.length+' change'+(acts.length>1?'s':'')+' to the calendar?','<div class="gsub">These edit real calendar events. Only items you marked agreed/moved are included.</div><ul style="margin:10px 0 0 18px;line-height:1.7">'+list+'</ul>',
      '<button class="cb" id="cancelw">Cancel</button> <button class="cb on-done" id="dow">Write '+acts.length+' change'+(acts.length>1?'s':'')+'</button>');
    box.querySelector('#cancelw').onclick=()=>$('gmodalhost').innerHTML='';
    box.querySelector('#dow').onclick=async()=>{
      box.querySelector('#dow').textContent='Writing…';box.querySelector('#dow').disabled=true;
      let ok=0,fail=0;
      for(const a of acts){
        try{
          const ev=await gapiFetch(evPath(a.eventId));
          const tz=(ev.start&&ev.start.timeZone)||'America/New_York';
          let sd,ed;
          if(a.kind==='time'){
            const day=String((ev.start.dateTime||'')).slice(0,10)||a.day;
            sd=day+'T'+fmtMs(a.newStartMs)+':00';
            const durMs=(Date.parse(ev.end.dateTime)-Date.parse(ev.start.dateTime))||3*3600000;
            ed=new Date(Date.parse(sd)+durMs);
            const pad=n=>String(n).padStart(2,'0');const f=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
            await gapiFetch(evPath(a.eventId),{method:'PATCH',body:JSON.stringify({start:{dateTime:sd,timeZone:tz},end:{dateTime:f(ed),timeZone:tz}})});
          } else {
            const oldStart=ev.start.dateTime||'';const clock=oldStart.slice(11,16)||a.keepStart.slice(0,5);
            const sdt=a.toDay+'T'+clock+':00';
            const durMs=(Date.parse(ev.end.dateTime)-Date.parse(ev.start.dateTime))||3*3600000;
            const pad=n=>String(n).padStart(2,'0');const f=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
            const edt=f(new Date(Date.parse(sdt)+durMs));
            await gapiFetch(evPath(a.eventId),{method:'PATCH',body:JSON.stringify({start:{dateTime:sdt,timeZone:tz},end:{dateTime:edt,timeZone:tz}})});
          }
          ok++;
        }catch(e){fail++;}
      }
      $('gmodalhost').innerHTML='';
      gModal('Calendar updated', '<div class="gsub">✅ '+ok+' change'+(ok!==1?'s':'')+' written'+(fail?' · ⚠ '+fail+' failed':'')+'.</div><div class="gqt">Re-pull from the calendar to see them reflected here.</div>');
    };
  });
}

/* ===== boot ===== */
$('calbtn').addEventListener('click',()=>{ if(GTOKEN){ gModal('Update calendar','<div class="gsub">Calendar write-back is parked while we verify it updates events correctly. Your confirmed re-chains and moves are saved here and will push once it\u2019s unlocked.</div>'); } else ensureGToken(()=>{updateCalBtns();gModal('Connected','<div class="gsub">\u2705 Calendar connected \u2014 the button is now <b>Update Calendar</b>. Write-back stays parked until we verify it end-to-end.</div>');}); });
$('fromDate').addEventListener('change',()=>{SELECTED=null;boot();});
function boot(){
  if(!$('fromDate').value)$('fromDate').value=TODAY_ISO;
  $('rfstamp').textContent='jobs through '+Object.keys(DATA.days).sort().slice(-1)[0]+' \u00b7 '+DATA.foremen.filter(f=>f.status!=='Active'&&f.status!=='Cancelled').length+' backup crews held';
  updateCalBtns();
  renderHorizon();
  const fs=WINDOW.find(d=>d.status==='short')||WINDOW.find(d=>d.status==='tight')||WINDOW[0];
  if(fs){SELECTED=fs.iso;renderHorizon();renderDay(SELECTED);}
  else $('daydetail').innerHTML='<div class="pickprompt">No calendar days in this range. Pick another start date above.</div>';
}
boot();
</script>
